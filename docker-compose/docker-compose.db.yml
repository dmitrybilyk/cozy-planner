services:
  db:
    image: postgres:15-alpine
    container_name: planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: planner_db
    ports:
      - "5432:5432"
    volumes:
      - planner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d planner_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cozy-net

networks:
  cozy-net:

volumes:
  planner_postgres_data:
