# Prod overlay for notifications + search-service.
# Use alongside docker-compose.services.yml to activate prod Spring profile
# (real Telegram bots, prod Kafka config).
#
# Usage (with local Kafka already running):
#   docker compose \
#     -f docker-compose.services.yml \
#     -f docker-compose.services-prod.yml \
#     -p docker-compose up -d notifications search-service
#
# Or start the full local stack at once:
#   docker compose \
#     -f docker-compose.kafka.yml \
#     -f docker-compose.services.yml \
#     -f docker-compose.services-prod.yml \
#     -p docker-compose up -d

services:

  notifications:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - cozy-net

  search-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - cozy-net

networks:
  cozy-net:
