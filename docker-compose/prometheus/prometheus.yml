global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'planner-app'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['cozy-planner.duckdns.org:443']
        labels:
          app: cozy-planner
    metrics_path: /actuator/prometheus

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
