spring:
  application:
    name: linkease-server

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: linkease-reminder-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  datasource:
    url: jdbc:postgresql://localhost:5432/linkease_db?stringtype=unspecified
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?access_type=offline

  session:
    store-type: jdbc
    timeout: 30d
    jdbc:
      initialize-schema: never

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  address: 0.0.0.0
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # Only this Google account is allowed to log in — single-tenant app, no multi-user model.
  owner-email: ${APP_OWNER_EMAIL:}
  notification-service: ${APP_NOTIFICATION_SERVICE:direct}
  notification-topic: ${APP_NOTIFICATION_TOPIC:linkease-notifications}

telegram:
  enabled: ${TELEGRAM_ENABLED:true}
  bot-token: ${LINKEASE_TELEGRAM_BOT_TOKEN:}
  bot-username: ${LINKEASE_TELEGRAM_BOT_USERNAME:LinkEaseBot}
  webhook-url: ${LINKEASE_TELEGRAM_WEBHOOK_URL:}
  webhook-secret: ${LINKEASE_TELEGRAM_WEBHOOK_SECRET:}
  reminder-minutes-before: ${TELEGRAM_REMINDER_MINUTES_BEFORE:60}
  developer-bot-token: ${DEVELOPER_BOT_TOKEN:}
  developer-chat-id: ${DEVELOPER_CHAT_ID:0}
