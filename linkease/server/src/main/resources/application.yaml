spring:
  application:
    name: linkease-server

  datasource:
    url: jdbc:postgresql://localhost:5432/linkease_db?stringtype=unspecified
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?access_type=offline

  session:
    store-type: jdbc
    timeout: 30d
    jdbc:
      initialize-schema: never

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  address: 0.0.0.0
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # Only this Google account is allowed to log in — single-tenant app, no multi-user model.
  owner-email: ${APP_OWNER_EMAIL:}

telegram:
  enabled: ${TELEGRAM_ENABLED:true}
  bot-token: ${LINKEASE_TELEGRAM_BOT_TOKEN:}
  bot-username: ${LINKEASE_TELEGRAM_BOT_USERNAME:LinkEaseBot}
  webhook-url: ${LINKEASE_TELEGRAM_WEBHOOK_URL:}
  webhook-secret: ${LINKEASE_TELEGRAM_WEBHOOK_SECRET:}
  reminder-minutes-before: ${TELEGRAM_REMINDER_MINUTES_BEFORE:60}
