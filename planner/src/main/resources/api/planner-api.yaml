openapi: 3.0.3
info:
  title: Planner Service API
  description: API for managing sports training schedules between coaches and athletes.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Coaches
    description: Operations for coach data
  - name: Athletes
    description: Operations for athlete data
  - name: Workouts
    description: Operations for planning and retrieving training sessions

paths:
  /api/v1/coaches/{coachId}/athletes:
    get:
      tags: [Coaches]
      summary: Get all athletes assigned to a specific coach
      operationId: getCoachAthletes
      parameters:
        - name: coachId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: A list of athletes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AthleteDTO'

  /api/v1/workouts:
    get:
      tags: [Workouts]
      summary: Retrieve workouts based on filters
      operationId: getWorkouts
      parameters:
        - name: coachId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: athleteId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of training sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutDTO'

    post:
      tags: [Workouts]
      summary: Schedule a new workout for an athlete
      operationId: createWorkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        '201':
          description: Workout created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDTO'

components:
  schemas:
    CoachDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        specialization:
          type: string

    AthleteDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        coachId:
          type: integer
          format: int64

    WorkoutDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          example: "08:30"
        durationMinutes:
          type: integer
        athleteId:
          type: integer
          format: int64
        coachId:
          type: integer
          format: int64

    CreateWorkoutRequest:
      type: object
      required: [title, date, athleteId, coachId]
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        durationMinutes:
          type: integer
        athleteId:
          type: integer
          format: int64
        coachId:
          type: integer
          format: int64