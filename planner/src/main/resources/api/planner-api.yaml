openapi: 3.0.3
info:
  title: Planner Service API
  description: API for managing scheduling and planning.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Clubs
    description: Operations for club/group management
  - name: Mentors
    description: Operations for mentor data
  - name: Trainees
    description: Operations for trainee data
  - name: Sessions
    description: Operations for planning and retrieving sessions
  - name: Locations
    description: Operations for location (place) management

paths:
  # --- КЛУБИ ---
  /api/v1/clubs:
    get:
      tags: [Clubs]
      summary: List all registered clubs
      operationId: getClubs
      responses:
        '200':
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClubDTO'
    post:
      tags: [Clubs]
      summary: Create a new club
      operationId: createClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClubRequest'
      responses:
        '201':
          description: Club created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDTO'

  /api/v1/clubs/{clubId}:
    parameters:
      - name: clubId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Clubs]
      summary: Get club by ID
      operationId: getClubById
      responses:
        '200':
          description: Club details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDTO'
    put:
      tags: [Clubs]
      summary: Update club details
      operationId: updateClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClubDTO'
      responses:
        '200':
          description: Club updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDTO'
    delete:
      tags: [Clubs]
      summary: Delete a club
      operationId: deleteClub
      responses:
        '204':
          description: Club deleted successfully

  # --- ТРЕНЕРИ ---
  /api/v1/clubs/{clubId}/mentors:
    get:
      tags: [Mentors]
      summary: Get all mentors in a specific club
      operationId: getClubMentors
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MentorDTO'

  # --- АТЛЕТИ ---
  /api/v1/mentors/{mentorId}/trainees:
    get:
      tags: [Mentors]
      summary: Get all trainees assigned to a specific mentor
      operationId: getMentorTrainees
      parameters:
        - name: mentorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: A list of trainees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TraineeDTO'

  /api/v1/trainees:
    post:
      tags: [Trainees]
      summary: Create a new trainee
      operationId: createTrainee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTraineeRequest'
      responses:
        '201':
          description: Athlete created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeDTO'

  /api/v1/trainees/{traineeId}:
    parameters:
      - name: traineeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Trainees]
      summary: Get trainee by ID
      operationId: getTraineeById
      responses:
        '200':
          description: Trainee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeDTO'
    put:
      tags: [Trainees]
      summary: Update an existing trainee
      operationId: updateTrainee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeDTO'
      responses:
        '200':
          description: Athlete updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeDTO'
    delete:
      tags: [Trainees]
      summary: Delete a trainee
      operationId: deleteTrainee
      responses:
        '204':
          description: Trainee deleted successfully

  # --- ЛОКАЦІЇ ---
  /api/v1/mentors/{mentorId}/locations:
    get:
      tags: [Locations]
      summary: Get all locations for a specific mentor
      operationId: getMentorLocations
      parameters:
        - name: mentorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationDTO'

  /api/v1/locations:
    post:
      tags: [Locations]
      summary: Create a new location
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDTO'

  /api/v1/locations/{locationId}:
    parameters:
      - name: locationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Locations]
      summary: Get location by ID
      operationId: getLocationById
      responses:
        '200':
          description: Location details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDTO'
    put:
      tags: [Locations]
      summary: Update a location
      operationId: updateLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationDTO'
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDTO'
    delete:
      tags: [Locations]
      summary: Delete a location
      operationId: deleteLocation
      responses:
        '204':
          description: Location deleted successfully

  # --- СЕСІЇ ---
  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: Retrieve sessions based on filters
      operationId: getSessions
      parameters:
        - name: mentorId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: traineeId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionDTO'

    post:
      tags: [Sessions]
      summary: Schedule or update a session (upsert)
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created or updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDTO'

  /api/v1/sessions/{sessionId}:
    parameters:
       - name: sessionId
         in: path
         required: true
         schema:
           type: integer
           format: int64
    delete:
      tags: [Sessions]
      summary: Delete a session
      operationId: deleteSession
      responses:
        '204':
          description: Session deleted successfully

components:
  schemas:
    ClubDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string

    CreateClubRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    MentorDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        specialization:
          type: string
        clubId:
          type: integer
          format: int64

    TraineeDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        mentorId:
          type: integer
          format: int64

    CreateTraineeRequest:
      type: object
      required: [name, mentorId]
      properties:
        name:
          type: string
        description:
          type: string
        mentorId:
          type: integer
          format: int64

    SessionDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          example: "08:30"
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          example: "09:30"
        traineeIds:
          type: array
          items:
            type: integer
            format: int64
        mentorId:
          type: integer
          format: int64
        locationId:
          type: integer
          format: int64
        color:
          type: string
        confirmationStatus:
          type: string
        createdBy:
          type: string
        confirmedTraineeIds:
          type: string
        rejectedTraineeIds:
          type: string
        recurring:
          type: boolean
        recurrenceGroupId:
          type: string

    LocationDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        color:
          type: string
        googleMapsUrl:
          type: string
        mentorId:
          type: integer
          format: int64

    CreateLocationRequest:
      type: object
      required: [name, mentorId]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string
        googleMapsUrl:
          type: string
        mentorId:
          type: integer
          format: int64

    CreateSessionRequest:
      type: object
      required: [title, date, traineeIds, mentorId]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        traineeIds:
          type: array
          items:
            type: integer
            format: int64
        mentorId:
          type: integer
          format: int64
        locationId:
          type: integer
          format: int64
        recurring:
          type: boolean
