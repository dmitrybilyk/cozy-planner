openapi: 3.0.3
info:
  title: Planner Service API
  description: API for managing scheduling and planning.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Clubs
    description: Operations for club/group management
  - name: Coaches
    description: Operations for coach (mentor) data
  - name: Athletes
    description: Operations for athlete (trainee) data
  - name: Workouts
    description: Operations for planning and retrieving meetings
  - name: Locations
    description: Operations for location (place) management

paths:
  # --- КЛУБИ ---
  /api/v1/clubs:
    get:
      tags: [Clubs]
      summary: List all registered clubs
      operationId: getClubs
      responses:
        '200':
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClubDTO'
    post:
      tags: [Clubs]
      summary: Create a new club
      operationId: createClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClubRequest'
      responses:
        '201':
          description: Club created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDTO'

  /api/v1/clubs/{clubId}:
    parameters:
      - name: clubId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Clubs]
      summary: Get club by ID
      operationId: getClubById
      responses:
        '200':
          description: Club details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDTO'
    put:
      tags: [Clubs]
      summary: Update club details
      operationId: updateClub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClubDTO'
      responses:
        '200':
          description: Club updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDTO'
    delete:
      tags: [Clubs]
      summary: Delete a club
      operationId: deleteClub
      responses:
        '204':
          description: Club deleted successfully

  # --- ТРЕНЕРИ ---
  /api/v1/clubs/{clubId}/coaches:
    get:
      tags: [Coaches]
      summary: Get all coaches in a specific club
      operationId: getClubCoaches
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CoachDTO'

  # --- АТЛЕТИ ---
  /api/v1/coaches/{coachId}/athletes:
    get:
      tags: [Coaches]
      summary: Get all athletes assigned to a specific coach
      operationId: getCoachAthletes
      parameters:
        - name: coachId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: A list of athletes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AthleteDTO'

  /api/v1/athletes:
    post:
      tags: [Athletes]
      summary: Create a new athlete
      operationId: createAthlete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAthleteRequest'
      responses:
        '201':
          description: Athlete created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteDTO'

  /api/v1/athletes/{athleteId}:
    parameters:
      - name: athleteId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Athletes]
      summary: Get athlete by ID
      operationId: getAthleteById
      responses:
        '200':
          description: Athlete details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteDTO'
    put:
      tags: [Athletes]
      summary: Update an existing athlete
      operationId: updateAthlete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AthleteDTO'
      responses:
        '200':
          description: Athlete updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteDTO'
    delete:
      tags: [Athletes]
      summary: Delete an athlete
      operationId: deleteAthlete
      responses:
        '204':
          description: Athlete deleted successfully

  # --- ЛОКАЦІЇ ---
  /api/v1/coaches/{coachId}/locations:
    get:
      tags: [Locations]
      summary: Get all locations for a specific coach
      operationId: getCoachLocations
      parameters:
        - name: coachId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationDTO'

  /api/v1/locations:
    post:
      tags: [Locations]
      summary: Create a new location
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDTO'

  /api/v1/locations/{locationId}:
    parameters:
      - name: locationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Locations]
      summary: Get location by ID
      operationId: getLocationById
      responses:
        '200':
          description: Location details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDTO'
    put:
      tags: [Locations]
      summary: Update a location
      operationId: updateLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationDTO'
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDTO'
    delete:
      tags: [Locations]
      summary: Delete a location
      operationId: deleteLocation
      responses:
        '204':
          description: Location deleted successfully

  # --- ТРЕНУВАННЯ ---
  /api/v1/workouts:
    get:
      tags: [Workouts]
      summary: Retrieve workouts based on filters
      operationId: getWorkouts
      parameters:
        - name: coachId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: athleteId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutDTO'

    post:
      tags: [Workouts]
      summary: Schedule or update a workout (upsert)
      operationId: createWorkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        '201':
          description: Workout created or updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDTO'

  /api/v1/workouts/{workoutId}:
    parameters:
       - name: workoutId
         in: path
         required: true
         schema:
           type: integer
           format: int64
    delete:
      tags: [Workouts]
      summary: Delete a workout
      operationId: deleteWorkout
      responses:
        '204':
          description: Workout deleted successfully

components:
  schemas:
    ClubDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string

    CreateClubRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    CoachDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        specialization:
          type: string
        clubId:
          type: integer
          format: int64

    AthleteDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        coachId:
          type: integer
          format: int64

    CreateAthleteRequest:
      type: object
      required: [name, coachId]
      properties:
        name:
          type: string
        description:
          type: string
        coachId:
          type: integer
          format: int64

    WorkoutDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          example: "08:30"
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          example: "09:30"
        athleteIds:
          type: array
          items:
            type: integer
            format: int64
        coachId:
          type: integer
          format: int64
        locationId:
          type: integer
          format: int64
        color:
          type: string

    LocationDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        color:
          type: string
        coachId:
          type: integer
          format: int64

    CreateLocationRequest:
      type: object
      required: [name, coachId]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string
        coachId:
          type: integer
          format: int64

    CreateWorkoutRequest:
      type: object
      required: [title, date, athleteIds, coachId]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        athleteIds:
          type: array
          items:
            type: integer
            format: int64
        coachId:
          type: integer
          format: int64
        locationId:
          type: integer
          format: int64
