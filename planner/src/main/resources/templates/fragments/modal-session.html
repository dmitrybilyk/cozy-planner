<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- МОДАЛКА ТРЕНУВАННЯ -->
<div x-show="showModal" data-tour="session-modal" class="fixed inset-0 z-[70] flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm px-0 sm:px-4" x-cloak x-transition @keydown.escape.window="showModal && closeModal()">
    <div class="modal-container" @click.away="closeModal()">
        <div class="p-6 border-b border-[#333] flex justify-between items-center">
            <h3 class="text-2xl sm:text-3xl font-bold text-white" x-text="editingSessionId ? (labels.edit || 'Редагувати') : (labels.new_session || 'Нова сесія')"></h3>
            <button x-show="editingSessionId" @click="askDeleteSession()" class="text-red-500 font-bold text-xs ">Видалити</button>
        </div>
        <div x-show="freeSlotContext" class="px-6 pt-3 pb-0">
            <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/25">
                <svg class="w-3.5 h-3.5 text-emerald-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-xs font-semibold text-emerald-300">Вільний час: <span class="font-black tabular-nums" x-text="freeSlotContext ? freeSlotContext.startStr + ' — ' + freeSlotContext.endStr : ''"></span></span>
            </div>
        </div>
        <div class="border-b border-[#333] px-6 py-3">
            <div x-ref="dateScroller" class="flex overflow-x-auto no-scrollbar space-x-3 scroll-smooth">
                <template x-for="day in futureDays" :key="day.dateStr">
                    <button :data-date="day.dateStr" @click="onSessionDateChange(day.dateStr)"
                            class="flex-shrink-0 flex flex-col items-center min-w-[56px]"
                            :class="day.isMonday ? 'week-start' : ''">
                        <div class="w-12 h-12 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                             :class="[day.dateStr === sessionForm.date ? 'ig-gradient shadow-lg' : (day.isWeekend || dayOffs.includes(day.dateStr) ? 'bg-[#5a2525]' : 'bg-[#333]'), day.dateStr === todayStr ? 'today-marker' : '']">
                            <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                                <span class="text-xs font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                                <span class="text-xs font-bold text-white" x-text="day.dayNum"></span>
                            </div>
                        </div>
                        <span x-show="day.dateStr === todayStr" class="text-[9px] font-black text-white uppercase mt-1 tracking-tighter" x-text="labels.today || 'Сьогодні'"></span>
                        <div x-show="dayOffs.includes(day.dateStr)" class="text-[9px] font-black text-red-400 uppercase mt-0.5">✕</div>
                    </button>
                </template>
            </div>
        </div>
        <div class="modal-body space-y-6">
            <div x-show="isTimePassed()" class="bg-red-900/20 text-red-400 p-3 rounded-xl text-xs font-bold uppercase text-center">Час уже минув</div>
            <div class="space-y-4">
                <div><label class="text-xs sm:text-sm font-black text-gray-400 uppercase mb-2 block" x-text="labels.session_name || 'Назва'"></label><input type="text" x-model="sessionForm.title" class="w-full bg-transparent border-b border-[#333] outline-none py-3 text-base focus:border-blue-500"></div>
                <div x-show="multiLocation || shareAvailability" class="flex items-center gap-2">
                    <div x-show="multiLocation" class="flex-1">
                        <label class="text-xs sm:text-sm font-black text-gray-400 uppercase mb-2 block" x-text="labels.session_location || 'Локація'"></label>
                        <div class="relative" x-data="{ locOpen: false }" @click.outside="locOpen = false">
                            <button type="button" @click="locOpen = !locOpen"
                                    class="w-full flex items-center gap-2 py-2 border-b border-[#333] text-left focus:outline-none">
                                <span class="w-3 h-3 rounded-full flex-shrink-0"
                                      :style="'background: ' + (sessionForm.locationId ? getLocationColor(sessionForm.locationId) : '#555')"></span>
                                <span class="flex-1 text-sm text-gray-200"
                                      x-text="sessionForm.locationId ? getLocationName(sessionForm.locationId) : (labels.no_location || 'Оберіть локацію')"></span>
                                <svg class="w-4 h-4 text-gray-500 flex-shrink-0 transition-transform" :class="locOpen ? 'rotate-180' : ''"
                                     fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </button>
                            <div x-show="locOpen" class="absolute z-30 top-full left-0 right-0 mt-1 bg-[#2a2a2a] border border-[#444] rounded-xl shadow-xl overflow-hidden">
                                <template x-for="location in availableLocations" :key="location.id">
                                    <button type="button"
                                            @click="sessionForm.locationId = location.id; onSessionLocationChange(); locOpen = false"
                                            class="w-full flex items-center gap-2.5 px-3 py-2.5 hover:bg-[#333] transition text-left"
                                            :class="sessionForm.locationId == location.id ? 'bg-[#333]' : ''">
                                        <span class="w-3 h-3 rounded-full flex-shrink-0" :style="'background: ' + (location.color || '#3b82f6')"></span>
                                        <span class="text-sm text-gray-200" x-text="location.name"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                    <button x-show="shareAvailability" @click="showAvailPopup = true" type="button"
                            class="text-xs font-bold px-3 py-2 rounded-xl whitespace-nowrap transition text-blue-400 bg-blue-900/30 hover:bg-blue-900/50 self-end"
                            x-text="labels.availability || 'Моя доступність'">
                    </button>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-xs sm:text-sm font-black text-gray-400 uppercase" x-text="labels.manage_trainees || 'Учні'"></p>
                        <span x-show="sessionForm.traineeIds.length" class="text-xs sm:text-sm font-bold text-blue-400 bg-blue-900/30 px-2.5 py-0.5 rounded-full" x-text="sessionForm.traineeIds.length + ' ' + (labels.selected_count || 'вибр.')"></span>
                    </div>
                    <div x-data="{ traineePickerOpen: false }"
                         x-effect="if (!showModal) { traineePickerOpen = false; traineeSearch = ''; }"
                         @click.outside="traineePickerOpen = false; traineeSearch = ''">
                        <!-- Selected chips -->
                        <div x-show="sessionForm.traineeIds.length" class="flex flex-wrap gap-1.5 mb-2">
                            <template x-for="aId in sessionForm.traineeIds" :key="aId">
                                <button @click="toggleTraineeSelection(aId)" type="button"
                                        class="inline-flex items-center gap-1 bg-blue-900/40 text-blue-300 text-xs sm:text-sm font-semibold px-2.5 py-1.5 rounded-full border border-blue-500/30 active:scale-95 transition-all">
                                    <span x-text="getTraineeName(aId)"></span>
                                    <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                            </template>
                        </div>
                        <!-- Combobox input -->
                        <div class="relative">
                            <input x-ref="traineeSearchInput" x-model="traineeSearch" type="text"
                                   @focus="traineePickerOpen = true"
                                   @click="traineePickerOpen = true"
                                   @keydown.escape="traineePickerOpen = false; traineeSearch = ''"
                                   :placeholder="sessionForm.traineeIds.length ? (labels.add_trainee || 'Додати ще...') : (labels.trainee_search || 'Пошук учня...')"
                                   class="w-full bg-[#1a1a1a] text-sm text-gray-200 placeholder-gray-600 rounded-xl px-3 py-2.5 focus:outline-none border border-[#333] focus:border-blue-500 transition">
                            <!-- Dropdown -->
                            <div x-show="traineePickerOpen" x-cloak
                                 class="absolute z-40 left-0 right-0 mt-1 bg-[#222] border border-[#444] rounded-xl shadow-2xl overflow-hidden max-h-52 overflow-y-auto">
                                <template x-for="trainee in filteredTrainees" :key="trainee.id">
                                    <button type="button"
                                            @mousedown.prevent="toggleTraineeSelection(trainee.id); traineeSearch = ''; if (sessionForm.traineeIds.includes(trainee.id)) { traineePickerOpen = false; }"
                                            class="w-full flex items-center gap-2.5 px-3 py-2.5 hover:bg-[#333] transition text-left"
                                            :class="sessionForm.traineeIds.includes(trainee.id) ? 'bg-blue-600/15' : ''">
                                        <span :class="isAvailable(trainee.id, sessionForm.date)?.length > 0 ? 'w-2 h-2 rounded-full bg-green-500 flex-shrink-0' : isAvailable(trainee.id, sessionForm.date) !== null ? 'w-2 h-2 rounded-full bg-red-500 flex-shrink-0' : 'w-2 h-2 rounded-full bg-gray-600 flex-shrink-0'"></span>
                                        <span class="text-sm text-gray-200 flex-1 truncate" x-text="trainee.name"></span>
                                        <svg x-show="sessionForm.traineeIds.includes(trainee.id)" class="w-4 h-4 text-blue-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                                    </button>
                                </template>
                                <div x-show="filteredTrainees.length === 0" class="text-center py-6 text-gray-600 text-xs" x-text="labels.not_found || 'Нічого не знайдено'"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs sm:text-sm font-black text-gray-500 uppercase" x-text="labels.session_time || 'Час'"></span>
                        <span class="text-[11px] text-gray-600 font-normal">· крок <span x-text="availStep || 30"></span> хв</span>
                        <span x-show="sessionForm.startTime && sessionForm.endTime" class="text-sm sm:text-base font-bold text-blue-400 bg-blue-900/30 px-3 py-1.5 rounded-full" x-text="sessionForm.startTime + ' — ' + sessionForm.endTime + ' · ' + getDurationLabel()"></span>
                        <span x-show="!sessionForm.startTime && sessionForm._prevStartTime" class="text-sm font-bold text-gray-600 line-through px-3 py-1.5" x-text="(sessionForm._prevStartTime || '') + ' — ' + (sessionForm._prevEndTime || '')"></span>
                        <button x-show="sessionForm.startTime" @click="sessionForm.startTime = null; sessionForm.endTime = null; sessionForm._prevStartTime = null; sessionForm._prevEndTime = null" type="button" class="text-xs font-bold text-red-400">Скинути</button>
                    </div>
                    <div class="flex items-center gap-2 bg-[#1a1a1a] rounded-xl border border-[#2a2a2a] p-3">
                        <select x-model="sessionForm.startTime" @change="onSessionStartChange()"
                                class="flex-1 bg-transparent text-gray-200 border border-[#444] rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                            <option value="">Від</option>
                            <template x-for="t in validStartSlots" :key="t">
                                <option :value="t" x-text="t" :class="t.endsWith(':00') ? 'font-semibold text-blue-400' : ''"></option>
                            </template>
                        </select>
                        <span class="text-gray-500 text-xs">—</span>
                        <select x-model="sessionForm.endTime"
                                class="flex-1 bg-transparent text-gray-200 border border-[#444] rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                            <option value="">До</option>
                            <template x-for="t in validEndSlots" :key="t">
                                <option :value="t" x-text="t" :class="t.endsWith(':00') ? 'font-semibold text-blue-400' : ''"></option>
                            </template>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer flex space-x-3">
            <button @click="closeModal()" class="flex-1 py-4 font-bold text-gray-500 text-sm" x-text="labels.cancel || 'Скасувати'"></button>
            <button @click="saveSession()" :class="saveBtnClass" :disabled="sessionSaving || sessionForm.traineeIds.length === 0 || isTimePassed() || !sessionForm.endTime || (locations.length > 0 && !sessionForm.locationId)" x-text="sessionSaving ? '...' : (labels.save || 'Зберегти')"></button>
        </div>
    </div>
</div>
</th:block>
</body>
</html>
