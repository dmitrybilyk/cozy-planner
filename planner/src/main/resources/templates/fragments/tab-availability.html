<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- ДОСТУПНІСТЬ ТРЕНЕРА -->
    <div x-show="activeTab === 'coach-availability'" class="max-w-2xl mx-auto p-4 pb-28">

        <div class="sticky top-0 z-10 bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] mb-4">
            <div class="flex overflow-x-auto no-scrollbar space-x-2 p-3">
                <template x-for="day in coachAvailDays" :key="day.ds">
                    <button @click="coachAvailSel(day.ds)"
                            class="flex-shrink-0 flex flex-col items-center px-2.5 py-1.5 rounded-lg transition-all min-w-[36px] relative"
                            :class="day.ds === coachAvailDate ? 'bg-blue-600 text-white shadow-lg' : (day.isWeekend ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                        <span class="text-[11px] font-bold uppercase" x-text="day.wd"></span>
                        <span class="text-sm font-black leading-tight" x-text="day.num"></span>
                        <span class="text-[11px] font-bold" x-text="day.mo"></span>
                        <span x-show="coachHasRanges(day.ds)" class="w-1 h-1 rounded-full bg-blue-400 mt-1"></span>
                    </button>
                </template>
            </div>
            <div data-tour="avail-share" class="px-3 py-2 border-t border-[#2a2a2a] flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-gray-400 uppercase">Поділитися</span>
                    <button @click="coachCopyLink()" class="px-2.5 py-1 rounded-lg bg-[#2a2a2a] hover:bg-[#333] text-xs font-bold transition" :class="coachCopied ? 'text-green-400' : 'text-gray-300'">
                        <span x-text="coachCopied ? '✓ Скопійовано' : 'Посиланням'"></span>
                    </button>
                    <button @click="coachCopyImageWeek()" class="px-2.5 py-1 rounded-lg bg-[#2a2a2a] hover:bg-[#333] text-xs font-bold transition" :class="coachImgCopiedWeek ? 'text-green-400' : 'text-gray-300'">
                        <span x-text="coachImgCopiedWeek ? '✓ Скопійовано' : 'Картинкою на день'"></span>
                    </button>
                </div>
                <div class="flex items-center gap-2"></div>
            </div>
            <div data-tour="avail-intervals" class="px-3 py-2 border-t border-[#2a2a2a] flex items-center justify-between">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Інтервали доступності по локаціях</span>
                <button @click="coachAddRange()" :disabled="coachAllCovered"
                        class="text-xs font-bold flex items-center gap-1 transition"
                        :class="coachAllCovered ? 'text-gray-600 cursor-not-allowed' : 'text-blue-400 hover:text-blue-300'">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    Додати
                </button>
            </div>
        </div>

        <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden mb-4">
            <div class="p-4 space-y-3">
                <template x-for="(r, i) in coachRanges" :key="i">
                    <div class="flex items-center gap-2 rounded-xl p-3 transition-all duration-300 bg-[#262626]"
                         :class="r._new ? '!bg-[#1e2a3a] !ring-2 !ring-blue-500/40' : ''"
                         x-effect="$el.style.borderLeft = '4px solid ' + (getLocColor(r.locationId) || 'transparent')">
                        <div class="flex-1 flex items-center gap-1">
                             <select x-model="r.startTime" @change="onCoachAvailStartChange(i)"
                                    x-effect="$nextTick(() => $el.value = r.startTime)"
                                    class="bg-transparent text-gray-200 border border-[#444] rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500">
                                <option value="" disabled>Час</option>
                                <template x-for="t in coachStartSlots(i)" :key="t">
                                    <option :value="t" x-text="t"></option>
                                </template>
                            </select>
                            <span class="text-gray-500 text-xs">—</span>
                            <select x-model="r.endTime" @change="coachMarkDirty()"
                                    x-effect="$nextTick(() => $el.value = r.endTime)"
                                    class="bg-transparent text-gray-200 border border-[#444] rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500">
                                <option value="" disabled>Час</option>
                                <template x-for="t in coachEndSlots(r.startTime, i)" :key="t">
                                    <option :value="t" x-text="t"></option>
                                </template>
                            </select>
                        </div>
                        <div x-show="locations.length > 0" class="flex items-center gap-1">
                            <select x-model="r.locationId" @change="coachMarkDirty()"
                                    x-effect="$nextTick(() => $el.value = r.locationId)"
                                    class="bg-[#333] text-gray-300 text-xs rounded-lg px-1.5 py-1.5 border border-[#444] focus:outline-none max-w-[80px]">
                                <option :value="null">—</option>
                                <template x-for="loc in locations" :key="loc.id">
                                    <option :value="loc.id" x-text="loc.name" :style="'color:' + (loc.color || '#3b82f6')"></option>
                                </template>
                            </select>
                        </div>
                        <button @click="coachRemoveRange(i)" class="p-1 text-red-400 hover:text-red-300 transition flex-shrink-0">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </template>
                <div x-show="coachRanges.length === 0" class="text-center py-4 text-gray-600 text-xs">
                    Натисніть "Додати", щоб створити інтервал доступності
                </div>
            </div>
        </div>

        <div x-show="coachAvailHasUnsaved && !coachSaving"
             class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"
             x-cloak x-transition>
            <button @click="coachSaveAll()"
                    :disabled="coachRanges.some(r => !r.startTime || !r.endTime)"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 transition-all active:scale-95 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                Зберегти
            </button>
        </div>

        <div x-show="coachSaving"
             class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"
             x-cloak x-transition>
            <div class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 flex items-center gap-2">
                <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Збереження...
            </div>
        </div>

        <div x-show="coachSaved && !coachSaving"
             class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"
             x-cloak x-transition>
            <div class="bg-green-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-green-600/30 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                Збережено!
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
