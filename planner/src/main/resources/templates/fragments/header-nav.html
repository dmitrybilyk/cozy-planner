<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- ВЕРХНЯ СЕКЦІЯ: навігація та кнопки -->
<header x-show="!loading" class="flex-shrink-0 bg-[#1a1a1a]/95 backdrop-blur-lg border-b border-[#333] shadow-md">
    <!-- Ряд 1: Профіль, Історія, День/План -->
    <div class="px-3 sm:px-4 h-14 sm:h-16 flex items-center justify-between">
        <div @click="activeTab = 'profile'" data-tour="profile" class="flex items-center space-x-2 sm:space-x-3 min-w-0 cursor-pointer rounded-lg px-2 py-1.5 transition"
             :class="activeTab === 'profile' ? 'bg-white/10' : 'hover:bg-white/5'">
            <div class="ig-ring w-7 h-7 sm:w-9 sm:h-9 flex items-center justify-center flex-shrink-0">
                <template x-if="photoUrl">
                    <img :src="photoUrl" class="w-full h-full rounded-full object-cover">
                </template>
                <template x-if="!photoUrl">
                    <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                        <span class="text-xs sm:text-sm font-black italic ig-gradient-text">CP</span>
                    </div>
                </template>
            </div>
            <div class="leading-tight truncate">
                <h1 class="text-sm sm:text-sm font-bold truncate" x-text="mentor.name || 'Cozy Planner'"></h1>
                <p x-show="user.email" class="text-xs sm:text-xs text-gray-500 font-medium truncate" x-text="user.email"></p>
            </div>
            <svg class="w-3.5 h-3.5 flex-shrink-0 ml-1 transition-colors" :class="activeTab === 'profile' ? 'text-white' : 'text-gray-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
        </div>
        <div class="flex items-center gap-1.5">
            <button @click="activeTab = 'history'; loadPastSessions()"
                    data-tour="history"
                    class="flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-xl transition-all"
                    :class="activeTab === 'history' ? 'bg-[#444] ring-2 ring-blue-400' : 'bg-[#333] hover:bg-[#444]'"
                    title="Історія">
                <span class="text-sm sm:text-base">🕐</span>
            </button>
            <button @click="activeTab = 'trainees'"
                    data-tour="trainees"
                    class="flex items-center justify-center w-9 h-9 sm:w-10 sm:h-10 rounded-xl transition-all"
                    :class="activeTab === 'trainees' ? 'bg-[#444] ring-2 ring-emerald-400' : 'bg-[#333] hover:bg-[#444]'"
                    title="Учні">
                <svg class="w-5 h-5" :class="activeTab === 'trainees' ? 'text-emerald-400' : 'text-gray-400'"
                     fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/>
                </svg>
            </button>
            <button x-show="multiLocation" @click="activeTab = 'locations'"
                    data-tour="locations-btn"
                    class="flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-xl transition-all"
                    :class="activeTab === 'locations' ? 'bg-[#444] ring-2 ring-rose-400' : 'bg-[#333] hover:bg-[#444]'"
                    title="Місця">
                <svg class="w-4 h-4" :class="activeTab === 'locations' ? 'text-rose-400' : 'text-gray-400'"
                     fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
                </svg>
            </button>
        </div>
     </div>
    <!-- Ряд 2: Смуга днів -->
    <div class="bg-[#1a1a1a] border-b border-[#333]" data-tour="days-row">
        <div class="flex items-center px-2 pt-2 pb-3 gap-1">
            <div id="calendar-container" class="flex-1 flex overflow-x-auto no-scrollbar space-x-3 scroll-smooth" @wheel.passive="handleMouseScroll($event)">
             <template x-for="day in visibleDays" :key="day.dateStr">
                <button @click="selectDay(day.dateStr)"
                        :id="'date-btn-' + day.dateStr"
                        class="flex-shrink-0 flex flex-col items-center min-w-[56px]"
                        :class="day.isMonday ? 'week-start' : ''">
                    <div class="w-12 h-12 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                         :class="[selectedDate === day.dateStr ? 'ig-gradient shadow-lg' : (day.isWeekend || isDayOff(day.dateStr) ? 'bg-[#5a2525]' : sessionCountClass(day.dateStr) || 'bg-[#333]'), day.dateStr === todayStr ? 'today-marker' : '']">
                        <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                            <span class="text-xs font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                            <span class="text-xs font-bold text-white" x-text="day.dayNum"></span>
                        </div>
                    </div>
                    <span x-show="day.dateStr === todayStr" class="text-[9px] font-black text-white uppercase mt-1 tracking-tighter" x-text="labels.today || 'Сьогодні'"></span>
                    <div x-show="isDayOff(day.dateStr)" class="text-[9px] font-black text-red-400 uppercase mt-0.5">✕</div>
                    <div x-show="sessionCountOn(day.dateStr) > 0 && !isDayOff(day.dateStr)" class="mt-0.5 text-xs font-bold text-blue-400" x-text="sessionCountOn(day.dateStr)"></div>
                </button>
            </template>
        </div>
            <button @click="goToToday()" @touchend.prevent="goToToday()"
                    style="touch-action: manipulation; min-width: 48px; min-height: 48px;"
                    class="flex-shrink-0 flex flex-col items-center justify-center gap-0.5 px-2 rounded-xl transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/>
                    <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor"/>
                    <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor"/>
                    <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor"/>
                    <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                </svg>
                <span class="text-[9px] font-bold text-blue-400 uppercase tracking-tight" x-text="labels.today || 'Сьогодні'"></span>
            </button>
    </div>
    </div>
    </div>
</header>
</th:block>
</body>
</html>
