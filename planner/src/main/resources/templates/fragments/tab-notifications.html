<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- СПОВІЩЕННЯ -->
    <div x-show="activeTab === 'notifications'" x-init="loadFeedbackReceivedByMentor()" class="max-w-2xl mx-auto p-4 pb-28">
        <!-- Feedback received from trainees -->
        <template x-if="traineeComm && _feedbackReceivedByMentor && _feedbackReceivedByMentor.length > 0">
            <div class="mb-6">
                <h3 class="text-sm font-black text-gray-500 uppercase tracking-widest mb-3">💬 Відгуки від учнів</h3>
                <div class="space-y-2">
                    <template x-for="fb in _feedbackReceivedByMentor" :key="fb.id">
                        <div class="rounded-xl p-3 border border-purple-500/20 bg-purple-900/10">
                            <div class="flex items-center justify-between gap-2 mb-1">
                                <span class="text-xs font-bold text-purple-400" x-text="fb.senderName || 'Учень'"></span>
                                <div class="flex items-center gap-0.5">
                                    <template x-for="i in [1,2,3,4,5]" :key="i">
                                        <span x-show="fb.rating" class="text-xs" :class="i <= fb.rating ? 'text-yellow-400' : 'text-gray-700'">★</span>
                                    </template>
                                    <span class="text-xs text-gray-600 ml-2" x-text="formatFeedbackDate(fb.createdAt)"></span>
                                </div>
                            </div>
                            <div x-show="fb.tags" class="flex flex-wrap gap-1 mb-1">
                                <template x-for="tag in (fb.tags || '').split(',')" :key="tag">
                                    <span x-show="tag.trim()" class="px-1.5 py-0.5 bg-purple-900/30 text-purple-300 rounded-full text-[10px] font-medium" x-text="tag.trim()"></span>
                                </template>
                            </div>
                            <p x-show="fb.text" class="text-xs text-gray-400" x-text="fb.text"></p>
                        </div>
                    </template>
                </div>
            </div>
        </template>
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-sm sm:text-base font-black text-gray-500 uppercase tracking-widest">🔔 Сповіщення</h3>
            <template x-if="unreadCount > 0">
                <button @click="markAllNotificationsRead()" class="text-sm font-bold text-blue-400 ">Прочитати всі</button>
            </template>
        </div>
        <div x-show="notifications.length === 0" class="text-center py-20 text-gray-600 text-sm">Немає сповіщень.</div>
        <div class="space-y-1">
            <template x-for="n in notifications" :key="n.id">
                <div @click="markNotificationRead(n.id)"
                     class="rounded-xl p-3 border cursor-pointer transition-all"
                     :class="n.isRead ? 'border-transparent opacity-50' : 'border-blue-500/30 bg-[#222]'">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-white" x-text="n.title"></p>
                            <p class="text-xs text-gray-300 mt-0.5" x-text="n.message"></p>
                            <p class="text-xs text-gray-400 mt-1" x-text="n.createdAt ? n.createdAt.slice(0, 16).replace('T', ' ') : ''"></p>
                        </div>
                        <template x-if="!n.isRead">
                            <span class="w-2.5 h-2.5 rounded-full bg-blue-400 flex-shrink-0 mt-1.5"></span>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>
</th:block>
</body>
</html>
