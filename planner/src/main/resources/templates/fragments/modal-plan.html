<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- PLAN SESSIONS MODAL -->
<div x-show="planModal.show" x-cloak x-transition
     class="fixed inset-0 z-[80] flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm px-0 sm:px-4"
     @keydown.escape.window="planModal.show = false">
    <div class="modal-container" @click.away="planModal.show = false">
        <div class="p-6 border-b border-[#333] flex justify-between items-center">
            <div>
                <h3 class="text-2xl font-bold text-white">📅 Планувати тренування</h3>
                <p class="text-sm text-gray-500 mt-0.5" x-text="planModal.traineeName"></p>
            </div>
            <button @click="planModal.show = false" class="text-gray-500 hover:text-gray-300 p-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body space-y-3">
            <template x-for="(slot, idx) in planModal.slots" :key="idx">
                <div class="flex items-center gap-2 bg-[#1e1e1e] rounded-xl p-3 border border-[#2a2a2a]">
                    <div class="flex-1 min-w-0 space-y-2">
                        <input type="date" x-model="slot.date" :min="todayStr"
                               @change="onPlanDateChange(slot)"
                               class="w-full bg-transparent border-b border-[#444] outline-none py-1 text-sm text-gray-200 focus:border-blue-500">
                        <template x-if="locations.length > 0">
                            <div class="relative" x-data="{ planLocOpen: false }" @click.outside="planLocOpen = false">
                                <button type="button" @click="planLocOpen = !planLocOpen"
                                        class="w-full flex items-center gap-2 bg-[#262626] border border-[#444] rounded-lg px-2 py-1 text-left focus:outline-none">
                                    <span class="w-2.5 h-2.5 rounded-full flex-shrink-0"
                                          :style="'background: ' + (slot.locationId ? getLocationColor(slot.locationId) : '#555')"></span>
                                    <span class="flex-1 text-sm text-gray-200"
                                          x-text="slot.locationId ? getLocationName(slot.locationId) : 'Локація'"></span>
                                    <svg class="w-3.5 h-3.5 text-gray-500 flex-shrink-0 transition-transform" :class="planLocOpen ? 'rotate-180' : ''"
                                         fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                                    </svg>
                                </button>
                                <div x-show="planLocOpen" class="absolute z-30 top-full left-0 right-0 mt-1 bg-[#2a2a2a] border border-[#444] rounded-xl shadow-xl overflow-hidden">
                                    <template x-for="loc in locations" :key="loc.id">
                                        <button type="button"
                                                @click="slot.locationId = loc.id; onPlanDateChange(slot); planLocOpen = false"
                                                class="w-full flex items-center gap-2.5 px-3 py-2 hover:bg-[#333] transition text-left"
                                                :class="slot.locationId == loc.id ? 'bg-[#333]' : ''">
                                            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="'background: ' + (loc.color || '#3b82f6')"></span>
                                            <span class="text-sm text-gray-200" x-text="loc.name"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <div class="flex items-center gap-2">
                            <select x-model="slot.startTime" @change="onPlanStartChange(slot)"
                                    class="flex-1 text-sm bg-[#262626] border border-[#444] rounded-lg px-2 py-1 focus:outline-none focus:border-blue-500"
                                    :class="planStartSlots(slot).length === 0 ? 'text-gray-600' : 'text-gray-200'">
                                <option value="" x-show="!slot.startTime" class="text-gray-600">Від</option>
                                <template x-for="t in planStartSlots(slot)" :key="t">
                                    <option :value="t" x-text="t" :class="t.endsWith(':00') ? 'font-semibold' : ''"></option>
                                </template>
                            </select>
                            <span class="text-gray-600 text-xs flex-shrink-0">—</span>
                            <select x-model="slot.endTime"
                                    class="flex-1 text-sm bg-[#262626] border border-[#444] rounded-lg px-2 py-1 focus:outline-none focus:border-blue-500"
                                    :class="planEndSlots(slot).length === 0 ? 'text-gray-600' : 'text-gray-200'">
                                <option value="" x-show="!slot.endTime" class="text-gray-600">До</option>
                                <template x-for="t in planEndSlots(slot)" :key="t">
                                    <option :value="t" x-text="t" :class="t.endsWith(':00') ? 'font-semibold' : ''"></option>
                                </template>
                            </select>
                        </div>
                        <div x-show="slot.date && planStartSlots(slot).length === 0"
                             class="text-xs text-yellow-600 font-medium">⚠ Немає вільних слотів на цю дату</div>
                    </div>
                    <button x-show="planModal.slots.length > 1" @click="removePlanSlot(idx)" type="button"
                            class="flex-shrink-0 text-red-500 hover:text-red-400 p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </template>
            <div class="flex items-center gap-2 pt-1">
                <span class="text-xs text-gray-500 flex-shrink-0">🔁 Щотижня:</span>
                <input type="number" x-model.number="planModal.weeklyCount" min="2" max="52"
                       data-testid="plan-weekly-count"
                       class="w-14 text-sm text-center bg-[#262626] border border-[#444] rounded-lg px-2 py-1 focus:border-blue-500 focus:outline-none text-gray-200">
                <span class="text-xs text-gray-600" x-text="'(' + (planModal.weeklyCount || 8) + ' тренув.)'"></span>
                <button @click="fillWeeklyPlan()" type="button" data-testid="plan-fill-weekly"
                        class="text-xs font-bold text-blue-400 px-3 py-1.5 rounded-lg border border-blue-500/30 hover:bg-blue-500/10 transition">
                    Заповнити
                </button>
                <button @click="addPlanSlot()" type="button"
                        class="ml-auto text-xs text-gray-500 hover:text-gray-300 px-3 py-1.5 rounded-lg border border-dashed border-[#444] hover:border-gray-500 transition">
                    + Ще дату
                </button>
            </div>
            <div x-show="planModal.error" class="text-red-400 text-xs font-medium" x-text="planModal.error"></div>
        </div>
        <div class="modal-footer flex space-x-3">
            <button @click="planModal.show = false" class="flex-1 py-4 font-bold text-gray-500 text-sm">Скасувати</button>
            <button @click="savePlanSessions()" :disabled="planModal.saving"
                    class="flex-1 py-4 font-bold rounded-2xl text-white transition disabled:opacity-50"
                    style="background: linear-gradient(135deg, #7c3aed, #6d28d9)">
                <span x-show="!planModal.saving" x-text="'Зберегти ' + planModal.slots.length + ' тренув.'"></span>
                <span x-show="planModal.saving">Збереження...</span>
            </button>
        </div>
    </div>
</div>

<!-- Availability popup (shown from session modal) -->
<div x-show="showAvailPopup" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition @click="showAvailPopup = false">
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[400px] rounded-[24px] overflow-hidden shadow-2xl" @click.stop>
        <div class="p-5">
            <div class="flex items-center justify-between mb-4">
                <h4 class="text-lg font-bold text-white">
                    <span x-text="labels.availability || 'Доступність'"></span>
                    <span class="text-gray-500 font-normal text-sm"> · <span x-text="sessionForm.date"></span></span>
                </h4>
                <button @click="showAvailPopup = false" class="text-gray-500 hover:text-white transition p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div x-show="getAvailPopupRanges().length === 0" class="text-center py-8 text-gray-500 text-sm">
                <span x-text="labels.no_avail || 'Немає встановленої доступності'"></span>
            </div>
            <div class="space-y-3 max-h-64 overflow-y-auto no-scrollbar pr-1">
                <template x-for="group in getAvailPopupRanges()" :key="group.locationId || '__none__'">
                    <div>
                        <div class="flex items-center gap-2 mb-1.5">
                            <span class="w-3 h-3 rounded-full flex-shrink-0" :style="'background:' + (group.locationColor || '#555')"></span>
                            <span class="text-sm font-bold text-gray-300" x-text="group.locationName || (labels.no_location || 'Без місця')"></span>
                        </div>
                        <div class="space-y-1 pl-5">
                            <template x-for="r in group.ranges" :key="r.startTime + '-' + r.endTime">
                                <div class="flex items-center gap-2 text-sm">
                                    <span class="text-blue-400 font-semibold" x-text="r.startTime || '...'"></span>
                                    <span class="text-gray-600">—</span>
                                    <span class="text-blue-400 font-semibold" x-text="r.endTime || '...'"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
        <div class="border-t border-[#333]">
            <button @click="showAvailPopup = false" class="w-full py-4 text-sm font-bold text-white hover:bg-white/5 transition">Закрити</button>
        </div>
    </div>
</div>

<!-- Session validation errors -->
<div x-show="sessionValidationErrors" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition @click="sessionValidationErrors = null">
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[360px] rounded-[24px] overflow-hidden shadow-2xl" @click.stop>
        <div class="p-6">
            <h4 class="text-lg font-bold text-red-400 mb-3" x-text="labels.cannot_save || 'Неможливо зберегти'"></h4>
            <ul class="space-y-2">
                <template x-for="error in sessionValidationErrors" :key="error">
                    <li class="text-sm text-gray-300 flex items-start gap-2">
                        <span class="text-red-400 mt-0.5 shrink-0">•</span>
                        <span x-text="error"></span>
                    </li>
                </template>
            </ul>
        </div>
        <div class="border-t border-[#333]">
            <button @click="sessionValidationErrors = null" class="w-full py-4 text-sm font-bold text-white">Зрозуміло</button>
        </div>
    </div>
</div>

<!-- Confirm dialog -->
<div x-show="confirmData.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[300px] rounded-[24px] overflow-hidden shadow-2xl"><div class="p-6 text-center text-white"><h4 class="text-lg font-bold" x-text="confirmData.title"></h4><p class="text-sm text-gray-500 mt-2" x-text="confirmData.message"></p></div><div class="flex flex-col border-t border-[#333]"><button @click="confirmData.onConfirm(); confirmData.show = false" class="py-4 text-sm font-bold border-b border-[#333]" :class="confirmData.confirmText === 'Видалити' || !confirmData.confirmText ? 'text-red-500' : 'text-yellow-400'" x-text="confirmData.confirmText || 'Видалити'"></button><button @click="confirmData.show = false" class="py-4 text-sm font-medium text-gray-300">Скасувати</button></div></div>
</div>

<!-- Refresh modal -->
<div x-show="showRefreshModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[300px] rounded-[24px] overflow-hidden shadow-2xl">
        <div class="p-6 text-center text-white">
            <div class="w-12 h-12 rounded-2xl bg-blue-600/20 flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </div>
            <h4 class="text-lg font-bold">Крок змінено</h4>
            <p class="text-sm text-gray-500 mt-2">Оновіть сторінку, щоб побачити зміни в сітці доступності.</p>
        </div>
        <div class="flex flex-col border-t border-[#333]">
            <button @click="showRefreshModal = false; location.reload()" class="py-4 text-sm font-bold text-blue-400 border-b border-[#333] hover:bg-white/5 transition">Оновити</button>
            <button @click="showRefreshModal = false" class="py-4 text-sm font-medium text-gray-300 hover:bg-white/5 transition">Пізніше</button>
        </div>
    </div>
</div>

<!-- Notify trainee modal -->
<div x-show="notifyModal.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition.opacity.duration.200ms>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6">
            <h4 class="text-lg font-bold text-white mb-1" x-text="labels.request_availability_title || '📲 Запросити доступність'"></h4>
            <p class="text-sm text-gray-400 mb-4"><span x-text="labels.request_availability_body || 'Надішліть запит учневі: '"></span><span x-text="notifyModal.traineeName"></span></p>

            <div class="mb-4">
                <label class="text-xs font-bold text-gray-500 uppercase mb-3 block">Період:</label>
                <div class="flex gap-2">
                    <button @click="notifyModal.dayType = 'today'"
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'today' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Сьогодні
                    </button>
                    <button @click="notifyModal.dayType = 'tomorrow'"
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'tomorrow' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Завтра
                    </button>
                    <button @click="notifyModal.dayType = 'specific_day'; notifyModal.targetDate = ''"
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'specific_day' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Обрати день
                    </button>
                    <button @click="notifyModal.dayType = 'weekend'"
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'weekend' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Вихідні
                    </button>
                </div>
                <div x-show="notifyModal.dayType === 'specific_day'" class="mt-3">
                    <input type="date" x-model="notifyModal.targetDate"
                           class="w-full bg-[#262626] text-white rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="mb-6">
                <label class="text-xs font-bold text-gray-500 uppercase mb-2 block" x-text="labels.comment_optional || `Коментар (необов'язково):`"></label>
                <textarea x-model="notifyModal.customMessage"
                          :placeholder="labels.comment_placeholder || &quot;наприклад: 'на два дні', 'на наступний тиждень'&quot;"
                          class="w-full bg-[#262626] text-white rounded-xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                          rows="2"></textarea>
            </div>

            <div class="flex gap-3">
                <button @click="closeNotifyModal()"
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-gray-400 bg-[#262626]"
                        x-text="labels.cancel || 'Скасувати'">
                </button>
                <button @click="sendNotifyTrainee()"
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-white bg-blue-600"
                        x-text="labels.send || 'Надіслати'">
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div x-show="toast.show" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[200] bg-[#1c1c1c] border border-[#333] px-6 py-3 rounded-2xl shadow-2xl text-sm text-white text-center max-w-[90vw]" x-cloak x-transition>
    <span x-text="toast.message"></span>
</div>
</th:block>
</body>
</html>
