<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- ONBOARDING INTRO OVERLAY -->
<div x-show="showIntro" x-cloak
     class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm"
     style="display:none">
    <div class="modal-container w-full sm:mx-4 fade-in">
        <!-- Slide content -->
        <div class="modal-body flex flex-col items-center text-center pt-8 pb-4 space-y-4">
            <div class="text-6xl" x-text="introSlides[introSlide].icon"></div>
            <h2 class="text-xl font-black tracking-tight" x-text="introSlides[introSlide].title"></h2>
            <p class="text-gray-400 text-sm leading-relaxed max-w-sm" x-text="introSlides[introSlide].body"></p>
            <!-- TG CTA -->
            <template x-if="introSlides[introSlide].cta === 'tg'">
                <div class="w-full max-w-xs pt-1">
                    <template x-if="mentorTg.connected">
                        <div class="flex items-center justify-center gap-2 text-sm font-bold text-green-400">
                            <span>✅</span><span>Telegram підключено</span>
                        </div>
                    </template>
                    <template x-if="!mentorTg.connected">
                        <button @click="openMentorTelegramLink()"
                                class="flex items-center justify-center gap-2 w-full ig-gradient-bg text-white py-3 rounded-2xl text-sm font-bold transition hover:opacity-90 active:scale-[0.97]">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                            Підключити Telegram
                        </button>
                    </template>
                </div>
            </template>
            <!-- Progress dots -->
            <div class="flex items-center gap-2 pt-2">
                <template x-for="(_, i) in introSlides" :key="i">
                    <div class="rounded-full transition-all duration-300"
                         :class="i === introSlide ? 'w-5 h-2 ig-gradient' : 'w-2 h-2 bg-[#444]'"></div>
                </template>
            </div>
        </div>
        <div class="modal-footer flex items-center gap-3">
            <button @click="dismissIntro()"
                    class="flex-1 py-3 rounded-2xl text-sm font-bold text-gray-500 hover:text-gray-300 transition">
                Пропустити
            </button>
            <template x-if="introSlide < introSlides.length - 1">
                <button @click="introSlide++"
                        class="flex-1 ig-gradient-bg text-white py-3 rounded-2xl text-sm font-bold transition hover:opacity-90 active:scale-[0.97]">
                    Далі →
                </button>
            </template>
            <template x-if="introSlide === introSlides.length - 1">
                <button @click="startTour()"
                        class="flex-1 ig-gradient-bg text-white py-3 rounded-2xl text-sm font-bold transition hover:opacity-90 active:scale-[0.97]">
                    Почати тур 🗺️
                </button>
            </template>
        </div>
    </div>
</div>
</th:block>
</body>
</html>
