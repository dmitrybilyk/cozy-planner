<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- Feedback Modal -->
<div x-show="feedbackModal.show" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4 modal-backdrop" x-cloak x-transition @keydown.escape.window="closeFeedbackModal()">
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl" @click.away="closeFeedbackModal()">
        <div class="modal-header flex justify-between items-center">
            <div>
                <h3 class="text-lg font-bold text-white">💬 Відгук для <span x-text="feedbackModal.traineeName"></span></h3>
                <p x-show="feedbackModal.sessionTitle" class="text-xs text-gray-500 mt-0.5" x-text="feedbackModal.sessionTitle"></p>
            </div>
        </div>
        <div class="p-5 space-y-4 max-h-[65vh] overflow-y-auto">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Оцінка</label>
                <div class="flex gap-2">
                    <template x-for="i in [1,2,3,4,5]" :key="i">
                        <button @click="feedbackModal.rating = feedbackModal.rating === i ? 0 : i"
                                class="text-2xl transition"
                                :class="i <= feedbackModal.rating ? 'text-yellow-400' : 'text-gray-600 hover:text-yellow-300'">★</button>
                    </template>
                </div>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Теги</label>
                <div class="flex flex-wrap gap-2">
                    <template x-for="tag in COACH_FEEDBACK_TAGS" :key="tag">
                        <button @click="toggleFeedbackTag(tag)"
                                class="px-3 py-1.5 rounded-full text-xs font-bold transition"
                                :class="feedbackModal.tags.includes(tag) ? 'bg-purple-600 text-white' : 'bg-[#2a2a2a] text-gray-400 hover:bg-[#333]'"
                                x-text="tag"></button>
                    </template>
                </div>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Повідомлення (необов'язково)</label>
                <textarea x-model="feedbackModal.text" rows="3"
                          placeholder="Коментар для учня..."
                          class="w-full bg-[#2a2a2a] border border-[#444] rounded-xl px-3 py-2.5 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-purple-500 resize-none"></textarea>
            </div>
        </div>
        <div class="modal-footer flex-col !p-0">
            <button @click="sendFeedback()"
                    :disabled="feedbackSending || (!feedbackModal.text.trim() && feedbackModal.tags.length === 0 && feedbackModal.rating === 0)"
                    class="w-full py-4 text-sm font-bold text-purple-400 disabled:opacity-30 transition">
                <span x-show="!feedbackSending">Надіслати</span>
                <span x-show="feedbackSending">...</span>
            </button>
            <div class="border-t border-[#2a2a2a] w-full"></div>
            <button @click="closeFeedbackModal()" class="w-full py-3 text-xs font-medium text-gray-600 hover:text-gray-400 transition">Скасувати</button>
        </div>
    </div>
</div>

<!-- Conversation Modal -->
<div x-show="conversationModal.show" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4 modal-backdrop" x-cloak x-transition @keydown.escape.window="closeConversationModal()">
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-lg rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]" @click.away="closeConversationModal()">
        <div class="modal-header flex justify-between items-center flex-shrink-0">
            <h3 class="text-lg font-bold text-white">💬 <span x-text="conversationModal.traineeName"></span></h3>
            <div class="flex items-center gap-3">
                <button x-show="traineeComm" @click="openFeedbackModal(conversationModal.traineeId, conversationModal.traineeName, null, null); conversationModal.show = false"
                        class="text-xs font-bold text-purple-400 px-3 py-1.5 rounded-lg border border-purple-500/30 hover:bg-purple-500/10 transition">
                    + Новий відгук
                </button>
                <button @click="closeConversationModal()" class="text-gray-500 text-sm font-bold">✕</button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-3">
            <div x-show="conversationLoading" class="text-center py-10 text-gray-500 text-sm">Завантаження...</div>
            <div x-show="!conversationLoading && conversation.length === 0" class="text-center py-10 text-gray-600 text-sm">Поки що немає відгуків</div>
            <template x-for="fb in conversation" :key="fb.id">
                <div class="rounded-2xl px-4 py-3"
                     :class="fb.fromMentorId ? 'bg-purple-900/20 border border-purple-500/20 ml-4' : 'bg-blue-900/20 border border-blue-500/20 mr-4'">
                    <div class="flex items-center gap-2 mb-1.5">
                        <span class="text-xs font-bold" :class="fb.fromMentorId ? 'text-purple-300' : 'text-blue-300'" x-text="fb.senderName || (fb.fromMentorId ? 'Тренер' : 'Учень')"></span>
                        <template x-if="fb.rating">
                            <span class="text-xs text-yellow-400" x-text="'★'.repeat(fb.rating)"></span>
                        </template>
                        <span class="text-[10px] text-gray-600 ml-auto" x-text="formatFeedbackDate(fb.createdAt)"></span>
                    </div>
                    <div x-show="fb.tags" class="flex flex-wrap gap-1 mb-1.5">
                        <template x-for="tag in (fb.tags || '').split(',')" :key="tag">
                            <span x-show="tag.trim()" class="px-2 py-0.5 rounded-full text-[10px] font-medium"
                                  :class="fb.fromMentorId ? 'bg-purple-900/40 text-purple-300' : 'bg-blue-900/40 text-blue-300'"
                                  x-text="tag.trim()"></span>
                        </template>
                    </div>
                    <p x-show="fb.text" class="text-sm text-gray-300" x-text="fb.text"></p>
                    <p x-show="fb.sessionTitle" class="text-[10px] text-gray-600 mt-1" x-text="'📅 ' + fb.sessionTitle"></p>
                </div>
            </template>
        </div>
    </div>
</div>

<!-- Contact Developer Modal -->
<div x-show="contactModal.show" x-cloak class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-6 modal-backdrop" @keydown.escape.window="contactModal.show = false" x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl" @click.away="contactModal.show = false">
        <div class="p-5 border-b border-[#333] flex justify-between items-center">
            <div>
                <h3 class="text-lg font-bold text-white">✉️ Написати розробнику</h3>
                <p class="text-xs text-gray-500 mt-0.5" x-text="'Від: ' + (user.email || mentor.email || 'ваш акаунт')"></p>
            </div>
            <button @click="contactModal.show = false" class="text-gray-500 text-sm font-bold">Скасувати</button>
        </div>
        <div class="p-5">
            <textarea x-model="contactModal.message" rows="5"
                      placeholder="Ваше питання, побажання або повідомлення про помилку..."
                      class="w-full bg-[#2a2a2a] border border-[#444] rounded-xl px-3 py-2.5 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-blue-500 resize-none"></textarea>
            <div x-show="contactModal.error" class="mt-2 text-xs text-red-400" x-text="contactModal.error"></div>
            <div x-show="contactModal.sent" class="mt-2 text-xs text-green-400">✓ Повідомлення надіслано! Дякуємо.</div>
        </div>
        <div class="p-4 border-t border-[#333]">
            <button @click="sendContactMessage()"
                    :disabled="contactModal.sending || !contactModal.message.trim()"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-2xl font-bold text-sm transition disabled:opacity-30">
                <span x-show="!contactModal.sending">Надіслати</span>
                <span x-show="contactModal.sending">Надсилання...</span>
            </button>
        </div>
    </div>
</div>

<!-- iOS Install Modal -->
<div x-show="showIosInstall" x-cloak class="fixed inset-0 z-[70] flex items-end justify-center" style="background:rgba(0,0,0,0.6)" @click.self="showIosInstall = false">
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-lg rounded-t-3xl p-6 pb-10">
        <h3 class="text-lg font-bold text-white mb-5">Встановити на iPhone</h3>
        <div class="space-y-4 text-sm">
            <div class="flex items-start gap-3">
                <span class="text-2xl leading-none">1️⃣</span>
                <div class="text-gray-300 leading-snug">Натисни кнопку <span class="text-white font-bold">Поділитися</span> (□↑) у нижній панелі Safari</div>
            </div>
            <div class="flex items-start gap-3">
                <span class="text-2xl leading-none">2️⃣</span>
                <div class="text-gray-300 leading-snug">Прогорни список дій і обери <span class="text-white font-bold">"На початковий екран"</span></div>
            </div>
            <div class="flex items-start gap-3">
                <span class="text-2xl leading-none">3️⃣</span>
                <div class="text-gray-300 leading-snug">Натисни <span class="text-white font-bold">"Додати"</span> у верхньому правому куті</div>
            </div>
        </div>
        <button @click="showIosInstall = false" class="w-full bg-blue-600 text-white py-3.5 rounded-2xl font-bold text-sm mt-6">Зрозуміло</button>
    </div>
</div>
</th:block>
</body>
</html>
