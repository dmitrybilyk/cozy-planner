<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- МЕНЕДЖЕР АТЛЕТІВ -->
    <div x-show="activeTab === 'trainees'" class="max-w-2xl mx-auto h-full flex flex-col p-4 pb-28">
        <div class="flex-shrink-0">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm sm:text-base font-black text-gray-500 uppercase tracking-widest" x-text="labels.team || 'Команда'"></h3>
                <div class="flex items-center gap-2">
                    <button @click="openCreateTraineeForm()" class="text-sm font-bold text-blue-400 flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                                <span x-text="(labels.add_trainee_short || 'Додати ' + (labels.trainee_gen || labels.trainee || 'учня'))"></span>
                            </button>
                    <button @click="toggleTraineeView()" data-tour="trainee-compact-toggle" class="text-xs sm:text-xs font-bold text-gray-500 hover:text-gray-300 transition px-2 py-1 rounded-lg border border-[#444] hover:border-gray-400" x-text="traineeCompactView ? '▤ Детальний режим' : '▣ Компактний режим'"></button>
                </div>
            </div>
            <input type="text" x-model="traineeSearch" :placeholder="'🔍 ' + (labels.trainee_search || 'Пошук учнів...')" class="w-full bg-[#262626] text-gray-200 text-sm px-4 py-2.5 rounded-xl border border-[#444] focus:outline-none focus:border-blue-500 mb-3">
        </div>
        <div class="flex-1 overflow-y-auto space-y-3 pb-4">
            <template x-for="t in filteredTrainees" :key="t.id">
                <div>
                      <template x-if="traineeCompactView && traineeExpandedIds.indexOf(t.id) < 0">
                         <div class="p-3 bg-[#1c1c1c] border border-[#333] rounded-3xl cursor-pointer" @click="traineeExpandedIds.push(t.id); _ref++">
                             <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-gray-700 flex-shrink-0 overflow-hidden">
                                    <template x-if="t.photoBase64">
                                        <img :src="t.photoBase64" class="w-full h-full object-cover">
                                    </template>
                                    <template x-if="!t.photoBase64">
                                        <div class="w-full h-full flex items-center justify-center text-gray-400 text-base">👤</div>
                                    </template>
                                </div>
                                <span class="text-sm font-semibold text-gray-200 truncate" x-text="t.name"></span>
                                <svg x-show="t.telegramConnected" class="w-4 h-4 text-blue-400 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                                <div class="ml-auto flex items-center gap-1.5 flex-shrink-0">
                                    <input x-show="telegramIntegration && mentorTg.connected && sessionConfirmations"
                                           type="checkbox"
                                           :checked="bulkAvailTrainees.includes(t.id)"
                                           @click.stop="toggleBulkAvailTrainee(t.id)"
                                           data-testid="bulk-select-trainee"
                                           class="w-4 h-4 rounded cursor-pointer accent-blue-500">
                                    <button @click.stop="traineeExpandedIds.push(t.id); _ref++" class="p-0.5 text-gray-500 hover:text-gray-300 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                     <template x-if="!traineeCompactView || traineeExpandedIds.indexOf(t.id) >= 0">
                        <div data-tour="trainee-card-expanded" class="p-4 bg-[#1c1c1c] border border-[#333] rounded-3xl">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-2xl bg-gray-700 flex-shrink-0 overflow-hidden">
                            <template x-if="t.photoBase64">
                                <img :src="t.photoBase64" class="w-full h-full object-cover">
                            </template>
                            <template x-if="!t.photoBase64">
                                <div class="w-full h-full flex items-center justify-center text-gray-400 text-xl">👤</div>
                            </template>
                        </div>
                        <div class="min-w-0 flex-1 flex items-center gap-2">
                            <p class="text-base sm:text-lg font-bold text-gray-100 truncate" x-text="t.name"></p>
                            <svg x-show="t.telegramConnected" class="w-4 h-4 text-blue-400 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                        </div>
                        <button @click.stop="openTraineeForm(t)" class="p-1 text-blue-400 hover:text-blue-300 transition flex-shrink-0" title="Правка">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
                        </button>
                        <button @click.stop="askDeleteTrainee(t.id)" class="p-1 text-red-400 hover:text-red-300 transition flex-shrink-0" title="Видалити">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
                        </button>
                        <button @click.stop="collapseTrainee(t.id)" data-tour="trainee-collapse" class="p-0.5 text-gray-500 hover:text-gray-300 transition flex-shrink-0" title="Згорнути">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
                        </button>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-1 ml-[60px]" x-show="t.description" x-text="t.description"></p>
                    <!-- Row 1: Create + Conversation -->
                    <div data-tour="trainee-actions" class="flex items-center gap-2 mt-3 pt-3 border-t border-[#292929] flex-wrap">
                        <span class="text-xs font-bold text-gray-500">Створити:</span>
                        <button @click="createSessionForTrainee(t)"
                                class="text-xs font-bold text-blue-400 px-2.5 py-1 rounded-lg border border-blue-500/30 hover:bg-blue-500/10 transition">
                            <span x-text="labels.session || 'Тренування'"></span>
                        </button>
                        <button @click="openPlanSessions(t)" data-tour="plan-sessions-btn"
                                class="text-xs font-bold text-violet-400 px-2.5 py-1 rounded-lg border border-violet-500/30 hover:bg-violet-500/10 transition">
                            <span x-text="labels.plan_sessions || 'Серію тренувань'"></span>
                        </button>
                        <button x-show="traineeComm" @click="openConversationModal(t)"
                                class="text-xs font-bold text-purple-400 px-2.5 py-1 rounded-lg border border-purple-500/30 hover:bg-purple-500/10 transition">
                            💬 Розмова
                        </button>
                    </div>
                    <!-- Row 2: Site + Timezone + TG invite (only when TG integration is on and coach is connected) -->
                    <template x-if="telegramIntegration && t.telegramEnabled && mentorTg.connected">
                        <div class="flex items-center gap-2 mt-2 flex-wrap">
                            <button @click="generateTraineeLink(t)" data-tour="trainee-site-btn" class="text-xs font-bold text-orange-400 px-2.5 py-1 rounded-lg border border-orange-500/30 hover:bg-orange-500/10 transition">
                                <span x-text="getCopyLinkText(t.id) || '🌐 Сайт ' + (labels.trainee_gen || labels.trainee || 'учня')"></span>
                            </button>
                            <div class="flex items-center gap-1 text-xs text-gray-400">
                                <span class="text-gray-500">🌍</span>
                                <select x-model="t._editingTz" @change="saveTraineeTimezone(t)" class="text-xs !py-1 !px-1.5 !rounded-lg max-w-[100px] bg-[#262626] border border-[#444]"
                                        :class="t._editingTz !== t.timezone ? '!border-yellow-500' : ''">
                                    <option value="Europe/Kyiv">Kyiv</option>
                                    <option value="Europe/Warsaw">Warsaw</option>
                                    <option value="Europe/Berlin">Berlin</option>
                                    <option value="Europe/Paris">Paris</option>
                                    <option value="Europe/London">London</option>
                                    <option value="Europe/Moscow">Moscow</option>
                                    <option value="Europe/Istanbul">Istanbul</option>
                                    <option value="Asia/Dubai">Dubai</option>
                                    <option value="Asia/Tokyo">Tokyo</option>
                                    <option value="America/New_York">NYC</option>
                                    <option value="America/Chicago">Chicago</option>
                                    <option value="America/Denver">Denver</option>
                                    <option value="America/Los_Angeles">LA</option>
                                </select>
                                <button x-show="t._editingTz !== t.timezone" @click="t._editingTz = t.timezone" class="text-gray-500 hover:text-white text-xs font-bold">✕</button>
                            </div>
                            <button x-show="!t.telegramConnected" @click="generateInvite(t.id)" class="text-xs font-bold text-green-400 px-2.5 py-1 rounded-lg border border-green-500/30 hover:bg-green-500/10 transition" x-text="inviteUrls[t.id] ? '✓ Скопійовано!' : '📲 Запросити в TG'"></button>
                        </div>
                    </template>
                    <!-- Availability section (only visible when shareAvailability is enabled) -->
                    <div x-show="shareAvailability" class="mt-3 pt-3 border-t border-[#292929]">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm font-bold text-gray-500 uppercase tracking-widest">Доступність</span>
                            <div x-show="t.telegramEnabled && t.telegramConnected">
                                <button @click="openNotifyModal(t)"
                                        :disabled="notifyingTrainees[t.id] === true"
                                        :class="notifyingTrainees[t.id] === true ? 'text-gray-500 border-gray-500/30' : (notifySuccess[t.id] === true ? 'text-green-400 border-green-500/30' : 'text-blue-400 border-blue-500/30')"
                                        class="px-2.5 py-1 rounded-lg text-xs font-bold disabled:opacity-50 cursor-pointer border">
                                    <span x-show="notifyingTrainees[t.id] === true" x-text="labels.sending || '...'"></span>
                                    <span x-show="notifySuccess[t.id] === true">✓</span>
                                    <span x-show="notifyingTrainees[t.id] !== true && notifySuccess[t.id] !== true" x-text="labels.notify_availability || 'Запитати доступність'"></span>
                                </button>
                            </div>
                        </div>
                        <template x-for="day in futureDays" :key="day.dateStr">
                            <div x-show="getFutureSlots(t.id, day.dateStr).length > 0" class="flex items-start gap-3 py-1.5">
                                <span class="text-xs font-bold w-14 flex-shrink-0 pt-0.5" :class="day.isWeekend ? 'text-red-400' : 'text-gray-500'" x-text="day.weekday + ' ' + day.dayNum"></span>
                                <div class="flex flex-wrap gap-1">
                                    <template x-for="slot in getFutureSlots(t.id, day.dateStr)" :key="slot.startTime">
                                        <button @click="createFromAvailability(t.id, day.dateStr, slot.startTime, slot.endTime)" type="button" class="bg-blue-900/30 text-blue-300 text-xs font-bold px-2 py-0.5 rounded-full border border-blue-500/30 hover:bg-blue-800/40 active:scale-95 transition-all"><span x-text="slot.startTime === 'all_day' ? 'Весь день' : slot.startTime.slice(0,5) + '—' + slot.endTime.slice(0,5)"></span></button>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <div x-show="!traineeHasFutureAvailability(t.id)" class="text-sm text-gray-600 italic" x-text="labels.no_availability || 'Немає даних про доступність'"></div>
                    </div>
                    <div x-show="!!notifyErrors[t.id]" class="mt-2 text-xs text-red-400 font-medium" x-text="notifyErrors[t.id]"></div>
                   </div>
                    </template>
                </div>
            </template>
        </div>
        <!-- Bulk availability action bar -->
        <div x-show="bulkAvailTrainees.length > 0 || bulkAvailResult"
             class="flex-shrink-0 mt-3 p-3 bg-[#1a2a3a] border border-blue-500/30 rounded-2xl flex items-center justify-between gap-3"
             data-testid="bulk-avail-bar">
            <span x-show="!bulkAvailResult" class="text-sm text-blue-300 font-medium" x-text="'Обрано: ' + bulkAvailTrainees.length"></span>
            <span x-show="bulkAvailResult" class="text-sm text-green-400 font-medium" x-text="bulkAvailResult ? ('Надіслано: ' + bulkAvailResult.sent + '/' + bulkAvailResult.total) : ''"></span>
            <div class="flex items-center gap-2">
                <button @click="bulkAvailTrainees = []; bulkAvailResult = null" class="text-xs text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-lg border border-[#444] transition">Скасувати</button>
                <button x-show="!bulkAvailResult" @click="bulkRequestAvailability()"
                        :disabled="bulkAvailSending"
                        data-testid="bulk-request-btn"
                        class="text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 px-3 py-1.5 rounded-lg transition">
                    <span x-show="bulkAvailSending">...</span>
                    <span x-show="!bulkAvailSending">Запитати доступність</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Модалка створення/редагування учня -->
    <div x-show="showTraineeFormModal" class="fixed inset-x-0 top-0 z-50 overflow-y-auto bg-black/80 backdrop-blur-sm" style="height: 100dvh" x-cloak x-transition @click.self="showTraineeFormModal = false">
        <div class="flex min-h-full items-end sm:items-center justify-center px-0 sm:px-4 py-4">
        <div class="w-full sm:max-w-md bg-[#1a1a1a] rounded-t-3xl sm:rounded-3xl p-6 border border-[#333] shadow-2xl space-y-4">
            <div class="flex items-center gap-3">
                <button @click="showTraineeFormModal = false" class="text-gray-400 hover:text-white transition p-1 -ml-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <span class="text-sm font-black text-gray-300 uppercase tracking-widest flex-1" x-text="editingTraineeId ? (labels.edit_trainee || 'Редагувати учня') : (labels.add_trainee || 'Додати учня')"></span>
                <button @click="showTraineeFormModal = false" class="text-gray-500 hover:text-gray-300 transition p-1 -mr-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative flex-shrink-0">
                    <div x-show="traineeForm.photoBase64" class="w-20 h-20 rounded-2xl bg-gray-700 overflow-hidden">
                        <img :src="traineeForm.photoBase64" class="w-full h-full object-cover">
                    </div>
                    <div x-show="!traineeForm.photoBase64" class="w-20 h-20 rounded-2xl bg-gray-700 flex items-center justify-center text-gray-400 text-3xl">👤</div>
                    <label class="absolute -bottom-1 -right-1 w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm cursor-pointer shadow-lg">
                        <span>📷</span>
                        <input type="file" accept="image/*" class="hidden" @change="handleTraineePhotoSelect($event)">
                    </label>
                </div>
                <div class="flex-1 space-y-3">
                    <input type="text" x-model="traineeForm.name" :placeholder="labels.trainee_name_placeholder || 'ПІБ учня'" class="w-full text-base bg-[#262626] text-gray-200 px-4 py-2.5 rounded-xl border border-[#444] focus:outline-none focus:border-blue-500">
                    <input type="text" x-model="traineeForm.description" :placeholder="labels.trainee_description_placeholder || 'Примітка'" class="w-full text-base bg-[#262626] text-gray-200 px-4 py-2.5 rounded-xl border border-[#444] focus:outline-none focus:border-blue-500">
                </div>
            </div>
            <div x-show="traineeForm.photoBase64" class="text-center">
                <button @click="traineeForm.photoBase64 = null" type="button" class="text-red-400 text-xs font-bold ">Видалити фото</button>
            </div>
            <button @click="saveTrainee()" :disabled="!traineeForm.name || traineeForm.name.trim() === ''" class="w-full ig-gradient text-white py-4 rounded-xl font-bold tracking-widest text-xs sm:text-sm shadow-lg disabled:opacity-50 disabled:cursor-not-allowed" x-text="editingTraineeId ? (labels.update_trainee || 'Оновити') : (labels.add_trainee || 'Додати учня')"></button>
        </div>
        </div>
    </div>
</th:block>
</body>
</html>
