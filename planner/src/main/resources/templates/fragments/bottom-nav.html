<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
<!-- WISDOM BUTTON -->
<button x-show="!loading" x-cloak
        @click="showWisdom()"
        title="Мудрість дня"
        class="fixed bottom-[4.5rem] left-4 z-30 w-11 h-11 rounded-full flex items-center justify-center text-xl shadow-lg transition-transform active:scale-90 hover:scale-110 select-none"
        style="background: linear-gradient(135deg, #b45309 0%, #d97706 50%, #fbbf24 100%)">
    🦉
</button>

<!-- WISDOM POPUP -->
<div x-show="wisdomPopup" x-cloak
     @click="wisdomPopup = false"
     class="fixed inset-0 z-[210] flex items-end justify-start pb-24 pl-4"
     style="background: rgba(0,0,0,0.4)"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0">
    <div @click.stop
         class="bg-[#1c1c1c] border border-[#444] rounded-2xl shadow-2xl p-4 max-w-[280px] text-sm text-gray-200 leading-relaxed"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95">
        <div class="flex items-start gap-2">
            <span class="text-lg leading-none mt-0.5">🦉</span>
            <span x-text="currentWisdom" class="italic text-amber-100"></span>
        </div>
        <button @click="wisdomPopup = false" class="mt-3 text-xs text-gray-500 hover:text-gray-300 transition-colors w-full text-right">закрити</button>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav x-show="!loading" x-cloak
     class="fixed bottom-0 left-0 right-0 z-40 bg-[#1a1a1a]/95 backdrop-blur-lg border-t border-[#333] shadow-2xl"
     style="padding-bottom: env(safe-area-inset-bottom, 0px)">
    <div class="flex items-stretch h-16 max-w-2xl mx-auto px-1">

        <!-- Plan -->
        <button @click="activeTab = 'agenda'; loadFutureSessions()"
                data-tour="view-toggle"
                class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2 transition active:scale-90">
            <svg class="w-6 h-6 transition-colors" :class="activeTab === 'agenda' ? 'text-cyan-400' : 'text-gray-600'"
                 fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5m-9-6h.008v.008H12V9zm0 3h.008v.008H12v-.008zm0 3h.008v.008H12v-.008zm-3-6h.008v.008H9V9zm0 3h.008v.008H9v-.008zm0 3h.008v.008H9v-.008zm6-6h.008v.008H15V9zm0 3h.008v.008H15v-.008zm0 3h.008v.008H15v-.008z"/>
            </svg>
            <span class="text-[10px] font-bold leading-tight transition-colors" :class="activeTab === 'agenda' ? 'text-cyan-400' : 'text-gray-600'">План</span>
        </button>

        <!-- My Availability -->
        <button x-show="shareAvailability" @click="activeTab = 'coach-availability'; loadCoachAvailability()"
                data-tour="availability"
                class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2 transition active:scale-90">
            <svg class="w-6 h-6 transition-colors" :class="activeTab === 'coach-availability' ? 'text-violet-400' : 'text-gray-600'"
                 fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5"/>
            </svg>
            <span class="text-[10px] font-bold leading-tight text-center transition-colors" :class="activeTab === 'coach-availability' ? 'text-violet-400' : 'text-gray-600'">Доступність</span>
        </button>

        <!-- Create Session -->
        <button @click="openSessionModal()"
                data-tour="add-session"
                class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2 transition active:scale-90">
            <div class="w-9 h-9 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/25 transition"
                 :class="selectedDate >= todayStr ? 'hover:bg-blue-700' : ''">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
            </div>
            <span class="text-[10px] font-bold text-blue-400 leading-tight" x-text="labels.create_session_short || 'Сесія'"></span>
        </button>

        <!-- Day -->
        <button @click="activeTab = 'feed'"
                data-tour="feed-view"
                class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2 transition active:scale-90">
            <svg class="w-6 h-6 transition-colors" :class="activeTab === 'feed' ? 'text-blue-400' : 'text-gray-600'"
                 fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
            </svg>
            <span class="text-[10px] font-bold leading-tight transition-colors" :class="activeTab === 'feed' ? 'text-blue-400' : 'text-gray-600'"
                  x-text="labels.today_short || 'День'"></span>
        </button>

    </div>
</nav>
</th:block>
</body>
</html>
