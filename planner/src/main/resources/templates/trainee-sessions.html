<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title x-text="pageTitle || 'Мої сесії'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/trainee-sessions.css">
</head>
<body class="antialiased" x-data="traineeApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <h1 class="text-lg font-bold" x-text="me.name || pageTitle || 'Мої сесії'">Мої сесії</h1>
    <div class="flex items-center gap-2">
        <div x-show="me.telegramEnabled" class="flex items-center gap-2 mr-1">
            <template x-if="me.telegramConnected">
                <span class="px-2 py-1 bg-green-900/30 text-green-400 rounded-full text-[9px] font-bold uppercase whitespace-nowrap">
                    <span>✓ TG</span>
                    <span x-show="me.telegramUsername" class="opacity-60 ml-1" x-text="'@' + me.telegramUsername"></span>
                </span>
            </template>
            <template x-if="!me.telegramConnected && me.telegramConnectLink">
                <a :href="me.telegramConnectLink" target="_blank"
                   class="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap transition active:scale-[0.97]">
                    📲 TG
                </a>
            </template>
            <template x-if="!me.telegramConnected && !me.telegramConnectLink">
                <span class="px-2 py-1 bg-yellow-900/30 text-yellow-400 rounded-full text-[9px] font-bold uppercase whitespace-nowrap">
                    ! TG
                </span>
            </template>
        </div>
        <template x-if="tab === 'sessions'">
            <button @click="openCreateModal()" class="bg-blue-600 text-white px-4 py-1.5 rounded-xl font-bold text-xs shadow-lg">+ Створити</button>
        </template>
    </div>
</header>

<div class="sticky top-14 z-30 bg-[#121212] border-b border-[#333]">
    <div class="flex max-w-lg mx-auto">
        <button @click="tab = 'sessions'" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider transition-all border-b-2"
                :class="tab === 'sessions' ? 'text-blue-400 border-blue-400' : 'text-gray-600 border-transparent'">
            <span x-text="tabLabels.sessions || 'Сесії'">Сесії</span>
        </button>
        <button @click="showCoachSchedule()" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider transition-all border-b-2"
                 :class="tab === 'schedule' ? 'text-blue-400 border-blue-400' : 'text-gray-600 border-transparent'">
             <span x-text="tabLabels.schedule || 'Доступність тренера'">Доступність тренера</span>
         </button>
        <button @click="tab = 'availability'" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider transition-all border-b-2"
                :class="tab === 'availability' ? 'text-blue-400 border-blue-400' : 'text-gray-600 border-transparent'">
            <span x-text="tabLabels.availability || 'Моя доступність'">Моя доступність</span>
        </button>
        <button @click="tab = 'notifications'" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider transition-all border-b-2 relative"
                :class="tab === 'notifications' ? 'text-blue-400 border-blue-400' : 'text-gray-600 border-transparent'">
            🔔
            <span x-show="unreadCount > 0" class="absolute -top-0.5 right-1 bg-red-500 text-white text-[8px] font-bold rounded-full min-w-[14px] h-[14px] flex items-center justify-center px-1 leading-none" x-text="unreadCount"></span>
        </button>
    </div>
</div>

<main class="max-w-lg mx-auto p-4 pb-24">
    <div x-show="saved" class="bg-green-900/20 text-green-400 p-3 rounded-xl text-sm font-bold text-center mb-4" x-text="savedMessage"></div>
    <div x-show="error" class="bg-red-900/20 text-red-400 p-3 rounded-xl text-sm font-bold text-center mb-4" x-text="error"></div>

    <!-- ====== SESSIONS TAB ====== -->
    <div x-show="tab === 'sessions'">
        <div x-show="sessions.length === 0" class="text-center py-20 text-gray-600 text-sm">
            <span x-text="tabLabels.no_sessions || 'У тебе ще немає сесій.'">У тебе ще немає сесій.</span> Натисни "+ Нова", щоб створити.
        </div>
        <div class="space-y-3">
            <template x-for="(session, idx) in sortedSessions" :key="session.id">
                <div>
                    <div x-show="idx > 0 && isPastSession(sortedSessions[idx-1]) !== isPastSession(session) && isPastSession(session)"
                         class="text-xs font-bold text-gray-600 uppercase tracking-wider pt-6 pb-3 text-center"><span x-text="tabLabels.past_sessions || '— Минулі сесії —'">— Минулі сесії —</span></div>
                    <div class="rounded-3xl p-5 shadow-sm border relative overflow-hidden"
                         :class="getCardClass(session)">
                    <div class="flex items-start justify-between">
                        <div class="flex-1 min-w-0">
                            <p class="text-base sm:text-lg font-bold text-gray-100 truncate" x-text="session.title"></p>
                            <p class="text-sm text-gray-500 mt-1 truncate" x-text="session.description" :title="session.description"></p>
                            <div class="flex items-center gap-2 mt-2 text-sm text-gray-400">
                                <span>📅 <span x-text="session.date"></span></span>
                                <span>🕐 <span x-text="session.time"></span><span x-show="session.endTime" x-text="' — ' + session.endTime"></span></span>
                            </div>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-xs text-gray-500" x-text="session.mentorName ? '👤 ' + session.mentorName : ''"></span>
                            </div>
                            <div x-show="session.confirmationStatus === 'PENDING'" class="mt-2">
                                <span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase"
                                      :class="getStatusClass(session.confirmationStatus)">
                                    <span x-text="getStatusLabel(session.confirmationStatus)"></span>
                                </span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-1 flex-shrink-0 ml-2">
                            <template x-for="icon in getSessionIcons(session)" :key="icon">
                                <span class="text-base" x-text="icon"></span>
                            </template>
                            <button @click.stop="handleTraineeConfirmAction(session)"
                                    x-show="session.createdBy === 'COACH' && session.confirmationStatus === 'PENDING'"
                                    class="text-yellow-500 hover:text-yellow-400 transition" title="Підтвердити">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </button>
                            <button @click.stop="rejectSession(session.id)"
                                    x-show="session.createdBy === 'COACH' && session.confirmationStatus === 'PENDING'"
                                    class="text-red-500 hover:text-red-400 transition" title="Відхилити">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </button>
                            <button @click.stop="openRequestConfirm(session)"
                                    x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING'"
                                    class="text-gray-500 hover:text-gray-300 transition" title="Запитати підтвердження">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
                            </button>
                            <span x-show="session.confirmationStatus === 'CONFIRMED'"
                                  class="text-green-500" title="Підтверджено">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </span>
                            <span x-show="session.confirmationStatus === 'REJECTED'"
                                  class="text-red-500" title="Відхилено">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </span>
                        </div>
                        <button @click.stop="exportToGCal(session)" class="mt-3 text-green-400 hover:text-green-300 transition" title="Google Календар">
                            <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H5V8h14v11z" fill="#4285F4"/><rect x="7" y="10" width="4" height="4" rx="0.5" fill="#EA4335"/><rect x="13" y="10" width="4" height="4" rx="0.5" fill="#FBBC04"/><rect x="7" y="16" width="4" height="4" rx="0.5" fill="#34A853"/><rect x="13" y="16" width="4" height="4" rx="0.5" fill="#4285F4"/></svg>
                        </button>
                    </div>
                </div>
            </template>
        </div>
        <div x-show="!showAllFuture && hasMoreSessions" class="text-center py-6">
            <button @click="showAllFuture = true"
                    class="px-8 py-3 bg-[#262626] hover:bg-[#333] rounded-2xl text-sm font-bold text-gray-300 transition">
                Завантажити ще
            </button>
        </div>
    </div>

    <!-- ====== COACH SCHEDULE TAB ====== -->
    <div x-show="tab === 'schedule'">
        <div x-show="Object.keys(coachCellsByDate).length === 0 && !mentorScheduleLoading" class="text-center py-20 text-gray-600 text-sm">
            Тренер ще не додав доступні години.
        </div>
        <div x-show="mentorScheduleLoading" class="text-center py-20 text-gray-500 text-sm">Завантаження...</div>
        <div x-show="Object.keys(coachCellsByDate).length > 0">
            <div class="flex items-center gap-3 mb-4 px-1">
                <template x-if="me.mentorPhotoUrl">
                    <img :src="me.mentorPhotoUrl" class="w-10 h-10 rounded-full object-cover ring-2 ring-blue-500/30">
                </template>
                <template x-if="!me.mentorPhotoUrl">
                    <div class="w-10 h-10 rounded-full bg-[#262626] flex items-center justify-center text-gray-400 text-sm font-bold ring-2 ring-blue-500/30">
                        <span x-text="(me.mentorName || 'Т')[0].toUpperCase()"></span>
                    </div>
                </template>
                <span class="text-sm font-bold text-gray-300" x-text="me.mentorName || 'Тренер'"></span>
            </div>
            <div class="flex overflow-x-auto no-scrollbar mb-4 space-x-2">
                <template x-for="day in days" :key="day.dateStr">
                    <button @click="coachSelectedDate = day.dateStr"
                            class="flex-shrink-0 flex flex-col items-center px-4 py-2.5 rounded-2xl transition-all min-w-[60px] relative"
                             :class="day.dateStr === coachSelectedDate ? 'bg-blue-600 text-white shadow-lg' : (day.isWeekend || coachDayOffs.includes(day.dateStr) ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                        <span class="text-[9px] font-bold uppercase" x-text="day.weekday"></span>
                        <span class="text-xl font-black leading-tight" x-text="day.dayNum"></span>
                        <span class="text-[9px] font-bold mt-0.5" x-text="day.month"></span>
                        <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                        <span x-show="coachCellsByDate[day.dateStr]?.length" class="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-400 rounded-full"></span>
                        <span x-show="coachDayOffs.includes(day.dateStr)" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full flex items-center justify-center text-white text-[7px] font-bold">✕</span>
                    </button>
                </template>
            </div>
            <div x-show="coachDayOffs.includes(coachSelectedDate)" class="bg-red-900/20 border border-red-500/30 rounded-2xl p-6 text-center mb-4">
                <p class="text-red-400 text-lg font-bold">ВИХІДНИЙ</p>
                <p class="text-gray-500 text-sm mt-1">Тренер не працює цього дня</p>
            </div>
            <div x-show="!coachDayOffs.includes(coachSelectedDate)" class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
                <div class="px-4 py-2 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
                    <span class="text-xs font-bold text-gray-500 whitespace-nowrap" x-text="coachSelectedDate"></span>
                </div>
                <div class="max-h-96 overflow-y-auto no-scrollbar">
                    <template x-for="(row, ri) in grid" :key="ri">
                        <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                            <div class="w-12 flex-shrink-0 flex items-start justify-end pr-2 pt-1 text-[10px] font-bold text-gray-600 select-none leading-none">
                                <span x-text="row.lbl"></span>
                            </div>
                            <div class="flex-1 flex">
                                    <template x-for="(c, ci) in row.cells" :key="ci">
                                        <button @click="bookSlotFromGrid(c.mm)"
                                                class="flex-1 h-10 sm:h-11 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95"
                                                :style="coachCellStyle(c.mm)"
                                                x-show="!isPastMinuteOnDate(coachSelectedDate, c.mm)">
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            <div class="flex flex-wrap items-center gap-3 mt-3 text-xs text-gray-500">
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#dc2626"></span> Зайнято</span>
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#2a2a2a"></span> Недоступно</span>
                <template x-for="loc in coachLocations" :key="loc.name">
                    <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" :style="'background:' + (loc.color || '#3b82f6')"></span> Вільно на <span x-text="loc.name"></span></span>
                </template>
            </div>
        </div>
    </div>

    <!-- ====== NOTIFICATIONS TAB ====== -->
    <div x-show="tab === 'notifications'">
        <div x-show="notifications.length === 0" class="text-center py-20 text-gray-600 text-sm">Немає сповіщень.</div>
        <template x-if="unreadCount > 0">
            <div class="text-right mb-2">
                <button @click="markAllNotificationsRead()" class="text-[11px] font-bold text-blue-400 uppercase">Прочитати всі</button>
            </div>
        </template>
        <div class="space-y-2">
            <template x-for="n in notifications" :key="n.id">
                <div @click="markNotificationRead(n.id)"
                     class="rounded-2xl p-4 border cursor-pointer transition-all"
                     :class="n.isRead ? 'bg-[#222] border-[#333] opacity-50' : 'bg-[#262626] border-blue-500/40'">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-white" x-text="n.title"></p>
                            <p class="text-xs text-gray-300 mt-1" x-text="n.message"></p>
                            <p class="text-[10px] text-gray-400 mt-1" x-text="n.createdAt ? n.createdAt.slice(0, 16).replace('T', ' ') : ''"></p>
                        </div>
                        <template x-if="!n.isRead">
                            <span class="w-2.5 h-2.5 rounded-full bg-blue-400 flex-shrink-0 mt-1.5"></span>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- ====== MY AVAILABILITY TAB ====== -->
    <div x-show="tab === 'availability'">
        <div class="flex overflow-x-auto no-scrollbar mb-4 space-x-2">
            <template x-for="day in days" :key="day.dateStr">
                <button @click="selectDate(day.dateStr)"
                        class="flex-shrink-0 flex flex-col items-center px-4 py-2.5 rounded-2xl transition-all min-w-[60px] relative"
                        :class="day.dateStr === selectedDate ? 'bg-blue-600 text-white shadow-lg' : (day.isWeekend ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                    <span class="text-[9px] font-bold uppercase" x-text="day.weekday"></span>
                    <span class="text-xl font-black leading-tight" x-text="day.dayNum"></span>
                    <span class="text-[9px] font-bold mt-0.5" x-text="day.month"></span>
                    <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                    <span x-show="cellsByDate[day.dateStr]?.length" class="absolute bottom-0 left-0 right-0 h-0.5 bg-green-400 rounded-full"></span>
                    <span x-show="!cellsByDate[day.dateStr]?.length && hasSessionOnDate(day.dateStr)" class="absolute bottom-0 left-0 right-0 h-0.5 bg-purple-400 rounded-full"></span>
                </button>
            </template>
        </div>
        <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
            <div class="px-4 py-2 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
                <span class="text-xs font-bold text-gray-500 whitespace-nowrap" x-text="selectedDate"></span>
            </div>
            <div class="max-h-96 overflow-y-auto no-scrollbar">
                <template x-for="(row, ri) in grid" :key="ri">
                    <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                        <div class="w-12 flex-shrink-0 flex items-start justify-end pr-2 pt-1 text-[10px] font-bold text-gray-600 select-none leading-none">
                            <span x-text="row.lbl"></span>
                        </div>
                        <div class="flex-1 flex">
                            <template x-for="(c, ci) in row.cells" :key="ci">
                                <button @click="tap(c.mm)"
                                        class="flex-1 h-10 sm:h-11 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95"
                                        :style="cellStyle(c.mm)">
                                </button>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
        <div class="flex items-center gap-3 mt-3 text-xs text-gray-500">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#dc2626"></span> Зайнято</span>
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#2a2a2a"></span> Недоступно</span>
        </div>
        <button @click="saveAll()"
                x-show="hasUnsavedChanges && !saving"
                x-transition:enter-start="opacity-0 translate-y-2"
                x-transition:enter-end="opacity-100 translate-y-0"
                class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 bg-blue-600 text-white pl-4 pr-5 py-2.5 rounded-2xl font-bold text-xs shadow-2xl shadow-blue-600/20 flex items-center gap-2 transition-all hover:bg-blue-500 active:scale-[0.97]">
            <span class="text-sm">💾</span>
            <span>Зберегти</span>
        </button>
        <button disabled
                x-show="saving"
                class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 bg-blue-500 text-white pl-4 pr-5 py-2.5 rounded-2xl font-bold text-xs shadow-2xl flex items-center gap-2 opacity-70 cursor-not-allowed">
            <span class="text-sm animate-bounce">⏳</span>
            <span>Збереження...</span>
        </button>
    </div>
</main>

<!-- Confirm modal -->
<div x-show="confirmModal.show" class="fixed inset-0 z-[60] flex items-center justify-center p-6 modal-backdrop" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6 text-center">
            <div class="text-3xl mb-3">📋</div>
            <h4 class="text-lg font-bold text-white" x-text="confirmModal.title"></h4>
            <p class="text-sm text-gray-400 mt-2" x-text="confirmModal.message"></p>
        </div>
        <div class="flex border-t border-[#333]">
            <button @click="doRequestConfirm()" class="flex-1 py-4 text-sm font-bold text-yellow-400 border-r border-[#333]">Надіслати</button>
            <button @click="closeRequestConfirm()" class="flex-1 py-4 text-sm font-medium text-gray-300">Скасувати</button>
        </div>
    </div>
</div>

<!-- Session info modal -->
<div x-show="sessionInfo.show" class="fixed inset-0 z-[60] flex items-center justify-center p-6 modal-backdrop" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl" @click.away="sessionInfo.show = false">
        <div class="p-6">
            <div class="flex items-start justify-between mb-4">
                <div>
                    <h4 class="text-lg font-bold text-white" x-text="sessionInfo.title"></h4>
                    <p class="text-sm text-gray-400 mt-1" x-text="sessionInfo.description || 'Без опису'"></p>
                </div>
                <span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase flex-shrink-0"
                      :class="sessionInfo.status === 'CONFIRMED' ? 'bg-green-900/30 text-green-400' : sessionInfo.status === 'REJECTED' ? 'bg-red-900/30 text-red-400' : 'bg-yellow-900/30 text-yellow-400'"
                      x-text="sessionInfo.status === 'CONFIRMED' ? '✅ Підтверджено' : sessionInfo.status === 'REJECTED' ? '❌ Відхилено' : '⏳ Очікує'">
                </span>
            </div>
            <div class="space-y-2 text-sm text-gray-400">
                <div class="flex items-center gap-2">
                    <span>📅</span>
                    <span x-text="sessionInfo.date"></span>
                </div>
                <div class="flex items-center gap-2">
                    <span>🕐</span>
                    <span x-text="sessionInfo.time + ' — ' + sessionInfo.endTime"></span>
                </div>
                <div x-show="sessionInfo.mentorName" class="flex items-center gap-2">
                    <span>👤</span>
                    <span x-text="sessionInfo.mentorName"></span>
                </div>
                <div x-show="sessionInfo.locationName" class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full" :style="'background:' + (sessionInfo.locationColor || '#888')"></span>
                    <span x-text="sessionInfo.locationName"></span>
                </div>
                <div x-show="sessionInfo.attendees && sessionInfo.attendees.length" class="flex items-start gap-2">
                    <span class="mt-0.5">👥</span>
                    <div>
                        <template x-for="(name, i) in sessionInfo.attendees" :key="i">
                            <span x-text="name" class="block text-gray-300"></span>
                        </template>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex border-t border-[#333]">
            <button @click="sessionInfo.show = false" class="flex-1 py-4 text-sm font-bold text-gray-300">Закрити</button>
        </div>
    </div>
</div>

<!-- Create session modal -->
<div x-show="showModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop px-0 sm:px-4" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl" @click.away="showModal = false">
        <div class="p-6 border-b border-[#333] flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Нова сесія</h3>
            <button @click="showModal = false" class="text-gray-500 text-sm font-bold">Скасувати</button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Назва</label>
                <input type="text" x-model="form.title" class="w-full text-base">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Дата</label>
                <div class="flex overflow-x-auto no-scrollbar space-x-2 pb-1">
                    <template x-for="day in days" :key="day.dateStr">
                        <button @click="form.date = day.dateStr"
                                class="flex-shrink-0 flex flex-col items-center px-3 py-2 rounded-2xl transition-all min-w-[52px]"
                                :class="day.dateStr === form.date ? 'bg-blue-600 text-white shadow-lg' : (day.isWeekend || coachDayOffs.includes(day.dateStr) ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                            <span class="text-[8px] font-bold uppercase" x-text="day.weekday"></span>
                            <span class="text-lg font-black leading-tight" x-text="day.dayNum"></span>
                            <span class="text-[8px] font-bold mt-0.5" x-text="day.month"></span>
                            <span x-show="day.isToday" class="text-[6px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                        </button>
                    </template>
                </div>
            </div>
            <div x-show="locations.length > 0">
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Локація</label>
                <select x-model="form.locationId" class="w-full text-base">
                    <option value="">Без локації</option>
                    <template x-for="loc in locations" :key="loc.id">
                        <option :value="loc.id" :style="'color:' + (loc.color || '#3b82f6')" x-text="loc.name"></option>
                    </template>
                </select>
            </div>
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">Час</label>
                    <span x-show="selectedModalSlots.length" class="text-xs font-bold text-blue-300" x-text="form.time + ' — ' + form.endTime"></span>
                    <span x-show="!selectedModalSlots.length" class="text-xs font-bold text-gray-500">Оберіть час</span>
                </div>
                <div class="bg-[#1a1a1a] rounded-xl border border-[#2a2a2a] overflow-hidden max-h-72 overflow-y-auto no-scrollbar">
                    <template x-for="(row, ri) in grid" :key="ri">
                        <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                            <div class="w-10 flex-shrink-0 flex items-start justify-end pr-1.5 pt-1 text-[11px] font-bold text-gray-400 select-none leading-none">
                                <span x-text="row.lbl"></span>
                            </div>
                            <div class="flex-1 flex">
                                <template x-for="(c, ci) in row.cells" :key="ci">
                                    <button @click="pickModalTime(c.mm)" type="button"
                                            class="flex-1 h-10 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95"
                                            :style="modalCellStyle(c.mm)">
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
                <div x-show="selectedModalSlots.length" class="flex gap-1 mt-2">
                    <span class="text-[10px] font-bold text-blue-300 bg-blue-900/30 px-2 py-1 rounded-lg" x-text="form.time + ' — ' + form.endTime"></span>
                    <button @click="selectedModalSlots = []; form.time = ''; form.endTime = ''" type="button" class="text-[10px] font-bold text-red-400 uppercase ml-auto">Скинути</button>
                </div>
            </div>
            <button @click="createSession()"
                    :disabled="!form.time || !form.endTime"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg disabled:opacity-20">
                Створити
            </button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var embeddedTrainee = /*[[${traineeData}]]*/ null;
</script>
<script src="/js/trainee-sessions.js"></script>
</body>
</html>
