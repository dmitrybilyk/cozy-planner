<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мої сесії</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        input, select { background: #262626 !important; color: white !important; border: 1px solid #363636 !important; border-radius: 12px !important; padding: 10px !important; }
        .bottom-nav { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
</head>
<body class="antialiased" x-data="traineeSessionsApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-16 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-2">
        <h1 class="text-lg font-bold">Мої сесії</h1>
        <span class="text-sm text-gray-400 ml-1" x-text="'— ' + (me.name || '')"></span>
    </div>
    <div class="flex items-center gap-2">
        <template x-if="me.telegramEnabled && !me.telegramConnected && me.telegramConnectLink">
            <a :href="me.telegramConnectLink" target="_blank"
               class="bg-yellow-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-bold uppercase whitespace-nowrap">
                📲 TG
            </a>
        </template>
        <template x-if="me.telegramConnected">
            <span class="text-green-400 text-[10px] font-bold">✓ TG</span>
        </template>
        <button @click="openCreateModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg">+ Нова</button>
    </div>
</header>

<main class="max-w-lg mx-auto p-4 pb-24">
    <div x-show="saved" class="bg-green-900/20 text-green-400 p-3 rounded-xl text-sm font-bold text-center mb-4" x-text="savedMessage"></div>
    <div x-show="error" class="bg-red-900/20 text-red-400 p-3 rounded-xl text-sm font-bold text-center mb-4" x-text="error"></div>

    <div x-show="sessions.length === 0" class="text-center py-20 text-gray-600 text-sm">
        У тебе ще немає сесій. Натисни "+ Нова", щоб створити.
    </div>

    <div class="space-y-3">
        <template x-for="session in sortedSessions.filter(s => s.date >= todayStr)" :key="session.id">
            <div class="rounded-3xl p-5 shadow-sm border relative overflow-hidden"
                 :class="getCardClass(session)">
                <div class="flex items-start justify-between">
                    <div class="flex-1 min-w-0">
                        <p class="text-base sm:text-lg font-bold text-gray-100 truncate" x-text="session.title"></p>
                        <p class="text-sm text-gray-500 mt-1" x-text="session.description"></p>
                        <div class="flex items-center gap-2 mt-2 text-sm text-gray-400">
                            <span>📅 <span x-text="session.date"></span></span>
                            <span>🕐 <span x-text="session.time"></span><span x-show="session.endTime" x-text="' — ' + session.endTime"></span></span>
                        </div>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-xs text-gray-500" x-text="session.mentorName ? '👤 ' + session.mentorName : ''"></span>
                        </div>
                        <div class="mt-2">
                            <span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase"
                                  :class="getStatusClass(session.confirmationStatus)">
                                <span x-text="getStatusLabel(session.confirmationStatus)"></span>
                            </span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1 flex-shrink-0 ml-2">
                        <template x-for="icon in getSessionIcons(session)" :key="icon">
                            <span class="text-base" x-text="icon"></span>
                        </template>
                    </div>
                </div>
                <div x-show="session.createdBy === 'COACH' && session.confirmationStatus === 'PENDING'" class="flex gap-2 mt-4 pt-3 border-t border-[#292929]">
                    <button @click="confirmSession(session.id)" class="flex-1 py-2 bg-green-600 text-white rounded-xl text-xs font-bold uppercase">Підтвердити</button>
                    <button @click="rejectSession(session.id)" class="flex-1 py-2 bg-red-600/30 text-red-400 rounded-xl text-xs font-bold uppercase">Відмінити</button>
                </div>
                <div x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING' && me.telegramConnected" class="mt-4 pt-3 border-t border-[#292929]">
                    <button @click="openRequestConfirm(session)" class="w-full py-2 bg-yellow-600/30 text-yellow-400 rounded-xl text-xs font-bold uppercase">Запитати підтвердження</button>
                </div>
                <div x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING'" class="flex gap-2 mt-4 pt-3 border-t border-[#292929]">
                    <button @click="rejectSession(session.id)" class="flex-1 py-2 bg-gray-600/30 text-gray-400 rounded-xl text-xs font-bold uppercase">Відмінити</button>
                </div>
            </div>
        </template>
        <template x-if="hasPastSessions">
            <div>
                <div class="flex items-center gap-3 mt-6 mb-3 opacity-40">
                    <div class="h-px flex-1 bg-gray-600"></div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider flex-shrink-0">Минулі</span>
                    <div class="h-px flex-1 bg-gray-600"></div>
                </div>
                <template x-for="session in sortedSessions.filter(s => s.date < todayStr)" :key="'past-'+session.id">
                    <div class="rounded-3xl p-5 shadow-sm border relative overflow-hidden mb-3 opacity-60"
                         :class="getCardClass(session)">
                        <div class="flex items-start justify-between">
                            <div class="flex-1 min-w-0">
                                <p class="text-base sm:text-lg font-bold text-gray-400 truncate" x-text="session.title"></p>
                                <div class="flex items-center gap-2 mt-2 text-sm text-gray-500">
                                    <span>📅 <span x-text="session.date"></span></span>
                                    <span>🕐 <span x-text="session.time"></span></span>
                                </div>
                                <div class="mt-2">
                                    <span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase"
                                          :class="getStatusClass(session.confirmationStatus)">
                                        <span x-text="getStatusLabel(session.confirmationStatus)"></span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>
</main>

<div x-show="confirmModal.show" class="fixed inset-0 z-[60] flex items-center justify-center p-6 modal-backdrop" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6 text-center">
            <div class="text-3xl mb-3">📋</div>
            <h4 class="text-lg font-bold text-white" x-text="confirmModal.title"></h4>
            <p class="text-sm text-gray-400 mt-2" x-text="confirmModal.message"></p>
        </div>
        <div class="flex border-t border-[#333]">
            <button @click="doRequestConfirm()" class="flex-1 py-4 text-sm font-bold text-yellow-400 border-r border-[#333]">Надіслати</button>
            <button @click="closeRequestConfirm()" class="flex-1 py-4 text-sm font-medium text-gray-300">Скасувати</button>
        </div>
    </div>
</div>

<div x-show="showModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop px-0 sm:px-4" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl" @click.away="showModal = false">
        <div class="p-6 border-b border-[#333] flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Нова сесія</h3>
            <button @click="showModal = false" class="text-gray-500 text-sm font-bold">Скасувати</button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Назва</label>
                <input type="text" x-model="form.title" class="w-full text-base">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Опис</label>
                <input type="text" x-model="form.description" class="w-full text-base">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Дата</label>
                <input type="date" x-model="form.date" :min="todayStr" class="w-full text-base">
            </div>
            <div>
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs sm:text-sm font-black text-gray-500 uppercase">Час</span>
                    <span x-show="form.startTime && form.endTime" class="text-xs font-bold text-blue-400 bg-blue-900/30 px-2.5 py-1 rounded-full">
                        <span x-text="getDurationLabel()"></span>
                    </span>
                </div>
                <div class="grid grid-cols-4 gap-1.5 max-h-52 overflow-y-auto no-scrollbar">
                    <template x-for="t in filteredDaySlots" :key="t">
                        <button @click="pickTime(t)" type="button"
                                class="py-2 rounded-xl font-bold text-xs sm:text-sm transition-all active:scale-95"
                                :class="getTimeClass(t)">
                            <span x-text="t"></span>
                        </button>
                    </template>
                </div>
                <div x-show="me.mentorShareToken && mentorSlots.length && !filteredDaySlots.length" class="text-center py-3 text-yellow-400 text-xs font-bold">
                    Тренер не має доступних годин на цю дату
                </div>
            </div>
            <button @click="createSession()"
                    :disabled="!form.title || !form.date || !form.time || !form.endTime"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg disabled:opacity-30 disabled:cursor-not-allowed">
                Створити
            </button>
        </div>
    </div>
</div>

<div x-show="showCoachAvailability" class="fixed inset-0 z-40 bg-[#121212] pt-14 pb-20 overflow-y-auto" x-cloak>
    <div class="max-w-lg mx-auto p-4">
        <div x-show="!mentorSlots.length" class="text-center py-16 text-gray-500 text-sm">
            Завантаження розкладу тренера...
        </div>
        <template x-for="day in sortedMentorDays" :key="day.date">
            <div class="mb-6">
                <div class="text-sm font-bold text-white mb-2" x-text="day.date"></div>
                <div class="space-y-2">
                    <template x-for="slot in day.slots" :key="slot.startTime">
                        <div class="bg-green-900/15 border border-green-600/30 rounded-xl px-4 py-3">
                            <span class="text-sm font-bold text-green-300" x-text="slot.startTime.slice(0,5) + ' — ' + slot.endTime.slice(0,5)"></span>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</div>

<nav class="bottom-nav fixed bottom-0 inset-x-0 bg-[#1a1a1a]/95 border-t border-[#333] z-50">
    <div class="flex items-center justify-around max-w-lg mx-auto h-14">
        <div @click="showCoachAvailability = false; showModal = false" class="flex flex-col items-center gap-0.5" :class="!showCoachAvailability ? 'text-blue-400' : 'text-gray-500'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <span class="text-[9px] font-bold uppercase">Сесії</span>
        </div>
        <div @click="showCoachAvailability = true; showModal = false" class="flex flex-col items-center gap-0.5" :class="showCoachAvailability ? 'text-blue-400' : 'text-gray-500'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10" stroke-width="1.5"/></svg>
            <span class="text-[9px] font-bold uppercase">Графік тренера</span>
        </div>
        <a :href="availabilityLink" class="flex flex-col items-center gap-0.5 text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[9px] font-bold uppercase">Моя доступність</span>
        </a>
    </div>
</nav>

<script th:inline="none">
    function localDateStr(d) {
        d = d || new Date();
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    }
    function traineeSessionsApp() {
        return {
            sessions: [],
            me: {},
            mentorSlots: [],
            showModal: false,
            saved: false,
            savedMessage: '',
            error: '',
            todayStr: localDateStr(),
            form: { title: '', description: '', date: localDateStr(), time: null, endTime: null },
            allSlots: Array.from({length: 29}, (_, i) => `${(7+Math.floor(i/2)).toString().padStart(2,'0')}:${i%2===0?'00':'30'}`),
            confirmModal: { show: false, sessionId: null, title: '', message: '' },
            showCoachAvailability: false,

            get sortedSessions() {
                const today = this.todayStr;
                const future = this.sessions.filter(s => s.date >= today);
                const past = this.sessions.filter(s => s.date < today);
                future.sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
                past.sort((a, b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
                return [...future, ...past];
            },

            get hasPastSessions() {
                return this.sessions.some(s => s.date < this.todayStr);
            },

            get availabilityLink() {
                return this.me.inviteToken ? '/trainee/' + this.me.inviteToken : '#';
            },

            get filteredDaySlots() {
                if (!this.me.mentorShareToken || !this.mentorSlots.length) return this.allSlots;
                const ranges = this.mentorSlots.filter(s => s.date === this.form.date);
                if (!ranges.length) return this.allSlots;
                const sm = (t) => { const [h,m]=t.split(':').map(Number); return h*60+m; };
                return this.allSlots.filter(t => {
                    const tm = sm(t);
                    return ranges.some(r => tm >= sm(r.startTime) && tm < sm(r.endTime));
                });
            },

            get sortedMentorDays() {
                const grouped = {};
                for (const slot of this.mentorSlots) {
                    if (!grouped[slot.date]) grouped[slot.date] = [];
                    grouped[slot.date].push(slot);
                }
                return Object.keys(grouped).sort().map(date => ({
                    date,
                    slots: grouped[date].sort((a, b) => a.startTime.localeCompare(b.startTime))
                }));
            },

            async loadMentorAvailability() {
                const start = localDateStr();
                const endDate = new Date();
                endDate.setDate(endDate.getDate() + 6);
                const end = localDateStr(endDate);
                try {
                    const res = await fetch(`/api/v1/shared/${this.me.mentorShareToken}?startDate=${start}&endDate=${end}`);
                    if (res.ok) {
                        const data = await res.json();
                        this.mentorSlots = data.slots || [];
                    }
                } catch(e) {}
            },

            bookSlot(slot) {
                this.showCoachAvailability = false;
                this.form = { title: 'Зустріч', description: '', date: slot.date, time: slot.startTime, endTime: slot.endTime };
                this.showModal = true;
            },

            async init() {
                const res = await fetch('/api/v1/me');
                if (!res.ok) { window.location.href = '/signin'; return; }
                const me = await res.json();
                if (!me.traineeId) { window.location.href = '/signin'; return; }
                this.me = me;
                await this.loadSessions();
                if (this.me.mentorShareToken) this.loadMentorAvailability();
                this.connectWebSocket();
            },

            connectWebSocket() {
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/api/v1/ws`;
                const ws = new WebSocket(wsUrl);
                ws.onmessage = (event) => {
                    if (event.data === 'session_changed') this.loadSessions();
                };
                ws.onclose = () => setTimeout(() => this.connectWebSocket(), 3000);
                ws.onerror = () => ws.close();
                this.ws = ws;
            },

            async loadSessions() {
                const res = await fetch('/api/v1/trainee/sessions');
                if (res.ok) {
                    this.sessions = await res.json();
                }
            },

            openCreateModal() {
                this.showCoachAvailability = false;
                this.form = { title: 'Зустріч', description: '', date: localDateStr(), time: null, endTime: null };
                this.showModal = true;
            },

            async createSession() {
                this.error = '';
                const res = await fetch('/api/v1/trainee/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: this.form.title,
                        description: this.form.description,
                        date: this.form.date,
                        time: this.form.time,
                        endTime: this.form.endTime
                    })
                });
                if (res.ok) {
                    this.showModal = false;
                    this.saved = true;
                    this.savedMessage = 'Сесію створено! Тренер отримає сповіщення.';
                    setTimeout(() => this.saved = false, 4000);
                    await this.loadSessions();
                } else {
                    this.error = 'Помилка при створенні сесії';
                }
            },

            async confirmSession(id) {
                this.error = '';
                const res = await fetch(`/api/v1/trainee/sessions/${id}/confirm`, { method: 'POST' });
                if (res.ok) {
                    this.saved = true;
                    this.savedMessage = 'Сесію підтверджено!';
                    setTimeout(() => this.saved = false, 3000);
                    await this.loadSessions();
                } else {
                    this.error = 'Помилка підтвердження';
                }
            },

            async rejectSession(id) {
                this.error = '';
                const res = await fetch(`/api/v1/trainee/sessions/${id}/reject`, { method: 'POST' });
                if (res.ok) {
                    this.saved = true;
                    this.savedMessage = 'Сесію відхилено';
                    setTimeout(() => this.saved = false, 3000);
                    await this.loadSessions();
                } else {
                    this.error = 'Помилка';
                }
            },

            openRequestConfirm(session) {
                this.confirmModal = {
                    show: true,
                    sessionId: session.id,
                    title: 'Запитати підтвердження?',
                    message: 'Тренер отримає сповіщення про необхідність підтвердити сесію.'
                };
            },

            closeRequestConfirm() {
                this.confirmModal = { show: false, sessionId: null, title: '', message: '' };
            },

            async doRequestConfirm() {
                const id = this.confirmModal.sessionId;
                this.closeRequestConfirm();
                if (!id) return;
                this.error = '';
                const res = await fetch(`/api/v1/trainee/sessions/${id}/request-coach-confirmation`, { method: 'POST' });
                if (res.ok) {
                    this.saved = true;
                    this.savedMessage = 'Запит на підтвердження надіслано тренеру!';
                    setTimeout(() => this.saved = false, 4000);
                    await this.loadSessions();
                } else {
                    this.error = 'Помилка при надсиланні запиту';
                }
            },

            slotToMin(t) {
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            },

            pickTime(t) {
                const tm = this.slotToMin(t);
                const sm = this.form.time !== null ? this.slotToMin(this.form.time) : -1;
                const em = this.form.endTime !== null ? this.slotToMin(this.form.endTime) : -1;
                if (sm < 0) {
                    this.form.time = t;
                    this.form.endTime = this.nextSlot(t);
                } else if (em < 0) {
                    if (tm > sm) {
                        this.form.endTime = t;
                    } else {
                        this.form.time = t;
                        this.form.endTime = this.nextSlot(t);
                    }
                } else if (tm > em) {
                    this.form.endTime = t;
                } else if (tm > sm && tm < em) {
                    this.form.endTime = t;
                } else {
                    this.form.time = t;
                    this.form.endTime = this.nextSlot(t);
                }
            },

            nextSlot(t) {
                const slots = this.filteredDaySlots;
                const idx = slots.indexOf(t);
                if (idx >= 0 && idx + 1 < slots.length) return slots[idx + 1];
                const m = this.slotToMin(t) + 30;
                const h = Math.floor(m / 60) % 24;
                return `${h.toString().padStart(2, '0')}:${m % 60 === 0 ? '00' : '30'}`;
            },

            getTimeClass(t) {
                const tm = this.slotToMin(t);
                const s = this.form.time !== null ? this.slotToMin(this.form.time) : -1;
                const e = this.form.endTime !== null ? this.slotToMin(this.form.endTime) : -1;
                if (tm === s) return 'bg-blue-600 text-white shadow-lg scale-105 ring-2 ring-blue-400';
                if (tm === e) return 'bg-blue-600 text-white shadow-lg';
                if (s >= 0 && e >= 0 && tm > s && tm < e) return 'bg-blue-500/20 text-blue-300';
                return 'bg-[#262626] text-gray-400 hover:bg-[#333]';
            },

            getDurationLabel() {
                if (!this.form.time || !this.form.endTime) return '';
                const diff = this.slotToMin(this.form.endTime) - this.slotToMin(this.form.time);
                const h = Math.floor(diff / 60);
                const m = diff % 60;
                if (h > 0 && m > 0) return `${h} год ${m} хв`;
                if (h > 0) return `${h} год`;
                return `${m} хв`;
            },

            getCardClass(session) {
                if (session.confirmationStatus === 'CONFIRMED') return 'bg-green-900/20 border-green-500/50';
                if (session.confirmationStatus === 'REJECTED') return 'bg-red-900/20 border-red-500/30 opacity-60';
                if (session.confirmationStatus === 'PENDING') return 'bg-yellow-900/10 border-yellow-500/30';
                return 'bg-[#1c1c1c] border-[#333]';
            },

            getStatusClass(status) {
                if (status === 'CONFIRMED') return 'bg-green-900/30 text-green-400';
                if (status === 'REJECTED') return 'bg-red-900/30 text-red-400';
                if (status === 'PENDING') return 'bg-yellow-900/30 text-yellow-400';
                return 'bg-gray-900/30 text-gray-400';
            },

            getStatusLabel(status) {
                if (status === 'CONFIRMED') return '✅ Підтверджено';
                if (status === 'REJECTED') return '❌ Відмінено';
                if (status === 'PENDING') return '⏳ Очікує';
                return '—';
            },

            getSessionIcons(session) {
                const icons = ['⚽', '🎾', '🏀', '⚾', '🏈', '🥊', '🎯', '🚴'];
                const count = (session.traineeIds || []).length;
                const result = [];
                for (let i = 0; i < count; i++) {
                    result.push(icons[(session.id * 3 + i) % icons.length]);
                }
                return result;
            }
        }
    }
</script>
