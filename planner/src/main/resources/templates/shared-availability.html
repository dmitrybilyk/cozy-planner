<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Графік тренера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/shared-availability.js" th:src="@{/js/shared-availability.js(v=${appVersion})}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
</head>
<body class="antialiased" x-data="sharedAvailabilityApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm" x-text="mentorName.charAt(0).toUpperCase()"></div>
        <div>
            <h1 class="text-base font-bold" x-text="mentorName"></h1>
            <p class="text-[10px] text-gray-500">Графік доступності</p>
        </div>
        <button @click="installPwa()" class="text-sm" title="Встановити додаток">
            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
        </button>
    </div>
</header>

<main class="max-w-lg mx-auto p-4 pb-24">
    <div x-show="loading" class="text-center py-16">
        <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
        <p class="text-gray-500 text-sm">Завантаження...</p>
    </div>

    <div x-show="!loading && !hasData" class="text-center py-16">
        <p class="text-4xl mb-3">📅</p>
        <p class="text-gray-400 text-lg font-bold mb-1">Немає доступних годин</p>
        <p class="text-gray-600 text-sm">Тренер ще не налаштував свій графік на найближчі дні</p>
    </div>

    <div x-show="!loading && hasData">
        <!-- multi-day navigation -->
        <div x-show="!singleDay" class="flex overflow-x-auto no-scrollbar mb-4 space-x-2">
            <template x-for="day in days" :key="day.dateStr">
                <button @click="selectedDate = day.dateStr"
                        class="flex-shrink-0 flex flex-col items-center px-4 py-2.5 rounded-2xl transition-all min-w-[60px] relative"
                        :class="day.dateStr === selectedDate ? 'bg-blue-600 text-white shadow-lg' : (day.isWeekend || isDayOff(day.dateStr) ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                    <span class="text-[9px] font-bold uppercase" x-text="day.weekday"></span>
                    <span class="text-xl font-black leading-tight" x-text="day.dayNum"></span>
                    <span class="text-[9px] font-bold mt-0.5" x-text="day.month"></span>
                    <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                    <span x-show="cellsByDate[day.dateStr]?.length" class="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-400 rounded-full"></span>
                    <span x-show="isDayOff(day.dateStr)" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full flex items-center justify-center text-white text-[7px] font-bold">✕</span>
                </button>
            </template>
        </div>

        <!-- day off banner -->
        <div x-show="isDayOff(selectedDate)" class="bg-red-900/20 border border-red-500/30 rounded-2xl p-6 text-center mb-4">
            <p class="text-red-400 text-lg font-bold">ВИХІДНИЙ</p>
            <p class="text-gray-500 text-sm mt-1">Тренер не працює цього дня</p>
        </div>

        <!-- standard grid (multi-day) -->
        <div x-show="!singleDay && !isDayOff(selectedDate)" class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
            <div class="px-4 py-2 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
                <span class="text-xs font-bold text-gray-500 whitespace-nowrap" x-text="selectedDate"></span>
            </div>
            <div class="max-h-96 overflow-y-auto no-scrollbar">
                <template x-for="(row, ri) in grid" :key="ri">
                    <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                        <div class="w-12 flex-shrink-0 flex items-center justify-end pr-1.5 text-sm sm:text-base font-bold text-gray-500 select-none">
                            <span x-text="parseInt(row.lbl)"></span>
                        </div>
                        <div class="flex-1 flex">
                            <template x-for="(c, ci) in row.cells" :key="ci">
                                <div class="flex-1 h-7 sm:h-8 border-l border-[#1f1f1f] first:border-l-0 relative"
                                     :style="cellStyle(c.mm)">
                                    <span x-show="c.locName"
                                          class="absolute inset-0 flex items-center justify-center text-[7px] font-bold text-white leading-tight text-center px-0.5 truncate"
                                          style="text-shadow:0 1px 2px rgba(0,0,0,0.6)" x-text="c.locName"></span>
                                </div>
                                <div x-show="ci < row.cells.length - 1"
                                     class="w-4 flex-shrink-0 flex items-center justify-center border-l border-[#1f1f1f] text-[9px] font-bold text-gray-500 select-none"
                                     :title="ci < row.cells.length - 1 ? fmt(row.cells[ci+1].mm) : ''">
                                    <span x-text="ci < row.cells.length - 1 ? ':' + String(row.cells[ci+1].mm % 60) : ''"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- single-day cozy card view -->
        <div x-show="singleDay && !isDayOff(selectedDate)" class="bg-[#1a1a1a] rounded-3xl border border-[#2a2a2a] overflow-hidden shadow-xl">
            <div class="px-5 py-4 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
                <div>
                    <span class="text-sm font-bold text-gray-400" x-text="selectedDate"></span>
                    <span class="text-xs text-gray-600 ml-2" x-text="dayName(selectedDate)"></span>
                </div>
                <span x-show="isTodaySelected" class="text-[10px] font-black uppercase bg-blue-600 text-white px-3 py-1 rounded-full">Сьогодні</span>
            </div>
            <div class="overflow-y-auto no-scrollbar">
                <template x-for="(row, ri) in cardGrid" :key="ri">
                    <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                        <div class="w-14 flex-shrink-0 flex items-center justify-end pr-2 text-sm sm:text-base font-bold text-gray-500 select-none">
                            <span x-text="parseInt(row.lbl)"></span>
                        </div>
                        <div class="flex-1 flex">
                            <template x-for="(c, ci) in row.cells" :key="ci">
                                <div class="flex-1 h-11 sm:h-12 border-l border-[#1f1f1f] first:border-l-0 relative"
                                     :style="cardCellStyle(c.mm)">
                                    <span x-show="cardCellAt(c.mm)?.locName"
                                          class="absolute inset-0 flex items-center justify-center text-[10px] sm:text-xs font-bold text-white leading-tight text-center px-1 truncate"
                                          style="text-shadow:0 1px 3px rgba(0,0,0,0.7)" x-text="cardCellAt(c.mm)?.locName || ''"></span>
                                </div>
                                <div x-show="ci < row.cells.length - 1"
                                     class="w-4 flex-shrink-0 flex items-center justify-center border-l border-[#1f1f1f] text-[9px] font-bold text-gray-500 select-none"
                                     :title="ci < row.cells.length - 1 ? fmt(row.cells[ci+1].mm) : ''">
                                    <span x-text="ci < row.cells.length - 1 ? ':' + String(row.cells[ci+1].mm % 60) : ''"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

        <div class="flex flex-wrap items-center gap-2 mt-3 text-xs text-gray-500" :class="singleDay ? 'text-sm' : ''">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
            <template x-for="loc in locations" :key="loc.name">
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" :style="'background:' + (loc.color || '#3b82f6')"></span> Вільно на <span x-text="loc.name"></span></span>
            </template>
            <span class="text-gray-600">· крок <span x-text="availStep || 30"></span> хв</span>
        </div>
    </div>
</main>

</body>
</html>
