<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Графік тренера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/shared-availability.js" th:src="@{/js/shared-availability.js(v=${appVersion})}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
</head>
<body class="antialiased" x-data="sharedAvailabilityApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm" x-text="mentorName.charAt(0).toUpperCase()"></div>
        <div>
            <h1 class="text-base font-bold" x-text="mentorName"></h1>
            <p class="text-xs text-gray-500">Графік доступності</p>
        </div>
        <button @click="installPwa()" class="text-sm" title="Встановити додаток">
            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
        </button>
    </div>
</header>

<main class="max-w-lg mx-auto p-4 pb-24">
    <div x-show="loading" class="text-center py-16">
        <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
        <p class="text-gray-500 text-sm">Завантаження...</p>
    </div>

    <div x-show="!loading && !hasData" class="text-center py-16">
        <p class="text-4xl mb-3">📅</p>
        <p class="text-gray-400 text-lg font-bold mb-1">Немає доступних годин</p>
        <p class="text-gray-600 text-sm">Тренер ще не налаштував свій графік на найближчі дні</p>
    </div>

    <div x-show="!loading && hasData">
        <!-- multi-day navigation -->
        <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] mb-4">
            <div class="flex overflow-x-auto no-scrollbar space-x-2 p-2.5">
                <template x-for="day in days" :key="day.dateStr">
                    <button @click="selectedDate = day.dateStr"
                            class="flex-shrink-0 flex flex-col items-center px-1.5 py-1 rounded-lg transition-all min-w-[28px] relative"
                            :class="day.dateStr === selectedDate ? 'bg-blue-600 text-white shadow-lg' : (day.isWeekend || isDayOff(day.dateStr) ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                        <span class="text-[9px] font-bold uppercase" x-text="day.weekday"></span>
                        <span class="text-xs font-black leading-tight" x-text="day.dayNum"></span>
                        <span class="text-[9px] font-bold" x-text="day.month"></span>
                        <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1 py-0.5 rounded-full">Сьогодні</span>
                        <span x-show="rangesByDate[day.dateStr]?.length && !isDayOff(day.dateStr)" class="w-0.5 h-0.5 rounded-full bg-blue-400 mt-0.5"></span>
                        <span x-show="isDayOff(day.dateStr)" class="text-[7px] font-black text-red-400 uppercase">✕</span>
                    </button>
                </template>
            </div>
        </div>

        <!-- selected date header -->
        <div x-show="!isDayOff(selectedDate)" class="mb-3">
            <h2 class="text-lg font-bold text-white" x-text="dayName(selectedDate)"></h2>
            <p x-show="isTodaySelected" class="text-xs font-bold text-blue-400 uppercase tracking-wider mt-0.5">Сьогодні</p>
        </div>

        <!-- day off -->
        <div x-show="isDayOff(selectedDate)" class="bg-gradient-to-br from-red-900/30 to-red-950/30 border border-red-500/20 rounded-3xl p-8 text-center mb-4">
            <span class="text-5xl block mb-3">🌙</span>
            <p class="text-red-400 text-xl font-black tracking-wide">ВИХІДНИЙ</p>
            <p class="text-gray-500 text-sm mt-2">Тренер не працює цього дня</p>
        </div>

        <!-- range cards -->
        <div x-show="!isDayOff(selectedDate)">
            <template x-if="selectedRanges.length === 0">
                <div class="text-center py-10 text-gray-600">
                    <p class="text-3xl mb-2">🕊️</p>
                    <p class="text-sm">На цей день доступні години відсутні</p>
                </div>
            </template>

            <div class="space-y-3">
                <template x-for="(r, i) in selectedRanges" :key="i">
                    <div class="rounded-2xl border border-[#2a2a2a] overflow-hidden transition-all hover:border-blue-500/30">
                        <div class="flex items-stretch">
                            <div class="w-2 flex-shrink-0" :style="'background:' + (r.locColor || '#3b82f6')"></div>
                            <div class="flex-1 px-4 py-3.5">
                                <div class="flex items-baseline gap-2">
                                    <span class="text-lg font-black text-white tracking-wide" x-text="r.startTime?.slice(0,5)"></span>
                                    <span class="text-sm text-gray-500">—</span>
                                    <span class="text-lg font-black text-white tracking-wide" x-text="r.endTime?.slice(0,5)"></span>
                                </div>
                                <div x-show="r.locName" class="flex items-center gap-1.5 mt-1.5">
                                    <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                                    <span class="text-xs font-semibold text-gray-400" x-text="r.locName"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="selectedRanges.length > 0" class="flex flex-wrap items-center gap-2 mt-5 pt-4 border-t border-[#222] text-xs text-gray-500">
                <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full" style="background:#3b82f6"></span> Вільно</span>
                <template x-for="loc in locations" :key="loc.name">
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full" :style="'background:' + (loc.color || '#3b82f6')"></span> <span x-text="loc.name"></span></span>
                </template>
                <span class="text-gray-600">· крок <span x-text="availStep || 30"></span> хв</span>
            </div>
        </div>
    </div>
</main>

</body>
</html>
