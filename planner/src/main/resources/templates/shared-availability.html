<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Графік тренера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased" x-data="sharedAvailabilityApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm" x-text="mentorName.charAt(0).toUpperCase()"></div>
        <div>
            <h1 class="text-base font-bold" x-text="mentorName"></h1>
            <p class="text-[10px] text-gray-500">Графік доступності</p>
        </div>
    </div>
</header>

<main class="max-w-lg mx-auto p-4 pb-24">
    <div x-show="loading" class="text-center py-16">
        <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
        <p class="text-gray-500 text-sm">Завантаження...</p>
    </div>

    <div x-show="!loading && !hasData" class="text-center py-16">
        <p class="text-4xl mb-3">📅</p>
        <p class="text-gray-400 text-lg font-bold mb-1">Немає доступних годин</p>
        <p class="text-gray-600 text-sm">Тренер ще не налаштував свій графік на найближчі дні</p>
    </div>

    <div x-show="!loading && hasData">
        <div class="flex overflow-x-auto no-scrollbar mb-4 space-x-2">
            <template x-for="day in days" :key="day.dateStr">
                <button @click="selectedDate = day.dateStr"
                        class="flex-shrink-0 flex flex-col items-center px-4 py-2.5 rounded-2xl transition-all min-w-[60px] relative"
                        :class="day.dateStr === selectedDate ? 'bg-blue-600 text-white shadow-lg' : 'bg-[#262626] text-gray-400'">
                    <span class="text-[9px] font-bold uppercase" x-text="day.weekday"></span>
                    <span class="text-xl font-black leading-tight" x-text="day.dayNum"></span>
                    <span class="text-[9px] font-bold mt-0.5" x-text="day.month"></span>
                    <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                    <span x-show="cellsByDate[day.dateStr]?.length" class="absolute bottom-0 left-0 right-0 h-0.5 bg-blue-400 rounded-full"></span>
                </button>
            </template>
        </div>

        <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
            <div class="px-4 py-2 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
                <span class="text-xs font-bold text-gray-500 whitespace-nowrap" x-text="selectedDate"></span>
            </div>
            <div class="max-h-96 overflow-y-auto no-scrollbar">
                <template x-for="(row, ri) in grid" :key="ri">
                    <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                        <div class="w-12 flex-shrink-0 flex items-start justify-end pr-2 pt-1 text-[10px] font-bold text-gray-600 select-none leading-none">
                            <span x-text="row.lbl"></span>
                        </div>
                        <div class="flex-1 flex">
                            <template x-for="(c, ci) in row.cells" :key="ci">
                                <div class="flex-1 h-10 sm:h-11 border-l border-[#1f1f1f] first:border-l-0 relative"
                                     :style="cellStyle(c.mm)">
                                    <span x-show="c.locName"
                                          class="absolute inset-0 flex items-center justify-center text-[8px] font-bold text-white leading-tight text-center px-0.5 truncate"
                                          style="text-shadow:0 1px 2px rgba(0,0,0,0.6)" x-text="c.locName"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-2 mt-3 text-xs text-gray-500">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
            <template x-for="loc in locations" :key="loc.name">
                <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" :style="'background:' + (loc.color || '#3b82f6')"></span> Вільно на <span x-text="loc.name"></span></span>
            </template>
        </div>
    </div>
</main>

<script th:inline="none">
    function localDateStr(d) {
        d = d || new Date();
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    }
    const MON = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
    const WD = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

    function sharedAvailabilityApp() {
        const today = localDateStr();
        return {
            shareToken: '',
            mentorName: '',
            loading: true,
            hasData: false,
            selectedDate: today,
            days: [],
            cellsByDate: {},
            grid: [],

            get coachCurCells() {
                return this.cellsByDate[this.selectedDate] || [];
            },
            cellAt(mm) {
                return this.coachCurCells.find(x => x.mm === mm);
            },
            get locations() {
                const seen = {};
                for (const date in this.cellsByDate) {
                    for (const cell of this.cellsByDate[date]) {
                        if (cell.locName && !seen[cell.locName]) {
                            seen[cell.locName] = { name: cell.locName, color: cell.locColor || '#3b82f6' };
                        }
                    }
                }
                return Object.values(seen);
            },
            cellStyle(mm) {
                const c = this.cellAt(mm);
                if (!c) return 'background:#2a2a2a';
                if (c.locColor) return `background:${c.locColor}`;
                return 'background:#3b82f6';
            },

            async init() {
                const pathParts = window.location.pathname.split('/');
                this.shareToken = pathParts[pathParts.length - 1];

                const now = new Date();
                for (let i = 0; i < 14; i++) {
                    const d = new Date(now);
                    d.setDate(now.getDate() + i);
                    const ds = localDateStr(d);
                    this.days.push({ dateStr: ds, weekday: WD[(d.getDay()+6)%7], dayNum: d.getDate(), month: MON[d.getMonth()], isToday: ds === today });
                }

                for (let h = 6; h < 22; h++) {
                    const cells = [{mm:h*60},{mm:h*60+30}];
                    this.grid.push({ lbl: `${String(h).padStart(2,'0')}:00`, cells });
                }

                await this.loadData();
            },

            async loadData() {
                try {
                    const mentorRes = await fetch(`/api/v1/shared/${this.shareToken}/mentor`);
                    if (!mentorRes.ok) { this.loading = false; return; }
                    const mentorData = await mentorRes.json();
                    this.mentorName = mentorData.name;

                    const start = this.days[0].dateStr;
                    const end = this.days[this.days.length - 1].dateStr;

                    const availRes = await fetch(`/api/v1/shared/${this.shareToken}?startDate=${start}&endDate=${end}`);
                    if (!availRes.ok) { this.loading = false; return; }

                    const availData = await availRes.json();
                    const slots = availData.slots || [];

                    const g = {};
                    for (const item of slots) {
                        if (!g[item.date]) g[item.date] = [];
                        const [sh, sm] = item.startTime.split(':').map(Number);
                        const [eh, em] = item.endTime.split(':').map(Number);
                        let t = sh * 60 + sm, end = eh * 60 + em;
                        while (t < end) {
                            g[item.date].push({ mm: t, locId: item.locationId, locColor: item.locationColor, locName: item.locationName });
                            t += 30;
                        }
                    }

                    this.cellsByDate = g;
                    this.hasData = Object.keys(g).length > 0;
                    if (this.hasData) {
                        this.selectedDate = Object.keys(g).sort()[0];
                    }
                    this.loading = false;
                } catch (e) {
                    console.error(e);
                    this.loading = false;
                }
            }
        }
    }
</script>
</body>
</html>
