<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Графік тренера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/shared-availability.js" th:src="@{/js/shared-availability.js(v=${appVersion})}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden" x-data="sharedAvailabilityApp()">

<div class="sticky top-0 z-10 bg-[#1a1a1a] border-b border-[#333]">
    <!-- Coach + install + days panel (non-scrolling) -->
    <div class="px-4 pt-3 pb-2">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm" x-text="mentorName.charAt(0).toUpperCase()"></div>
                <div>
                    <h1 class="text-base font-bold" x-text="mentorName"></h1>
                    <p class="text-xs text-gray-500">Графік доступності</p>
                </div>
            </div>
        </div>
        <div x-show="!loading && hasData && !isStandalone" class="mb-2">
            <button @click="installPwa()" class="w-full flex items-center justify-center gap-2 text-blue-400 py-2 rounded-xl font-bold transition hover:bg-white/5 active:scale-[0.97] text-sm border border-blue-500/30">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                <span>Встановити додаток</span>
            </button>
        </div>
            <div x-show="!loading && hasData">
                <div class="flex items-center gap-1">
                    <div class="flex-1 flex overflow-x-auto no-scrollbar space-x-3 scroll-smooth">
                        <template x-for="day in days" :key="day.dateStr">
                            <button @click="selectedDate = day.dateStr"
                                    class="flex-shrink-0 flex flex-col items-center min-w-[56px]">
                                <div class="w-12 h-12 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                                     :class="[selectedDate === day.dateStr ? 'ig-gradient shadow-lg' : (day.isWeekend || isDayOff(day.dateStr) ? 'bg-[#5a2525]' : 'bg-[#333]'), day.isToday ? 'today-marker' : '']">
                                    <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                                        <span class="text-xs font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                                        <span class="text-xs font-bold text-white" x-text="day.dayNum"></span>
                                    </div>
                                </div>
                                <span x-show="day.isToday" class="text-[9px] font-black text-white uppercase mt-1 tracking-tighter">Сьогодні</span>
                                <div x-show="isDayOff(day.dateStr)" class="text-[9px] font-black text-red-400 uppercase mt-0.5">✕</div>
                                <div x-show="rangesByDate[day.dateStr]?.length && !isDayOff(day.dateStr)" class="mt-0.5 flex items-center gap-0.5">
                                    <span class="w-1 h-1 rounded-full bg-blue-400"></span>
                                </div>
                            </button>
                        </template>
                    </div>
                </div>
                <div class="relative mt-2" x-data="{ open: false }" @click.outside="open = false">
                    <button @click="open = !open" class="w-full text-xs font-bold bg-[#2a2a2a] text-gray-200 border border-[#444] rounded-lg px-2 py-1.5 flex items-center gap-1.5 text-left">
                        <span class="w-2 h-2 rounded-full flex-shrink-0" :style="'background:' + (locationFilter ? (locations.find(l => l.id == locationFilter)?.color || '#3b82f6') : '#888')"></span>
                        <span class="truncate flex-1" x-text="locationFilter ? (locations.find(l => l.id == locationFilter)?.name || 'Всі локації') : 'Всі локації'"></span>
                        <svg class="w-3 h-3 flex-shrink-0 text-gray-500" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div x-show="open" class="absolute top-full left-0 right-0 z-20 mt-1 bg-[#2a2a2a] border border-[#444] rounded-lg shadow-xl overflow-hidden">
                        <button @click="locationFilter = null; open = false" class="w-full text-left px-3 py-2 text-xs font-bold hover:bg-[#3a3a3a] transition flex items-center gap-1.5" :class="!locationFilter ? 'text-white bg-blue-600/20' : 'text-gray-400'">
                            <span class="w-2 h-2 rounded-full flex-shrink-0" :style="'background:#888'"></span>
                            <span>Всі локації</span>
                        </button>
                        <template x-for="loc in locations" :key="loc.name">
                            <button @click="locationFilter = loc.id; open = false" class="w-full text-left px-3 py-2 text-xs font-bold hover:bg-[#3a3a3a] transition flex items-center gap-1.5" :class="locationFilter == loc.id ? 'text-white bg-blue-600/20' : ''" :style="'color:' + (loc.color || '#3b82f6')">
                                <span class="w-2 h-2 rounded-full flex-shrink-0" :style="'background:' + (loc.color || '#3b82f6')"></span>
                                <span x-text="loc.name"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>
    </div>
</div>

<main class="max-w-2xl mx-auto p-4 pb-24 flex-1 overflow-y-auto w-full">
    <div x-show="loading" class="text-center py-16">
        <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
        <p class="text-gray-500 text-sm">Завантаження...</p>
    </div>

    <div x-show="!loading && !hasData" class="text-center py-16">
        <p class="text-4xl mb-3">📅</p>
        <p class="text-gray-400 text-lg font-bold mb-1">Немає доступних годин</p>
        <p class="text-gray-600 text-sm">Тренер ще не налаштував свій графік на найближчі дні</p>
    </div>

    <div x-show="!loading && hasData">
        <!-- selected date header -->
        <div x-show="!isDayOff(selectedDate)" class="mb-3 text-center">
            <h2 class="text-lg font-bold text-white" x-text="dayName(selectedDate)"></h2>
            <p x-show="isTodaySelected" class="text-xs font-bold text-blue-400 uppercase tracking-wider mt-0.5">Сьогодні</p>
        </div>

        <!-- day off -->
        <div x-show="isDayOff(selectedDate)" class="bg-gradient-to-br from-red-900/30 to-red-950/30 border border-red-500/20 rounded-3xl p-8 text-center mb-4">
            <span class="text-5xl block mb-3">🌙</span>
            <p class="text-red-400 text-xl font-black tracking-wide">ВИХІДНИЙ</p>
            <p class="text-gray-500 text-sm mt-2">Тренер не працює цього дня</p>
        </div>

        <!-- range cards -->
        <div x-show="!isDayOff(selectedDate)">
            <template x-if="selectedRanges.length === 0">
                <div class="text-center py-10 text-gray-600">
                    <p class="text-3xl mb-2">🕊️</p>
                    <p class="text-sm">На цей день доступні години відсутні</p>
                </div>
            </template>

            <div class="space-y-3">
                <template x-for="(r, i) in selectedRanges" :key="i">
                    <div class="rounded-2xl border border-[#2a2a2a] overflow-hidden transition-all hover:border-blue-500/30">
                        <div class="flex items-stretch">
                            <div class="w-2 flex-shrink-0" :style="'background:' + (r.locColor || '#3b82f6')"></div>
                            <div class="flex-1 px-4 py-3.5 text-center">
                                <div class="flex items-baseline justify-center gap-2">
                                    <span class="text-lg font-black text-white tracking-wide" x-text="r.startTime?.slice(0,5)"></span>
                                    <span class="text-sm text-gray-500">—</span>
                                    <span class="text-lg font-black text-white tracking-wide" x-text="r.endTime?.slice(0,5)"></span>
                                </div>
                                <div x-show="r.locName" class="flex items-center justify-center gap-1.5 mt-1.5">
                                    <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                                    <span class="text-xs font-semibold text-gray-400" x-text="r.locName"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</main>

</body>
</html>
