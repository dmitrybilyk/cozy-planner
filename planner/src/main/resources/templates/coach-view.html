<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planner Pro — Тренер</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            overscroll-behavior-y: contain;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ig-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .today-marker { border: 2px solid #ffffff !important; box-shadow: 0 0 12px rgba(255, 255, 255, 0.4); }
        #calendar-container { touch-action: pan-x; -webkit-overflow-scrolling: touch; }
        .dragging { opacity: 0.3; transform: scale(0.95); border: 1px dashed #0095f6 !important; }
        .modal-container { display: flex; flex-direction: column; background: #1c1c1c; border: 1px solid #333; width: 100%; max-width: 512px; max-height: 90vh; border-top-left-radius: 32px; border-top-right-radius: 32px; }
        @media (min-width: 640px) { .modal-container { border-radius: 24px; max-height: 85vh; } }
        .modal-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #333; background: #1c1c1c; padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        input, select, textarea { background: #262626 !important; color: white !important; border: 1px solid #363636 !important; border-radius: 12px !important; padding: 10px !important; }
    </style>
</head>
<body class="antialiased" x-data="calendarApp()">

<header class="bg-[#1a1a1a] border-b border-[#333] sticky top-0 z-40 px-4 h-16 flex items-center justify-between shadow-md">
    <div class="flex items-center space-x-2">
        <h1 class="text-xl font-bold tracking-tight italic" x-text="coach.name"></h1>
        <div class="ig-gradient p-[1.5px] rounded-full"><div class="bg-black rounded-full p-0.5"><div class="w-3 h-3 bg-blue-500 rounded-full"></div></div></div>
    </div>
    <div class="flex bg-[#262626] p-1 rounded-xl">
        <button @click="currentView = 'feed'" class="px-3 py-1.5 text-[10px] font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'feed' ? 'bg-[#444] text-blue-400' : 'text-gray-500'">День</button>
        <button @click="currentView = 'agenda'" class="px-3 py-1.5 text-[10px] font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'agenda' ? 'bg-[#444] text-blue-400' : 'text-gray-500'">План</button>
    </div>
    <div class="flex items-center space-x-3">
        <button @click="showManageLocations = true"><svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg></button>
        <button @click="showManageAthletes = true"><svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></button>
        <button @click="openWorkoutModal()"><svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.8" d="M12 4v16m8-8H4"/></svg></button>
    </div>
</header>

<div x-show="currentView === 'feed'" class="bg-[#1a1a1a] border-b border-[#333]">
    <div id="calendar-container" class="flex overflow-x-auto no-scrollbar p-4 space-x-5 scroll-smooth" @wheel.passive="handleMouseScroll($event)">
        <template x-for="day in days" :key="day.dateStr">
            <button @click="selectedDate = day.dateStr; $nextTick(() => scrollToActive())"
                    :id="'date-btn-' + day.dateStr"
                    class="flex-shrink-0 flex flex-col items-center min-w-[64px]">
                <div class="w-14 h-14 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                     :class="[selectedDate === day.dateStr ? 'ig-gradient shadow-lg' : 'bg-[#333]', day.dateStr === todayStr ? 'today-marker' : '']">
                    <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                        <span class="text-[9px] font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                        <span class="text-sm font-bold text-white" x-text="day.dayNum"></span>
                    </div>
                </div>
                <span x-show="day.dateStr === todayStr" class="text-[7px] font-black text-white uppercase mt-1 tracking-tighter">Сьогодні</span>
                <div x-show="hasWorkoutOn(day.dateStr)" class="w-1 h-1 bg-blue-500 rounded-full mt-0.5"></div>
            </button>
        </template>
    </div>
</div>

<div x-show="currentView === 'agenda'" class="bg-[#1a1a1a] border-b border-[#333] p-4 overflow-x-auto no-scrollbar flex space-x-2">
    <button @click="toggleAthleteFilter(null)" class="px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition" :class="selectedAthleteFilters.length === 0 ? 'bg-white text-black' : 'bg-[#262626] text-gray-400'">Всі атлети</button>
    <template x-for="athlete in athletes" :key="athlete.id">
        <button @click="toggleAthleteFilter(athlete.id)" class="px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition border border-[#333]" :class="selectedAthleteFilters.includes(athlete.id) ? 'bg-blue-600 text-white border-blue-600' : 'bg-[#1a1a1a] text-gray-400'" x-text="athlete.name"></button>
    </template>
</div>

<main class="max-w-2xl mx-auto p-4 pb-24">
    <div x-show="currentView === 'feed'">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest" x-text="formatDisplayDate(selectedDate)"></h2>
            <button @click="selectedDate = todayStr; $nextTick(() => scrollToToday())" class="text-[10px] font-bold text-blue-400 uppercase">Сьогодні</button>
        </div>
        <div class="space-y-4">
            <template x-for="(workout, index) in filteredWorkouts" :key="workout.id">
                <div draggable="true" @dragstart="dragStart($event, index)" @dragover.prevent @drop="drop($event, targetIndex(workout.id))" @click="editWorkout(workout)"
                     class="bg-[#1c1c1c] border border-[#333] rounded-3xl p-5 shadow-sm transition active:scale-95"
                     :class="draggedIndex === index ? 'dragging' : ''"
                     :style="'border-left: 5px solid ' + (workout.color || '#3b82f6')">
                    <div class="flex items-center space-x-4">
                        <div class="flex flex-col items-center justify-center rounded-2xl px-3 py-2 min-w-[70px] border border-[#333]"
                             :style="'background: ' + (workout.color || '#3b82f6') + '33'">
                            <span class="text-xl font-black" :style="'color: ' + (workout.color || '#3b82f6')" x-text="workout.time"></span>
                            <span class="text-[9px] font-bold text-gray-500 uppercase" x-text="workout.endTime"></span>
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-gray-100" x-text="workout.title"></p>
                            <p class="text-xs text-gray-500 italic" x-text="workout.description"></p>
                            <div class="flex flex-wrap gap-1 mt-2">
                                <template x-for="aId in workout.athleteIds"><span class="text-[10px] bg-[#333] px-2 py-0.5 rounded-full font-semibold text-gray-300" x-text="getAthleteName(aId)"></span></template>
                            </div>
                            <div x-show="getLocationName(workout.locationId)" class="mt-1.5 flex items-center space-x-1">
                                <span class="w-2 h-2 rounded-full" :style="'background: ' + (workout.color || '#3b82f6')"></span>
                                <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(workout.locationId)"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredWorkouts.length === 0" class="text-center py-20 text-gray-600 text-sm italic">Немає тренувань на цей день</div>
        </div>
    </div>

    <div x-show="currentView === 'agenda'" class="space-y-10">
        <template x-for="dateGroup in agendaGroups" :key="dateGroup.date">
            <div class="space-y-4">
                <button @click="goToDay(dateGroup.date)" class="sticky top-16 bg-[#121212] py-2 z-10 w-full text-left flex items-center justify-between">
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest" x-text="formatDisplayDate(dateGroup.date)"></span>
                    <span x-show="dateGroup.date === todayStr" class="text-[9px] font-black text-white bg-[#333] px-2 py-0.5 rounded">СЬОГОДНІ</span>
                </button>
                <div class="space-y-3">
                    <template x-for="workout in dateGroup.items" :key="workout.id">
                        <div @click="editWorkout(workout)" class="bg-[#1c1c1c] border border-[#333] rounded-2xl p-4 flex items-center justify-between shadow-sm active:bg-[#262626]"
                             :style="'border-left: 4px solid ' + (workout.color || '#3b82f6')">
                            <div class="flex items-center space-x-4">
                                <span class="text-sm font-black text-white" x-text="workout.time"></span>
                                <div>
                                    <p class="text-sm font-bold text-gray-200" x-text="workout.title"></p>
                                    <p class="text-[10px] text-gray-500" x-text="workout.athleteIds.map(id => getAthleteName(id)).join(', ')"></p>
                                    <div x-show="getLocationName(workout.locationId)" class="flex items-center space-x-1 mt-1">
                                        <span class="w-2 h-2 rounded-full" :style="'background: ' + (workout.color || '#3b82f6')"></span>
                                        <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(workout.locationId)"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</main>

<!-- МЕНЕДЖЕР АТЛЕТІВ (ПОВНОЕКРАННИЙ) -->
<div x-show="showManageAthletes" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>
    <header class="px-4 h-16 flex items-center justify-between border-b border-[#333]">
        <button @click="showManageAthletes = false" class="text-blue-400 font-bold">Назад</button>
        <h3 class="font-bold">Команда</h3>
        <div class="w-10"></div>
    </header>
    <div class="p-6 space-y-3 bg-[#1a1a1a] border-b border-[#333]">
        <input type="text" x-model="athleteForm.name" placeholder="ПІБ атлета" class="w-full">
        <input type="text" x-model="athleteForm.description" placeholder="Примітка" class="w-full">
        <button @click="saveAthlete()" class="w-full bg-white text-black py-4 rounded-xl font-bold uppercase tracking-widest text-[10px]" x-text="editingAthleteId ? 'Оновити' : 'Додати атлета'"></button>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-3">
        <template x-for="athlete in athletes" :key="athlete.id">
            <div class="flex items-center justify-between p-4 bg-[#1c1c1c] border border-[#333] rounded-3xl">
                <div>
                    <p class="font-bold text-gray-100" x-text="athlete.name"></p>
                    <p class="text-[10px] text-gray-500" x-text="athlete.description"></p>
                </div>
                <div class="flex space-x-6 text-[10px] font-black uppercase">
                    <button @click="editAthlete(athlete)" class="text-blue-400">Правка</button>
                    <button @click="askDeleteAthlete(athlete.id)" class="text-red-500">Видалити</button>
                </div>
            </div>
        </template>
    </div>
</div>

<!-- МЕНЕДЖЕР ЛОКАЦІЙ (ПОВНОЕКРАННИЙ) -->
<div x-show="showManageLocations" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>
    <header class="px-4 h-16 flex items-center justify-between border-b border-[#333]">
        <button @click="showManageLocations = false" class="text-blue-400 font-bold">Назад</button>
        <h3 class="font-bold">Локації</h3>
        <div class="w-10"></div>
    </header>
    <div class="p-6 space-y-3 bg-[#1a1a1a] border-b border-[#333]">
        <input type="text" x-model="locationForm.name" placeholder="Назва локації" class="w-full">
        <input type="text" x-model="locationForm.description" placeholder="Опис" class="w-full">
        <div class="flex items-center space-x-3">
            <input type="color" x-model="locationForm.color" class="w-12 h-12 p-0.5 rounded-xl cursor-pointer">
            <span class="text-xs text-gray-400">Колір</span>
        </div>
        <button @click="saveLocation()" class="w-full bg-white text-black py-4 rounded-xl font-bold uppercase tracking-widest text-[10px]" x-text="editingLocationId ? 'Оновити' : 'Додати локацію'"></button>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-3">
        <template x-for="location in locations" :key="location.id">
            <div class="flex items-center justify-between p-4 bg-[#1c1c1c] border border-[#333] rounded-3xl"
                 :style="'border-left: 5px solid ' + (location.color || '#3b82f6')">
                <div>
                    <p class="font-bold text-gray-100" x-text="location.name"></p>
                    <p class="text-[10px] text-gray-500" x-text="location.description"></p>
                </div>
                <div class="flex space-x-6 text-[10px] font-black uppercase">
                    <button @click="editLocation(location)" class="text-blue-400">Правка</button>
                    <button @click="askDeleteLocation(location.id)" class="text-red-500">Видалити</button>
                </div>
            </div>
        </template>
    </div>
</div>

<!-- МОДАЛКА ТРЕНУВАННЯ -->
<div x-show="showModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm px-0 sm:px-4" x-cloak x-transition>
    <div class="modal-container" @click.away="showModal = false">
        <div class="p-6 border-b border-[#333] flex justify-between items-center">
            <h3 class="text-xl font-bold text-white" x-text="editingWorkoutId ? 'Редагувати' : 'Нова сесія'"></h3>
            <button x-show="editingWorkoutId" @click="askDeleteWorkout()" class="text-red-500 font-bold text-xs uppercase">Видалити</button>
        </div>
        <div class="modal-body space-y-6">
            <div x-show="isTimePassed()" class="bg-red-900/20 text-red-400 p-3 rounded-xl text-[10px] font-bold uppercase text-center">Час уже минув</div>
            <div class="space-y-4">
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Дата</label><input type="date" x-model="workoutForm.date" :min="todayStr" class="w-full"></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Назва</label><input type="text" x-model="workoutForm.title" class="w-full bg-transparent border-b border-[#333] outline-none py-2 focus:border-blue-500"></div>
                <div><label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Опис</label><textarea x-model="workoutForm.description" class="w-full" rows="2"></textarea></div>
                <div class="flex justify-between gap-4">
                    <div class="flex-1"><span class="text-[9px] font-black text-gray-500 uppercase block mb-1">Початок</span><div class="flex space-x-1"><select x-model="workoutForm.startH" @change="autoUpdateEndTime" class="w-full font-bold"><template x-for="h in hours"><option :value="h" x-text="h"></option></template></select><select x-model="workoutForm.startM" @change="autoUpdateEndTime" class="w-full font-bold"><option value="00">00</option><option value="30">30</option></select></div></div>
                    <div class="flex-1"><span class="text-[9px] font-black text-gray-500 uppercase block mb-1">Кінець</span><div class="flex space-x-1"><select x-model="workoutForm.endH" class="w-full font-bold"><template x-for="h in hours"><option :value="h" x-text="h"></option></template></select><select x-model="workoutForm.endM" class="w-full font-bold"><option value="00">00</option><option value="30">30</option></select></div></div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Локація</label>
                    <select x-model="workoutForm.locationId" class="w-full">
                        <option :value="null">Без локації</option>
                        <template x-for="location in locations" :key="location.id">
                            <option :value="location.id" x-text="location.name" :style="'color: ' + (location.color || '#3b82f6')"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <p class="text-[10px] font-black text-gray-400 uppercase">Атлети</p>
                        <span x-show="workoutForm.athleteIds.length" class="text-[10px] font-bold text-blue-400 bg-blue-900/30 px-2 py-0.5 rounded-full" x-text="workoutForm.athleteIds.length + ' вибр.'"></span>
                    </div>
                    <input type="text" x-model="athleteSearch" placeholder="Пошук атлетів..." class="w-full mb-2 text-sm">
                    <div class="grid grid-cols-1 gap-1.5 max-h-52 overflow-y-auto no-scrollbar">
                        <template x-for="athlete in filteredAthletes" :key="athlete.id">
                            <label class="flex items-center justify-between px-4 py-3.5 rounded-2xl border-2 transition-all duration-150 active:scale-[0.98] cursor-pointer"
                                   :class="workoutForm.athleteIds.includes(athlete.id) ? 'bg-blue-900/20 border-blue-500' : 'bg-[#262626] border-transparent'">
                                <span class="font-semibold text-sm text-gray-200" x-text="athlete.name"></span>
                                <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-150"
                                     :class="workoutForm.athleteIds.includes(athlete.id) ? 'bg-blue-500 border-blue-500' : 'border-gray-600'">
                                    <svg x-show="workoutForm.athleteIds.includes(athlete.id)" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                </div>
                                <input type="checkbox" :value="athlete.id" x-model="workoutForm.athleteIds" class="hidden">
                            </label>
                        </template>
                        <div x-show="filteredAthletes.length === 0 && athleteSearch" class="text-center py-6 text-gray-600 text-xs">Нічого не знайдено</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer flex space-x-3">
            <button @click="showModal = false" class="flex-1 py-4 font-bold text-gray-500 uppercase text-xs">Скасувати</button>
            <button @click="saveWorkout()" :disabled="workoutForm.athleteIds.length === 0 || isTimePassed()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg disabled:opacity-20">Зберегти</button>
        </div>
    </div>
</div>

<div x-show="confirmData.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[300px] rounded-[24px] overflow-hidden shadow-2xl"><div class="p-6 text-center text-white"><h4 class="text-lg font-bold" x-text="confirmData.title"></h4><p class="text-sm text-gray-500 mt-2" x-text="confirmData.message"></p></div><div class="flex flex-col border-t border-[#333]"><button @click="confirmData.onConfirm(); confirmData.show = false" class="py-4 text-sm font-bold text-red-500 border-b border-[#333]">Видалити</button><button @click="confirmData.show = false" class="py-4 text-sm font-medium text-gray-300">Скасувати</button></div></div>
</div>

<script>
    function calendarApp() {
        return {
            currentView: 'feed', showModal: false, showManageAthletes: false, showManageLocations: false,
            editingWorkoutId: null, editingAthleteId: null, editingLocationId: null, draggedIndex: null,
            selectedDate: new Date().toISOString().split('T')[0], todayStr: new Date().toISOString().split('T')[0],
            days: [], workouts: [], athletes: [], locations: [], coachId: 1, coach: { name: 'Катя' },
            hours: Array.from({length: 24}, (_, i) => i.toString().padStart(2, '0')),
            selectedAthleteFilters: [], athleteSearch: '',
            workoutForm: { title: 'Тренування', description: '', date: '', startH: '08', startM: '00', endH: '09', endM: '00', athleteIds: [], locationId: null },
            athleteForm: { name: '', description: '' },
            locationForm: { name: '', description: '', color: '#3b82f6' },
            confirmData: { show: false, title: '', message: '', onConfirm: () => {} },

            async init() {
                this.generateDays();
                await this.fetchLocations();
                await this.fetchAthletes();
                await this.fetchData();
                setTimeout(() => this.scrollToToday(), 200);
            },

            get filteredWorkouts() {
                return this.workouts.filter(w => w.date === this.selectedDate);
            },

            targetIndex(id) {
                return this.filteredWorkouts.findIndex(w => w.id === id);
            },

            scrollToToday() {
                this.selectedDate = this.todayStr;
                this.scrollToActive();
            },

            scrollToActive() {
                const el = document.getElementById('calendar-container');
                const activeBtn = document.getElementById('date-btn-' + this.selectedDate);
                if (el && activeBtn) {
                    el.scrollTo({
                        left: activeBtn.offsetLeft - el.offsetWidth / 2 + activeBtn.offsetWidth / 2,
                        behavior: 'smooth'
                    });
                }
            },

            goToDay(date) { this.selectedDate = date; this.currentView = 'feed'; setTimeout(() => this.scrollToActive(), 150); },
            toggleAthleteFilter(id) { if (id === null) this.selectedAthleteFilters = []; else { const idx = this.selectedAthleteFilters.indexOf(id); if (idx > -1) this.selectedAthleteFilters.splice(idx, 1); else this.selectedAthleteFilters.push(id); } },

            get agendaGroups() {
                let filtered = this.workouts.filter(w => w.date >= this.todayStr);
                if (this.selectedAthleteFilters.length > 0) filtered = filtered.filter(w => w.athleteIds.some(id => this.selectedAthleteFilters.includes(id)));
                const groups = filtered.reduce((acc, w) => { if (!acc[w.date]) acc[w.date] = []; acc[w.date].push(w); return acc; }, {});
                return Object.keys(groups).sort().map(date => ({ date, items: groups[date] }));
            },

            get filteredAthletes() {
                const q = this.athleteSearch.toLowerCase();
                return this.athletes
                    .filter(a => !q || a.name.toLowerCase().includes(q))
                    .sort((a, b) => a.name.localeCompare(b.name));
            },

            isTimePassed() {
                if (this.workoutForm.date < this.todayStr) return true;
                if (this.workoutForm.date === this.todayStr) {
                    const now = new Date(); const sel = new Date();
                    sel.setHours(parseInt(this.workoutForm.startH), parseInt(this.workoutForm.startM), 0);
                    return sel < now;
                }
                return false;
            },

            async fetchData() {
                const res = await fetch(`/api/v1/workouts?coachId=${this.coachId}&startDate=${this.days[0].dateStr}&endDate=${this.days[this.days.length-1].dateStr}`);
                if (res.ok) this.workouts = (await res.json()).sort((a, b) => a.time.localeCompare(b.time));
            },

            async fetchAthletes() {
                const res = await fetch(`/api/v1/coaches/${this.coachId}/athletes`);
                if (res.ok) this.athletes = (await res.json()).sort((a, b) => a.name.localeCompare(b.name));
            },

            async fetchLocations() {
                const res = await fetch(`/api/v1/coaches/${this.coachId}/locations`);
                if (res.ok) this.locations = await res.json();
            },

            getAthleteName(id) { return this.athletes.find(at => at.id === id)?.name || 'Unknown'; },
            getLocationName(id) { return this.locations.find(l => l.id === id)?.name || ''; },
            hasWorkoutOn(date) { return this.workouts.some(w => w.date === date); },
            autoUpdateEndTime() { let h = (parseInt(this.workoutForm.startH) + 1) % 24; this.workoutForm.endH = h.toString().padStart(2, '0'); this.workoutForm.endM = this.workoutForm.startM; },
            handleMouseScroll(e) { document.getElementById('calendar-container').scrollLeft += e.deltaY; },
            dragStart(event, index) { this.draggedIndex = index; },

            async drop(event, targetIndex) {
                if (this.draggedIndex === null || this.draggedIndex === targetIndex) return;
                const list = this.filteredWorkouts; const dragged = list[this.draggedIndex]; const target = list[targetIndex];
                if (dragged.date < this.todayStr) return;
                const ts = dragged.time; const te = dragged.endTime;
                dragged.time = target.time; dragged.endTime = target.endTime;
                target.time = ts; target.endTime = te;
                await this.saveRaw(dragged); await this.saveRaw(target);
                this.draggedIndex = null; await this.fetchData();
            },

            async saveRaw(w) { await fetch('/api/v1/workouts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...w, coachId: this.coachId }) }); },

            openWorkoutModal() {
                this.editingWorkoutId = null;
                this.workoutForm = { title: 'Тренування', description: '', date: this.selectedDate, startH: '08', startM: '00', endH: '09', endM: '00', athleteIds: [], locationId: null };
                this.showModal = true;
            },

            editWorkout(w) {
                this.editingWorkoutId = w.id;
                this.originalWorkoutData = { date: w.date, time: w.time };
                const [sh, sm] = w.time.split(':'); const [eh, em] = (w.endTime || '09:00').split(':');
                this.workoutForm = { title: w.title, description: w.description || '', date: w.date, startH: sh, startM: sm, endH: eh, endM: em, athleteIds: [...(w.athleteIds || [])], locationId: w.locationId || null };
                this.showModal = true;
            },

            async saveWorkout() {
                const newTime = `${this.workoutForm.startH}:${this.workoutForm.startM}`;
                if (this.editingWorkoutId && this.originalWorkoutData) {
                    if (this.workoutForm.date !== this.originalWorkoutData.date || newTime !== this.originalWorkoutData.time) {
                        await fetch(`/api/v1/workouts/${this.editingWorkoutId}`, { method: 'DELETE' });
                    }
                }
                const payload = {
                    id: (this.editingWorkoutId && this.workoutForm.date === this.originalWorkoutData?.date && newTime === this.originalWorkoutData?.time) ? this.editingWorkoutId : null,
                    ...this.workoutForm, time: newTime, endTime: `${this.workoutForm.endH}:${this.workoutForm.endM}`, coachId: this.coachId
                };
                await fetch('/api/v1/workouts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                this.showModal = false; await this.fetchData();
            },

            askDeleteWorkout() {
                this.confirmData = { show: true, title: 'Видалити?', message: 'Дію неможливо скасувати.', onConfirm: async () => { await fetch(`/api/v1/workouts/${this.editingWorkoutId}`, { method: 'DELETE' }); this.showModal = false; await this.fetchData(); } };
            },

            async saveAthlete() {
                const method = this.editingAthleteId ? 'PUT' : 'POST';
                const url = this.editingAthleteId ? `/api/v1/athletes/${this.editingAthleteId}` : '/api/v1/athletes';
                await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...this.athleteForm, coachId: this.coachId }) });
                this.athleteForm = { name: '', description: '' }; this.editingAthleteId = null; await this.fetchAthletes();
            },

            editAthlete(a) { this.editingAthleteId = a.id; this.athleteForm = { name: a.name, description: a.description }; },
            askDeleteAthlete(id) { this.confirmData = { show: true, title: 'Видалити?', message: 'Дані зникнуть.', onConfirm: async () => { await fetch(`/api/v1/athletes/${id}`, { method: 'DELETE' }); await this.fetchAthletes(); await this.fetchData(); } }; },

            async saveLocation() {
                const method = this.editingLocationId ? 'PUT' : 'POST';
                const url = this.editingLocationId ? `/api/v1/locations/${this.editingLocationId}` : '/api/v1/locations';
                await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...this.locationForm, coachId: this.coachId }) });
                this.locationForm = { name: '', description: '', color: '#3b82f6' }; this.editingLocationId = null;
                await this.fetchLocations();
            },

            editLocation(l) { this.editingLocationId = l.id; this.locationForm = { name: l.name, description: l.description || '', color: l.color || '#3b82f6' }; },
            askDeleteLocation(id) { this.confirmData = { show: true, title: 'Видалити?', message: 'Локація зникне з усіх тренувань.', onConfirm: async () => { await fetch(`/api/v1/locations/${id}`, { method: 'DELETE' }); await this.fetchLocations(); await this.fetchData(); } }; },

            generateDays() {
                const start = new Date(); start.setDate(start.getDate() - 14);
                const ukDays = ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
                for (let i = 0; i < 74; i++) {
                    const dateStr = start.toISOString().split('T')[0];
                    this.days.push({ dateStr, dayNum: start.getDate(), weekday: ukDays[start.getDay()] });
                    start.setDate(start.getDate() + 1);
                }
            },
            formatDisplayDate(str) {
                const d = new Date(str); const months = ['січня', 'лютого', 'березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня'];
                return `${d.getDate()} ${months[d.getMonth()]}`;
            }
        }
    }
</script>
