<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Planner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            overscroll-behavior-y: contain;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ig-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .ig-gradient-text {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .today-marker { border: 2px solid #ffffff !important; box-shadow: 0 0 12px rgba(255, 255, 255, 0.4); }
        #calendar-container { touch-action: pan-x; -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; scroll-padding-left: 1rem; }
        .week-start { scroll-snap-align: start; border-left: 1px solid #333; padding-left: 0.75rem; margin-left: 0.25rem; }
        .dragging { opacity: 0.3; transform: scale(0.95); border: 1px dashed #0095f6 !important; }
        .modal-container { display: flex; flex-direction: column; background: #1c1c1c; border: 1px solid #333; width: 100%; max-width: 512px; max-height: 90vh; border-top-left-radius: 32px; border-top-right-radius: 32px; }
        @media (min-width: 640px) { .modal-container { border-radius: 24px; max-height: 85vh; } }
        .modal-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #333; background: #1c1c1c; padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        input, select, textarea { background: #262626 !important; color: white !important; border: 1px solid #363636 !important; border-radius: 12px !important; padding: 10px !important; }
        .ig-ring {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 2px;
            border-radius: 50%;
            display: inline-flex;
        }
        .card-hover { transition: all 0.15s ease; }
        .card-hover:active { transform: scale(0.97); }
        .bottom-nav { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
    </style>
</head>
<body class="antialiased" x-data="calendarApp()">

<header class="bg-[#1a1a1a]/95 backdrop-blur-lg border-b border-[#333] sticky top-0 z-40 shadow-md">
    <div class="px-3 sm:px-4 h-14 sm:h-16 flex items-center justify-between">
        <div @click="showProfile = true" class="flex items-center space-x-2 sm:space-x-3 min-w-0 cursor-pointer hover:bg-white/5 rounded-lg px-2 py-1.5 transition">
            <div class="ig-ring w-7 h-7 sm:w-9 sm:h-9 flex items-center justify-center flex-shrink-0">
                <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                    <span class="text-[8px] sm:text-[10px] font-black italic ig-gradient-text">CP</span>
                </div>
            </div>
            <div class="leading-tight truncate">
                <h1 class="text-[11px] sm:text-sm font-bold truncate" x-text="coach.name || 'Cozy Planner'"></h1>
                <p x-show="user.email" class="text-[8px] sm:text-[9px] text-gray-500 font-medium truncate" x-text="user.email"></p>
            </div>
            <svg class="w-3 h-3 text-gray-500 flex-shrink-0 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
        </div>
        <div class="flex bg-[#262626] p-0.5 sm:p-1 rounded-xl flex-shrink-0">
            <button @click="currentView = 'feed'" class="px-2 sm:px-3 py-1 sm:py-1.5 text-[9px] sm:text-[10px] font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'feed' ? 'bg-[#444] text-blue-400' : 'text-gray-500'">День</button>
            <button @click="currentView = 'agenda'" class="px-2 sm:px-3 py-1 sm:py-1.5 text-[9px] sm:text-[10px] font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'agenda' ? 'bg-[#444] text-blue-400' : 'text-gray-500'">План</button>
        </div>
         <form method="POST" action="/logout" id="logoutForm" class="hidden"></form>
         
         <div x-show="coachTg.enabled" class="flex items-center gap-2 mr-2">
             <template x-if="coachTg.connected">
                 <span class="px-2 py-1 bg-green-900/30 text-green-400 rounded-full text-[9px] font-bold uppercase">
                     ✓ TG підключено
                     <span x-show="coachTg.username" class="opacity-60 ml-1" x-text="'@' + coachTg.username"></span>
                 </span>
             </template>
             <template x-if="!coachTg.connected">
                 <button @click="generateCoachTelegramToken()" 
                         :class="coachTg.copied ? 'bg-green-600' : (coachTg.connectLink ? 'bg-orange-500' : 'bg-blue-600')"
                         class="px-2 py-1 text-white rounded-lg text-[10px] font-bold uppercase">
                     <span x-show="coachTg.copied">✓ Скопійовано!</span>
                     <span x-show="!coachTg.copied && coachTg.connectLink">🔗 Копіювати посилання</span>
                     <span x-show="!coachTg.copied && !coachTg.connectLink">📲 Під'єднати TG</span>
                 </button>
             </template>
         </div>
         
         <button onclick="document.getElementById('logoutForm').submit()" class="flex-shrink-0"><svg class="w-5 h-5 sm:w-6 sm:h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
    </div>
    <div class="px-2 sm:px-4 pb-2 sm:pb-3 flex gap-2">
        <button @click="openWorkoutModal()" class="flex-1 flex items-center justify-center gap-1.5 bg-blue-600 hover:bg-blue-700 active:scale-[0.97] text-white py-3 rounded-2xl font-bold text-sm sm:text-base shadow-lg transition">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span>Нова сесія</span>
        </button>
        <button @click="showManageAthletes = true" class="flex-1 flex items-center justify-center gap-1.5 bg-[#262626] hover:bg-[#333] active:scale-[0.97] text-gray-200 py-3 rounded-2xl font-bold text-sm sm:text-base transition">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span>Учні</span>
        </button>
        <button @click="showManageLocations = true" class="flex-1 flex items-center justify-center gap-1.5 bg-[#262626] hover:bg-[#333] active:scale-[0.97] text-gray-200 py-3 rounded-2xl font-bold text-sm sm:text-base transition">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span>Місця</span>
        </button>
        <button @click="showAvailabilityOverview = true" class="flex-1 flex items-center justify-center gap-1.5 bg-[#262626] hover:bg-[#333] active:scale-[0.97] text-gray-200 py-3 rounded-2xl font-bold text-sm sm:text-base transition">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span>Доступність</span>
        </button>
    </div>
</header>

<div x-show="currentView === 'feed'" class="bg-[#1a1a1a] border-b border-[#333]">
    <div id="calendar-container" class="flex overflow-x-auto no-scrollbar p-4 space-x-5 scroll-smooth" @wheel.passive="handleMouseScroll($event)">
         <template x-for="day in days" :key="day.dateStr">
            <button @click="selectedDate = day.dateStr; $nextTick(() => scrollToActive())"
                    :id="'date-btn-' + day.dateStr"
                    class="flex-shrink-0 flex flex-col items-center min-w-[64px]"
                    :class="day.isMonday ? 'week-start' : ''">
                <div class="w-14 h-14 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                     :class="[selectedDate === day.dateStr ? 'ig-gradient shadow-lg' : 'bg-[#333]', day.dateStr === todayStr ? 'today-marker' : '']">
                    <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                        <span class="text-[9px] font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                        <span class="text-sm font-bold text-white" x-text="day.dayNum"></span>
                    </div>
                </div>
                <span x-show="day.dateStr === todayStr" class="text-[7px] font-black text-white uppercase mt-1 tracking-tighter">Сьогодні</span>
                <div x-show="hasWorkoutOn(day.dateStr)" class="w-1 h-1 bg-blue-500 rounded-full mt-0.5"></div>
            </button>
        </template>
    </div>
</div>

<div x-show="currentView === 'agenda'" class="bg-[#1a1a1a] border-b border-[#333] p-4 overflow-x-auto no-scrollbar flex space-x-2">
    <button @click="toggleAthleteFilter(null)" class="px-5 py-2.5 rounded-full text-sm sm:text-base font-bold whitespace-nowrap transition" :class="selectedAthleteFilters.length === 0 ? 'bg-white text-black' : 'bg-[#262626] text-gray-400'">Всі учні</button>
    <template x-for="athlete in athletes" :key="athlete.id">
        <button @click="toggleAthleteFilter(athlete.id)" class="px-5 py-2.5 rounded-full text-sm sm:text-base font-bold whitespace-nowrap transition border border-[#333]" :class="selectedAthleteFilters.includes(athlete.id) ? 'bg-blue-600 text-white border-blue-600' : 'bg-[#1a1a1a] text-gray-400'" x-text="athlete.name"></button>
    </template>
</div>

<main class="max-w-2xl mx-auto p-4 pb-24">
    <div x-show="currentView === 'feed'">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-sm sm:text-base font-black text-gray-500 uppercase tracking-widest" x-text="formatDisplayDate(selectedDate)"></h2>
            <button @click="selectedDate = todayStr; $nextTick(() => scrollToToday())" class="text-xs sm:text-sm font-bold text-blue-400 uppercase">Сьогодні</button>
        </div>
        <div class="space-y-4">
            <template x-for="(workout, index) in filteredWorkouts" :key="workout.id">
                <div draggable="true" @dragstart="dragStart($event, index)" @dragend="dragEnd" @dragover.prevent @drop="drop($event, targetIndex(workout.id))"
                     @click="handleCardClick(workout, index)"
                     :data-workout-id="workout.id"
                     :id="'workout-card-' + workout.id"
                     class="bg-[#1c1c1c] border border-[#333] rounded-3xl p-5 shadow-sm card-hover fade-in"
                     :class="draggedIndex === index ? 'dragging' : ''"
                     :style="'border-left: 5px solid ' + (workout.color || '#3b82f6')">
                    <div class="flex items-center space-x-4">
                        <div class="flex flex-col items-center justify-center rounded-2xl px-3 py-2 min-w-[70px] border border-[#333]"
                             :style="'background: ' + (workout.color || '#3b82f6') + '33'">
                            <span class="text-lg sm:text-xl font-black" :style="'color: ' + (workout.color || '#3b82f6')" x-text="workout.time"></span>
                            <span class="text-[9px] font-bold text-gray-500 uppercase" x-text="workout.endTime"></span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-base sm:text-lg font-bold text-gray-100 truncate" x-text="workout.title"></p>
                            <p class="text-sm text-gray-500 italic truncate" x-text="workout.description"></p>
                            <div class="flex flex-wrap gap-1 mt-2">
                                <template x-for="aId in workout.athleteIds"><span class="inline-flex items-center gap-1 text-xs sm:text-sm bg-[#333] px-2.5 py-0.5 rounded-full font-semibold text-gray-300"><span :class="isAvailable(aId, workout.date)?.length > 0 ? 'w-1.5 h-1.5 rounded-full bg-green-500' : isAvailable(aId, workout.date) !== null ? 'w-1.5 h-1.5 rounded-full bg-red-500' : 'w-1.5 h-1.5 rounded-full bg-gray-600'" x-text="''"></span><span x-text="getAthleteName(aId)"></span></span></template>
                            </div>
                            <div x-show="getLocationName(workout.locationId)" class="mt-1.5 flex items-center space-x-1">
                                <span class="w-2 h-2 rounded-full" :style="'background: ' + (workout.color || '#3b82f6')"></span>
                                <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(workout.locationId)"></span>
                            </div>
                            <button @click.stop="copyWorkout(workout)" class="mt-2 text-[11px] sm:text-xs font-bold text-blue-400 uppercase tracking-wider">Копіювати</button>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredWorkouts.length === 0" class="text-center py-20 text-gray-600 text-sm italic">Немає тренувань на цей день</div>
        </div>
    </div>

    <div x-show="currentView === 'agenda'" class="space-y-10">
        <template x-for="dateGroup in agendaGroups" :key="dateGroup.date">
            <div class="space-y-4">
                <button @click="goToDay(dateGroup.date)" class="sticky top-[108px] sm:top-[116px] bg-[#121212] py-2 z-10 w-full text-left flex items-center justify-between">
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest" x-text="formatDisplayDate(dateGroup.date)"></span>
                    <span x-show="dateGroup.date === todayStr" class="text-[9px] font-black text-white bg-[#333] px-2 py-0.5 rounded">СЬОГОДНІ</span>
                </button>
                <div class="space-y-3">
                    <template x-for="(workout, index) in dateGroup.items" :key="workout.id">
                        <div @click="handleCardClick(workout, index)"
                             :data-workout-id="workout.id"
                             :id="'agenda-card-' + workout.id"
                             class="bg-[#1c1c1c] border border-[#333] rounded-2xl p-4 flex items-center justify-between shadow-sm card-hover"
                             :style="'border-left: 4px solid ' + (workout.color || '#3b82f6')">
                            <div class="flex items-center space-x-4 min-w-0 flex-1">
                                <span class="text-sm font-black text-white flex-shrink-0" x-text="workout.time"></span>
                                <div class="min-w-0 flex-1">
                                <p class="text-base sm:text-lg font-bold text-gray-200 truncate" x-text="workout.title"></p>
                                <p class="text-xs sm:text-sm text-gray-500 truncate" x-text="workout.athleteIds.map(id => getAthleteName(id)).join(', ')"></p>
                                    <div x-show="getLocationName(workout.locationId)" class="flex items-center space-x-1 mt-1">
                                        <span class="w-2 h-2 rounded-full" :style="'background: ' + (workout.color || '#3b82f6')"></span>
                                        <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(workout.locationId)"></span>
                                    </div>
                                </div>
                            </div>
                            <button @click.stop="copyWorkout(workout)" class="ml-2 flex-shrink-0 text-[11px] sm:text-xs font-bold text-blue-400 uppercase tracking-wider">Копіювати</button>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</main>

<!-- ПРОФІЛЬ ТРЕНЕРА -->
<div x-show="showProfile" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>
    <header class="px-4 h-16 flex items-center justify-between border-b border-[#333]">
        <button @click="showProfile = false" class="text-blue-400 font-bold">Назад</button>
        <h3 class="font-bold">Профіль</h3>
        <div class="w-10"></div>
    </header>
    
    <div class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
        <!-- Інформація про тренера -->
        <div class="bg-[#1a1a1a] rounded-2xl p-4 sm:p-5 border border-[#333]">
            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-4">Інформація</h4>
            
            <div class="flex items-center gap-4 mb-5">
                <div class="ig-ring w-16 h-16 flex items-center justify-center flex-shrink-0">
                    <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                        <span class="text-lg font-black italic ig-gradient-text">CP</span>
                    </div>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-base sm:text-lg" x-text="coach.name || 'Ментор'"></p>
                    <p x-show="user.email" class="text-gray-500 text-sm" x-text="user.email"></p>
                </div>
            </div>
        </div>
        
        <!-- Telegram -->
        <div class="bg-[#1a1a1a] rounded-2xl p-4 sm:p-5 border border-[#333]">
            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-4">
                <span class="mr-1">📱</span> Telegram
            </h4>
            
            <template x-if="!coachTg.enabled">
                <p class="text-gray-500 text-sm">Telegram не налаштовано.</p>
            </template>
            
            <template x-if="coachTg.enabled && coachTg.connected">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span>
                        <span class="text-green-400 font-medium">Підключено</span>
                        <span x-show="coachTg.username" class="text-gray-500" x-text="'@' + coachTg.username"></span>
                    </div>
                </div>
            </template>
            
            <template x-if="coachTg.enabled && !coachTg.connected">
                <div class="space-y-3">
                    <p class="text-gray-400 text-sm">Підключіть Telegram, щоб отримувати сповіщення про оновлення доступності учнів.</p>
                    
                    <button @click="generateCoachTelegramToken()" 
                            :class="coachTg.copied ? 'bg-green-600' : (coachTg.connectLink ? 'bg-orange-500' : 'bg-blue-600')"
                            class="w-full flex items-center justify-center gap-2 text-white py-3 rounded-xl font-bold transition active:scale-[0.97]">
                        <span x-show="coachTg.copied">✓</span>
                        <span x-show="!coachTg.copied && coachTg.connectLink">🔗</span>
                        <span x-show="!coachTg.copied && !coachTg.connectLink">📲</span>
                        <span x-show="coachTg.copied">Скопійовано!</span>
                        <span x-show="!coachTg.copied && coachTg.connectLink">Копіювати посилання</span>
                        <span x-show="!coachTg.copied && !coachTg.connectLink">Під'єднати Телеграм</span>
                    </button>
                    
                    <p x-show="coachTg.connectLink && !coachTg.copied" class="text-gray-600 text-[10px] text-center">
                        Натисніть, щоб скопіювати посилання для підключення
                    </p>
                </div>
            </template>
        </div>
        
        <!-- Вихід -->
        <div class="pt-4">
            <form method="POST" action="/logout" class="w-full">
                <button type="submit" class="w-full flex items-center justify-center gap-2 bg-red-900/30 text-red-400 py-3 rounded-xl font-bold transition hover:bg-red-900/50 active:scale-[0.97]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span>Вийти</span>
                </button>
            </form>
        </div>
    </div>
</div>

<!-- МЕНЕДЖЕР АТЛЕТІВ (ПОВНОЕКРАННИЙ) -->
<div x-show="showManageAthletes" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>
    <header class="px-4 h-16 flex items-center justify-between border-b border-[#333]">
        <button @click="showManageAthletes = false" class="text-blue-400 font-bold">Назад</button>
        <h3 class="font-bold">Команда</h3>
        <div class="w-10"></div>
    </header>
    <div class="p-6 space-y-3 bg-[#1a1a1a] border-b border-[#333]">
        <div class="flex items-center gap-4">
            <div class="relative flex-shrink-0">
                <div x-show="athleteForm.photoBase64" class="w-20 h-20 rounded-2xl bg-gray-700 overflow-hidden">
                    <img :src="athleteForm.photoBase64" class="w-full h-full object-cover">
                </div>
                <div x-show="!athleteForm.photoBase64" class="w-20 h-20 rounded-2xl bg-gray-700 flex items-center justify-center text-gray-400 text-3xl">
                    👤
                </div>
                <label class="absolute -bottom-1 -right-1 w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm cursor-pointer shadow-lg">
                    <span>📷</span>
                    <input type="file" accept="image/*" class="hidden" @change="handleAthletePhotoSelect($event)">
                </label>
            </div>
            <div class="flex-1 space-y-3">

<script th:inline="none">
    function localDateStr(d) {
        d = d || new Date();
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    }
    function calendarApp() {
        const _today = localDateStr();
        return {
            currentView: 'feed', showModal: false, showManageAthletes: false, showManageLocations: false, showAvailabilityOverview: false, showProfile: false,
            editingWorkoutId: null, editingAthleteId: null, editingLocationId: null, draggedIndex: null,
            selectedDate: _today, todayStr: _today,
            days: [], workouts: [], athletes: [], locations: [], coachId: null, coach: { name: '' }, user: {},
            hours: Array.from({length: 24}, (_, i) => i.toString().padStart(2, '0')),
            halfHours: Array.from({length: 48}, (_, i) => `${Math.floor(i/2).toString().padStart(2,'0')}:${i%2===0?'00':'30'}`),
            daySlots: Array.from({length: 29}, (_, i) => `${(7+Math.floor(i/2)).toString().padStart(2,'0')}:${i%2===0?'00':'30'}`),
            selectedAthleteFilters: [], athleteSearch: '',
            workoutForm: { title: 'Зустріч', description: '', date: '', startTime: null, endTime: null, athleteIds: [], locationId: null },
            athleteForm: { name: '', description: '', photoBase64: null, weekendReminderEnabled: false },
            locationForm: { name: '', description: '', color: '#3b82f6' },
            confirmData: { show: false, title: '', message: '', onConfirm: () => {} },
            notifyModal: { show: false, athleteId: null, athleteName: '', customMessage: '' },
            coachTg: { enabled: false, connected: false, username: '', connectLink: '', copied: false },
            inviteUrls: {},
            notifyingAthletes: {},
            notifyErrors: {},
            notifySuccess: {},
            availabilityMap: {},
            touchDrag: null,
            touchJustDragged: false,
            _touchDragCleanup: null,

            async init() {
                console.log('init() starting...');
                try {
                    const me = await this.fetchMe();
                    console.log('fetchMe result:', me, 'coachId:', this.coachId);
                    if (!me) return;
                    
                    this.generateDays();
                    console.log('generateDays done, days count:', this.days.length);
                    
                    await this.fetchLocations();
                    console.log('fetchLocations done, locations:', this.locations.length);
                    
                    await this.fetchAthletes();
                    console.log('fetchAthletes done, athletes:', this.athletes.length);
                    
                    await this.fetchData();
                    console.log('fetchData done, workouts:', this.workouts.length);
                    
                    await this.fetchAvailability();
                    console.log('fetchAvailability done');
                    
                    await this.fetchCoachTelegramStatus();
                    console.log('fetchCoachTelegramStatus done');
                    
                    this.connectWebSocket();
                    this.initTouchDrag();
                    setTimeout(() => this.scrollToToday(), 200);
                    console.log('init() complete!');
                } catch (e) {
                    console.error('init() error:', e);
                }
            },

            connectWebSocket() {
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/api/v1/ws`;
                const ws = new WebSocket(wsUrl);
                
                ws.onmessage = (event) => {
                    switch(event.data) {
                        case 'workout_changed': this.fetchData(); break;
                        case 'athlete_changed': this.fetchAthletes(); this.fetchData(); break;
                        case 'location_changed': this.fetchLocations(); this.fetchData(); break;
                        case 'availability_changed': this.fetchAvailability(); break;
                        case 'coach_changed': this.fetchCoachTelegramStatus(); this.fetchAthletes(); break;
                    }
                };
                
                ws.onclose = () => {
                    setTimeout(() => this.connectWebSocket(), 3000);
                };
                
                ws.onerror = () => {
                    ws.close();
                };
                
                this.ws = ws;
            },

            handleCardClick(workout, index) {
                if (this.touchJustDragged) return;
                this.editWorkout(workout);
            },

            copyWorkout(w) {
                this.editingWorkoutId = null;
                this.originalWorkoutData = null;
                let st = w.time, et = w.endTime || this.nextSlot(w.time);
                if (w.date === this.todayStr && new Date(`${w.date}T${st}`) <= new Date()) {
                    const dur = this.slotToMin(et) - this.slotToMin(st);
                    st = this.getNearestSlot();
                    const em = this.slotToMin(st) + Math.max(dur, 30);
                    const eh = Math.floor(em / 60) % 24;
                    et = `${eh.toString().padStart(2, '0')}:${em % 60 === 0 ? '00' : '30'}`;
                }
                this.workoutForm = {

                };

            initTouchDrag() {
                const container = document.querySelector('main') || document.body;
                if (!container) return;
                if (this._touchDragCleanup) return;

                let timer = null;
                let drag = null;

                const onStart = (e) => {
                    const card = e.target.closest('[data-workout-id]');
                    if (!card) return;
                    const id = parseInt(card.dataset.workoutId);
                    const workout = this.workouts.find(w => w.id === id);
                    if (!workout) return;
                    const t = e.touches[0];
                    this.touchJustDragged = false;
                    drag = { workout, card, startX: t.clientX, startY: t.clientY, armed: false, ghost: null };
                    timer = setTimeout(() => { if (drag) drag.armed = true; }, 400);
                };

                    const onMove = (e) => {
                    if (!drag || !drag.armed) return;
                    e.preventDefault();
                    const t = e.touches[0];
                    if (!drag.ghost) {
                        const g = drag.card.cloneNode(true);
                        g.style.position = 'fixed';
                        g.style.width = drag.card.offsetWidth + 'px';
                        g.style.opacity = '0.85';
                        g.style.pointerEvents = 'none';
                        g.style.zIndex = '9999';
                        g.style.transform = 'scale(0.95) rotate(1deg)';
                        g.style.transition = 'none';
                        document.body.appendChild(g);
                        drag.ghost = g;
                    }
                    drag.ghost.style.left = (t.clientX - drag.ghost.offsetWidth / 2) + 'px';
                    drag.ghost.style.top = (t.clientY - 30) + 'px';
                };

                const onEnd = async (e) => {
                    clearTimeout(timer);
                    if (!drag) return;
                    if (drag.armed && drag.ghost) {
                        this.touchJustDragged = true;
                        setTimeout(() => { this.touchJustDragged = false; }, 400);
                        const el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                        const c = el?.closest('[data-workout-id]');
                        if (c) {
                            const tid = parseInt(c.dataset.workoutId);
                            const tw = this.workouts.find(w => w.id === tid);
                            if (tw && tw.id !== drag.workout.id) {
                                const ts = drag.workout.time, te = drag.workout.endTime;
                                drag.workout.time = tw.time; drag.workout.endTime = tw.endTime;
                                tw.time = ts; tw.endTime = te;
                                await this.saveRaw(drag.workout); await this.saveRaw(tw);
                                await this.fetchData();
                            }
                        }
                    }
                    if (drag.ghost) drag.ghost.remove();
                    drag = null;
                };

                container.addEventListener('touchstart', onStart, { passive: true });
                container.addEventListener('touchmove', onMove, { passive: false });
                container.addEventListener('touchend', onEnd, { passive: true });

                this._touchDragCleanup = () => {
                    container.removeEventListener('touchstart', onStart);
                    container.removeEventListener('touchmove', onMove);
                    container.removeEventListener('touchend', onEnd);
                };
            },

            async fetchAvailability() {

                const start = this.days[0].dateStr;
                const end = this.days[this.days.length - 1].dateStr;
                const res = await fetch(`/api/v1/coaches/${this.coachId}/availability?startDate=${start}&endDate=${end}`);
                if (res.ok) {
                    const data = await res.json();
                    const map = {};
                    for (const entry of data) {
                        for (const slot of entry.slots) {
                            const key = entry.athleteId + '|' + slot.date;
                            if (!map[key]) map[key] = [];

                        }
                    }
                    this.availabilityMap = map;
                }
            },

            getNearestSlot() {
                const now = new Date();
                const totalMin = Math.max(now.getHours() * 60 + now.getMinutes(), 7 * 60);
                const nextSlot = Math.ceil(totalMin / 30) * 30;
                const nh = Math.floor(nextSlot / 60) % 24;
                const nm = nextSlot % 60;
                return `${nh.toString().padStart(2, '0')}:${nm === 0 ? '00' : '30'}`;
            },

            slotToMin(t) {
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            },

            pickTime(t) {
                const tm = this.slotToMin(t);
                const sm = this.workoutForm.startTime !== null ? this.slotToMin(this.workoutForm.startTime) : -1;
                const em = this.workoutForm.endTime !== null ? this.slotToMin(this.workoutForm.endTime) : -1;

                if (sm < 0) {
                    this.workoutForm.startTime = t;
                    this.workoutForm.endTime = this.nextSlot(t);
                } else if (em < 0) {
                    if (tm > sm) {
                        this.workoutForm.endTime = t;
                    } else {
                        this.workoutForm.startTime = t;
                        this.workoutForm.endTime = this.nextSlot(t);
                    }
                } else if (tm > em) {
                    this.workoutForm.endTime = t;
                } else if (tm > sm && tm < em) {
                    this.workoutForm.endTime = t;
                } else {
                    this.workoutForm.startTime = t;
                    this.workoutForm.endTime = this.nextSlot(t);
                }
            },

            nextSlot(t) {
                const m = this.slotToMin(t) + 30;
                const h = Math.floor(m / 60) % 24;
                return `${h.toString().padStart(2, '0')}:${m % 60 === 0 ? '00' : '30'}`;
            },

            getTimeClass(t) {
                const tm = this.slotToMin(t);
                const s = this.workoutForm.startTime !== null ? this.slotToMin(this.workoutForm.startTime) : -1;
                const e = this.workoutForm.endTime !== null ? this.slotToMin(this.workoutForm.endTime) : -1;
                const conflict = this.workoutForm.athleteIds.length > 0 ? this.hasSlotConflict(t) : false;
                if (tm === s && conflict) return 'bg-blue-600 text-white shadow-lg scale-105 ring-2 ring-red-400';
                if (tm === s) return 'bg-blue-600 text-white shadow-lg scale-105 ring-2 ring-blue-400';
                if (tm === e && conflict) return 'bg-blue-600 text-white shadow-lg ring-2 ring-red-400';
                if (tm === e) return 'bg-blue-600 text-white shadow-lg';
                if (s >= 0 && e >= 0 && tm > s && tm < e) return conflict ? 'bg-red-900/30 text-red-300' : 'bg-blue-500/20 text-blue-300';
                if (conflict) return 'bg-red-900/20 text-red-400/60 line-through';
                return 'bg-[#262626] text-gray-400 hover:bg-[#333]';
            },

            hasSlotConflict(t) {
                if (this.workoutForm.athleteIds.length === 0) return false;
                const tm = this.slotToMin(t);
                for (const aId of this.workoutForm.athleteIds) {
                    const key = aId + '|' + this.workoutForm.date;
                    const slots = this.availabilityMap[key];
                    if (!slots) continue;
                    const ok = slots.some(s => {
                        const ss = this.slotToMin(s.startTime);
                        const se = this.slotToMin(s.endTime);
                        return tm >= ss && tm < se;
                    });
                    if (!ok) return true;
                }
                return false;
            },

            get isWorkoutTimeValid() {
                const { startTime, endTime, date, athleteIds } = this.workoutForm;
                if (!startTime || !endTime || athleteIds.length === 0) return true;
                const sm = this.slotToMin(startTime);
                const em = this.slotToMin(endTime);
                for (const aId of athleteIds) {
                    const slots = this.availabilityMap[aId + '|' + date];
                    if (!slots || slots.length === 0) continue;
                    const ok = slots.some(s => {
                        const ss = this.slotToMin(s.startTime);
                        const se = this.slotToMin(s.endTime);
                        return sm >= ss && em <= se;
                    });
                    if (!ok) return false;
                }
                return true;
            },

            getDurationLabel() {
                if (!this.workoutForm.startTime || !this.workoutForm.endTime) return '';
                const diff = this.slotToMin(this.workoutForm.endTime) - this.slotToMin(this.workoutForm.startTime);
                const h = Math.floor(diff / 60);
                const m = diff % 60;
                if (h > 0 && m > 0) return `${h} год ${m} хв`;
                if (h > 0) return `${h} год`;
                return `${m} хв`;
            },

            async drop(event, targetIndex) {
                if (this.draggedIndex === null || this.draggedIndex === targetIndex) return;
                const list = this.filteredWorkouts; const dragged = list[this.draggedIndex]; const target = list[targetIndex];
                if (dragged.date < this.todayStr) return;
                const ts = dragged.time; const te = dragged.endTime;
                dragged.time = target.time; dragged.endTime = target.endTime;
                target.time = ts; target.endTime = te;
                await this.saveRaw(dragged); await this.saveRaw(target);
                this.draggedIndex = null; await this.fetchData();
            },

            async saveRaw(w) { await fetch('/api/v1/workouts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...w, coachId: this.coachId }) }); },

            openWorkoutModal() {

            async saveWorkout() {
                const { startTime, endTime, date, title, description, athleteIds, locationId } = this.workoutForm;
                if (!startTime || !endTime) return;
                if (!this.isWorkoutTimeValid) return;
                const newTime = startTime;
                if (this.editingWorkoutId && this.originalWorkoutData) {
                    if (date !== this.originalWorkoutData.date || newTime !== this.originalWorkoutData.time) {
                        await fetch(`/api/v1/workouts/${this.editingWorkoutId}`, { method: 'DELETE' });
                    }
                }
                const payload = {
                    id: (this.editingWorkoutId && date === this.originalWorkoutData?.date && newTime === this.originalWorkoutData?.time) ? this.editingWorkoutId : null,
                    title, description, date, coachId: this.coachId,
                    time: newTime, endTime,
                    athleteIds, locationId
                };
                await fetch('/api/v1/workouts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                this.showModal = false; await this.fetchData();
            },

            askDeleteWorkout() {
                this.confirmData = { show: true, title: 'Видалити?', message: 'Дію неможливо скасувати.', onConfirm: async () => { await fetch(`/api/v1/workouts/${this.editingWorkoutId}`, { method: 'DELETE' }); this.showModal = false; await this.fetchData(); } };
            },

            async saveAthlete() {

                const res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...this.athleteForm, coachId: this.coachId }) });
                
                let athleteId = this.editingAthleteId;
                if (!athleteId && res.ok) {

                        const data = await res.json();
                        athleteId = data.id;
                    } catch (e) {}
                }
                
                if (athleteId && this.athleteForm.photoBase64 !== undefined) {
                    await fetch(`/api/v1/athletes/${athleteId}/photo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ photoBase64: this.athleteForm.photoBase64 })
                    });
                }
                
                if (athleteId && this.athleteForm.weekendReminderEnabled !== undefined) {
                    await fetch(`/api/v1/athletes/${athleteId}/weekend-reminder`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ enabled: this.athleteForm.weekendReminderEnabled })
                    });
                }
                
                this.athleteForm = { name: '', description: '', photoBase64: null, weekendReminderEnabled: false }; this.editingAthleteId = null; await this.fetchAthletes();
            },

            editAthlete(a) { this.editingAthleteId = a.id; this.athleteForm = { name: a.name, description: a.description, photoBase64: a.photoBase64 || null, weekendReminderEnabled: a.weekendReminderEnabled || false }; },
            askDeleteAthlete(id) { this.confirmData = { show: true, title: 'Видалити?', message: 'Дані зникнуть.', onConfirm: async () => { await fetch(`/api/v1/athletes/${id}`, { method: 'DELETE' }); await this.fetchAthletes(); await this.fetchData(); } }; },
            
             async toggleWeekendReminder(athlete) {
                 if (!athlete.telegramEnabled || !athlete.telegramConnected) return;
                 const res = await fetch(`/api/v1/athletes/${athlete.id}/weekend-reminder`, {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ enabled: athlete.weekendReminderEnabled })
                 });
                 if (!res.ok) {
                     athlete.weekendReminderEnabled = !athlete.weekendReminderEnabled;
                 }
             },
            
            handleAthletePhotoSelect(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSize = 200;
                        let w = img.width;
                        let h = img.height;
                        
                        if (w > h) {
                            if (w > maxSize) {
                                h = Math.round(h * maxSize / w);
                                w = maxSize;
                            }
                        } else {
                            if (h > maxSize) {
                                w = Math.round(w * maxSize / h);
                                h = maxSize;
                            }
                        }
                        
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        this.athleteForm.photoBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
                event.target.value = '';
            },

            async saveLocation() {
                const method = this.editingLocationId ? 'PUT' : 'POST';
                const url = this.editingLocationId ? `/api/v1/locations/${this.editingLocationId}` : '/api/v1/locations';
                await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...this.locationForm, coachId: this.coachId }) });
                this.locationForm = { name: '', description: '', color: '#3b82f6' }; this.editingLocationId = null;
                await this.fetchLocations();
            },

            editLocation(l) { this.editingLocationId = l.id; this.locationForm = { name: l.name, description: l.description || '', color: l.color || '#3b82f6' }; },
            askDeleteLocation(id) { this.confirmData = { show: true, title: 'Видалити?', message: 'Локація зникне з усіх тренувань.', onConfirm: async () => { await fetch(`/api/v1/locations/${id}`, { method: 'DELETE' }); await this.fetchLocations(); await this.fetchData(); } }; },

            snapToMonday(date) {
                const d = new Date(date);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                d.setDate(diff);
                return d;
            },
            generateDays() {
                const start = this.snapToMonday(new Date());
                start.setDate(start.getDate() - 14);
                const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                for (let i = 0; i < 77; i++) {
                    this.days.push({ dateStr: localDateStr(start), dayNum: start.getDate(), weekday: days[(start.getDay() + 6) % 7], isMonday: start.getDay() === 1 });
                    start.setDate(start.getDate() + 1);
                }
            },
            formatDisplayDate(str) {
                const d = new Date(str); const months = ['січня', 'лютого', 'березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня'];
                return `${d.getDate()} ${months[d.getMonth()]}`;
            }
        }
    }
</script>
