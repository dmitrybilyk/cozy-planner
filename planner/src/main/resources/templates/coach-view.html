<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach View - Planner Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-container { scroll-snap-type: x mandatory; }
        .date-card { scroll-snap-align: start; }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased" x-data="calendarApp()">

<!-- Header -->
<header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-gray-900" x-text="coach.name">Loading...</h1>
            <p class="text-xs text-indigo-600 font-bold uppercase tracking-widest" x-text="coach.specialization || 'Coach Dashboard'"></p>
        </div>
        <div class="flex space-x-2">
            <button @click="scrollWeeks(-1)" class="p-2 rounded-full bg-gray-100 hover:bg-indigo-100 text-indigo-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button @click="scrollWeeks(1)" class="p-2 rounded-full bg-gray-100 hover:bg-indigo-100 text-indigo-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>
</header>

<!-- Horizontal Scrollable Calendar -->
<div class="bg-white border-b sticky top-[73px] z-10">
    <div id="calendar-container" class="flex overflow-x-auto no-scrollbar scroll-container space-x-3 p-4">
        <template x-for="day in days" :key="day.dateStr">
            <button
                    @click="selectedDate = day.dateStr"
                    :id="'date-' + day.dateStr"
                    class="date-card flex-shrink-0 w-16 h-24 rounded-2xl flex flex-col items-center justify-center border-2 transition-all duration-300"
                    :class="selectedDate === day.dateStr ? 'border-indigo-600 bg-indigo-50 text-indigo-700 shadow-sm scale-105' : 'border-transparent bg-gray-50 text-gray-400 hover:bg-gray-100'">

                <span class="text-[10px] uppercase font-black mb-1" x-text="day.weekday"></span>
                <span class="text-lg font-black" x-text="day.dayNum"></span>
                <div x-show="day.hasWorkout" class="mt-2 w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
            </button>
        </template>
    </div>
</div>

<!-- Main Content -->
<main class="max-w-4xl mx-auto p-4 pb-24">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-lg font-bold text-gray-800">Schedule</h2>
            <p class="text-sm text-gray-500" x-text="formatDisplayDate(selectedDate)"></p>
        </div>
        <button @click="showModal = true" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-transform">
            + Add New
        </button>
    </div>

    <!-- Workout List -->
    <div class="space-y-4">
        <template x-for="workout in filteredWorkouts" :key="workout.id">
            <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm flex items-start space-x-4">
                <div class="bg-indigo-100 p-3 rounded-2xl text-indigo-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center">
                        <h4 class="font-black text-gray-900 text-lg" x-text="workout.title"></h4>
                    </div>
                    <p class="text-sm text-gray-500 font-medium mt-1" x-text="workout.time + ' • ' + workout.duration"></p>
                    <p class="text-sm text-gray-600 mt-2" x-text="workout.description"></p>
                </div>
            </div>
        </template>

        <div x-show="filteredWorkouts.length === 0" class="text-center py-20 flex flex-col items-center">
            <p class="text-gray-400 font-medium uppercase text-xs tracking-widest">No sessions planned</p>
        </div>
    </div>
</main>

<!-- ADD NEW MODAL -->
<div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl" @click.away="showModal = false">
        <h3 class="text-xl font-black mb-4">New Workout</h3>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold uppercase text-gray-400">Title</label>
                <input type="text" x-model="newWorkout.title" class="w-full bg-gray-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase text-gray-400">Time</label>
                <input type="time" x-model="newWorkout.time" class="w-full bg-gray-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase text-gray-400">Description</label>
                <textarea x-model="newWorkout.description" class="w-full bg-gray-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none" rows="3"></textarea>
            </div>
        </div>

        <div class="mt-6 flex space-x-3">
            <button @click="showModal = false" class="flex-1 py-3 font-bold text-gray-400 bg-gray-100 rounded-xl">Cancel</button>
            <button @click="saveWorkout()" class="flex-1 py-3 font-bold text-white bg-indigo-600 rounded-xl shadow-lg shadow-indigo-200">Save</button>
        </div>
    </div>
</div>

<script>
    function calendarApp() {
        return {
            showModal: false,
            selectedDate: new Date().toISOString().split('T')[0],
            days: [],
            workouts: [],
            coach: { name: 'Oleksandr Zinchenko', specialization: 'Football Coach' },
            athleteId: 1,
            coachId: 1,
            newWorkout: { title: '', time: '08:00', description: '' },

            async init() {
                this.generateDays();
                await this.fetchData();
                this.$nextTick(() => this.scrollToSelected());
                this.$watch('selectedDate', () => this.scrollToSelected());
            },

            generateDays() {
                const start = new Date();
                start.setDate(start.getDate() - 30);
                const end = new Date();
                end.setDate(end.getDate() + 30);

                let current = new Date(start);
                while (current <= end) {
                    const dateStr = current.toISOString().split('T')[0];
                    this.days.push({
                        dateStr: dateStr,
                        dayNum: current.getDate(),
                        weekday: current.toLocaleDateString('en-US', { weekday: 'short' }),
                        monthName: current.toLocaleDateString('en-US', { month: 'long' }),
                        year: current.getFullYear(),
                        hasWorkout: false
                    });
                    current.setDate(current.getDate() + 1);
                }
            },

            async fetchData() {
                const start = this.days[0].dateStr;
                const end = this.days[this.days.length - 1].dateStr;
                try {
                    const response = await fetch(`/api/v1/workouts?coachId=${this.coachId}&athleteId=${this.athleteId}&startDate=${start}&endDate=${end}`);
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    this.workouts = data.map(w => ({
                        id: w.id,
                        dateStr: w.date,
                        title: w.title,
                        time: w.time || '--:--',
                        duration: w.durationMinutes ? w.durationMinutes + 'm' : '60m',
                        description: w.description
                    }));
                    this.days.forEach(day => {
                        day.hasWorkout = this.workouts.some(w => w.dateStr === day.dateStr);
                    });
                } catch (error) {
                    console.error("Fetch failed:", error);
                }
            },

            async saveWorkout() {
                const payload = {
                    ...this.newWorkout,
                    date: this.selectedDate,
                    coachId: this.coachId,
                    athleteId: this.athleteId,
                    durationMinutes: 60
                };
                try {
                    const response = await fetch('/api/v1/workouts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        this.showModal = false;
                        this.newWorkout = { title: '', time: '08:00', description: '' };
                        await this.fetchData();
                    }
                } catch (e) {
                    console.error("Save failed", e);
                }
            },

            get currentMonthName() {
                const d = this.days.find(d => d.dateStr === this.selectedDate);
                return d ? d.monthName : '';
            },

            get currentYear() {
                const d = this.days.find(d => d.dateStr === this.selectedDate);
                return d ? d.year : '';
            },

            get filteredWorkouts() {
                return this.workouts.filter(w => w.dateStr === this.selectedDate);
            },

            formatDisplayDate(str) {
                return new Date(str).toLocaleDateString('en-UK', { day: 'numeric', month: 'short', year: 'numeric' });
            },

            scrollWeeks(direction) {
                const container = document.getElementById('calendar-container');
                container.scrollBy({ left: direction * 300, behavior: 'smooth' });
            },

            scrollToSelected() {
                const el = document.getElementById('date-' + this.selectedDate);
                if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }
    }
</script>
</body>
</html>
