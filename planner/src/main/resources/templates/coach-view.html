<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach View - Planner Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-container { scroll-snap-type: x mandatory; }
        .date-card { scroll-snap-align: start; }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased" x-data="calendarApp()">

<!-- Header -->
<header class="bg-white border-b sticky top-0 z-30 p-4 shadow-sm">
    <div class="max-w-4xl mx-auto flex flex-col space-y-4">
        <div class="flex justify-between items-center">
            <div>
                <div class="flex items-center space-x-2">
                    <h1 class="text-2xl font-black text-gray-900" x-text="coach.name">Loading...</h1>
                    <!-- Відображення клубу -->
                    <span class="bg-indigo-100 text-indigo-700 text-[10px] px-2 py-1 rounded-full font-black uppercase tracking-tighter" x-text="club.name || 'Loading Club...'"></span>
                </div>
                <div class="flex items-center space-x-2 mt-1">
                    <p class="text-xs text-indigo-600 font-bold uppercase tracking-widest" x-text="coach.specialization || 'Coach Dashboard'"></p>
                    <template x-if="selectedAthlete">
                        <button @click="editAthlete(selectedAthlete)" class="text-[10px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 hover:bg-indigo-100 hover:text-indigo-600 transition">Edit Athlete</button>
                    </template>
                </div>
            </div>
            <div class="flex space-x-2">
                <button @click="scrollWeeks(-1)" class="p-2 rounded-full bg-gray-100 hover:bg-indigo-100 text-indigo-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button @click="scrollWeeks(1)" class="p-2 rounded-full bg-gray-100 hover:bg-indigo-100 text-indigo-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>

        <!-- Search / Combobox -->
        <div class="relative" x-data="{ open: false, search: '' }">
            <div class="flex space-x-2">
                <div class="relative flex-1">
                    <input type="text" placeholder="Search athlete..." class="w-full bg-gray-50 border-none rounded-xl p-3 pl-10 focus:ring-2 focus:ring-indigo-500 outline-none font-medium" x-model="search" @focus="open = true" @click.away="open = false">
                    <svg class="w-5 h-5 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <button @click="openAthleteModal()" class="bg-indigo-50 text-indigo-600 p-3 rounded-xl hover:bg-indigo-100 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                </button>
            </div>
            <div x-show="open" x-cloak class="absolute w-full mt-2 bg-white border border-gray-100 rounded-2xl shadow-xl z-50 max-h-60 overflow-y-auto p-2">
                <button @click="selectAthlete(null); open = false; search = ''" class="w-full text-left p-3 rounded-xl hover:bg-indigo-50 transition flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-bold">ALL</div>
                    <span class="font-bold text-gray-700">All Athletes (Team Agenda)</span>
                </button>
                <template x-for="athlete in filteredAthletes(search)" :key="athlete.id">
                    <button @click="selectAthlete(athlete); open = false; search = athlete.name" class="w-full text-left p-3 rounded-xl hover:bg-indigo-50 transition flex items-center space-x-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold" x-text="athlete.name.charAt(0)"></div>
                        <span class="font-bold text-gray-700" x-text="athlete.name"></span>
                    </button>
                </template>
            </div>
        </div>
    </div>
</header>

<div class="bg-white border-b sticky top-[158px] z-10">
    <div id="calendar-container" class="flex overflow-x-auto no-scrollbar scroll-container space-x-3 p-4">
        <template x-for="day in days" :key="day.dateStr">
            <button @click="selectedDate = day.dateStr" :id="'date-' + day.dateStr" class="date-card flex-shrink-0 w-16 h-24 rounded-2xl flex flex-col items-center justify-center border-2 transition-all duration-300" :class="selectedDate === day.dateStr ? 'border-indigo-600 bg-indigo-50 text-indigo-700 shadow-sm scale-105' : 'border-transparent bg-gray-50 text-gray-400 hover:bg-gray-100'">
                <span class="text-[10px] uppercase font-black mb-1" x-text="day.weekday"></span>
                <span class="text-lg font-black" x-text="day.dayNum"></span>
                <div x-show="day.hasWorkout" class="mt-2 w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
            </button>
        </template>
    </div>
</div>

<main class="max-w-4xl mx-auto p-4 pb-24">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-lg font-bold text-gray-800" x-text="selectedAthlete ? selectedAthlete.name + ' Agenda' : 'Team Agenda'"></h2>
            <p class="text-sm text-gray-500" x-text="formatDisplayDate(selectedDate)"></p>
        </div>
        <button x-show="selectedAthlete" @click="openWorkoutModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-transform">
            + Add Workout
        </button>
    </div>

    <div class="space-y-4">
        <template x-for="workout in filteredWorkouts" :key="workout.id">
            <div @click="editWorkout(workout)" class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm flex items-start space-x-4 cursor-pointer hover:border-indigo-200 transition">
                <div class="bg-indigo-100 p-3 rounded-2xl text-indigo-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center">
                        <h4 class="font-black text-gray-900 text-lg" x-text="workout.title"></h4>
                        <span x-show="!selectedAthlete" class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-lg" x-text="workout.athleteName"></span>
                    </div>
                    <p class="text-sm text-gray-500 font-medium mt-1" x-text="workout.time + ' • ' + workout.duration"></p>
                    <p class="text-sm text-gray-600 mt-2" x-text="workout.description"></p>
                </div>
            </div>
        </template>
    </div>
</main>

<!-- WORKOUT MODAL -->
<div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl" @click.away="showModal = false">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-black" x-text="editingWorkoutId ? 'Update Workout' : 'New Workout'"></h3>
            <button x-show="editingWorkoutId" @click="deleteWorkout()" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>
        <div class="space-y-4">
            <input type="text" placeholder="Title" x-model="workoutForm.title" class="w-full bg-gray-50 border-none rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="time" x-model="workoutForm.time" class="w-full bg-gray-50 border-none rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500">
            <textarea placeholder="Description" x-model="workoutForm.description" class="w-full bg-gray-50 border-none rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500" rows="3"></textarea>
        </div>
        <div class="mt-6 flex space-x-3">
            <button @click="showModal = false" class="flex-1 py-3 font-bold text-gray-400 bg-gray-100 rounded-xl">Cancel</button>
            <button @click="saveWorkout()" class="flex-1 py-3 font-bold text-white bg-indigo-600 rounded-xl shadow-lg shadow-indigo-200" x-text="editingWorkoutId ? 'Update' : 'Save'"></button>
        </div>
    </div>
</div>

<!-- ATHLETE MODAL -->
<div x-show="showAthleteModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl" @click.away="showAthleteModal = false">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-black" x-text="editingAthleteId ? 'Update Athlete' : 'Add Athlete'"></h3>
            <button x-show="editingAthleteId" @click="deleteAthlete()" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>
        <div class="space-y-4">
            <input type="text" placeholder="Athlete Name" x-model="athleteForm.name" class="w-full bg-gray-50 border-none rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500">
            <textarea placeholder="Athlete Description" x-model="athleteForm.description" class="w-full bg-gray-50 border-none rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500" rows="3"></textarea>
        </div>
        <div class="mt-6 flex space-x-3">
            <button @click="showAthleteModal = false" class="flex-1 py-3 font-bold text-gray-400 bg-gray-100 rounded-xl">Cancel</button>
            <button @click="saveAthlete()" class="flex-1 py-3 font-bold text-white bg-indigo-600 rounded-xl shadow-lg shadow-indigo-200" x-text="editingAthleteId ? 'Update' : 'Add'"></button>
        </div>
    </div>
</div>

<script>
    function calendarApp() {
        return {
            showModal: false,
            showAthleteModal: false,
            editingWorkoutId: null,
            editingAthleteId: null,
            selectedDate: new Date().toISOString().split('T')[0],
            days: [],
            workouts: [],
            athletes: [],
            selectedAthlete: null,

            // Hardcoded context (In a real app, this comes from login/session)
            clubId: 2,
            coachId: 2, // Olena Rybakova (Tennis Club coach)

            coach: { name: 'Olena Rybakova', specialization: 'Tennis High-Performance' },
            club: { name: '', description: '' },

            workoutForm: { title: '', time: '08:00', description: '' },
            athleteForm: { name: '', description: '' },

            async init() {
                this.generateDays();
                await this.fetchClubInfo(); // Завантаження інформації про клуб
                await this.fetchAthletes();
                await this.fetchData();
                this.$nextTick(() => this.scrollToSelected());
                this.$watch('selectedDate', () => this.scrollToSelected());
            },

            async fetchClubInfo() {
                try {
                    const res = await fetch(`/api/v1/clubs/${this.clubId}`);
                    if (res.ok) this.club = await res.json();
                } catch (e) { console.error("Club fetch failed", e); }
            },

            filteredAthletes(search) {
                return this.athletes.filter(a => a.name.toLowerCase().includes(search.toLowerCase()));
            },

            async selectAthlete(athlete) {
                this.selectedAthlete = athlete;
                await this.fetchData();
            },

            async fetchAthletes() {
                try {
                    const res = await fetch(`/api/v1/coaches/${this.coachId}/athletes`);
                    if (res.ok) this.athletes = await res.json();
                } catch (e) { console.error(e); }
            },

            // --- ATHLETE ACTIONS ---
            openAthleteModal() {
                this.editingAthleteId = null;
                this.athleteForm = { name: '', description: '' };
                this.showAthleteModal = true;
            },
            editAthlete(athlete) {
                this.editingAthleteId = athlete.id;
                this.athleteForm = { name: athlete.name, description: athlete.description };
                this.showAthleteModal = true;
            },
            async saveAthlete() {
                const method = this.editingAthleteId ? 'PUT' : 'POST';
                const url = this.editingAthleteId ? `/api/v1/athletes/${this.editingAthleteId}` : '/api/v1/athletes';
                const payload = { ...this.athleteForm, coachId: this.coachId };
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    this.showAthleteModal = false;
                    await this.fetchAthletes();
                    this.selectedAthlete = null;
                    await this.fetchData();
                }
            },
            async deleteAthlete() {
                if (!confirm('Delete this athlete and all their schedule?')) return;
                await fetch(`/api/v1/athletes/${this.editingAthleteId}`, { method: 'DELETE' });
                this.showAthleteModal = false;
                this.selectedAthlete = null;
                await this.fetchAthletes();
                await this.fetchData();
            },

            // --- WORKOUT ACTIONS ---
            openWorkoutModal() {
                this.editingWorkoutId = null;
                this.workoutForm = { title: '', time: '08:00', description: '' };
                this.showModal = true;
            },
            editWorkout(workout) {
                if (!this.selectedAthlete) return;
                this.editingWorkoutId = workout.id;
                this.workoutForm = { title: workout.title, time: workout.time, description: workout.description };
                this.showModal = true;
            },
            async saveWorkout() {
                const payload = {
                    ...this.workoutForm,
                    id: this.editingWorkoutId,
                    date: this.selectedDate,
                    coachId: this.coachId,
                    athleteId: this.selectedAthlete.id,
                    durationMinutes: 60
                };
                const res = await fetch('/api/v1/workouts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    this.showModal = false;
                    await this.fetchData();
                }
            },
            async deleteWorkout() {
                if (!confirm('Delete this workout?')) return;
                try {
                    const res = await fetch(`/api/v1/workouts/${this.editingWorkoutId}`, { method: 'DELETE' });
                    if (res.ok) {
                        this.showModal = false;
                        await this.fetchData();
                    }
                } catch (e) { console.error("Delete failed", e); }
            },

            // --- DATA LOADING ---
            async fetchData() {
                const start = this.days[0].dateStr;
                const end = this.days[this.days.length - 1].dateStr;
                let url = `/api/v1/workouts?coachId=${this.coachId}&startDate=${start}&endDate=${end}`;
                if (this.selectedAthlete) url += `&athleteId=${this.selectedAthlete.id}`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    this.workouts = data.map(w => ({
                        ...w,
                        dateStr: w.date,
                        time: w.time || '08:00',
                        duration: w.durationMinutes ? w.durationMinutes + 'm' : '60m',
                        athleteName: this.athletes.find(a => a.id === w.athleteId)?.name || 'Unknown'
                    }));
                    this.updateCalendarDots();
                } catch (e) { console.error(e); }
            },

            updateCalendarDots() {
                this.days.forEach(day => {
                    day.hasWorkout = this.workouts.some(w => w.dateStr === day.dateStr);
                });
            },

            generateDays() {
                const start = new Date();
                start.setDate(start.getDate() - 30);
                const end = new Date();
                end.setDate(end.getDate() + 30);
                let current = new Date(start);
                while (current <= end) {
                    const dateStr = current.toISOString().split('T')[0];
                    this.days.push({
                        dateStr: dateStr, dayNum: current.getDate(),
                        weekday: current.toLocaleDateString('en-US', { weekday: 'short' }),
                        monthName: current.toLocaleDateString('en-US', { month: 'long' }),
                        year: current.getFullYear(), hasWorkout: false
                    });
                    current.setDate(current.getDate() + 1);
                }
            },
            get filteredWorkouts() {
                return this.workouts.filter(w => w.dateStr === this.selectedDate);
            },
            formatDisplayDate(str) {
                return new Date(str).toLocaleDateString('en-UK', { day: 'numeric', month: 'short', year: 'numeric' });
            },
            scrollWeeks(direction) {
                document.getElementById('calendar-container').scrollBy({ left: direction * 300, behavior: 'smooth' });
            },
            scrollToSelected() {
                const el = document.getElementById('date-' + this.selectedDate);
                if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }
    }
</script>
</body>
</html>
