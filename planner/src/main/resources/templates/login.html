<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
    <link rel="stylesheet" href="/css/login.css" th:href="@{/css/login.css(v=${appVersion})}">
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm text-center space-y-8">
        <div class="space-y-2">
            <div class="ig-ring mx-auto w-20 h-20 flex items-center justify-center">
                <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                    <span class="text-3xl font-black italic ig-gradient-text">CP</span>
                </div>
            </div>
            <h1 class="text-3xl font-black tracking-tight">Cozy Planner</h1>
            <p class="text-gray-500 text-sm">Твій помічник для планування</p>
        </div>

        <div class="space-y-3">
            <a href="/oauth2/authorization/google"
               class="flex items-center justify-center space-x-3 w-full bg-white text-black py-4 rounded-2xl font-bold text-sm hover:bg-gray-200 transition active:scale-[0.97]">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span>Увійти через Google</span>
            </a>

            <div class="flex items-center space-x-4 py-2">
                <div class="flex-1 h-px bg-[#333]"></div>
                <span class="text-gray-600 text-xs font-bold">АБО</span>
                <div class="flex-1 h-px bg-[#333]"></div>
            </div>

            <form method="POST" action="/demo-login">
                <button type="submit"
                        class="w-full ig-gradient-bg text-white py-4 rounded-2xl font-bold text-sm hover:opacity-90 transition active:scale-[0.97] shadow-lg">
                    👤 Увійти як Демо
                </button>
            </form>

        </div>

        <p class="text-gray-600 text-xs max-w-[260px] mx-auto leading-relaxed">Натисни "Увійти як Демо" — одразу побачиш тренера, спортсменів, розклад та всі можливості додатку.</p>
    </div>
</body>
</html>
