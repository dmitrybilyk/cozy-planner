<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моя доступність</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased" x-data="availabilityApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-16 flex items-center justify-between sticky top-0 z-40">
    <h1 class="text-lg font-bold">Моя доступність</h1>
    <button @click="saveAvailability()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-lg">Зберегти</button>
</header>

<main class="max-w-lg mx-auto p-4 pb-24">
    <div x-show="saved" class="bg-green-900/20 text-green-400 p-3 rounded-xl text-sm font-bold text-center mb-4">Збережено!</div>

    <div class="flex overflow-x-auto no-scrollbar mb-6 space-x-2">
        <template x-for="day in days" :key="day.dateStr">
            <button @click="selectDate(day.dateStr)"
                    class="flex-shrink-0 flex flex-col items-center px-4 py-3 rounded-2xl transition-all"
                    :class="selectedDate === day.dateStr ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400'">
                <span class="text-[10px] font-bold uppercase" x-text="day.weekday"></span>
                <span class="text-lg font-black" x-text="day.dayNum"></span>
            </button>
        </template>
    </div>

    <div class="mb-4">
        <p class="text-xs font-bold text-gray-500 uppercase mb-3">Вільні години <span class="text-blue-400" x-text="selectedDate"></span></p>
        <div class="space-y-2">
            <template x-for="(slot, i) in currentSlots" :key="i">
                <div class="flex items-center justify-between bg-blue-900/20 border border-blue-500/30 rounded-xl px-4 py-3">
                    <span class="text-sm font-bold text-blue-300" x-text="slot.startTime + ' — ' + slot.endTime"></span>
                    <button @click="removeSlot(i)" class="text-red-400 text-xs font-bold uppercase">Видалити</button>
                </div>
            </template>
            <div x-show="currentSlots.length === 0" class="text-center py-6 text-gray-600 text-sm">Немає вільних годин. Оберіть діапазон нижче.</div>
        </div>
    </div>

    <div>
        <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-bold text-gray-500 uppercase">Новий діапазон</span>
            <span x-show="pickStart" class="text-xs font-bold text-yellow-400">Оберіть кінець</span>
        </div>
        <div class="grid grid-cols-4 gap-1.5 max-h-52 overflow-y-auto no-scrollbar">
            <template x-for="t in daySlots" :key="t">
                <button @click="pickSlot(t)" type="button"
                        class="py-2 rounded-xl font-bold text-xs sm:text-sm transition-all active:scale-95"
                        :class="getSlotClass(t)">
                    <span x-text="t"></span>
                </button>
            </template>
        </div>
    </div>
</main>

<script th:inline="none">
    function localDateStr(d) {
        d = d || new Date();
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    }
    function snapToMonday(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        d.setDate(diff);
        return d;
    }
    function availabilityApp() {
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const today = localDateStr();
        return {
            athleteId: null,
            selectedDate: today,
            days: [],
            slotsByDate: {},
            pickStart: null,
            daySlots: Array.from({length: 29}, (_, i) => `${(7+Math.floor(i/2)).toString().padStart(2,'0')}:${i%2===0?'00':'30'}`),
            saved: false,

            get currentSlots() {
                return this.slotsByDate[this.selectedDate] || [];
            },

            async init() {
                const res = await fetch('/api/v1/me');
                if (!res.ok) { window.location.href = '/signin'; return; }
                const me = await res.json();
                if (!me.athleteId) { window.location.href = '/signin'; return; }
                this.athleteId = me.athleteId;

                const now = new Date();
                const start = snapToMonday(now);
                for (let i = 0; i < 14; i++) {
                    const d = new Date(start);
                    d.setDate(start.getDate() + i);
                    const ds = localDateStr(d);
                    this.days.push({ dateStr: ds, weekday: days[(d.getDay() + 6) % 7], dayNum: d.getDate() });
                }
                await this.loadAvailability();
                this.connectWebSocket();
            },

            connectWebSocket() {
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/api/v1/ws`;
                const ws = new WebSocket(wsUrl);
                
                ws.onmessage = (event) => {
                    if (event.data === 'availability_changed') {
                        this.loadAvailability();
                    }
                };
                
                ws.onclose = () => {
                    setTimeout(() => this.connectWebSocket(), 3000);
                };
                
                ws.onerror = () => {
                    ws.close();
                };
                
                this.ws = ws;
            },

            selectDate(date) {
                this.selectedDate = date;
                this.pickStart = null;
            },

            slotToMin(t) {
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            },

            pickSlot(t) {
                const slots = this.slotsByDate[this.selectedDate] || [];
                if (this.pickStart === null) {
                    this.pickStart = t;
                } else {
                    const sm = this.slotToMin(this.pickStart);
                    const tm = this.slotToMin(t);
                    if (tm <= sm) {
                        this.pickStart = t;
                        return;
                    }
                    slots.push({ startTime: this.pickStart, endTime: t });
                    slots.sort((a, b) => this.slotToMin(a.startTime) - this.slotToMin(b.startTime));
                    this.slotsByDate[this.selectedDate] = slots;
                    this.pickStart = null;
                }
            },

            getSlotClass(t) {
                const tm = this.slotToMin(t);
                const slots = this.slotsByDate[this.selectedDate] || [];
                for (const s of slots) {
                    const ss = this.slotToMin(s.startTime);
                    const se = this.slotToMin(s.endTime);
                    if (tm >= ss && tm < se) return 'bg-blue-600/30 text-blue-300';
                }
                if (this.pickStart) {
                    const pm = this.slotToMin(this.pickStart);
                    if (tm === pm) return 'bg-yellow-500 text-black font-black ring-2 ring-yellow-300';
                    if (tm > pm) return 'bg-blue-500/20 text-blue-300';
                }
                return 'bg-[#262626] text-gray-400 hover:bg-[#333]';
            },

            removeSlot(i) {
                const slots = this.slotsByDate[this.selectedDate] || [];
                slots.splice(i, 1);
                this.slotsByDate[this.selectedDate] = slots;
            },

            async loadAvailability() {
                const start = this.days[0].dateStr;
                const end = this.days[this.days.length - 1].dateStr;
                const res = await fetch(`/api/v1/athletes/${this.athleteId}/availability?startDate=${start}&endDate=${end}`);
                if (res.ok) {
                    const data = await res.json();
                    const grouped = {};
                    for (const item of data) {
                        if (!grouped[item.date]) grouped[item.date] = [];
                        grouped[item.date].push({ startTime: item.startTime, endTime: item.endTime });
                    }
                    for (const date in grouped) {
                        grouped[date].sort((a, b) => this.slotToMin(a.startTime) - this.slotToMin(b.startTime));
                    }
                    this.slotsByDate = grouped;
                }
            },

            async saveAvailability() {
                const date = this.selectedDate;
                const slots = this.currentSlots;
                let res;
                if (slots.length === 0) {
                    res = await fetch(`/api/v1/athlete/availability?date=${date}`, { method: 'DELETE' });
                } else {
                    const entries = slots.map(s => ({ date, startTime: s.startTime, endTime: s.endTime }));
                    res = await fetch('/api/v1/athlete/availability', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(entries)
                    });
                }
                if (res.ok) {
                    this.saved = true;
                    setTimeout(() => this.saved = false, 3000);
                }
            }
        }
    }
</script>
</body>
</html>
