<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
    <link rel="stylesheet" href="/css/setup.css" th:href="@{/css/setup.css(v=${appVersion})}">
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4 bg-[#0f0f0f] text-white"
      x-data="{
        profile: '', workStart: '08:00', workEnd: '21:00', timeStep: 30, shareAvailability: false, multiLocation: false,
        allHours: ['05:00','06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00','23:00'],
        endHours() { return this.allHours.filter(h => h > this.workStart); },
        fixWorkEnd() { if (!this.endHours().includes(this.workEnd)) this.workEnd = this.endHours()[0] || '23:00'; }
      }">
    <div class="w-full max-w-sm space-y-8">

        <div class="text-center space-y-2">
            <div class="ig-ring mx-auto w-14 h-14 flex items-center justify-center">
                <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                    <span class="text-lg font-black italic ig-gradient-text">CP</span>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Ласкаво просимо!</h1>
        </div>

        <form method="POST" action="/setup" class="space-y-6">
            <input type="hidden" name="profile" :value="profile">
            <input type="hidden" name="clubName" value="Мій простір">
            <input type="hidden" name="workStart" :value="workStart">
            <input type="hidden" name="workEnd" :value="workEnd">
            <input type="hidden" name="availStep" :value="timeStep">
            <input type="hidden" name="shareAvailability" :value="shareAvailability">
            <input type="hidden" name="multiLocation" :value="multiLocation">

            <div>
                <label class="text-xs font-black text-gray-400 uppercase tracking-wider block mb-2">Моє ім'я</label>
                <input type="text" name="mentorName" placeholder="напр. Катя" required autocomplete="name"
                       class="w-full bg-[#1a1a1a] border border-[#2a2a2a] rounded-2xl px-4 py-3 text-white text-base focus:border-blue-500 focus:outline-none transition"
                       th:value="${googleName}">
            </div>

            <div>
                <label class="text-xs font-black text-gray-400 uppercase tracking-wider block mb-3">Я</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" @click="profile = 'sport'"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="profile === 'sport' ? 'selected' : ''">
                        <div class="text-2xl mb-1.5">🏋️</div>
                        <div class="text-xs font-bold leading-tight">Тренер</div>
                    </button>
                    <button type="button" @click="profile = 'massage'"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="profile === 'massage' ? 'selected' : ''">
                        <div class="text-2xl mb-1.5">💆</div>
                        <div class="text-xs font-bold leading-tight">Масажист</div>
                    </button>
                    <button type="button" @click="profile = 'psychology'"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="profile === 'psychology' ? 'selected' : ''">
                        <div class="text-2xl mb-1.5">🧠</div>
                        <div class="text-xs font-bold leading-tight">Психолог</div>
                    </button>
                    <button type="button" @click="profile = 'studying'"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="profile === 'studying' ? 'selected' : ''">
                        <div class="text-2xl mb-1.5">📚</div>
                        <div class="text-xs font-bold leading-tight">Репетитор</div>
                    </button>
                    <button type="button" @click="profile = 'manicure'"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="profile === 'manicure' ? 'selected' : ''">
                        <div class="text-2xl mb-1.5">💅</div>
                        <div class="text-xs font-bold leading-tight">Майстер<br>манікюру</div>
                    </button>
                    <button type="button" @click="profile = 'other'"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="profile === 'other' ? 'selected' : ''">
                        <div class="text-2xl mb-1.5">🌟</div>
                        <div class="text-xs font-bold leading-tight">Інше</div>
                    </button>
                </div>
            </div>

            <div>
                <label class="text-xs font-black text-gray-400 uppercase tracking-wider block mb-1">Робочий час</label>
                <p class="text-xs text-gray-500 mb-3">Слоти доступності будуть показані лише в цей проміжок — решту часу ти недоступний</p>
                <div class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <select x-model="workStart" @change="fixWorkEnd()"
                                x-effect="$nextTick(() => $el.value = workStart)"
                                class="w-full appearance-none bg-[#1a1a1a] border border-[#2a2a2a] rounded-2xl px-4 py-3 text-white text-base focus:border-blue-500 focus:outline-none transition">
                            <template x-for="h in allHours.filter(h => h < '23:00')" :key="h">
                                <option :value="h" x-text="h"></option>
                            </template>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-gray-500 text-xs">▼</div>
                    </div>
                    <span class="text-gray-500 font-bold">—</span>
                    <div class="relative flex-1">
                        <select x-model="workEnd"
                                x-effect="$nextTick(() => $el.value = workEnd)"
                                class="w-full appearance-none bg-[#1a1a1a] border border-[#2a2a2a] rounded-2xl px-4 py-3 text-white text-base focus:border-blue-500 focus:outline-none transition">
                            <template x-for="h in endHours()" :key="h">
                                <option :value="h" x-text="h"></option>
                            </template>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-gray-500 text-xs">▼</div>
                    </div>
                </div>
            </div>

            <div>
                <label class="text-xs font-black text-gray-400 uppercase tracking-wider block mb-1">Деталізація вибору часу</label>
                <p class="text-xs text-gray-500 mb-3">Мінімальний інтервал між слотами. Наприклад, 30 хв → 09:00, 09:30, 10:00...</p>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" @click="timeStep = 15"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="timeStep === 15 ? 'selected' : ''">
                        <div class="text-xl font-bold mb-0.5">15</div>
                        <div class="text-xs font-bold text-gray-400">хв</div>
                    </button>
                    <button type="button" @click="timeStep = 30"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="timeStep === 30 ? 'selected' : ''">
                        <div class="text-xl font-bold mb-0.5">30</div>
                        <div class="text-xs font-bold text-gray-400">хв</div>
                    </button>
                    <button type="button" @click="timeStep = 60"
                            class="profile-btn rounded-2xl border-2 border-[#2a2a2a] bg-[#1a1a1a] py-4 px-2 text-center"
                            :class="timeStep === 60 ? 'selected' : ''">
                        <div class="text-xl font-bold mb-0.5">60</div>
                        <div class="text-xs font-bold text-gray-400">хв</div>
                    </button>
                </div>
            </div>

            <div class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-2xl px-4 py-4 space-y-3">
                <p class="text-xs font-black text-gray-400 uppercase tracking-wider mb-1">Додаткові можливості</p>
                <label class="flex items-center justify-between cursor-pointer select-none">
                    <div>
                        <div class="text-sm text-gray-200 font-medium">Ділитися доступністю</div>
                        <div class="text-xs text-gray-500 mt-0.5">Учні бачать ваш вільний час і можуть записатися</div>
                    </div>
                    <div class="relative ml-3 flex-shrink-0" @click="shareAvailability = !shareAvailability">
                        <div class="w-10 h-5 rounded-full transition-colors duration-200" :class="shareAvailability ? 'bg-blue-600' : 'bg-[#333]'"></div>
                        <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform duration-200" :class="shareAvailability ? 'translate-x-5' : 'translate-x-0'"></div>
                    </div>
                </label>
                <label class="flex items-center justify-between cursor-pointer select-none">
                    <div>
                        <div class="text-sm text-gray-200 font-medium">Декілька локацій</div>
                        <div class="text-xs text-gray-500 mt-0.5">Зал, майданчик, онлайн — кілька місць проведення</div>
                    </div>
                    <div class="relative ml-3 flex-shrink-0" @click="multiLocation = !multiLocation">
                        <div class="w-10 h-5 rounded-full transition-colors duration-200" :class="multiLocation ? 'bg-blue-600' : 'bg-[#333]'"></div>
                        <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform duration-200" :class="multiLocation ? 'translate-x-5' : 'translate-x-0'"></div>
                    </div>
                </label>
            </div>

            <button type="submit" :disabled="!profile"
                    class="w-full ig-gradient text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg hover:opacity-90 transition active:scale-[0.97] disabled:opacity-30 disabled:pointer-events-none">
                Почати
            </button>
        </form>
    </div>
</body>
</html>
