<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
    <link rel="stylesheet" href="/css/setup.css" th:href="@{/css/setup.css(v=${appVersion})}">
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4" x-data="{ profile: 'sport' }">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center space-y-3">
            <div class="ig-ring mx-auto w-16 h-16 flex items-center justify-center">
                <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                    <span class="text-xl font-black italic ig-gradient-text">CP</span>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Ласкаво просимо!</h1>
            <p class="text-sm text-gray-500">Створіть свій простір</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button type="button" @click="profile = 'sport'"
                    class="profile-btn p-4 rounded-2xl border-2 border-[#333] bg-[#1a1a1a] text-center"
                    :class="profile === 'sport' ? 'selected' : ''">
                <div class="text-3xl mb-2">🏅</div>
                <div class="text-sm font-bold">Спорт</div>
            </button>
            <button type="button" @click="profile = 'studying'"
                    class="profile-btn p-4 rounded-2xl border-2 border-[#333] bg-[#1a1a1a] text-center"
                    :class="profile === 'studying' ? 'selected' : ''">
                <div class="text-3xl mb-2">📚</div>
                <div class="text-sm font-bold">Навчання</div>
            </button>
            <button type="button" @click="profile = 'psychology'"
                    class="profile-btn p-4 rounded-2xl border-2 border-[#333] bg-[#1a1a1a] text-center"
                    :class="profile === 'psychology' ? 'selected' : ''">
                <div class="text-3xl mb-2">🧠</div>
                <div class="text-sm font-bold">Психологія</div>
            </button>
            <button type="button" @click="profile = 'other'"
                    class="profile-btn p-4 rounded-2xl border-2 border-[#333] bg-[#1a1a1a] text-center"
                    :class="profile === 'other' ? 'selected' : ''">
                <div class="text-3xl mb-2">🌟</div>
                <div class="text-sm font-bold">Інші Послуги</div>
            </button>
        </div>

        <form method="POST" action="/setup" class="space-y-5">
            <input type="hidden" name="profile" x-model="profile" :value="profile">
            <input type="hidden" name="clubName" value="Мій простір">
            <div>
                <label class="text-xs font-black text-gray-400 uppercase block mb-2">Твоє ім'я</label>
                <input type="text" name="mentorName" placeholder="напр. Катя" required
                       class="w-full bg-[#262626] border border-[#363636] rounded-xl p-3 text-white focus:border-blue-500 transition"
                       th:value="${googleName}">
            </div>
            <button type="submit"
                    class="w-full ig-gradient text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg hover:opacity-90 transition active:scale-[0.97]">
                Почати
            </button>
        </form>
    </div>
</body>
</html>
