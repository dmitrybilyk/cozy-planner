<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #ffffff;
        }
        .ig-gradient {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .ig-gradient-text {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .ig-ring {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 2px;
            border-radius: 50%;
            display: inline-flex;
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center space-y-3">
            <div class="ig-ring mx-auto w-16 h-16 flex items-center justify-center">
                <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                    <span class="text-xl font-black italic ig-gradient-text">CP</span>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Ласкаво просимо!</h1>
            <p class="text-sm text-gray-500">Створіть свій простір</p>
        </div>

        <form method="POST" action="/setup" class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase block mb-2">Назва клубу</label>
                <input type="text" name="clubName" placeholder="напр. Тенісний клуб" required
                       class="w-full bg-[#262626] border border-[#363636] rounded-xl p-3 text-white focus:border-blue-500 transition">
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase block mb-2">Твоє ім'я</label>
                <input type="text" name="coachName" placeholder="напр. Катя" required
                       class="w-full bg-[#262626] border border-[#363636] rounded-xl p-3 text-white focus:border-blue-500 transition">
            </div>
            <button type="submit"
                    class="w-full ig-gradient text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg hover:opacity-90 transition active:scale-[0.97]">
                Почати
            </button>
        </form>
    </div>
</body>
</html>
