<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title x-text="mentorTitle"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/coach-availability.js" th:src="@{/js/coach-availability.js(v=${appVersion})}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
</head>
<body class="antialiased" x-data="rangeApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <a href="/planner" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-lg font-bold text-white">Доступність</h1>
    </div>
    <button @click="installPwa()" class="mr-2 text-sm" title="Встановити додаток">
        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
    </button>
</header>

<main class="max-w-lg mx-auto p-4 pb-28">

    <!-- Day picker -->
    <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] mb-4">
        <div class="flex overflow-x-auto no-scrollbar space-x-1.5 p-2.5">
            <template x-for="day in days" :key="day.ds">
                <button @click="sel(day.ds)"
                        class="flex-shrink-0 flex flex-col items-center px-1.5 py-1 rounded-lg transition-all min-w-[28px] relative"
                        :class="day.ds === curDate ? 'bg-blue-600 text-white shadow-lg' : ((dayOffs.includes(day.ds) || day.isWeekend) ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                    <span class="text-[9px] font-bold uppercase" x-text="day.wd"></span>
                    <span class="text-xs font-black leading-tight" x-text="day.num"></span>
                    <span class="text-[9px] font-bold" x-text="day.mo"></span>
                    <span x-show="dayOffs.includes(day.ds)" class="text-[7px] font-black text-red-400 uppercase">✕</span>
                    <span x-show="hasRanges(day.ds) && !dayOffs.includes(day.ds)" class="w-0.5 h-0.5 rounded-full bg-blue-400 mt-0.5"></span>
                </button>
            </template>
        </div>
        <div class="px-3 py-1.5 border-t border-[#2a2a2a] flex items-center justify-between gap-2">
            <div class="flex items-center gap-1">
                <button @click="toggleDayOff()"
                        :class="isDayOff ? 'bg-red-600 text-white' : 'bg-[#2a2a2a] text-gray-500 hover:text-gray-300'"
                        class="px-1.5 py-0.5 rounded-lg text-xs font-bold uppercase transition">
                    <span x-text="isDayOff ? '✓ Вихідний' : 'Вихідний'"></span>
                </button>
                <button @click="copyLink()" class="p-1 rounded-lg hover:bg-[#333] transition" :title="copied ? 'Скопійовано' : 'Посилання на розклад'">
                    <svg class="w-3 h-3" :class="copied ? 'text-green-400' : 'text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                </button>
            </div>
            <div class="flex items-center gap-2">
                <span x-show="curDate === todayStr" class="text-[9px] font-black uppercase bg-blue-600 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
            </div>
        </div>
    </div>

    <!-- Day off message -->
    <div x-show="isDayOff" class="bg-red-900/20 border border-red-500/30 rounded-2xl p-3 text-center mb-3">
        <p class="text-red-400 text-sm font-bold">✕ ВИХІДНИЙ</p>
        <p class="text-gray-500 text-xs mt-0.5">Цього дня немає тренувань</p>
    </div>

    <!-- Free all day toggle -->
    <div x-show="!isDayOff" class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden mb-4">
        <div class="p-4">
            <label class="flex items-center gap-3 cursor-pointer">
                <div class="relative">
                    <input type="checkbox" x-model="freeAllDay" @change="onFreeAllDayToggle()" class="sr-only">
                    <div class="w-10 h-6 rounded-full transition-colors" :class="freeAllDay ? 'bg-blue-600' : 'bg-[#444]'"></div>
                    <div class="absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white transition-transform shadow" :class="freeAllDay ? 'translate-x-4' : ''"></div>
                </div>
                <div>
                    <span class="text-sm font-bold" :class="freeAllDay ? 'text-green-400' : 'text-gray-400'"><span x-text="freeAllDay ? '✓ Весь день вільний' : 'Вказати інтервали'"></span></span>
                    <p class="text-xs text-gray-600 mt-0.5" x-text="freeAllDay ? 'Ніяких обмежень — доступний весь робочий час' : 'Налаштуйте конкретні часові проміжки'"></p>
                </div>
            </label>
        </div>
    </div>

    <!-- Specific intervals -->
    <div x-show="!isDayOff && !freeAllDay" class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden mb-4">
        <div class="p-4 space-y-3">
            <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Інтервали</span>
                <button @click="addRange()" class="text-xs font-bold text-blue-400 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    Додати
                </button>
            </div>
            <template x-for="(r, i) in ranges" :key="i">
                <div class="flex items-center gap-2 bg-[#262626] rounded-xl p-3" :style="'border-left: 4px solid ' + (getLocColor(r.locationId) || 'transparent')">
                    <div class="flex-1 flex items-center gap-1">
                            <select x-model="r.startTime" @change="onAvailStartChange(i)"
                                    x-effect="$nextTick(() => $el.value = r.startTime)"
                                    class="bg-transparent text-gray-200 border border-[#444] rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500">
                                <option value="" disabled>Час</option>
                                <template x-for="t in startSlots(i)" :key="t">
                                    <option :value="t" x-text="t" :class="t.endsWith(':00') ? 'font-semibold text-blue-400' : ''"></option>
                                </template>
                            </select>
                            <span class="text-gray-500 text-xs">—</span>
                            <select x-model="r.endTime" @change="markDirty()"
                                    x-effect="$nextTick(() => $el.value = r.endTime)"
                                    class="bg-transparent text-gray-200 border border-[#444] rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500">
                                <option value="" disabled>Час</option>
                                <template x-for="t in endSlots(r.startTime, i)" :key="t">
                                    <option :value="t" x-text="t" :class="t.endsWith(':00') ? 'font-semibold text-blue-400' : ''"></option>
                                </template>
                            </select>
                    </div>
                    <div class="flex items-center gap-1">
                        <select x-model="r.locationId" @change="markDirty()"
                                class="bg-[#333] text-gray-300 text-xs rounded-lg px-1.5 py-1.5 border border-[#444] focus:outline-none max-w-[80px]">
                            <option value="">Місце</option>
                            <template x-for="loc in locs" :key="loc.id">
                                <option :value="loc.id" x-text="loc.name" :style="'color:' + (loc.color || '#3b82f6')"></option>
                            </template>
                        </select>
                        <span x-show="r.locationId && getLocName(r.locationId)" class="text-xs font-bold truncate max-w-[60px]" :style="'color:' + (getLocColor(r.locationId) || '#3b82f6')" x-text="getLocName(r.locationId)"></span>
                    </div>
                    <button @click="removeRange(i)" class="p-1 text-red-400 hover:text-red-300 transition flex-shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </template>
            <div x-show="ranges.length === 0" class="text-center py-4 text-gray-600 text-xs">
                Натисніть "Додати", щоб створити інтервал доступності
            </div>
        </div>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap items-center gap-2 mt-2 text-xs text-gray-500">
        <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
        <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm" style="background:#dc2626"></span> Зайнято (сесії)</span>
    </div>

</main>

    <!-- Floating save button -->
    <div x-show="dirty && !saving"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 animate-bounce"
         x-cloak x-transition>
        <button @click="saveAll()"
                class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 transition-all active:scale-95 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
            Зберегти
        </button>
    </div>

    <!-- Saving spinner -->
    <div x-show="saving"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"
         x-cloak x-transition>
        <div class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 flex items-center gap-2">
            <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Збереження...
        </div>
    </div>

    <div x-show="saved"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"
         x-cloak x-transition>
        <div class="bg-green-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-green-600/30 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            <span x-text="savedMessage"></span>
        </div>
    </div>

</body>
</html>
