<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доступність тренера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased" x-data="app()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <a href="/planner" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-lg font-bold">Доступність тренера</h1>
    </div>
</header>

<main class="max-w-lg mx-auto p-4 pb-28">

    <div class="flex overflow-x-auto no-scrollbar mb-4 space-x-2">
        <template x-for="day in days" :key="day.ds">
            <button @click="sel(day.ds)"
                    class="flex-shrink-0 flex flex-col items-center px-4 py-2.5 rounded-2xl transition-all min-w-[60px] relative"
                    :class="day.ds === curDate ? 'bg-blue-600 text-white shadow-lg' : 'bg-[#262626] text-gray-400'">
                <span class="text-[9px] font-bold uppercase" x-text="day.wd"></span>
                <span class="text-xl font-black leading-tight" x-text="day.num"></span>
                <span class="text-[9px] font-bold mt-0.5" x-text="day.mo"></span>
                <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                <span x-show="hasDaySlots(day.ds)" class="absolute -bottom-0.5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-blue-400"></span>
            </button>
        </template>
    </div>

    <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
        <div class="px-4 py-2 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
            <span class="text-xs font-bold text-gray-500 whitespace-nowrap" x-text="curDate"></span>
            <select x-show="locs.length" x-model="curLoc" class="bg-[#262626] text-gray-300 text-xs rounded-xl px-2 py-1.5 border border-[#444] focus:outline-none max-w-[140px]">
                <option :value="null">Місце</option>
                <template x-for="l in locs" :key="l.id">
                    <option :value="l.id" x-text="l.name" :style="'color: ' + (l.color || '#3b82f6')"></option>
                </template>
            </select>
        </div>
        <div class="max-h-96 overflow-y-auto no-scrollbar">
            <template x-for="(row, ri) in grid" :key="ri">
                <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                    <div class="w-12 flex-shrink-0 flex items-start justify-end pr-2 pt-1 text-[10px] font-bold text-gray-600 select-none leading-none">
                        <span x-text="row.lbl"></span>
                    </div>
                    <div class="flex-1 flex">
                        <template x-for="(c, ci) in row.cells" :key="ci">
                            <button @click="tap(c.mm)"
                                    class="flex-1 h-10 sm:h-11 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95 relative"
                                    :style="cellStyle(c.mm)"
                                    :title="title(c.mm)">
                                <span x-show="inSess(c.mm)"
                                      class="absolute inset-0 flex items-center justify-center text-[9px] font-black text-white leading-tight"
                                      style="text-shadow:0 1px 3px rgba(0,0,0,0.6)">Busy</span>
                            </button>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="flex flex-wrap items-center gap-2 mt-3 text-xs text-gray-500">
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#dc2626"></span> Зайнято</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
        <template x-for="loc in locs" :key="loc.id">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" :style="'background:' + (loc.color || '#3b82f6')"></span> Вільно на <span x-text="loc.name"></span></span>
        </template>
    </div>

    <div class="mt-6 bg-[#1e1e1e] border border-[#333] p-4 rounded-2xl">
        <div class="flex items-center justify-between mb-3">
            <p class="text-sm font-bold text-gray-500 uppercase">Поширити розклад</p>
            <button @click="mkToken()" x-show="!shareUrl" class="text-blue-400 text-xs font-bold">Створити</button>
        </div>
        <div x-show="shareUrl" class="space-y-3">
            <div>
                <label class="text-[10px] font-bold text-gray-600 uppercase mb-1.5 block">Весь розклад</label>
                <div class="flex items-center gap-2">
                    <input type="text" :value="shareUrl" readonly @click="$el.select()" class="flex-1 bg-[#2a2a2a] text-gray-300 text-sm px-3 py-2 rounded-xl border border-[#444] focus:outline-none">
                    <button @click="copyLink()" class="bg-[#333] hover:bg-[#444] text-white px-3 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all active:scale-95">
                        <span x-text="copied ? '✓' : 'Копіювати'"></span>
                    </button>
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-600 uppercase mb-1.5 block">Сьогодні</label>
                <div class="flex items-center gap-2">
                    <input type="text" :value="shareUrl + '?date=' + curDate" readonly @click="$el.select()" class="flex-1 bg-[#2a2a2a] text-gray-300 text-sm px-3 py-2 rounded-xl border border-[#444] focus:outline-none">
                    <button @click="copyTodayLink()" class="bg-[#333] hover:bg-[#444] text-white px-3 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all active:scale-95">
                        <span x-text="todayCopied ? '✓' : 'Копіювати'"></span>
                    </button>
                </div>
            </div>
            <div class="pt-2 border-t border-[#2a2a2a]">
                <label class="text-[10px] font-bold text-gray-600 uppercase mb-2 block">Картинки (без входу)</label>
                <div class="flex items-center gap-2">
                    <button @click="copyImageWeek()" class="flex-1 bg-[#262626] hover:bg-[#333] text-gray-300 py-2.5 rounded-xl text-xs font-bold transition-all active:scale-95 border border-[#444]">
                        <span x-text="imgCopiedWeek ? '✓ Скопійовано' : '📅 Весь розклад'"></span>
                    </button>
                    <button @click="copyImageDay()" class="flex-1 bg-[#262626] hover:bg-[#333] text-gray-300 py-2.5 rounded-xl text-xs font-bold transition-all active:scale-95 border border-[#444]">
                        <span x-text="imgCopiedDay ? '✓ Скопійовано' : '📋 Сьогодні'"></span>
                    </button>
                </div>
            </div>
        </div>
        <p x-show="!shareUrl" class="text-sm text-gray-600">З'явиться після першого натискання на слот</p>
        <p x-show="shareUrl" class="text-xs text-gray-600 mt-2">Посилання та картинки відкриваються без входу</p>
    </div>

    <!-- Session details popup on busy slot -->
    <div x-show="busySession" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm" x-cloak x-transition @click.self="busySession = null">
        <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-5 border-b border-[#333] flex items-center justify-between">
                <h3 class="text-lg font-bold text-white truncate" x-text="busySession?.title || 'Сесія'"></h3>
                <button @click="busySession = null" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div class="p-5 space-y-4">
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span x-text="busySession?.startTime?.slice(0,5) + ' — ' + busySession?.endTime?.slice(0,5)"></span>
                </div>
                <div x-show="busySession?.description" class="text-sm text-gray-300 bg-[#262626] rounded-xl p-3">
                    <p x-text="busySession?.description"></p>
                </div>
                <div x-show="busySession?.confirmationStatus && busySession?.confirmationStatus !== 'NONE'" class="flex items-center gap-2 text-xs">
                    <span class="text-gray-500">Статус:</span>
                    <span class="font-bold"
                          :class="busySession?.confirmationStatus === 'CONFIRMED' ? 'text-green-400' : busySession?.confirmationStatus === 'REJECTED' ? 'text-red-400' : 'text-yellow-400'"
                          x-text="busySession?.confirmationStatus === 'CONFIRMED' ? 'Підтверджено' : busySession?.confirmationStatus === 'REJECTED' ? 'Відхилено' : 'Очікує'"></span>
                </div>
            </div>
            <div class="px-5 pb-5">
                <button @click="busySession = null" class="w-full py-3 rounded-xl text-sm font-bold text-white bg-[#333] hover:bg-[#444] transition-all">Закрити</button>
            </div>
        </div>
    </div>
</main>

<script th:inline="none">
function app() {
    const MON = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
    const WD = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
    const today = (d=>`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`)(new Date);

    return {
        mentorId: null, shareToken: null, shareUrl: '', copied: false, todayCopied: false, imgCopiedWeek: false, imgCopiedDay: false,
        curDate: today, days: [], grid: [],
        cells: {}, sess: {}, locs: [], curLoc: null,
        ws: null,
        busySession: null,

        init() {
            const now = new Date;
            for (let i = 0; i < 14; i++) {
                const d = new Date(now); d.setDate(now.getDate() + i);
                const ds = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
                this.days.push({ ds, wd: WD[(d.getDay()+6)%7], num: d.getDate(), mo: MON[d.getMonth()], isToday: ds === today });
            }
            for (let h = 6; h < 22; h++) {
                const cells = [{mm:h*60},{mm:h*60+30}];
                this.grid.push({ lbl: `${String(h).padStart(2,'0')}:00`, cells });
            }
            this.load();
            this.connectWebSocket();
        },

        getCurCells() { return this.cells[this.curDate] || []; },

        cellAt(mm) { return this.getCurCells().find(x => x.mm === mm); },

        inSess(mm) {
            return (this.sess[this.curDate] || []).some(s => {
                const [sh,sm] = s.startTime.split(':').map(Number);
                const [eh,em] = s.endTime.split(':').map(Number);
                return mm >= sh*60+sm && mm < eh*60+em;
            });
        },

        title(mm) {
            return `${String(Math.floor(mm/60)).padStart(2,'0')}:${String(mm%60).padStart(2,'0')}`;
        },

        hasDaySlots(ds) { return (this.cells[ds] || []).length > 0; },

        sessionAt(mm) {
            return (this.sess[this.curDate] || []).find(s => {
                const [sh,sm] = s.startTime.split(':').map(Number);
                const [eh,em] = s.endTime.split(':').map(Number);
                return mm >= sh*60+sm && mm < eh*60+em;
            }) || null;
        },

        async tap(mm) {
            const busy = this.sessionAt(mm);
            if (busy) { this.busySession = busy; return; }
            const arr = this.getCurCells();
            const idx = arr.findIndex(x => x.mm === mm);
            if (idx >= 0) {
                arr.splice(idx, 1);
            } else {
                arr.push({ mm, locId: this.curLoc ? Number(this.curLoc) : null });
            }
            this.cells[this.curDate] = [...arr];
            await this.quickSaveDate(this.curDate);
        },

        async quickSaveDate(date) {
            this._quickSaveCount = (this._quickSaveCount || 0) + 1;
            const arr = this.cells[date] || [];
            console.log(`[coach] quickSaveDate ${date} cells=${arr.length}`);
            try {
                if (!arr.length) {
                    const r = await fetch(`/api/v1/coach/availability?dates=${date}`, { method: 'DELETE' });
                    if (!r.ok) console.error(`[coach] DELETE fail ${date} status=${r.status}`);
                    else console.log(`[coach] DELETE ok ${date}`);
                    return;
                }
                const sorted = [...arr].sort((a,b) => a.mm - b.mm);
                const merged = [];
                let cs = sorted[0].mm, ce = sorted[0].mm + 30, cl = sorted[0].locId;
                for (let i = 1; i < sorted.length; i++) {
                    if (sorted[i].mm === ce && sorted[i].locId === cl) {
                        ce = sorted[i].mm + 30;
                    } else {
                        merged.push({ date, startTime: this.minStr(cs), endTime: this.minStr(ce), locationId: cl || null });
                        cs = sorted[i].mm; ce = sorted[i].mm + 30; cl = sorted[i].locId;
                    }
                }
                merged.push({ date, startTime: this.minStr(cs), endTime: this.minStr(ce), locationId: cl || null });
                const r = await fetch('/api/v1/coach/availability', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(merged) });
                if (!r.ok) console.error(`[coach] POST fail status=${r.status}`, merged);
                else {
                    console.log(`[coach] POST ok ${date} merged=${merged.length}`);
                    if (!this.shareToken) await this.mkToken();
                }
            } catch(e) { console.error('[coach] quickSaveDate error', e); }
            finally { this._quickSaveCount--; }
        },

        cellStyle(mm) {
            if (this.inSess(mm)) return 'background:#dc2626';
            const c = this.cellAt(mm);
            if (!c) return 'background:#2a2a2a';
            if (c.locId != null && this.locs.length) {
                const l = this.locs.find(x => Number(x.id) === Number(c.locId));
                if (l && l.color) return `background:${l.color}`;
            }
            return 'background:#3b82f6';
        },

        sel(d) { this.curDate = d; },

        async load() {
            const r = await fetch('/api/v1/me');
            if (!r.ok) { window.location.href = '/signin'; return; }
            const me = await r.json();
            if (!me.mentor || me.mentor.id < 0) { window.location.href = '/signin'; return; }
            this.mentorId = me.mentor.id;
            this.shareToken = me.mentor.shareToken;
            if (this.shareToken) this.shareUrl = window.location.origin + '/shared/' + this.shareToken;

            const sd = this.days[0].ds, ed = this.days[this.days.length-1].ds;
            const [lr, ar, sr] = await Promise.all([
                fetch(`/api/v1/mentors/${this.mentorId}/locations`),
                fetch(`/api/v1/coach/availability?startDate=${sd}&endDate=${ed}`),
                fetch(`/api/v1/coach/sessions?startDate=${sd}&endDate=${ed}`)
            ]);
            if (lr.ok) this.locs = await lr.json();

            if (ar.ok) {
                const g = {};
                for (const i of await ar.json()) {
                    if (!g[i.date]) g[i.date] = [];
                    const [sh,sm] = i.startTime.split(':').map(Number);
                    const [eh,em] = i.endTime.split(':').map(Number);
                    let t = sh*60+sm, end = eh*60+em;
                    while (t < end) {
                        g[i.date].push({ mm: t, locId: i.locationId });
                        t += 30;
                    }
                }
                this.cells = g;
            }

            if (sr.ok) {
                const g = {};
                for (const i of await sr.json()) {
                    if (!g[i.date]) g[i.date] = [];
                    g[i.date].push(i);
                }
                this.sess = g;
            }
        },

        minStr(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; },

        connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/api/v1/ws`;
            const ws = new WebSocket(wsUrl);
            ws.onmessage = (event) => {
                console.log('[coach] ws event:', event.data, 'quickSaveCount:', this._quickSaveCount);
                if (event.data === 'coach_availability_changed' && !this._quickSaveCount) {
                    console.log('[coach] reloading from ws');
                    this.load();
                }
                if (event.data === 'session_changed' || event.data === 'location_changed') {
                    console.log('[coach] reloading from ws (session/location)');
                    this.load();
                }
            };
            ws.onclose = () => setTimeout(() => this.connectWebSocket(), 3000);
            ws.onerror = () => ws.close();
            this.ws = ws;
        },

        async mkToken() {
            if (this.shareToken) return;
            const r = await fetch('/api/v1/coach/share-token', { method:'POST' });
            if (r.ok) { const d = await r.json(); this.shareToken = d.shareToken; this.shareUrl = window.location.origin + '/shared/' + this.shareToken; }
        },

        async copyLink() {
            try { await navigator.clipboard.writeText(this.shareUrl); this.copied = true; setTimeout(() => this.copied = false, 2000); }
            catch(e) { prompt('Скопіюйте:', this.shareUrl); }
        },
        async copyTodayLink() {
            const url = this.shareUrl + '?date=' + this.curDate;
            try { await navigator.clipboard.writeText(url); this.todayCopied = true; setTimeout(() => this.todayCopied = false, 2000); }
            catch(e) { prompt('Скопіюйте:', url); }
        },
        async copyImageWeek() {
            if (!this.shareToken) await this.mkToken();
            if (!this.shareToken) return;
            const imgUrl = window.location.origin + '/api/v1/shared/' + this.shareToken + '/image';
            try { await navigator.clipboard.writeText(imgUrl); this.imgCopiedWeek = true; setTimeout(() => this.imgCopiedWeek = false, 3000); }
            catch(e) { prompt('Скопіюйте посилання на картинку:', imgUrl); }
        },
        async copyImageDay() {
            if (!this.shareToken) await this.mkToken();
            if (!this.shareToken) return;
            const imgUrl = window.location.origin + '/api/v1/shared/' + this.shareToken + '/image?date=' + this.curDate;
            try { await navigator.clipboard.writeText(imgUrl); this.imgCopiedDay = true; setTimeout(() => this.imgCopiedDay = false, 3000); }
            catch(e) { prompt('Скопіюйте посилання на картинку:', imgUrl); }
        }
    }
}
</script>
</body>
</html>
