<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title x-text="mentorTitle"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/shared.css">
</head>
<body class="antialiased" x-data="app()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <a href="/planner" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-lg font-bold" x-text="mentorTitle"></h1>
    </div>
</header>

<main class="max-w-lg mx-auto p-4 pb-28">

    <!-- Share schedule compact bar -->
    <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] p-3 mb-4">
        <div class="flex items-center justify-between gap-2">
            <div class="flex items-center gap-1.5">
                <span class="text-[10px] font-bold text-gray-500 uppercase whitespace-nowrap">День</span>
                <button @click="copyTodayLink()" class="p-2 rounded-lg bg-[#262626] hover:bg-[#333] text-gray-400 hover:text-white transition-all active:scale-95 relative" title="Копіювати посилання на день">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    <span x-show="todayCopied" class="absolute inset-0 flex items-center justify-center bg-green-600 text-white text-[8px] font-bold rounded-lg">✓</span>
                </button>
                <button @click="copyImageDay()" class="p-2 rounded-lg bg-[#262626] hover:bg-[#333] text-gray-400 hover:text-white transition-all active:scale-95 relative" title="Копіювати картинку дня">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span x-show="imgCopiedDay" class="absolute inset-0 flex items-center justify-center bg-green-600 text-white text-[8px] font-bold rounded-lg">✓</span>
                </button>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="text-[10px] font-bold text-gray-500 uppercase whitespace-nowrap">Розклад</span>
                <button @click="copyLink()" class="p-2 rounded-lg bg-[#262626] hover:bg-[#333] text-gray-400 hover:text-white transition-all active:scale-95 relative" title="Копіювати посилання на розклад">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    <span x-show="copied" class="absolute inset-0 flex items-center justify-center bg-green-600 text-white text-[8px] font-bold rounded-lg">✓</span>
                </button>
                <button @click="copyImageWeek()" class="p-2 rounded-lg bg-[#262626] hover:bg-[#333] text-gray-400 hover:text-white transition-all active:scale-95 relative" title="Копіювати картинку розкладу">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span x-show="imgCopiedWeek" class="absolute inset-0 flex items-center justify-center bg-green-600 text-white text-[8px] font-bold rounded-lg">✓</span>
                </button>
            </div>
        </div>
    </div>

    <div class="flex overflow-x-auto no-scrollbar mb-4 space-x-2">
        <template x-for="day in days" :key="day.ds">
            <button @click="sel(day.ds)"
                    class="flex-shrink-0 flex flex-col items-center px-4 py-2.5 rounded-2xl transition-all min-w-[60px] relative"
                    :class="day.ds === curDate ? 'bg-blue-600 text-white shadow-lg' : (dayOffs.includes(day.ds) ? 'bg-[#5a1a1a] ring-1 ring-red-500/30 text-red-300' : (day.isWeekend ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400'))">
                <span class="text-[9px] font-bold uppercase" x-text="day.wd"></span>
                <span class="text-xl font-black leading-tight" x-text="day.num"></span>
                <span class="text-[9px] font-bold mt-0.5" x-text="day.mo"></span>
                <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                <span x-show="hasDaySlots(day.ds)" class="absolute -bottom-0.5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-blue-400"></span>
            </button>
        </template>
    </div>

    <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
        <div class="px-4 py-2 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
            <div class="flex items-center gap-2">
                <span class="text-xs font-bold text-gray-500 whitespace-nowrap" x-text="curDate"></span>
                <button @click="toggleDayOff()"
                        :class="isDayOff ? 'bg-red-600 text-white' : 'bg-[#2a2a2a] text-gray-500 hover:text-gray-300'"
                        class="px-2 py-0.5 rounded-lg text-[9px] font-bold uppercase transition">
                    <span x-text="isDayOff ? '✓ Вихідний' : 'Вихідний'"></span>
                </button>
            </div>
            <div class="flex items-center gap-2">
                <button @click="fillAllDay()" :disabled="isDayOff" class="px-2 py-0.5 rounded-lg text-[9px] font-bold uppercase bg-[#2a2a2a] text-gray-400 hover:text-gray-300 transition disabled:opacity-30 disabled:cursor-not-allowed">Весь день</button>
                <select x-show="locs.length" x-model="curLoc" class="bg-[#262626] text-gray-300 text-xs rounded-xl px-2 py-1.5 border border-[#444] focus:outline-none max-w-[120px]">
                    <option :value="null">Місце</option>
                    <template x-for="l in locs" :key="l.id">
                        <option :value="l.id" x-text="l.name" :style="'color: ' + (l.color || '#3b82f6')"></option>
                    </template>
                </select>
            </div>
        </div>
        <div class="max-h-96 overflow-y-auto no-scrollbar">
            <template x-for="(row, ri) in grid" :key="ri">
                <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                    <div class="w-12 flex-shrink-0 flex items-start justify-end pr-2 pt-1 text-[10px] font-bold text-gray-600 select-none leading-none">
                        <span x-text="row.lbl"></span>
                    </div>
                    <div class="flex-1 flex">
                        <template x-for="(c, ci) in row.cells" :key="ci">
                            <button @click="tap(c.mm)"
                                    class="flex-1 h-10 sm:h-11 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95 relative"
                                    :style="cellStyle(c.mm)"
                                    :title="title(c.mm)">
                                <span x-show="inSess(c.mm)"
                                      class="absolute inset-0 flex items-center justify-center text-[9px] font-black text-white leading-tight"
                                      style="text-shadow:0 1px 3px rgba(0,0,0,0.6)">Busy</span>
                            </button>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="flex flex-wrap items-center gap-2 mt-3 text-xs text-gray-500">
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#dc2626"></span> Зайнято</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
        <template x-for="loc in locs" :key="loc.id">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" :style="'background:' + (loc.color || '#3b82f6')"></span> Вільно на <span x-text="loc.name"></span></span>
        </template>
    </div>

    <!-- Session details popup on busy slot -->
    <div x-show="busySession" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm" x-cloak x-transition @click.self="busySession = null">
        <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-5 border-b border-[#333] flex items-center justify-between">
                <h3 class="text-lg font-bold text-white truncate" x-text="busySession?.title || 'Сесія'"></h3>
                <button @click="busySession = null" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div class="p-5 space-y-4">
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span x-text="busySession?.startTime?.slice(0,5) + ' — ' + busySession?.endTime?.slice(0,5)"></span>
                </div>
                <div x-show="busySession?.description" class="text-sm text-gray-300 bg-[#262626] rounded-xl p-3">
                    <p x-text="busySession?.description"></p>
                </div>
                <div x-show="busySession?.confirmationStatus && busySession?.confirmationStatus !== 'NONE'" class="flex items-center gap-2 text-xs">
                    <span class="text-gray-500">Статус:</span>
                    <span class="font-bold"
                          :class="busySession?.confirmationStatus === 'CONFIRMED' ? 'text-green-400' : busySession?.confirmationStatus === 'REJECTED' ? 'text-red-400' : 'text-yellow-400'"
                          x-text="busySession?.confirmationStatus === 'CONFIRMED' ? 'Підтверджено' : busySession?.confirmationStatus === 'REJECTED' ? 'Відхилено' : 'Очікує'"></span>
                </div>
            </div>
            <div class="px-5 pb-5">
                <button @click="busySession = null" class="w-full py-3 rounded-xl text-sm font-bold text-white bg-[#333] hover:bg-[#444] transition-all">Закрити</button>
            </div>
        </div>
    </div>
</main>

    <!-- Floating save button -->
    <div x-show="hasUnsavedChanges && !saving"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 animate-bounce"
         x-cloak x-transition>
        <button @click="saveAll()"
                class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 transition-all active:scale-95 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
            Зберегти
        </button>
    </div>

    <!-- Saving spinner -->
    <div x-show="saving"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"
         x-cloak x-transition>
        <div class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 flex items-center gap-2">
            <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Збереження...
        </div>
    </div>

<script src="/js/coach-availability.js"></script>
</body>
</html>
