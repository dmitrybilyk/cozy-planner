<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title x-text="mentorTitle"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/coach-availability.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css">
</head>
<body class="antialiased" x-data="app()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <a href="/planner" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
    </div>
    <button @click="installPwa()" class="mr-2 text-sm" title="Встановити додаток">
        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
    </button>
</header>

<main class="max-w-lg mx-auto p-4 pb-28">

    <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] mb-4">
        <div class="flex overflow-x-auto no-scrollbar space-x-2 p-2.5">
            <template x-for="day in days" :key="day.ds">
                <button @click="sel(day.ds)"
                        class="flex-shrink-0 flex flex-col items-center px-1.5 py-1 rounded-lg transition-all min-w-[28px] relative"
                        :class="day.ds === curDate ? 'bg-blue-600 text-white shadow-lg' : ((dayOffs.includes(day.ds) || day.isWeekend) ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                    <span class="text-[6px] font-bold uppercase" x-text="day.wd"></span>
                    <span class="text-[10px] font-black leading-tight" x-text="day.num"></span>
                    <span class="text-[6px] font-bold" x-text="day.mo"></span>
                    <span x-show="dayOffs.includes(day.ds)" class="text-[5px] font-black text-red-400 uppercase">✕</span>
                    <span x-show="hasDaySlots(day.ds) && !dayOffs.includes(day.ds)" class="w-0.5 h-0.5 rounded-full bg-blue-400 mt-0.5"></span>
                </button>
            </template>
        </div>
        <div class="px-3 py-1.5 border-t border-[#2a2a2a] flex items-center justify-between gap-2">
            <div class="flex items-center gap-1">
                <button @click="toggleDayOff()"
                        :class="isDayOff ? 'bg-red-600 text-white' : 'bg-[#2a2a2a] text-gray-500 hover:text-gray-300'"
                        class="px-1.5 py-0.5 rounded-lg text-[8px] font-bold uppercase transition">
                    <span x-text="isDayOff ? '✓ Вихідний' : 'Вихідний'"></span>
                </button>
                <button @click="copyLink()" class="p-1 rounded-lg hover:bg-[#333] transition" :title="copied ? 'Скопійовано' : 'Посилання на розклад'">
                    <svg class="w-3 h-3" :class="copied ? 'text-green-400' : 'text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                </button>
                <button @click="copyImageWeek()" class="p-1 rounded-lg hover:bg-[#333] transition" :title="imgCopiedWeek ? 'Скопійовано' : 'Картинка розкладу'">
                    <svg class="w-3 h-3" :class="imgCopiedWeek ? 'text-green-400' : 'text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </button>
            </div>
            <div class="flex items-center gap-2">
                <span x-show="curDate === todayStr" class="text-[7px] font-black uppercase bg-blue-600 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
                <button @click="fillAllDay()" :disabled="isDayOff" class="px-1.5 py-0.5 rounded-lg text-[8px] font-bold bg-[#2a2a2a] text-gray-400 hover:text-gray-300 transition disabled:opacity-30 disabled:cursor-not-allowed">Весь день</button>
                <select x-model="availStep" @change="saveStep()" class="bg-[#262626] text-gray-300 text-[10px] rounded-lg px-1.5 py-1 border border-[#444] focus:outline-none max-w-[70px]">
                    <option value="15">15 хв</option>
                    <option value="30">30 хв</option>
                    <option value="60">60 хв</option>
                </select>
                <select x-show="locs.length" x-model="curLoc" class="bg-[#262626] text-gray-300 text-[10px] rounded-lg px-1.5 py-1 border border-[#444] focus:outline-none max-w-[90px]">
                    <option :value="null">Місце</option>
                    <template x-for="l in locs" :key="l.id">
                        <option :value="l.id" x-text="l.name" :style="'color: ' + (l.color || '#3b82f6')"></option>
                    </template>
                </select>
            </div>
        </div>
    </div>

    <div x-show="isDayOff" class="bg-red-900/20 border border-red-500/30 rounded-2xl p-3 text-center mb-3">
        <p class="text-red-400 text-sm font-bold">✕ ВИХІДНИЙ</p>
        <p class="text-gray-500 text-[10px] mt-0.5">Цього дня немає тренувань</p>
    </div>

    <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
        <div class="max-h-80 overflow-y-auto no-scrollbar">
            <template x-for="(row, ri) in grid" :key="ri">
                <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                    <div class="w-9 flex-shrink-0 flex items-center justify-end pr-1 text-[8px] font-bold text-gray-500 select-none cursor-pointer hover:text-white transition"
                         @click="toggleRow(row.lbl)">
                        <span x-text="parseInt(row.lbl)"></span>
                    </div>
                    <div class="flex-1 flex">
                        <template x-for="(c, ci) in row.cells" :key="ci">
                            <button @click="tap(c.mm)"
                                    class="flex-1 h-6 sm:h-7 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95 relative"
                                    :style="cellStyle(c.mm)"
                                    :title="title(c.mm)">
                                <span x-show="inSess(c.mm)"
                                      class="absolute inset-0 flex items-center justify-center text-[6px] font-black text-white leading-tight"
                                      style="text-shadow:0 1px 3px rgba(0,0,0,0.6)">Busy</span>
                                <span x-show="ci < row.cells.length - 1"
                                      class="absolute right-0 top-0 bottom-0 flex items-center pr-0.5 text-[6px] font-bold text-gray-400 pointer-events-none"
                                      x-text="':' + String(row.cells[ci+1].mm % 60)"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="flex flex-wrap items-center gap-2 mt-2 text-[10px] text-gray-500">
        <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm" style="background:#dc2626"></span> Зайнято</span>
        <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm" style="background:#3b82f6"></span> Вільно</span>
        <template x-for="loc in locs" :key="loc.id">
            <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm" :style="'background:' + (loc.color || '#3b82f6')"></span> Вільно на <span x-text="loc.name"></span></span>
        </template>
        <span class="text-gray-600">· крок <span x-text="availStep || 30"></span> хв</span>
    </div>

    <!-- Session details popup on busy slot -->
    <div x-show="busySession" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm" x-cloak x-transition @click.self="busySession = null">
        <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-5 border-b border-[#333] flex items-center justify-between">
                <h3 class="text-lg font-bold text-white truncate" x-text="busySession?.title || 'Сесія'"></h3>
                <button @click="busySession = null" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div class="p-5 space-y-4">
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span x-text="busySession?.startTime?.slice(0,5) + ' — ' + busySession?.endTime?.slice(0,5)"></span>
                </div>
                <div x-show="busySession?.description" class="text-sm text-gray-300 bg-[#262626] rounded-xl p-3">
                    <p x-text="busySession?.description"></p>
                </div>
                <div x-show="busySession?.confirmationStatus && busySession?.confirmationStatus !== 'NONE'" class="flex items-center gap-2 text-xs">
                    <span class="text-gray-500">Статус:</span>
                    <span class="font-bold"
                          :class="busySession?.confirmationStatus === 'CONFIRMED' ? 'text-green-400' : busySession?.confirmationStatus === 'REJECTED' ? 'text-red-400' : 'text-yellow-400'"
                          x-text="busySession?.confirmationStatus === 'CONFIRMED' ? 'Підтверджено' : busySession?.confirmationStatus === 'REJECTED' ? 'Відхилено' : 'Очікує'"></span>
                </div>
            </div>
            <div class="px-5 pb-5">
                <button @click="busySession = null" class="w-full py-3 rounded-xl text-sm font-bold text-white bg-[#333] hover:bg-[#444] transition-all">Закрити</button>
            </div>
        </div>
    </div>
</main>

    <!-- Floating save button -->
    <div x-show="hasUnsavedChanges && !saving"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 animate-bounce"
         x-cloak x-transition>
        <button @click="saveAll()"
                class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 transition-all active:scale-95 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
            Зберегти
        </button>
    </div>

    <!-- Saving spinner -->
    <div x-show="saving"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"
         x-cloak x-transition>
        <div class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 flex items-center gap-2">
            <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Збереження...
        </div>
    </div>

</body>
</html>
