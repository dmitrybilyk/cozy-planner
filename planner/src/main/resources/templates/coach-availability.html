<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мій графік</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased" x-data="app()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-14 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
        <a href="/planner" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-lg font-bold">Мій графік</h1>
    </div>
    <button @click="save()" :disabled="saving" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-lg disabled:opacity-50">
        <span x-show="!saving">Зберегти</span>
        <span x-show="saving">...</span>
    </button>
</header>

<main class="max-w-lg mx-auto p-4 pb-28">
    <div x-show="saved" class="bg-green-900/20 text-green-400 p-3 rounded-xl text-sm font-bold text-center mb-4">Збережено!</div>

    <div class="flex overflow-x-auto no-scrollbar mb-4 space-x-2">
        <template x-for="day in days" :key="day.ds">
            <button @click="sel(day.ds)"
                    class="flex-shrink-0 flex flex-col items-center px-4 py-2.5 rounded-2xl transition-all min-w-[60px]"
                    :class="day.ds === curDate ? 'bg-blue-600 text-white shadow-lg' : 'bg-[#262626] text-gray-400'">
                <span class="text-[9px] font-bold uppercase" x-text="day.wd"></span>
                <span class="text-xl font-black leading-tight" x-text="day.num"></span>
                <span class="text-[9px] font-bold mt-0.5" x-text="day.mo"></span>
                <span x-show="day.isToday" class="text-[7px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span>
            </button>
        </template>
    </div>

    <div class="bg-[#1a1a1a] rounded-2xl border border-[#2a2a2a] overflow-hidden">
        <div class="px-4 py-2 border-b border-[#2a2a2a] flex items-center justify-between gap-2">
            <span class="text-xs font-bold text-gray-500 whitespace-nowrap" x-text="curDate"></span>
            <select x-show="locs.length" x-model="curLoc" class="bg-[#262626] text-gray-300 text-xs rounded-xl px-2 py-1.5 border border-[#444] focus:outline-none max-w-[140px]">
                <option :value="null">Місце</option>
                <template x-for="l in locs" :key="l.id">
                    <option :value="l.id" x-text="l.name" :style="'color: ' + (l.color || '#3b82f6')"></option>
                </template>
            </select>
        </div>
        <div class="max-h-96 overflow-y-auto no-scrollbar">
            <template x-for="(row, ri) in grid" :key="ri">
                <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                    <div class="w-12 flex-shrink-0 flex items-start justify-end pr-2 pt-1 text-[10px] font-bold text-gray-600 select-none leading-none">
                        <span x-text="row.lbl"></span>
                    </div>
                    <div class="flex-1 flex">
                        <template x-for="(c, ci) in row.cells" :key="ci">
                            <button @click="tap(c.mm)"
                                    class="flex-1 h-8 sm:h-9 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95"
                                    :style="cellStyle(c.mm)"
                                    :title="title(c.mm)">
                            </button>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="flex items-center gap-3 mt-3 text-xs text-gray-500">
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#3b82f5"></span> Доступно</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#a855f780"></span> Тренування</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:#2a2a2a"></span> Вільно</span>
    </div>

    <div class="mt-6 bg-[#1e1e1e] border border-[#333] p-4 rounded-2xl">
        <div class="flex items-center justify-between mb-2">
            <p class="text-xs font-bold text-gray-500 uppercase">Постійне посилання</p>
            <button @click="mkToken()" x-show="!shareUrl" class="text-blue-400 text-xs font-bold">Створити</button>
        </div>
        <div x-show="shareUrl" class="space-y-2">
            <div class="flex items-center gap-2">
                <input type="text" :value="shareUrl" readonly @click="$el.select()" class="flex-1 bg-[#2a2a2a] text-gray-300 text-sm px-3 py-2 rounded-xl border border-[#444] focus:outline-none">
                <button @click="copyLink()" class="bg-[#333] hover:bg-[#444] text-white px-3 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all active:scale-95">
                    <span x-text="copied ? 'Скопійовано!' : 'Копіювати'"></span>
                </button>
            </div>
            <div class="flex items-center gap-2">
                <button @click="copyImageLink()" class="flex-1 bg-[#262626] hover:bg-[#333] text-gray-300 py-2 rounded-xl text-xs font-bold transition-all active:scale-95 border border-[#444]">
                    <span x-text="imgCopied ? 'Скопійовано!' : '📷 Копіювати картинку'"></span>
                </button>
            </div>
        </div>
        <p x-show="!shareUrl" class="text-xs text-gray-600">Після збереження створиться</p>
        <p x-show="shareUrl" class="text-xs text-gray-600 mt-1">Картинку можна надіслати в чат — відкривається без входу</p>
    </div>
</main>

<script th:inline="none">
function app() {
    const MON = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
    const WD = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
    const today = (d=>`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`)(new Date);

    return {
        mentorId: null, shareToken: null, shareUrl: '', copied: false, imgCopied: false,
        curDate: today, days: [], grid: [],
        cells: {}, sess: {}, locs: [], curLoc: null,
        saved: false, saving: false,

        init() {
            const now = new Date;
            for (let i = 0; i < 14; i++) {
                const d = new Date(now); d.setDate(now.getDate() + i);
                const ds = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
                this.days.push({ ds, wd: WD[(d.getDay()+6)%7], num: d.getDate(), mo: MON[d.getMonth()], isToday: ds === today });
            }
            for (let h = 6; h < 22; h++) {
                const cells = [{mm:h*60},{mm:h*60+30}];
                this.grid.push({ lbl: `${String(h).padStart(2,'0')}:00`, cells });
            }
            this.load();
        },

        getCurCells() { return this.cells[this.curDate] || []; },

        cellAt(mm) { return this.getCurCells().find(x => x.mm === mm); },

        inSess(mm) {
            return (this.sess[this.curDate] || []).some(s => {
                const [sh,sm] = s.startTime.split(':').map(Number);
                const [eh,em] = s.endTime.split(':').map(Number);
                return mm >= sh*60+sm && mm < eh*60+em;
            });
        },

        title(mm) {
            return `${String(Math.floor(mm/60)).padStart(2,'0')}:${String(mm%60).padStart(2,'0')}`;
        },

        tap(mm) {
            if (this.inSess(mm)) return;
            const arr = this.getCurCells();
            const idx = arr.findIndex(x => x.mm === mm);
            if (idx >= 0) {
                arr.splice(idx, 1);
            } else {
                arr.push({ mm, locId: this.curLoc });
            }
            this.cells[this.curDate] = [...arr];
        },

        cellStyle(mm) {
            if (this.inSess(mm)) return 'background:#a855f780';
            const c = this.cellAt(mm);
            if (!c) return 'background:#2a2a2a';
            if (c.locId) {
                const l = this.locs.find(x => x.id === c.locId);
                if (l && l.color) return `background:${l.color}80`;
            }
            return 'background:#3b82f5';
        },

        sel(d) { this.curDate = d; },

        async load() {
            const r = await fetch('/api/v1/me');
            if (!r.ok) { window.location.href = '/signin'; return; }
            const me = await r.json();
            if (!me.mentor || me.mentor.id < 0) { window.location.href = '/signin'; return; }
            this.mentorId = me.mentor.id;
            this.shareToken = me.mentor.shareToken;
            if (this.shareToken) this.shareUrl = window.location.origin + '/shared/' + this.shareToken;

            const sd = this.days[0].ds, ed = this.days[this.days.length-1].ds;
            const [lr, ar, sr] = await Promise.all([
                fetch(`/api/v1/mentors/${this.mentorId}/locations`),
                fetch(`/api/v1/coach/availability?startDate=${sd}&endDate=${ed}`),
                fetch(`/api/v1/coach/sessions?startDate=${sd}&endDate=${ed}`)
            ]);
            if (lr.ok) this.locs = await lr.json();

            if (ar.ok) {
                const g = {};
                for (const i of await ar.json()) {
                    if (!g[i.date]) g[i.date] = [];
                    const [sh,sm] = i.startTime.split(':').map(Number);
                    const [eh,em] = i.endTime.split(':').map(Number);
                    let t = sh*60+sm, end = eh*60+em;
                    while (t < end) {
                        g[i.date].push({ mm: t, locId: i.locationId });
                        t += 30;
                    }
                }
                this.cells = g;
            }

            if (sr.ok) {
                const g = {};
                for (const i of await sr.json()) {
                    if (!g[i.date]) g[i.date] = [];
                    g[i.date].push(i);
                }
                this.sess = g;
            }
        },

        async save() {
            this.saving = true;
            const all = [];
            for (const date in this.cells) {
                const arr = this.cells[date];
                if (!arr.length) continue;
                const sorted = [...arr].sort((a,b) => a.mm - b.mm);
                let cs = sorted[0].mm, ce = sorted[0].mm + 30, cl = sorted[0].locId;
                for (let i = 1; i < sorted.length; i++) {
                    if (sorted[i].mm === ce && sorted[i].locId === cl) {
                        ce = sorted[i].mm + 30;
                    } else {
                        all.push({ date, startTime: this.minStr(cs), endTime: this.minStr(ce), locationId: cl || null });
                        cs = sorted[i].mm; ce = sorted[i].mm + 30; cl = sorted[i].locId;
                    }
                }
                all.push({ date, startTime: this.minStr(cs), endTime: this.minStr(ce), locationId: cl || null });
            }
            const del = Object.keys(this.cells).filter(d => !this.cells[d].length);

            try {
                if (all.length) {
                    const r = await fetch('/api/v1/coach/availability', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(all) });
                    if (!r.ok) throw Error('POST fail');
                }
                if (del.length) {
                    const r = await fetch(`/api/v1/coach/availability?dates=${del.join(',')}`, { method:'DELETE' });
                    if (!r.ok) throw Error('DEL fail');
                }
                if (!this.shareToken) await this.mkToken();
                this.saved = true; setTimeout(() => this.saved = false, 3000);
            } catch(e) { console.error(e); }
            finally { this.saving = false; }
        },

        minStr(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; },

        async mkToken() {
            if (this.shareToken) return;
            const r = await fetch('/api/v1/coach/share-token', { method:'POST' });
            if (r.ok) { const d = await r.json(); this.shareToken = d.shareToken; this.shareUrl = window.location.origin + '/shared/' + this.shareToken; }
        },

        async copyLink() {
            try { await navigator.clipboard.writeText(this.shareUrl); this.copied = true; setTimeout(() => this.copied = false, 2000); }
            catch(e) { prompt('Скопіюйте:', this.shareUrl); }
        },
        async copyImageLink() {
            if (!this.shareToken) await this.mkToken();
            if (!this.shareToken) return;
            const imgUrl = window.location.origin + '/api/v1/shared/' + this.shareToken + '/image';
            try { await navigator.clipboard.writeText(imgUrl); this.imgCopied = true; setTimeout(() => this.imgCopied = false, 3000); }
            catch(e) { prompt('Скопіюйте посилання на картинку:', imgUrl); }
        }
    }
}
</script>
</body>
</html>
