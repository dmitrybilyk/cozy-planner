<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Майже готово!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
    <link rel="stylesheet" href="/css/setup.css" th:href="@{/css/setup.css(v=${appVersion})}">
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4 bg-[#0f0f0f] text-white"
      x-data="{
          loading: true,
          tgEnabled: false,
          tgConnected: false,
          tgLink: null,
          checking: false,
          _poll: null,
          mentorProfile: 'sport',
          traineeNoun() {
              const map = { sport: 'спортсменами', studying: 'учнями', psychology: 'клієнтами' };
              return map[this.mentorProfile] || 'учасниками';
          },
          async init() {
              try {
                  const [tgRes, meRes] = await Promise.all([
                      fetch('/api/v1/mentor/telegram/status'),
                      fetch('/api/v1/me')
                  ]);
                  const data = await tgRes.json();
                  this.tgEnabled = data.enabled;
                  this.tgConnected = data.connected;
                  this.tgLink = data.connectLink;
                  if (this.tgEnabled && !this.tgConnected && !this.tgLink) {
                      const gen = await fetch('/api/v1/mentor/telegram/generate-token', { method: 'POST' });
                      const gd = await gen.json();
                      if (gd.success) this.tgLink = gd.connectLink;
                  }
                  if (meRes.ok) {
                      const me = await meRes.json();
                      this.mentorProfile = me.mentorProfile || 'sport';
                  }
              } catch (e) {}
              this.loading = false;
              if (!this.tgEnabled) {
                  window.location.href = '/planner';
              }
          },
          openTelegram() {
              window.open(this.tgLink, '_blank');
              this.startPolling();
          },
          startPolling() {
              if (this._poll) return;
              this.checking = true;
              this._poll = setInterval(async () => {
                  try {
                      const res = await fetch('/api/v1/mentor/telegram/status');
                      const data = await res.json();
                      if (data.connected) {
                          this.tgConnected = true;
                          this.stopPolling();
                      }
                  } catch (e) {}
              }, 3000);
          },
          stopPolling() {
              if (this._poll) { clearInterval(this._poll); this._poll = null; }
              this.checking = false;
          }
      }">
    <div class="w-full max-w-sm space-y-8" x-show="!loading" x-cloak>

        <div class="text-center space-y-2">
            <div class="ig-ring mx-auto w-14 h-14 flex items-center justify-center">
                <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                    <span class="text-lg font-black italic ig-gradient-text">CP</span>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight" x-text="tgConnected ? 'Все готово!' : 'Майже готово!'"></h1>
            <p class="text-sm text-gray-400" x-text="tgConnected ? 'Telegram підключено, можна починати' : 'Підключи Telegram, щоб отримувати сповіщення'"></p>
        </div>

        <div class="space-y-4">

            <div x-show="tgConnected"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 class="bg-[#1a1a1a] border border-green-800 rounded-2xl px-5 py-4 flex items-center gap-3">
                <div class="text-green-400 text-2xl">✅</div>
                <div>
                    <div class="text-sm font-bold text-white">Telegram підключено</div>
                    <div class="text-xs text-gray-500 mt-0.5">Сповіщення про нові бронювання та підтвердження надходитимуть у Telegram</div>
                </div>
            </div>

            <div x-show="!tgConnected && tgEnabled" class="bg-[#1a1a1a] border border-[#2a2a2a] rounded-2xl px-5 py-5 space-y-4">
                <div class="flex items-start gap-3">
                    <div class="text-2xl">💬</div>
                    <div>
                        <div class="text-sm font-bold text-white">Telegram-сповіщення</div>
                        <div class="text-xs text-gray-400 mt-1 leading-relaxed"
                             x-text="'Отримуй повідомлення про нові бронювання та підтвердження прямо в Telegram. Спілкуйся з ' + traineeNoun() + ' та керуй взаємодією в одному місці.'">
                        </div>
                    </div>
                </div>
                <template x-if="tgLink">
                    <div class="space-y-2">
                        <button @click="openTelegram()"
                                class="flex items-center justify-center gap-2 w-full ig-gradient text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg hover:opacity-90 transition active:scale-[0.97]">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.54 13.93l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.834.947l-.226-.318z"/></svg>
                            Відкрити Telegram
                        </button>
                        <div x-show="checking" class="flex items-center justify-center gap-2 text-xs text-gray-500 py-1">
                            <div class="w-3 h-3 border border-gray-500 border-t-gray-300 rounded-full animate-spin"></div>
                            Очікую підключення...
                        </div>
                    </div>
                </template>
                <template x-if="!tgLink">
                    <div class="text-center text-xs text-gray-500 py-2">Telegram-бот не налаштовано</div>
                </template>
            </div>

        </div>

        <div class="space-y-3">
            <a href="/planner"
               class="block text-center w-full bg-[#1a1a1a] border border-[#2a2a2a] text-white py-4 rounded-2xl font-bold text-sm hover:border-[#3a3a3a] transition active:scale-[0.97]"
               x-text="tgConnected ? 'Відкрити додаток →' : 'Зробити пізніше'">
            </a>
        </div>

    </div>

    <div x-show="loading" class="flex items-center justify-center">
        <div class="w-8 h-8 border-2 border-gray-600 border-t-white rounded-full animate-spin"></div>
    </div>
</body>
</html>
