<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моя доступність</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/trainee-availability.js" th:src="@{/js/trainee-availability.js(v=${appVersion})}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
</head>
<body class="antialiased" x-data="availabilityApp()">

<header class="bg-[#1a1a1a]/95 border-b border-[#333] px-4 h-16 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-2">
        <h1 class="text-lg font-bold">Моя доступність</h1>
    </div>
    <div class="flex items-center gap-2">
        <template x-if="me.telegramEnabled && !me.telegramConnected && me.telegramConnectLink">
            <a :href="me.telegramConnectLink" target="_blank"
               class="bg-yellow-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap">
                📲 Під'єднати телеграм
            </a>
        </template>
        <template x-if="me.telegramConnected">
            <span class="text-green-400 text-xs font-bold">✓ TG</span>
        </template>

    </div>
</header>

<main class="max-w-lg mx-auto p-4 pb-24">
    <div x-show="saved" class="bg-green-900/20 text-green-400 p-3 rounded-xl text-sm font-bold text-center mb-4">Збережено!</div>



    <div class="flex overflow-x-auto no-scrollbar mb-6 space-x-2">
        <template x-for="day in days" :key="day.dateStr">
            <button @click="selectDate(day.dateStr)"
                    class="flex-shrink-0 flex flex-col items-center px-4 py-3 rounded-2xl transition-all"
                    :class="selectedDate === day.dateStr ? 'bg-blue-600 text-white' : (day.isWeekend ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')">
                <span class="text-xs font-bold uppercase" x-text="day.weekday"></span>
                <span class="text-lg font-black" x-text="day.dayNum"></span>
            </button>
        </template>
    </div>

    <div class="mb-4">
        <p class="text-xs font-bold text-gray-500 uppercase mb-3">Вільні години <span class="text-blue-400" x-text="selectedDate"></span></p>
        <div class="space-y-2">
            <template x-for="(slot, i) in currentSlots" :key="i">
                <div class="flex items-center justify-between bg-blue-900/20 border border-blue-500/30 rounded-xl px-4 py-3">
                    <span class="text-sm font-bold text-blue-300" x-text="slot.startTime + ' — ' + slot.endTime"></span>
                    <button @click="removeSlot(i)" class="text-red-400 text-xs font-bold uppercase">Видалити</button>
                </div>
            </template>
            <div x-show="currentSlots.length === 0" class="text-center py-6 text-gray-600 text-sm">Підкажіть <span x-text="mentorDative"></span>, коли ви маєте час.</div>
        </div>
    </div>

    <div>
        <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-bold text-gray-500 uppercase">Новий діапазон <span class="text-[11px] font-normal text-gray-600">· крок 30 хв</span></span>
            <span x-show="pickStart" class="text-xs font-bold text-yellow-400">Оберіть кінець</span>
        </div>
        <div class="grid grid-cols-4 gap-1.5 max-h-52 overflow-y-auto no-scrollbar">
            <template x-for="t in daySlots" :key="t">
                <button @click="pickSlot(t)" type="button"
                        class="py-2 rounded-xl font-bold text-xs sm:text-sm transition-all active:scale-95"
                        :class="getSlotClass(t)">
                    <span x-text="t"></span>
                </button>
            </template>
        </div>
    </div>
</main>

    <div x-show="hasUnsavedChanges && !saving"
         class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 animate-bounce"
         x-cloak x-transition>
        <button @click="saveAll()"
                class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 transition-all active:scale-95 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
            Зберегти
        </button>
    </div>

    <div x-show="saving"
         class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50"
         x-cloak x-transition>
        <div class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm shadow-2xl shadow-blue-600/30 flex items-center gap-2">
            <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Збереження...
        </div>
    </div>

<nav class="bottom-nav fixed bottom-0 inset-x-0 bg-[#1a1a1a]/95 border-t border-[#333] z-40">
    <div class="flex items-center justify-around max-w-lg mx-auto h-14">
        <div class="flex flex-col items-center gap-0.5 text-blue-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[11px] font-bold uppercase">Моя доступність</span>
        </div>
        <a :href="sessionsLink" class="flex flex-col items-center gap-0.5 text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <span class="text-[11px] font-bold uppercase" x-text="sessionsTabLabel"></span>
        </a>
    </div>
</nav>

</body>
</html>
