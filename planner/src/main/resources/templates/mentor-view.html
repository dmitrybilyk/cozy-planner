<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Planner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>(function(){var t=localStorage.getItem('cpTheme')||'default';document.documentElement.classList.add('theme-'+t);})();</script>
    <script src="/js/aphorisms-uk.js" th:src="@{/js/aphorisms-uk.js(v=${appVersion})}"></script>
    <!-- Module files must load before mentor-view.js (which merges them via window.plannerModules) -->
    <script defer src="/js/planner-utils.js" th:src="@{/js/planner-utils.js(v=${appVersion})}"></script>
    <script defer src="/js/planner-sessions.js" th:src="@{/js/planner-sessions.js(v=${appVersion})}"></script>
    <script defer src="/js/planner-trainees.js" th:src="@{/js/planner-trainees.js(v=${appVersion})}"></script>
    <script defer src="/js/planner-availability.js" th:src="@{/js/planner-availability.js(v=${appVersion})}"></script>
    <script defer src="/js/planner-settings.js" th:src="@{/js/planner-settings.js(v=${appVersion})}"></script>
    <script defer src="/js/mentor-view.js" th:src="@{/js/mentor-view.js(v=${appVersion})}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/shared.css" th:href="@{/css/shared.css(v=${appVersion})}">
    <link rel="stylesheet" href="/css/mentor-view.css" th:href="@{/css/mentor-view.css(v=${appVersion})}">
</head>
<body class="antialiased flex flex-col h-screen overflow-hidden" x-data="calendarApp()">

<!-- Loading overlay -->
<th:block th:replace="~{fragments/loading-overlay :: content}"/>

<!-- Onboarding intro -->
<th:block th:replace="~{fragments/intro-onboarding :: content}"/>

<!-- Tour overlay -->
<th:block th:replace="~{fragments/tour-overlay :: content}"/>

<!-- Header: profile bar + days strip -->
<th:block th:replace="~{fragments/header-nav :: content}"/>

<!-- Main scrollable content area -->
<main x-show="!loading" class="flex-1 overflow-y-auto" id="main-scroll">

    <!-- Pull-to-refresh indicator -->
    <div x-show="ptrRefreshing" x-cloak
         class="flex items-center justify-center gap-2 py-3 text-xs text-gray-500">
        <svg class="w-4 h-4 animate-spin text-blue-400" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
        </svg>
        <span>Оновлення…</span>
    </div>

    <!-- Tab: Day view -->
    <th:block th:replace="~{fragments/tab-feed :: content}"/>

    <!-- Tab: Agenda / Plan -->
    <th:block th:replace="~{fragments/tab-agenda :: content}"/>

    <!-- Tab: History -->
    <th:block th:replace="~{fragments/tab-history :: content}"/>

    <!-- Tab: Profile (settings) -->
    <th:block th:replace="~{fragments/tab-profile :: content}"/>

    <!-- Tab: Trainees + trainee form modal -->
    <th:block th:replace="~{fragments/tab-trainees :: content}"/>

    <!-- Tab: Locations + location form modal -->
    <th:block th:replace="~{fragments/tab-locations :: content}"/>

    <!-- Tab: Notifications -->
    <th:block th:replace="~{fragments/tab-notifications :: content}"/>

    <!-- Tab: Coach availability -->
    <th:block th:replace="~{fragments/tab-availability :: content}"/>

</main>

<!-- Session modal -->
<th:block th:replace="~{fragments/modal-session :: content}"/>

<!-- Plan sessions modal + availability popup + validation errors + confirm + refresh + notify + toast -->
<th:block th:replace="~{fragments/modal-plan :: content}"/>

<!-- Feedback, conversation, contact developer, iOS install modals -->
<th:block th:replace="~{fragments/modals-misc :: content}"/>

<!-- Wisdom button + popup + bottom navigation -->
<th:block th:replace="~{fragments/bottom-nav :: content}"/>

</body>
</html>
