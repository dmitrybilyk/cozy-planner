<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Planner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/mentor-view.css">
</head>
<body class="antialiased" x-data="calendarApp()">

<header class="bg-[#1a1a1a]/95 backdrop-blur-lg border-b border-[#333] sticky top-0 z-40 shadow-md">
    <div class="px-3 sm:px-4 h-14 sm:h-16 flex items-center justify-between">
        <div @click="showProfile = true" class="flex items-center space-x-2 sm:space-x-3 min-w-0 cursor-pointer hover:bg-white/5 rounded-lg px-2 py-1.5 transition">
            <div class="ig-ring w-7 h-7 sm:w-9 sm:h-9 flex items-center justify-center flex-shrink-0">
                <template x-if="photoUrl">
                    <img :src="photoUrl" class="w-full h-full rounded-full object-cover">
                </template>
                <template x-if="!photoUrl">
                    <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                        <span class="text-[8px] sm:text-[10px] font-black italic ig-gradient-text">CP</span>
                    </div>
                </template>
            </div>
            <div class="leading-tight truncate">
                <h1 class="text-[11px] sm:text-sm font-bold truncate" x-text="mentor.name || 'Cozy Planner'"></h1>
                <p x-show="user.email" class="text-[8px] sm:text-[9px] text-gray-500 font-medium truncate" x-text="user.email"></p>
            </div>
            <svg class="w-3 h-3 text-gray-500 flex-shrink-0 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
        </div>
        <div class="flex bg-[#262626] p-0.5 sm:p-1 rounded-xl flex-shrink-0">
            <button @click="currentView = 'feed'" class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'feed' ? 'bg-[#444] text-blue-400' : 'text-gray-500'" x-text="labels.day || 'День'"></button>
            <button @click="currentView = 'agenda'" class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'agenda' ? 'bg-[#444] text-blue-400' : 'text-gray-500'" x-text="labels.plan || 'План'"></button>
        </div>
         <form method="POST" action="/logout" id="logoutForm" class="hidden"></form>
         
         <button @click="showNotifications = !showNotifications" class="relative mr-1 text-lg">
             🔔
             <span x-show="unreadCount > 0" class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold rounded-full min-w-[14px] h-[14px] flex items-center justify-center px-1 leading-none" x-text="unreadCount"></span>
         </button>
          <div x-show="mentorTg.enabled" class="flex items-center mr-2">
              <template x-if="mentorTg.connected">
                  <span class="px-1.5 py-0.5 bg-green-900/30 text-green-400 rounded text-[10px] font-bold">TG</span>
              </template>
              <template x-if="!mentorTg.connected">
                  <button @click="generateMentorTelegramToken()" 
                          :class="mentorTg.copied ? 'bg-green-600' : (mentorTg.connectLink ? 'bg-orange-500' : 'bg-blue-600')"
                          class="px-1.5 py-0.5 text-white rounded text-[10px] font-bold">
                      <span x-show="mentorTg.copied">✓</span>
                      <span x-show="!mentorTg.copied">TG</span>
                  </button>
              </template>
          </div>
         
         <button onclick="document.getElementById('logoutForm').submit()" class="flex-shrink-0"><svg class="w-5 h-5 sm:w-6 sm:h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
    </div>
    <div class="px-2 sm:px-4 pb-2 sm:pb-3 flex gap-2">
        <button @click="openSessionModal()" :disabled="selectedDate < todayStr" class="flex-1 flex items-center justify-center bg-blue-600 hover:bg-blue-700 active:scale-[0.97] text-white py-3 rounded-2xl shadow-lg transition disabled:opacity-30 disabled:cursor-not-allowed disabled:active:scale-100" :title="labels.new_session || 'Нова сесія'">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
        <button @click="showManageTrainees = true" class="flex-1 flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 rounded-2xl transition" :title="labels.manage_trainees || 'Учні'">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <button @click="showManageLocations = true" class="flex-1 flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 rounded-2xl transition" :title="labels.locations || 'Місця'">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <a href="/coach/availability" class="flex-1 flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 rounded-2xl transition" :title="'Доступність ' + (labels.mentor || 'тренера').toLowerCase()">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </a>
        <button @click="showAvailabilityOverview = true" class="flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 px-3 rounded-2xl transition" :title="'Доступність ' + (labels.trainees || 'учнів').toLowerCase()">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </button>
    </div>
</header>

<div x-show="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60" style="top: 0; left: 0; width: 100%; height: 100%;">
    <div class="flex flex-col items-center gap-4">
        <svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="text-white text-lg font-bold">Завантаження…</span>
    </div>
</div>

<div x-show="currentView === 'feed'" class="bg-[#1a1a1a] border-b border-[#333]">
    <div id="calendar-container" class="flex overflow-x-auto no-scrollbar p-4 space-x-5 scroll-smooth" @wheel.passive="handleMouseScroll($event)">
         <template x-for="day in days" :key="day.dateStr">
            <button @click="selectedDate = day.dateStr; $nextTick(() => scrollToActive()); if (!loadedDates[day.dateStr]) loadDaySessions(day.dateStr)"
                    :id="'date-btn-' + day.dateStr"
                    class="flex-shrink-0 flex flex-col items-center min-w-[64px]"
                    :class="day.isMonday ? 'week-start' : ''">
                <div class="w-14 h-14 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                     :class="[selectedDate === day.dateStr ? 'ig-gradient shadow-lg' : (day.isWeekend ? 'bg-[#5a2525]' : 'bg-[#333]'), day.dateStr === todayStr ? 'today-marker' : '']">
                    <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                        <span class="text-[9px] font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                        <span class="text-sm font-bold text-white" x-text="day.dayNum"></span>
                    </div>
                </div>
                <span x-show="day.dateStr === todayStr" class="text-[7px] font-black text-white uppercase mt-1 tracking-tighter" x-text="labels.today || 'Сьогодні'"></span>
                <div x-show="hasSessionOn(day.dateStr)" class="w-1 h-1 bg-blue-500 rounded-full mt-0.5"></div>
            </button>
        </template>
    </div>
</div>

<div x-show="currentView === 'agenda'" class="bg-[#1a1a1a] border-b border-[#333] p-4 overflow-x-auto no-scrollbar flex space-x-2">
    <button @click="toggleTraineeFilter(null)" class="px-5 py-2.5 rounded-full text-sm sm:text-base font-bold whitespace-nowrap transition" :class="selectedTraineeFilters.length === 0 ? 'bg-white text-black' : 'bg-[#262626] text-gray-400'" x-text="labels.all_trainees || 'Всі учні'"></button>
    <template x-for="trainee in trainees" :key="trainee.id">
        <button @click="toggleTraineeFilter(trainee.id)" class="px-5 py-2.5 rounded-full text-sm sm:text-base font-bold whitespace-nowrap transition border border-[#333]" :class="selectedTraineeFilters.includes(trainee.id) ? 'bg-blue-600 text-white border-blue-600' : 'bg-[#1a1a1a] text-gray-400'" x-text="trainee.name"></button>
    </template>
</div>

<div x-show="showNotifications" class="fixed inset-0 z-50 flex justify-end" @click.away="showNotifications = false" x-cloak x-transition>
    <div class="bg-[#1a1a1a] border-l border-[#333] w-full max-w-sm h-full overflow-y-auto shadow-2xl">
        <div class="flex items-center justify-between px-4 py-3 border-b border-[#333] sticky top-0 bg-[#1a1a1a] z-10">
            <h3 class="font-bold text-sm">🔔 Сповіщення</h3>
            <div class="flex gap-2">
                <template x-if="unreadCount > 0">
                    <button @click="markAllNotificationsRead()" class="text-[11px] font-bold text-blue-400 uppercase">Прочитати всі</button>
                </template>
                <button @click="showNotifications = false" class="text-gray-500 text-sm font-bold">✕</button>
            </div>
        </div>
        <div x-show="notifications.length === 0" class="text-center py-20 text-gray-600 text-sm">Немає сповіщень.</div>
        <div class="space-y-1 p-2">
            <template x-for="n in notifications" :key="n.id">
                <div @click="markNotificationRead(n.id)"
                     class="rounded-xl p-3 border cursor-pointer transition-all"
                     :class="n.isRead ? 'border-transparent opacity-50' : 'border-blue-500/30 bg-[#222]'">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-white" x-text="n.title"></p>
                            <p class="text-xs text-gray-300 mt-0.5" x-text="n.message"></p>
                            <p class="text-[10px] text-gray-400 mt-1" x-text="n.createdAt ? n.createdAt.slice(0, 16).replace('T', ' ') : ''"></p>
                        </div>
                        <template x-if="!n.isRead">
                            <span class="w-2.5 h-2.5 rounded-full bg-blue-400 flex-shrink-0 mt-1.5"></span>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<main class="max-w-2xl mx-auto p-4 pb-24">
    <div x-show="currentView === 'feed'">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-sm sm:text-base font-black text-gray-500 uppercase tracking-widest" x-text="formatDisplayDate(selectedDate)"></h2>
            <button @click="selectedDate = todayStr; $nextTick(() => scrollToToday())" class="text-xs sm:text-sm font-bold text-blue-400 uppercase" x-text="labels.today || 'Сьогодні'"></button>
        </div>
        <div class="space-y-4">
            <template x-for="(session, index) in filteredSessions" :key="session.id">
                <div>
                    <div x-show="showNowLineAfter(session, filteredSessions)"
                         class="my-3 flex items-center gap-2">
                        <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                        <span class="text-[9px] font-bold text-red-500 uppercase tracking-wider flex-shrink-0 px-1">● NOW</span>
                        <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                    </div>
                    <div draggable="true" @dragstart="dragStart($event, index)" @dragend="dragEnd" @dragover.prevent @drop="drop($event, targetIndex(session.id))"
                         @click="handleCardClick(session, index)"
                         :data-session-id="session.id"
                         :id="'session-card-' + session.id"
                         class="rounded-3xl p-5 shadow-sm card-hover fade-in relative overflow-hidden"
                         :class="[draggedIndex === index ? 'dragging' : '', getCardBorderClass(session)]"
                         :style="'border-left: 5px solid ' + (session.color || '#3b82f6')">
                        <div x-show="isSessionNow(session)" 
                             class="absolute inset-0 bg-gradient-to-r from-red-500/5 to-transparent pointer-events-none"></div>
                        <div class="flex items-center space-x-4">
                            <div class="relative flex flex-col items-center justify-center rounded-2xl px-3 py-2 min-w-[70px] border border-[#333]"
                                 :style="'background: ' + (session.color || '#3b82f6') + '33'">
                                <span x-show="isSessionNow(session)" 
                                      class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span>
                                <span class="text-xl sm:text-2xl font-black leading-none" :style="'color: ' + (session.color || '#3b82f6')" x-text="session.time + ' — ' + (session.endTime || '')"></span>
                                <span class="text-[9px] font-bold text-gray-500 mt-0.5" x-text="sessionDuration(session)"></span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <p class="text-base sm:text-lg font-bold text-gray-100 truncate" x-text="session.title"></p>
                                    <span x-show="isSessionNow(session)" 
                                          class="text-[9px] font-bold text-red-500 uppercase tracking-wider animate-pulse flex-shrink-0">● NOW</span>
                                </div>
                                <p class="text-sm text-gray-500 italic truncate" x-text="session.description"></p>
                                <div class="flex flex-wrap gap-1 mt-2">
                                    <template x-for="aId in session.traineeIds"><span class="inline-flex items-center gap-1 text-xs sm:text-sm bg-[#333] px-2.5 py-0.5 rounded-full font-semibold text-gray-300"><span :class="isAvailable(aId, session.date)?.length > 0 ? 'w-1.5 h-1.5 rounded-full bg-green-500' : isAvailable(aId, session.date) !== null ? 'w-1.5 h-1.5 rounded-full bg-red-500' : 'w-1.5 h-1.5 rounded-full bg-gray-600'" x-text="''"></span><span x-text="getTraineeName(aId)"></span></span></template>
                                </div>
                                <div x-show="session.confirmationStatus === 'PENDING'" class="flex flex-wrap gap-1 mt-1">
                                    <span class="inline-flex items-center gap-1 text-[10px] font-bold uppercase px-2 py-0.5 rounded-full"
                                          :class="getConfirmationBadgeClass(session.confirmationStatus)">
                                        <span x-text="getConfirmationLabel(session.confirmationStatus)"></span>
                                    </span>
                                </div>
                                <div x-show="getLocationName(session.locationId)" class="mt-1.5 flex items-center space-x-1">
                                    <span class="w-2 h-2 rounded-full" :style="'background: ' + (session.color || '#3b82f6')"></span>
                                    <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(session.locationId)"></span>
                                </div>
                                <div class="flex items-center gap-3 mt-2">
                                    <button @click.stop="copySession(session)" class="text-blue-400 hover:text-blue-300 transition" title="Копіювати">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                    </button>
                                    <button @click.stop="exportToGCal(session)" title="Google Календар">
                                        <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H5V8h14v11z" fill="#4285F4"/><rect x="7" y="10" width="4" height="4" rx="0.5" fill="#EA4335"/><rect x="13" y="10" width="4" height="4" rx="0.5" fill="#FBBC04"/><rect x="7" y="16" width="4" height="4" rx="0.5" fill="#34A853"/><rect x="13" y="16" width="4" height="4" rx="0.5" fill="#4285F4"/></svg>
                                    </button>
                                </div>
                                <div x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING'" class="flex gap-2 mt-2">
                                    <button @click.stop="confirmSession(session.id)" class="flex-1 py-1.5 bg-green-600/30 text-green-400 rounded-xl text-[10px] font-bold uppercase">Підтвердити</button>
                                    <button @click.stop="rejectSession(session.id)" class="flex-1 py-1.5 bg-red-600/30 text-red-400 rounded-xl text-[10px] font-bold uppercase">Відмінити</button>
                                </div>
                                <div x-show="session.createdBy === 'COACH' && (session.confirmationStatus === 'NONE' || session.confirmationStatus === 'REJECTED')" class="mt-2">
                                    <button @click.stop="requestTraineeConfirmation(session)" class="text-[10px] font-bold text-yellow-400 uppercase tracking-wider">Запитати підтвердження учня</button>
                                </div>
                            </div>
                            <div class="flex flex-col items-center gap-1 flex-shrink-0 ml-1">
                                <template x-for="(icon, i) in getSessionIcons(session, index)" :key="i">
                                    <span class="text-base sm:text-lg" x-text="icon"></span>
                                </template>
                                <button @click.stop="handleConfirmAction(session)"
                                        x-show="session.createdBy === 'COACH' && session.confirmationStatus === 'NONE'"
                                        class="text-gray-500 hover:text-gray-300 transition" title="Запитати підтвердження">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
                                </button>
                                <span x-show="session.confirmationStatus === 'PENDING'"
                                      class="text-yellow-500" title="Очікує підтвердження">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                </span>
                                <span x-show="session.confirmationStatus === 'CONFIRMED'"
                                      class="text-green-500" title="Підтверджено">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                </span>
                                <span x-show="session.confirmationStatus === 'REJECTED'"
                                      class="text-red-500" title="Відхилено">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredSessions.length === 0" class="text-center py-20 text-gray-600 text-sm italic" x-text="labels.no_sessions || 'Немає тренувань на цей день'"></div>
        </div>
    </div>

    <div x-show="currentView === 'agenda'" class="space-y-10">
        <template x-for="dateGroup in agendaGroups" :key="dateGroup.date">
            <div class="space-y-4">
                <button @click="goToDay(dateGroup.date)" class="sticky top-[108px] sm:top-[116px] bg-[#121212] py-2 z-10 w-full text-left flex items-center justify-between">
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest" x-text="formatDisplayDate(dateGroup.date)"></span>
                    <span x-show="dateGroup.date === todayStr" class="text-[9px] font-black text-white bg-[#333] px-2 py-0.5 rounded" x-text="labels.today || 'СЬОГОДНІ'"></span>
                </button>
                <div x-show="dateGroup.items.length === 0" class="text-center py-6 text-gray-600 text-sm italic">Немає тренувань</div>
                <div class="space-y-3">
                    <template x-for="(session, index) in dateGroup.items" :key="session.id">
                        <div>
                            <div x-show="showNowLineAfter(session, dateGroup.items)"
                                 class="my-2 flex items-center gap-2">
                                <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                                <span class="text-[9px] font-bold text-red-500 uppercase tracking-wider flex-shrink-0 px-1">● NOW</span>
                                <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                            </div>
                             <div @click="handleCardClick(session, index)"
                                  :data-session-id="session.id"
                                  :id="'agenda-card-' + session.id"
                                  class="rounded-2xl p-4 shadow-sm card-hover relative overflow-hidden"
                                  :class="[getAgendaCardClass(session)]"
                                  :style="'border-left: 4px solid ' + (session.color || '#3b82f6')">
                                <div x-show="isSessionNow(session)" 
                                     class="absolute inset-0 bg-gradient-to-r from-red-500/5 to-transparent pointer-events-none"></div>
                                <div class="flex items-center space-x-4 min-w-0 flex-1">
                                    <span class="text-sm font-black text-white flex-shrink-0" x-text="session.time"></span>
                                    <div class="min-w-0 flex-1">
                                        <div class="flex items-center gap-2">
                                            <p class="text-base sm:text-lg font-bold text-gray-200 truncate" x-text="session.title"></p>
                                            <span x-show="isSessionNow(session)" 
                                                  class="text-[9px] font-bold text-red-500 uppercase tracking-wider animate-pulse flex-shrink-0">● NOW</span>
                                        </div>
                                        <p class="text-xs sm:text-sm text-gray-500 truncate" x-text="session.traineeIds.map(id => getTraineeName(id)).join(', ')"></p>
                                        <div class="flex flex-wrap gap-1 mt-1">
                                            <span x-show="session.confirmationStatus"
                                                  class="inline-flex items-center gap-1 text-[9px] font-bold uppercase px-1.5 py-0.5 rounded-full"
                                                  :class="getConfirmationBadgeClass(session.confirmationStatus)">
                                                <span x-text="getConfirmationLabel(session.confirmationStatus)"></span>
                                            </span>
                                        </div>
                                        <div x-show="getLocationName(session.locationId)" class="flex items-center space-x-1 mt-1">
                                            <span class="w-2 h-2 rounded-full" :style="'background: ' + (session.color || '#3b82f6')"></span>
                                            <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(session.locationId)"></span>
                                        </div>
                                        <div x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING'" class="flex gap-2 mt-2">
                                            <button @click.stop="confirmSession(session.id)" class="flex-1 py-1 bg-green-600/30 text-green-400 rounded-lg text-[9px] font-bold uppercase">Підтвердити</button>
                                            <button @click.stop="rejectSession(session.id)" class="flex-1 py-1 bg-red-600/30 text-red-400 rounded-lg text-[9px] font-bold uppercase">Відмінити</button>
                                        </div>
                                        <div x-show="session.createdBy === 'COACH' && (session.confirmationStatus === 'NONE' || session.confirmationStatus === 'REJECTED')" class="mt-1">
                                            <button @click.stop="requestTraineeConfirmation(session)" class="text-[9px] font-bold text-yellow-400 uppercase tracking-wider">Зап. підтв.</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-1 ml-2 flex-shrink-0">
                                    <template x-for="(icon, i) in getSessionIcons(session, index)" :key="i">
                                        <span class="text-sm sm:text-base" x-text="icon"></span>
                                    </template>
                                    <button @click.stop="handleConfirmAction(session)"
                                            x-show="session.createdBy === 'COACH' && session.confirmationStatus === 'NONE'"
                                            class="text-gray-500 hover:text-gray-300 transition" title="Запитати підтвердження">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
                                    </button>
                                    <span x-show="session.confirmationStatus === 'PENDING'"
                                          class="text-yellow-500" title="Очікує підтвердження">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    </span>
                                    <span x-show="session.confirmationStatus === 'CONFIRMED'"
                                          class="text-green-500" title="Підтверджено">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    </span>
                                    <span x-show="session.confirmationStatus === 'REJECTED'"
                                          class="text-red-500" title="Відхилено">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    </span>
                                </div>
                                <button @click.stop="copySession(session)" class="ml-2 flex-shrink-0 text-blue-400 hover:text-blue-300 transition" title="Копіювати">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                </button>
                                <button @click.stop="exportToGCal(session)" class="ml-2 flex-shrink-0" title="Google Календар">
                                    <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H5V8h14v11z" fill="#4285F4"/><rect x="7" y="10" width="4" height="4" rx="0.5" fill="#EA4335"/><rect x="13" y="10" width="4" height="4" rx="0.5" fill="#FBBC04"/><rect x="7" y="16" width="4" height="4" rx="0.5" fill="#34A853"/><rect x="13" y="16" width="4" height="4" rx="0.5" fill="#4285F4"/></svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
        <div x-show="hasMoreDays" class="text-center py-4">
            <button @click="loadNextDays(7)" :disabled="loadingMore"
                    class="px-8 py-3 bg-[#262626] hover:bg-[#333] rounded-2xl text-sm font-bold text-gray-300 transition disabled:opacity-40">
                <span x-show="!loadingMore">Завантажити ще</span>
                <span x-show="loadingMore">Завантаження…</span>
            </button>
        </div>
    </div>
</main>

<!-- ПРОФІЛЬ ТРЕНЕРА -->
<div x-show="showProfile" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>
    <header class="px-4 h-16 flex items-center justify-between border-b border-[#333]">
        <button @click="showProfile = false" class="text-blue-400 font-bold">Назад</button>
        <h3 class="font-bold">Профіль</h3>
        <div class="w-10"></div>
    </header>
    
    <div class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
        <!-- Інформація про тренера -->
        <div class="bg-[#1a1a1a] rounded-2xl p-4 sm:p-5 border border-[#333]">
            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-4">Інформація</h4>
            
            <div class="flex items-center gap-4 mb-5">
                <div class="ig-ring w-16 h-16 flex items-center justify-center flex-shrink-0">
                    <template x-if="photoUrl">
                        <img :src="photoUrl" class="w-full h-full rounded-full object-cover">
                    </template>
                    <template x-if="!photoUrl">
                        <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                            <span class="text-lg font-black italic ig-gradient-text">CP</span>
                        </div>
                    </template>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-base sm:text-lg" x-text="mentor.name || 'Ментор'"></p>
                    <p x-show="user.email" class="text-gray-500 text-sm" x-text="user.email"></p>
                    <label class="inline-block mt-2 text-[11px] font-bold text-blue-400 uppercase cursor-pointer">
                        <input type="file" accept="image/*" @change="uploadPhoto($event)" class="hidden">
                        Завантажити фото
                    </label>
                </div>
            </div>
        </div>

        <!-- Робочі години -->
        <div class="bg-[#1a1a1a] rounded-2xl p-4 sm:p-5 border border-[#333]">
            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-4">🕐 Робочі години (щодня)</h4>
            <div class="flex items-center gap-3">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-gray-600 uppercase mb-1 block">Початок</label>
                    <input type="time" x-model="workStart" @change="saveWorkHours()"
                           class="w-full bg-[#262626] text-gray-200 text-sm px-3 py-2 rounded-xl border border-[#444] focus:outline-none focus:border-blue-500">
                </div>
                <span class="text-gray-600 mt-5">—</span>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-gray-600 uppercase mb-1 block">Кінець</label>
                    <input type="time" x-model="workEnd" @change="saveWorkHours()"
                           class="w-full bg-[#262626] text-gray-200 text-sm px-3 py-2 rounded-xl border border-[#444] focus:outline-none focus:border-blue-500">
                </div>
            </div>
        </div>

        <!-- Telegram -->
        <div class="bg-[#1a1a1a] rounded-2xl p-4 sm:p-5 border border-[#333]">
            <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-4">
                <span class="mr-1">📱</span> Telegram
            </h4>
            
            <template x-if="!mentorTg.enabled">
                <p class="text-gray-500 text-sm">Telegram не налаштовано.</p>
            </template>
            
            <template x-if="mentorTg.enabled && mentorTg.connected">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span>
                        <span class="text-green-400 font-medium">Підключено</span>
                        <span x-show="mentorTg.username" class="text-gray-500" x-text="'@' + mentorTg.username"></span>
                    </div>
                </div>
            </template>
            
            <template x-if="mentorTg.enabled && !mentorTg.connected">
                <div class="space-y-3">
                    <p class="text-gray-400 text-sm" x-text="labels.tg_connect_prompt || 'Підключить телеграм, щоб вмикнути сповіщення'"></p>
                    
                    <button @click="generateMentorTelegramToken()" 
                            :class="mentorTg.copied ? 'bg-green-600' : (mentorTg.connectLink ? 'bg-orange-500' : 'bg-blue-600')"
                            class="w-full flex items-center justify-center gap-2 text-white py-3 rounded-xl font-bold transition active:scale-[0.97]">
                        <span x-show="mentorTg.copied">✓</span>
                        <span x-show="!mentorTg.copied && mentorTg.connectLink">🔗</span>
                        <span x-show="!mentorTg.copied && !mentorTg.connectLink">📲</span>
                        <span x-show="mentorTg.copied">Скопійовано!</span>
                        <span x-show="!mentorTg.copied && mentorTg.connectLink">Копіювати посилання</span>
                        <span x-show="!mentorTg.copied && !mentorTg.connectLink">Під'єднати Телеграм</span>
                    </button>
                    
                    <p x-show="mentorTg.connectLink && !mentorTg.copied" class="text-gray-600 text-[10px] text-center">
                        Натисніть, щоб скопіювати посилання для підключення
                    </p>
                </div>
            </template>
        </div>
        
        <!-- Вихід -->
        <div class="pt-4 space-y-3">
            <form method="POST" action="/logout" class="w-full">
                <button type="submit" class="w-full flex items-center justify-center gap-2 bg-red-900/30 text-red-400 py-3 rounded-xl font-bold transition hover:bg-red-900/50 active:scale-[0.97]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span>Вийти</span>
                </button>
            </form>
            <button @click="startFresh()" 
                    class="w-full flex items-center justify-center gap-2 bg-orange-900/30 text-orange-400 py-3 rounded-xl font-bold transition hover:bg-orange-900/50 active:scale-[0.97]">
                <span>🔄</span>
                <span>Почати спочатку</span>
            </button>
        </div>
    </div>
</div>

<!-- МЕНЕДЖЕР АТЛЕТІВ (ПОВНОЕКРАННИЙ) -->
<div x-show="showManageTrainees" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>
    <header class="px-4 h-16 flex items-center justify-between border-b border-[#333]">
        <button @click="showManageTrainees = false" class="text-blue-400 font-bold" x-text="labels.back || 'Назад'"></button>
        <h3 class="font-bold" x-text="labels.team || 'Команда'"></h3>
        <div class="w-10"></div>
    </header>
    <div class="p-6 space-y-3 bg-[#1a1a1a] border-b border-[#333]">
        <div x-show="editingTraineeId || showCreateForm" class="space-y-3">
            <div class="flex items-center gap-4">
                <div class="relative flex-shrink-0">
                    <div x-show="traineeForm.photoBase64" class="w-20 h-20 rounded-2xl bg-gray-700 overflow-hidden">
                        <img :src="traineeForm.photoBase64" class="w-full h-full object-cover">
                    </div>
                    <div x-show="!traineeForm.photoBase64" class="w-20 h-20 rounded-2xl bg-gray-700 flex items-center justify-center text-gray-400 text-3xl">
                        👤
                    </div>
                    <label class="absolute -bottom-1 -right-1 w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm cursor-pointer shadow-lg">
                        <span>📷</span>
                        <input type="file" accept="image/*" class="hidden" @change="handleTraineePhotoSelect($event)">
                    </label>
                </div>
                <div class="flex-1 space-y-3">
                    <input type="text" x-model="traineeForm.name" :placeholder="labels.trainee_name_placeholder || 'ПІБ учня'" class="w-full text-base">
                    <input type="text" x-model="traineeForm.description" :placeholder="labels.trainee_description_placeholder || 'Примітка'" class="w-full text-base">
                </div>
            </div>
            <div x-show="traineeForm.photoBase64" class="text-center">
                <button @click="traineeForm.photoBase64 = null" type="button" class="text-red-400 text-xs font-bold uppercase">Видалити фото</button>
            </div>
            <button @click="saveTrainee()" :disabled="!traineeForm.name || traineeForm.name.trim() === ''" class="w-full ig-gradient text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs sm:text-sm shadow-lg disabled:opacity-50 disabled:cursor-not-allowed" x-text="editingTraineeId ? (labels.update_trainee || 'Оновити') : (labels.add_trainee || 'Додати учня')"></button>
        </div>
        <div x-show="!(editingTraineeId || showCreateForm)" class="text-center">
            <button @click="openCreateTraineeForm()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs sm:text-sm shadow-lg transition active:scale-[0.97]">+ Створити учня</button>
        </div>
    </div>
     <div class="flex-1 overflow-y-auto p-4 space-y-3">
         <input type="text" x-model="traineeSearch" :placeholder="labels.trainee_search || 'Пошук учнів...'" class="w-full text-base sticky top-0 z-10">
         <template x-for="trainee in filteredTrainees" :key="trainee.id">
             <div class="p-4 bg-[#1c1c1c] border border-[#333] rounded-3xl">
                 <div class="flex items-center justify-between">
                     <div class="flex items-start gap-3 min-w-0 flex-1">
                         <div class="w-12 h-12 rounded-2xl bg-gray-700 flex-shrink-0 overflow-hidden">
                             <template x-if="trainee.photoBase64">
                                 <img :src="trainee.photoBase64" class="w-full h-full object-cover">
                             </template>
                             <template x-if="!trainee.photoBase64">
                                 <div class="w-full h-full flex items-center justify-center text-gray-400 text-xl">👤</div>
                             </template>
                         </div>
                         <div class="min-w-0 flex-1">
                             <div class="flex items-center gap-2 flex-wrap">
                                 <span :class="isAvailable(trainee.id, selectedDate)?.length > 0 ? 'w-2.5 h-2.5 rounded-full bg-green-500 flex-shrink-0' : isAvailable(trainee.id, selectedDate) !== null ? 'w-2.5 h-2.5 rounded-full bg-red-500 flex-shrink-0' : 'w-2.5 h-2.5 rounded-full bg-gray-600 flex-shrink-0'"></span>
                                 <p class="text-base sm:text-lg font-bold text-gray-100" x-text="trainee.name"></p>
                                 <template x-if="trainee.telegramEnabled">
                                     <span :class="trainee.telegramConnected ? 'bg-green-900/30 text-green-400' : 'bg-yellow-900/30 text-yellow-400'" 
                                           class="flex items-center gap-1 px-2 py-0.5 rounded-full text-[9px] font-bold uppercase">
                                         <span x-text="trainee.telegramConnected ? '✓ TG' : '! TG'"></span>
                                         <span x-show="trainee.telegramUsername" class="opacity-60" x-text="'@' + trainee.telegramUsername"></span>
                                     </span>
                                 </template>
                             </div>
                             <p class="text-sm text-gray-500 truncate" x-text="trainee.description"></p>
                         </div>
                     </div>
                     <div class="flex flex-col items-end gap-1 flex-shrink-0 ml-2">
                         <div class="flex space-x-4 text-xs sm:text-sm font-black uppercase">
                             <button @click="editTrainee(trainee)" class="text-blue-400">Правка</button>
                             <button @click="askDeleteTrainee(trainee.id)" class="text-red-500">Видалити</button>
                         </div>
                     </div>
                 </div>
                  <div class="flex items-center justify-between mt-3 pt-3 border-t border-[#292929]">
                      <div class="flex items-center gap-2 flex-wrap">

                           <button @click="generateTraineeLink(trainee)" class="px-3 py-1.5 rounded-lg text-[11px] font-bold text-orange-400 uppercase tracking-wider" x-text="traineeLinks[trainee.id] ? '✓ Посилання скопійовано!' : '🔗 Посилання учня'"></button>
                           <template x-if="trainee.telegramEnabled && !trainee.telegramConnected">
                               <button @click="generateInvite(trainee.id)" class="px-3 py-1.5 rounded-lg text-[11px] font-bold text-green-400 uppercase tracking-wider" x-text="inviteUrls[trainee.id] ? '✓ Скопійовано!' : '🌐 Запросити в TG'"></button>
                           </template>
                            <div class="flex items-center gap-1.5" x-show="trainee.telegramConnected">
                                <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer select-none" 
                                       :class="!trainee.telegramConnected ? 'text-gray-600' : ''">

                                          class="w-4 h-4 rounded cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed">
                                   Доступність у week-end
                                 </label>
                            </div>
                            <div class="flex items-center gap-1.5" x-show="trainee.telegramConnected">
                                <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer select-none" 
                                       :class="!trainee.telegramConnected ? 'text-gray-600' : ''">
                                   <input type="checkbox" x-model="trainee.sessionReminderEnabled" 
                                          @change="toggleSessionReminder(trainee)"
                                          :disabled="!trainee.telegramConnected"
                                          class="w-4 h-4 rounded cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed">
                                   <span x-text="labels.remind_session_short || '⏰ Нагадування за 1 год'"></span>
                                 </label>
                            </div>
                     </div>
                     <div x-show="trainee.telegramEnabled && trainee.telegramConnected" class="flex items-center gap-2">
                         <button @click="openNotifyModal(trainee)" 
                                 x-bind:disabled="notifyingTrainees[trainee.id] === true"
                                 :class="notifyingTrainees[trainee.id] === true ? 'bg-gray-700 text-gray-500' : (notifySuccess[trainee.id] === true ? 'bg-green-900/50 text-green-400' : 'bg-blue-900/50 text-blue-400')"
                                 class="px-3 py-1.5 rounded-lg text-[11px] font-bold uppercase tracking-wider disabled:opacity-50 cursor-pointer">
                              <span x-show="notifyingTrainees[trainee.id] === true" x-text="labels.sending || 'Відправка...'"></span>
                              <span x-show="notifySuccess[trainee.id] === true">✓</span>
                              <span x-show="notifyingTrainees[trainee.id] !== true && notifySuccess[trainee.id] !== true" x-text="labels.notify_availability || 'Запитати Доступність'"></span>
                         </button>
                     </div>
                 </div>
                <div x-show="!!notifyErrors[trainee.id]" class="mt-2 text-[10px] text-red-400 font-medium" x-text="notifyErrors[trainee.id]"></div>
            </div>
        </template>
    </div>
</div>

<div x-show="showManageLocations" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>

    <div class="p-6 space-y-3 bg-[#1a1a1a] border-b border-[#333]">

            <span class="text-sm text-gray-400" x-text="labels.color || 'Колір'"></span>
        </div>
        <button @click="saveLocation()" class="w-full ig-gradient text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs sm:text-sm shadow-lg" x-text="editingLocationId ? (labels.update_trainee || 'Оновити') : (labels.add_location || 'Додати локацію')"></button>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-3">
        <template x-for="location in locations" :key="location.id">
            <div class="flex items-center justify-between p-4 bg-[#1c1c1c] border border-[#333] rounded-3xl"
                 :style="'border-left: 5px solid ' + (location.color || '#3b82f6')">
                <div class="min-w-0">
                    <p class="text-base sm:text-lg font-bold text-gray-100" x-text="location.name"></p>
                    <p class="text-sm text-gray-500 truncate" x-text="location.description"></p>
                </div>
                <div class="flex space-x-6 text-xs sm:text-sm font-black uppercase flex-shrink-0">
                    <button @click="editLocation(location)" class="text-blue-400">Правка</button>
                    <button @click="askDeleteLocation(location.id)" class="text-red-500">Видалити</button>
                </div>
            </div>
        </template>
    </div>
</div>

<!-- ПЕРЕГЛЯД ЗАЙНЯТОСТІ АТЛЕТІВ -->
<div x-show="showAvailabilityOverview" class="fixed inset-0 z-[60] bg-[#121212] flex flex-col" x-cloak x-transition>
    <header class="px-4 h-16 flex items-center justify-between border-b border-[#333]">
        <button @click="showAvailabilityOverview = false" class="text-blue-400 font-bold" x-text="labels.back || 'Назад'"></button>
        <h3 class="font-bold" x-text="labels.availability_overview || 'Зайнятість учнів'"></h3>
        <div class="w-10"></div>
    </header>
    <div class="flex-1 overflow-y-auto p-4 space-y-3">
        <input type="text" x-model="traineeSearch" placeholder="🔍 Пошук учня..." class="w-full bg-[#262626] text-gray-200 text-sm px-4 py-2.5 rounded-xl border border-[#444] focus:outline-none focus:border-blue-500 mb-2">
        <template x-for="trainee in filteredTrainees" :key="trainee.id">
            <div class="bg-[#1c1c1c] border border-[#333] rounded-3xl p-4">
                <div class="flex items-center justify-between mb-2">
                    <div class="font-bold text-gray-100" x-text="trainee.name"></div>
                    <div x-show="trainee.telegramEnabled && trainee.telegramConnected">
                        <button @click="openNotifyModal(trainee)"
                                :disabled="notifyingTrainees[trainee.id] === true"
                                :class="notifyingTrainees[trainee.id] === true ? 'bg-gray-700 text-gray-500' : (notifySuccess[trainee.id] === true ? 'bg-green-900/50 text-green-400' : 'bg-blue-900/50 text-blue-400')"
                                class="px-3 py-1.5 rounded-lg text-[11px] font-bold uppercase tracking-wider disabled:opacity-50 cursor-pointer">
                            <span x-show="notifyingTrainees[trainee.id] === true">Відправка...</span>
                            <span x-show="notifySuccess[trainee.id] === true">✓</span>
                            <span x-show="notifyingTrainees[trainee.id] !== true && notifySuccess[trainee.id] !== true">Запитати доступність</span>
                        </button>
                    </div>
                </div>
                <template x-for="day in futureDays" :key="day.dateStr">
                    <div x-show="getFutureSlots(trainee.id, day.dateStr).length > 0" class="flex items-start gap-3 py-2 border-b border-[#252525] last:border-0">
                        <span class="text-xs font-bold w-14 flex-shrink-0 pt-0.5" :class="day.isWeekend ? 'text-red-400' : 'text-gray-500'" x-text="day.weekday + ' ' + day.dayNum"></span>
                        <div class="flex flex-wrap gap-1.5">
                            <template x-for="slot in getFutureSlots(trainee.id, day.dateStr)" :key="slot.startTime">
                                <button @click="createFromAvailability(trainee.id, day.dateStr, slot.startTime, slot.endTime)" type="button" class="bg-blue-900/30 text-blue-300 text-xs font-bold px-2.5 py-1 rounded-full border border-blue-500/30 hover:bg-blue-800/40 active:scale-95 transition-all">+ <span x-text="slot.startTime.slice(0,5) + '—' + slot.endTime.slice(0,5)"></span></button>
                            </template>
                        </div>
                    </div>
                </template>
                <div x-show="!traineeHasFutureAvailability(trainee.id)" class="text-sm text-gray-600 italic" x-text="labels.no_availability || 'Немає даних про доступність'"></div>
            </div>
        </template>
        <div x-show="trainees.length === 0" class="text-center py-20 text-gray-600 text-sm" x-text="labels.no_trainees || 'Немає учнів'"></div>
    </div>
</div>

<!-- МОДАЛКА ТРЕНУВАННЯ -->
<div x-show="showModal" class="fixed inset-0 z-[70] flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm px-0 sm:px-4" x-cloak x-transition>
    <div class="modal-container" @click.away="showModal = false">
        <div class="p-6 border-b border-[#333] flex justify-between items-center">
            <h3 class="text-2xl sm:text-3xl font-bold text-white" x-text="editingSessionId ? (labels.edit || 'Редагувати') : (labels.new_session || 'Нова сесія')"></h3>
            <button x-show="editingSessionId" @click="askDeleteSession()" class="text-red-500 font-bold text-xs uppercase">Видалити</button>
        </div>
        <div class="modal-body space-y-6">
            <div x-show="isTimePassed()" class="bg-red-900/20 text-red-400 p-3 rounded-xl text-[10px] font-bold uppercase text-center">Час уже минув</div>
            <div class="space-y-4">
                <div><label class="text-xs sm:text-sm font-black text-gray-400 uppercase mb-2 block" x-text="labels.session_date || 'Дата'"></label><div class="flex overflow-x-auto no-scrollbar space-x-2 pb-1"><template x-for="day in futureDays" :key="day.dateStr"><button @click="sessionForm.date = day.dateStr" class="flex-shrink-0 flex flex-col items-center px-3 py-2 rounded-2xl transition-all min-w-[52px]" :class="day.dateStr === sessionForm.date ? 'bg-blue-600 text-white shadow-lg' : (day.isWeekend ? 'bg-[#5a2020] text-red-300' : 'bg-[#262626] text-gray-400')"><span class="text-[8px] font-bold uppercase" x-text="day.weekday"></span><span class="text-lg font-black leading-tight" x-text="day.dayNum"></span><span class="text-[8px] font-bold mt-0.5" x-text="day.shortMonth || ''"></span><span x-show="day.dateStr === todayStr" class="text-[6px] font-black uppercase mt-0.5 bg-blue-500 text-white px-1.5 py-0.5 rounded-full">Сьогодні</span></button></template></div></div>
                <div><label class="text-xs sm:text-sm font-black text-gray-400 uppercase mb-2 block" x-text="labels.session_name || 'Назва'"></label><input type="text" x-model="sessionForm.title" class="w-full bg-transparent border-b border-[#333] outline-none py-3 text-base focus:border-blue-500"></div>
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs sm:text-sm font-black text-gray-500 uppercase" x-text="labels.session_time || 'Час'"></span>
                        <span x-show="sessionForm.startTime && sessionForm.endTime" class="text-sm sm:text-base font-bold text-blue-400 bg-blue-900/30 px-3 py-1.5 rounded-full" x-text="sessionForm.startTime + ' — ' + sessionForm.endTime + ' · ' + getDurationLabel()"></span>
                        <button x-show="selectedCoachSlots.length" @click="selectedCoachSlots = []; sessionForm.startTime = null; sessionForm.endTime = null" type="button" class="text-xs font-bold text-red-400 uppercase">Скинути</button>
                    </div>
                    <div class="bg-[#1a1a1a] rounded-xl border border-[#2a2a2a] overflow-hidden max-h-72 overflow-y-auto no-scrollbar">
                        <template x-for="(row, ri) in coachGrid" :key="ri">
                            <div class="flex border-b border-[#1f1f1f] last:border-b-0">
                                <div class="w-12 sm:w-14 flex-shrink-0 flex items-start justify-end pr-2 pt-1.5 text-xs sm:text-sm font-bold text-gray-400 select-none leading-none">
                                    <span x-text="row.lbl"></span>
                                </div>
                                <div class="flex-1 flex">
                                    <template x-for="(c, ci) in row.cells" :key="ci">
                                        <button @click="pickTime(c.mm)" type="button"
                                                class="flex-1 h-12 sm:h-14 border-l border-[#1f1f1f] first:border-l-0 transition-all active:scale-95"
                                                :style="coachCellStyle(c.mm)"
                                                x-show="!c.isPast">
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <div>
                    <label class="text-xs sm:text-sm font-black text-gray-400 uppercase mb-2 block" x-text="labels.session_location || 'Локація'"></label>
                    <select x-model="sessionForm.locationId" class="w-full text-base">
                        <option :value="null" x-text="labels.no_location || 'Без місця'"></option>
                        <template x-for="location in locations" :key="location.id">
                            <option :value="location.id" x-text="location.name" :style="'color: ' + (location.color || '#3b82f6')"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <p class="text-xs sm:text-sm font-black text-gray-400 uppercase" x-text="labels.manage_trainees || 'Учні'"></p>
                        <span x-show="sessionForm.traineeIds.length" class="text-xs sm:text-sm font-bold text-blue-400 bg-blue-900/30 px-2.5 py-0.5 rounded-full" x-text="sessionForm.traineeIds.length + ' ' + (labels.selected_count || 'вибр.')"></span>
                    </div>
                    <input type="text" x-model="traineeSearch" :placeholder="labels.trainee_search || 'Пошук учнів...'" class="w-full mb-2 text-base">
                    <div x-show="sessionForm.traineeIds.length" class="flex flex-wrap gap-1.5 mb-2">
                        <template x-for="aId in sessionForm.traineeIds" :key="aId">
                            <button @click="sessionForm.traineeIds = sessionForm.traineeIds.filter(id => id !== aId)" type="button"
                                    class="inline-flex items-center gap-1 bg-blue-900/40 text-blue-300 text-xs sm:text-sm font-semibold px-2.5 py-1.5 rounded-full border border-blue-500/30 active:scale-95 transition-all">
                                <span x-text="getTraineeName(aId)"></span>
                                <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </template>
                    </div>
                    <div class="grid grid-cols-1 gap-1.5 max-h-52 overflow-y-auto no-scrollbar">
                        <template x-for="trainee in filteredTrainees" :key="trainee.id">
                            <div @click="toggleTraineeSelection(trainee.id)" class="flex items-center justify-between px-4 py-3.5 rounded-2xl border-2 transition-all duration-150 active:scale-[0.98] cursor-pointer"
                                   :class="sessionForm.traineeIds.includes(trainee.id) ? 'bg-blue-600/20 border-blue-400' : 'bg-[#262626] border-transparent'">
                                <div class="flex items-center gap-2 min-w-0">
                                    <span :class="isAvailable(trainee.id, sessionForm.date)?.length > 0 ? 'w-2 h-2 rounded-full bg-green-500 flex-shrink-0' : isAvailable(trainee.id, sessionForm.date) !== null ? 'w-2 h-2 rounded-full bg-red-500 flex-shrink-0' : 'w-2 h-2 rounded-full bg-gray-600 flex-shrink-0'"></span>
                                    <span class="font-semibold text-base sm:text-lg truncate" :class="sessionForm.traineeIds.includes(trainee.id) ? 'text-blue-200' : 'text-gray-200'" x-text="trainee.name"></span>
                                </div>
                                <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-150"
                                     :class="sessionForm.traineeIds.includes(trainee.id) ? 'bg-blue-500 border-blue-500' : 'border-gray-600'">
                                    <svg x-show="sessionForm.traineeIds.includes(trainee.id)" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                </div>
                            </div>
                        </template>
                        <div x-show="filteredTrainees.length === 0 && traineeSearch" class="text-center py-6 text-gray-600 text-xs" x-text="labels.not_found || 'Нічого не знайдено'"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer flex space-x-3">
            <button @click="showModal = false" class="flex-1 py-4 font-bold text-gray-500 uppercase text-sm" x-text="labels.cancel || 'Скасувати'"></button>
            <button @click="saveSession()" :disabled="sessionForm.traineeIds.length === 0 || isTimePassed() || !sessionForm.endTime || !isSessionTimeValid" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg disabled:opacity-20" x-text="labels.save || 'Зберегти'"></button>
        </div>
    </div>
</div>

<div x-show="confirmData.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[300px] rounded-[24px] overflow-hidden shadow-2xl"><div class="p-6 text-center text-white"><h4 class="text-lg font-bold" x-text="confirmData.title"></h4><p class="text-sm text-gray-500 mt-2" x-text="confirmData.message"></p></div><div class="flex flex-col border-t border-[#333]"><button @click="confirmData.onConfirm(); confirmData.show = false" class="py-4 text-sm font-bold border-b border-[#333]" :class="confirmData.confirmText === 'Видалити' || !confirmData.confirmText ? 'text-red-500' : 'text-yellow-400'" x-text="confirmData.confirmText || 'Видалити'"></button><button @click="confirmData.show = false" class="py-4 text-sm font-medium text-gray-300">Скасувати</button></div></div>
</div>

<div x-show="notifyModal.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6">
            <h4 class="text-lg font-bold text-white mb-1" x-text="labels.request_availability_title || '📲 Запросити доступність'"></h4>
            <p class="text-sm text-gray-400 mb-4"><span x-text="labels.request_availability_body || 'Надішліть запит учневі: '"></span><span x-text="notifyModal.traineeName"></span></p>
            
            <div class="mb-4">
                <label class="text-xs font-bold text-gray-500 uppercase mb-3 block">Період:</label>
                <div class="flex gap-2">
                    <button @click="notifyModal.dayType = 'tomorrow'" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'tomorrow' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Завтра
                    </button>
                    <button @click="notifyModal.dayType = 'specific_day'; notifyModal.targetDate = ''" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'specific_day' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Обрати день
                    </button>
                    <button @click="notifyModal.dayType = 'weekend'" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'weekend' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Вихідні
                    </button>
                </div>
                <div x-show="notifyModal.dayType === 'specific_day'" class="mt-3">
                    <input type="date" x-model="notifyModal.targetDate" 
                           class="w-full bg-[#262626] text-white rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            
            <div class="mb-6">
                <label class="text-xs font-bold text-gray-500 uppercase mb-2 block" x-text="labels.comment_optional || 'Коментар (необов\\'язково):'"></label>
                <textarea x-model="notifyModal.customMessage" 
                          :placeholder="labels.comment_placeholder || &quot;наприклад: 'на два дні', 'на наступний тиждень'&quot;"
                          class="w-full bg-[#262626] text-white rounded-xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                          rows="2"></textarea>
            </div>
            
            <div class="flex gap-3">
                <button @click="closeNotifyModal()" 
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-gray-400 bg-[#262626]"
                        x-text="labels.cancel || 'Скасувати'">
                </button>
                <button @click="sendNotifyTrainee()" 
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-white bg-blue-600"
                        x-text="labels.send || 'Надіслати'">
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/mentor-view.js"></script>
</body>
</html>
