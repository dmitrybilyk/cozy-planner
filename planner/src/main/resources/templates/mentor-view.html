<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Planner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            overscroll-behavior-y: contain;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ig-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .ig-gradient-text {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .today-marker { border: 2px solid #ffffff !important; box-shadow: 0 0 12px rgba(255, 255, 255, 0.4); }
        #calendar-container { touch-action: pan-x; -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; scroll-padding-left: 1rem; }
        .week-start { scroll-snap-align: start; border-left: 1px solid #333; padding-left: 0.75rem; margin-left: 0.25rem; }
        .dragging { opacity: 0.3; transform: scale(0.95); border: 1px dashed #0095f6 !important; }
        .modal-container { display: flex; flex-direction: column; background: #1c1c1c; border: 1px solid #333; width: 100%; max-width: 512px; max-height: 90vh; border-top-left-radius: 32px; border-top-right-radius: 32px; }
        @media (min-width: 640px) { .modal-container { border-radius: 24px; max-height: 85vh; } }
        .modal-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #333; background: #1c1c1c; padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        input, select, textarea { background: #262626 !important; color: white !important; border: 1px solid #363636 !important; border-radius: 12px !important; padding: 10px !important; }
        .ig-ring {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 2px;
            border-radius: 50%;
            display: inline-flex;
        }
        .card-hover { transition: all 0.15s ease; }
        .card-hover:active { transform: scale(0.97); }
        .bottom-nav { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
    </style>
</head>
<body class="antialiased" x-data="calendarApp()">

<header class="bg-[#1a1a1a]/95 backdrop-blur-lg border-b border-[#333] sticky top-0 z-40 shadow-md">
    <div class="px-3 sm:px-4 h-14 sm:h-16 flex items-center justify-between">
        <div @click="showProfile = true" class="flex items-center space-x-2 sm:space-x-3 min-w-0 cursor-pointer hover:bg-white/5 rounded-lg px-2 py-1.5 transition">
            <div class="ig-ring w-7 h-7 sm:w-9 sm:h-9 flex items-center justify-center flex-shrink-0">
                <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                    <span class="text-[8px] sm:text-[10px] font-black italic ig-gradient-text">CP</span>
                </div>
            </div>
            <div class="leading-tight truncate">
                <h1 class="text-[11px] sm:text-sm font-bold truncate" x-text="mentor.name || 'Cozy Planner'"></h1>
                <p x-show="user.email" class="text-[8px] sm:text-[9px] text-gray-500 font-medium truncate" x-text="user.email"></p>
            </div>
            <svg class="w-3 h-3 text-gray-500 flex-shrink-0 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
        </div>
        <div class="flex bg-[#262626] p-0.5 sm:p-1 rounded-xl flex-shrink-0">
            <button @click="currentView = 'feed'" class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'feed' ? 'bg-[#444] text-blue-400' : 'text-gray-500'" x-text="labels.day || 'День'"></button>
            <button @click="currentView = 'agenda'" class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-black uppercase tracking-wider rounded-lg transition" :class="currentView === 'agenda' ? 'bg-[#444] text-blue-400' : 'text-gray-500'" x-text="labels.plan || 'План'"></button>
        </div>
         <form method="POST" action="/logout" id="logoutForm" class="hidden"></form>
         
         <div x-show="mentorTg.enabled" class="flex items-center gap-2 mr-2">
             <template x-if="mentorTg.connected">
                 <span class="px-2 py-1 bg-green-900/30 text-green-400 rounded-full text-[9px] font-bold uppercase">
                     <span x-text="labels.tg_connected || '✓ TG підключено'"></span>
                     <span x-show="mentorTg.username" class="opacity-60 ml-1" x-text="'@' + mentorTg.username"></span>
                 </span>
             </template>
             <template x-if="!mentorTg.connected">
                 <button @click="generateMentorTelegramToken()" 
                         :class="mentorTg.copied ? 'bg-green-600' : (mentorTg.connectLink ? 'bg-orange-500' : 'bg-blue-600')"
                         class="px-2 py-1 text-white rounded-lg text-[10px] font-bold uppercase">
                     <span x-show="mentorTg.copied">✓ Скопійовано!</span>
                     <span x-show="!mentorTg.copied && mentorTg.connectLink">🔗 Копіювати посилання</span>
                     <span x-show="!mentorTg.copied && !mentorTg.connectLink">📲 Під'єднати TG</span>
                 </button>
             </template>
         </div>
         
         <button onclick="document.getElementById('logoutForm').submit()" class="flex-shrink-0"><svg class="w-5 h-5 sm:w-6 sm:h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
    </div>
    <div class="px-2 sm:px-4 pb-2 sm:pb-3 flex gap-2">
        <button @click="openSessionModal()" :disabled="selectedDate < todayStr" class="flex-1 flex items-center justify-center bg-blue-600 hover:bg-blue-700 active:scale-[0.97] text-white py-3 rounded-2xl shadow-lg transition disabled:opacity-30 disabled:cursor-not-allowed disabled:active:scale-100" title="Нова сесія">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
        <button @click="showManageTrainees = true" class="flex-1 flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 rounded-2xl transition" title="Учні">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <button @click="showManageLocations = true" class="flex-1 flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 rounded-2xl transition" title="Місця">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <a href="/coach/availability" class="flex-1 flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 rounded-2xl transition" title="Доступність тренера">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </a>
        <button @click="showAvailabilityOverview = true" class="flex items-center justify-center bg-[#262626] hover:bg-[#333] active:scale-[0.97] py-3 px-3 rounded-2xl transition" title="Доступність учнів">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </button>
    </div>
</header>

<div x-show="currentView === 'feed'" class="bg-[#1a1a1a] border-b border-[#333]">
    <div id="calendar-container" class="flex overflow-x-auto no-scrollbar p-4 space-x-5 scroll-smooth" @wheel.passive="handleMouseScroll($event)">
         <template x-for="day in days" :key="day.dateStr">
            <button @click="selectedDate = day.dateStr; $nextTick(() => scrollToActive())"
                    :id="'date-btn-' + day.dateStr"
                    class="flex-shrink-0 flex flex-col items-center min-w-[64px]"
                    :class="day.isMonday ? 'week-start' : ''">
                <div class="w-14 h-14 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                     :class="[selectedDate === day.dateStr ? 'ig-gradient shadow-lg' : 'bg-[#333]', day.dateStr === todayStr ? 'today-marker' : '']">
                    <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                        <span class="text-[9px] font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                        <span class="text-sm font-bold text-white" x-text="day.dayNum"></span>
                    </div>
                </div>
                <span x-show="day.dateStr === todayStr" class="text-[7px] font-black text-white uppercase mt-1 tracking-tighter" x-text="labels.today || 'Сьогодні'"></span>
                <div x-show="hasSessionOn(day.dateStr)" class="w-1 h-1 bg-blue-500 rounded-full mt-0.5"></div>
            </button>
        </template>
    </div>
</div>

<div x-show="currentView === 'agenda'" class="bg-[#1a1a1a] border-b border-[#333] p-4 overflow-x-auto no-scrollbar flex space-x-2">
    <button @click="toggleTraineeFilter(null)" class="px-5 py-2.5 rounded-full text-sm sm:text-base font-bold whitespace-nowrap transition" :class="selectedTraineeFilters.length === 0 ? 'bg-white text-black' : 'bg-[#262626] text-gray-400'" x-text="labels.all_trainees || 'Всі учні'"></button>
    <template x-for="trainee in trainees" :key="trainee.id">
        <button @click="toggleTraineeFilter(trainee.id)" class="px-5 py-2.5 rounded-full text-sm sm:text-base font-bold whitespace-nowrap transition border border-[#333]" :class="selectedTraineeFilters.includes(trainee.id) ? 'bg-blue-600 text-white border-blue-600' : 'bg-[#1a1a1a] text-gray-400'" x-text="trainee.name"></button>
    </template>
</div>

<main class="max-w-2xl mx-auto p-4 pb-24">
    <div x-show="currentView === 'feed'">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-sm sm:text-base font-black text-gray-500 uppercase tracking-widest" x-text="formatDisplayDate(selectedDate)"></h2>
            <button @click="selectedDate = todayStr; $nextTick(() => scrollToToday())" class="text-xs sm:text-sm font-bold text-blue-400 uppercase" x-text="labels.today || 'Сьогодні'"></button>
        </div>
        <div class="space-y-4">
            <template x-for="(session, index) in filteredSessions" :key="session.id">
                <div>
                    <div x-show="showNowLineAfter(session, filteredSessions)"
                         class="my-3 flex items-center gap-2">
                        <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                        <span class="text-[9px] font-bold text-red-500 uppercase tracking-wider flex-shrink-0 px-1">● NOW</span>
                        <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                    </div>
                    <div draggable="true" @dragstart="dragStart($event, index)" @dragend="dragEnd" @dragover.prevent @drop="drop($event, targetIndex(session.id))"
                         @click="handleCardClick(session, index)"
                         :data-session-id="session.id"
                         :id="'session-card-' + session.id"
                         class="rounded-3xl p-5 shadow-sm card-hover fade-in relative overflow-hidden"
                         :class="[draggedIndex === index ? 'dragging' : '', getCardBorderClass(session)]"
                         :style="'border-left: 5px solid ' + (session.color || '#3b82f6')">
                        <div x-show="isSessionNow(session)" 
                             class="absolute inset-0 bg-gradient-to-r from-red-500/5 to-transparent pointer-events-none"></div>
                        <div class="flex items-center space-x-4">
                            <div class="relative flex flex-col items-center justify-center rounded-2xl px-3 py-2 min-w-[70px] border border-[#333]"
                                 :style="'background: ' + (session.color || '#3b82f6') + '33'">
                                <span x-show="isSessionNow(session)" 
                                      class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span>
                                <span class="text-xl sm:text-2xl font-black leading-none" :style="'color: ' + (session.color || '#3b82f6')" x-text="session.time + ' — ' + (session.endTime || '')"></span>
                                <span class="text-[9px] font-bold text-gray-500 mt-0.5" x-text="sessionDuration(session)"></span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <p class="text-base sm:text-lg font-bold text-gray-100 truncate" x-text="session.title"></p>
                                    <span x-show="isSessionNow(session)" 
                                          class="text-[9px] font-bold text-red-500 uppercase tracking-wider animate-pulse flex-shrink-0">● NOW</span>
                                </div>
                                <p class="text-sm text-gray-500 italic truncate" x-text="session.description"></p>
                                <div class="flex flex-wrap gap-1 mt-2">
                                    <template x-for="aId in session.traineeIds"><span class="inline-flex items-center gap-1 text-xs sm:text-sm bg-[#333] px-2.5 py-0.5 rounded-full font-semibold text-gray-300"><span :class="isAvailable(aId, session.date)?.length > 0 ? 'w-1.5 h-1.5 rounded-full bg-green-500' : isAvailable(aId, session.date) !== null ? 'w-1.5 h-1.5 rounded-full bg-red-500' : 'w-1.5 h-1.5 rounded-full bg-gray-600'" x-text="''"></span><span x-text="getTraineeName(aId)"></span></span></template>
                                </div>
                                <div class="flex flex-wrap gap-1 mt-1">
                                    <span x-show="session.confirmationStatus"
                                          class="inline-flex items-center gap-1 text-[10px] font-bold uppercase px-2 py-0.5 rounded-full"
                                          :class="getConfirmationBadgeClass(session.confirmationStatus)">
                                        <span x-text="getConfirmationLabel(session.confirmationStatus)"></span>
                                    </span>
                                </div>
                                <div x-show="getLocationName(session.locationId)" class="mt-1.5 flex items-center space-x-1">
                                    <span class="w-2 h-2 rounded-full" :style="'background: ' + (session.color || '#3b82f6')"></span>
                                    <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(session.locationId)"></span>
                                </div>
                                <div class="flex items-center gap-3 mt-2">
                                    <button @click.stop="copySession(session)" class="text-[11px] sm:text-xs font-bold text-blue-400 uppercase tracking-wider" x-text="labels.copy || 'Копіювати'"></button>
                                    <button @click.stop="exportToGCal(session)" class="text-[11px] sm:text-xs font-bold text-green-400 uppercase tracking-wider hover:text-green-300">📅 GCal</button>
                                </div>
                                <div x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING'" class="flex gap-2 mt-2">
                                    <button @click.stop="confirmSession(session.id)" class="flex-1 py-1.5 bg-green-600/30 text-green-400 rounded-xl text-[10px] font-bold uppercase">Підтвердити</button>
                                    <button @click.stop="rejectSession(session.id)" class="flex-1 py-1.5 bg-red-600/30 text-red-400 rounded-xl text-[10px] font-bold uppercase">Відмінити</button>
                                </div>
                                <div x-show="session.createdBy === 'COACH' && (session.confirmationStatus === 'NONE' || session.confirmationStatus === 'REJECTED')" class="mt-2">
                                    <button @click.stop="requestTraineeConfirmation(session)" class="text-[10px] font-bold text-yellow-400 uppercase tracking-wider">Запитати підтвердження учня</button>
                                </div>
                            </div>
                            <div class="flex flex-col items-center gap-1 flex-shrink-0 ml-1">
                                <template x-for="(icon, i) in getSessionIcons(session, index)" :key="i">
                                    <span class="text-base sm:text-lg" x-text="icon"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredSessions.length === 0" class="text-center py-20 text-gray-600 text-sm italic" x-text="labels.no_sessions || 'Немає тренувань на цей день'"></div>
        </div>
    </div>

    <div x-show="currentView === 'agenda'" class="space-y-10">
        <template x-for="dateGroup in agendaGroups" :key="dateGroup.date">
            <div class="space-y-4">
                <button @click="goToDay(dateGroup.date)" class="sticky top-[108px] sm:top-[116px] bg-[#121212] py-2 z-10 w-full text-left flex items-center justify-between">
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest" x-text="formatDisplayDate(dateGroup.date)"></span>
                    <span x-show="dateGroup.date === todayStr" class="text-[9px] font-black text-white bg-[#333] px-2 py-0.5 rounded" x-text="labels.today || 'СЬОГОДНІ'"></span>
                </button>
                <div class="space-y-3">
                    <template x-for="(session, index) in dateGroup.items" :key="session.id">
                        <div>
                            <div x-show="showNowLineAfter(session, dateGroup.items)"
                                 class="my-2 flex items-center gap-2">
                                <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                                <span class="text-[9px] font-bold text-red-500 uppercase tracking-wider flex-shrink-0 px-1">● NOW</span>
                                <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                            </div>
                             <div @click="handleCardClick(session, index)"
                                  :data-session-id="session.id"
                                  :id="'agenda-card-' + session.id"
                                  class="rounded-2xl p-4 shadow-sm card-hover relative overflow-hidden"
                                  :class="[getAgendaCardClass(session)]"
                                  :style="'border-left: 4px solid ' + (session.color || '#3b82f6')">
                                <div x-show="isSessionNow(session)" 
                                     class="absolute inset-0 bg-gradient-to-r from-red-500/5 to-transparent pointer-events-none"></div>
                                <div class="flex items-center space-x-4 min-w-0 flex-1">
                                    <span class="text-sm font-black text-white flex-shrink-0" x-text="session.time"></span>
                                    <div class="min-w-0 flex-1">
                                        <div class="flex items-center gap-2">
                                            <p class="text-base sm:text-lg font-bold text-gray-200 truncate" x-text="session.title"></p>
                                            <span x-show="isSessionNow(session)" 
                                                  class="text-[9px] font-bold text-red-500 uppercase tracking-wider animate-pulse flex-shrink-0">● NOW</span>
                                        </div>
                                        <p class="text-xs sm:text-sm text-gray-500 truncate" x-text="session.traineeIds.map(id => getTraineeName(id)).join(', ')"></p>
                                        <div class="flex flex-wrap gap-1 mt-1">
                                            <span x-show="session.confirmationStatus"
                                                  class="inline-flex items-center gap-1 text-[9px] font-bold uppercase px-1.5 py-0.5 rounded-full"
                                                  :class="getConfirmationBadgeClass(session.confirmationStatus)">
                                                <span x-text="getConfirmationLabel(session.confirmationStatus)"></span>
                                            </span>
                                        </div>
                                        <div x-show="getLocationName(session.locationId)" class="flex items-center space-x-1 mt-1">
                                            <span class="w-2 h-2 rounded-full" :style="'background: ' + (session.color || '#3b82f6')"></span>
                                            <span class="text-[9px] text-gray-500 font-medium" x-text="getLocationName(session.locationId)"></span>
                                        </div>
                                        <div x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING'" class="flex gap-2 mt-2">
                                            <button @click.stop="confirmSession(session.id)" class="flex-1 py-1 bg-green-600/30 text-green-400 rounded-lg text-[9px] font-bold uppercase">Підтвердити</button>
                                            <button @click.stop="rejectSession(session.id)" class="flex-1 py-1 bg-red-600/30 text-red-400 rounded-lg text-[9px] font-bold uppercase">Відмінити</button>
                                        </div>
                                        <div x-show="session.createdBy === 'COACH' && (session.confirmationStatus === 'NONE' || session.confirmationStatus === 'REJECTED')" class="mt-1">
                                            <button @click.stop="requestTraineeConfirmation(session)" class="text-[9px] font-bold text-yellow-400 uppercase tracking-wider">Зап. підтв.</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-1 ml-2 flex-shrink-0">
                                    <template x-for="(icon, i) in getSessionIcons(session, index)" :key="i">
                                        <span class="text-sm sm:text-base" x-text="icon"></span>
                                    </template>
                                </div>
                                <button @click.stop="copySession(session)" class="ml-2 flex-shrink-0 text-[11px] sm:text-xs font-bold text-blue-400 uppercase tracking-wider" x-text="labels.copy || 'Копіювати'"></button>
                                <button @click.stop="exportToGCal(session)" class="ml-2 flex-shrink-0 text-[11px] sm:text-xs font-bold text-green-400 uppercase tracking-wider hover:text-green-300">📅 GCal</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</main>

                        <p class="text-xs sm:text-sm font-black text-gray-400 uppercase" x-text="labels.manage_trainees || 'Учні'"></p>
                        <span x-show="sessionForm.traineeIds.length" class="text-xs sm:text-sm font-bold text-blue-400 bg-blue-900/30 px-2.5 py-0.5 rounded-full" x-text="sessionForm.traineeIds.length + ' ' + (labels.selected_count || 'вибр.')"></span>
                    </div>
                    <input type="text" x-model="traineeSearch" :placeholder="labels.trainee_search || 'Пошук учнів...'" class="w-full mb-2 text-base">
                    <div x-show="sessionForm.traineeIds.length" class="flex flex-wrap gap-1.5 mb-2">
                        <template x-for="aId in sessionForm.traineeIds" :key="aId">
                            <button @click="sessionForm.traineeIds = sessionForm.traineeIds.filter(id => id !== aId)" type="button"
                                    class="inline-flex items-center gap-1 bg-blue-900/40 text-blue-300 text-xs sm:text-sm font-semibold px-2.5 py-1.5 rounded-full border border-blue-500/30 active:scale-95 transition-all">
                                <span x-text="getTraineeName(aId)"></span>
                                <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </template>
                    </div>
                    <div class="grid grid-cols-1 gap-1.5 max-h-52 overflow-y-auto no-scrollbar">
                        <template x-for="trainee in filteredTrainees" :key="trainee.id">
                            <div @click="toggleTraineeSelection(trainee.id)" class="flex items-center justify-between px-4 py-3.5 rounded-2xl border-2 transition-all duration-150 active:scale-[0.98] cursor-pointer"
                                   :class="sessionForm.traineeIds.includes(trainee.id) ? 'bg-blue-600/20 border-blue-400' : 'bg-[#262626] border-transparent'">
                                <div class="flex items-center gap-2 min-w-0">
                                    <span :class="isAvailable(trainee.id, sessionForm.date)?.length > 0 ? 'w-2 h-2 rounded-full bg-green-500 flex-shrink-0' : isAvailable(trainee.id, sessionForm.date) !== null ? 'w-2 h-2 rounded-full bg-red-500 flex-shrink-0' : 'w-2 h-2 rounded-full bg-gray-600 flex-shrink-0'"></span>
                                    <span class="font-semibold text-base sm:text-lg truncate" :class="sessionForm.traineeIds.includes(trainee.id) ? 'text-blue-200' : 'text-gray-200'" x-text="trainee.name"></span>
                                </div>
                                <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-150"
                                     :class="sessionForm.traineeIds.includes(trainee.id) ? 'bg-blue-500 border-blue-500' : 'border-gray-600'">
                                    <svg x-show="sessionForm.traineeIds.includes(trainee.id)" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                </div>
                            </div>
                        </template>
                        <div x-show="filteredTrainees.length === 0 && traineeSearch" class="text-center py-6 text-gray-600 text-xs" x-text="labels.not_found || 'Нічого не знайдено'"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer flex space-x-3">
            <button @click="showModal = false" class="flex-1 py-4 font-bold text-gray-500 uppercase text-sm" x-text="labels.cancel || 'Скасувати'"></button>
            <button @click="saveSession()" :disabled="sessionForm.traineeIds.length === 0 || isTimePassed() || !sessionForm.endTime || !isSessionTimeValid" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg disabled:opacity-20" x-text="labels.save || 'Зберегти'"></button>
        </div>
    </div>
</div>

<div x-show="confirmData.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[300px] rounded-[24px] overflow-hidden shadow-2xl"><div class="p-6 text-center text-white"><h4 class="text-lg font-bold" x-text="confirmData.title"></h4><p class="text-sm text-gray-500 mt-2" x-text="confirmData.message"></p></div><div class="flex flex-col border-t border-[#333]"><button @click="confirmData.onConfirm(); confirmData.show = false" class="py-4 text-sm font-bold border-b border-[#333]" :class="confirmData.confirmText === 'Видалити' || !confirmData.confirmText ? 'text-red-500' : 'text-yellow-400'" x-text="confirmData.confirmText || 'Видалити'"></button><button @click="confirmData.show = false" class="py-4 text-sm font-medium text-gray-300">Скасувати</button></div></div>
</div>

<div x-show="notifyModal.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6">
            <h4 class="text-lg font-bold text-white mb-1" x-text="labels.request_availability_title || '📲 Запросити доступність'"></h4>
            <p class="text-sm text-gray-400 mb-4"><span x-text="labels.request_availability_body || 'Надішліть запит учневі: '"></span><span x-text="notifyModal.traineeName"></span></p>
            
            <div class="mb-4">
                <label class="text-xs font-bold text-gray-500 uppercase mb-3 block">Період:</label>
                <div class="flex gap-2">

                    </button>
                    <button @click="notifyModal.dayType = 'specific_day'; notifyModal.targetDate = ''" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"

                    </button>
                    <button @click="notifyModal.dayType = 'weekend'" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'weekend' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Вихідні
                    </button>
                </div>
                <div x-show="notifyModal.dayType === 'specific_day'" class="mt-3">
                    <input type="date" x-model="notifyModal.targetDate" 
                           class="w-full bg-[#262626] text-white rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">

            <div class="mb-6">
                <label class="text-xs font-bold text-gray-500 uppercase mb-2 block" x-text="labels.comment_optional || 'Коментар (необов\\'язково):'"></label>
                <textarea x-model="notifyModal.customMessage" 
                          :placeholder="labels.comment_placeholder || &quot;наприклад: 'на два дні', 'на наступний тиждень'&quot;"
                          class="w-full bg-[#262626] text-white rounded-xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                          rows="2"></textarea>
            </div>
            
            <div class="flex gap-3">
                <button @click="closeNotifyModal()" 
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-gray-400 bg-[#262626]"
                        x-text="labels.cancel || 'Скасувати'">
                </button>
                <button @click="sendNotifyTrainee()" 
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-white bg-blue-600"
                        x-text="labels.send || 'Надіслати'">
                </button>
            </div>
        </div>
    </div>
</div>

<script th:inline="none">
    function localDateStr(d) {
        d = d || new Date();
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    }
    function calendarApp() {
        const _today = localDateStr();
        return {
            currentView: 'feed', showModal: false, showManageTrainees: false, showManageLocations: false, showAvailabilityOverview: false, showProfile: false,
            editingSessionId: null, editingTraineeId: null, editingLocationId: null, draggedIndex: null,
            selectedDate: _today, todayStr: _today,
            days: [], sessions: [], trainees: [], locations: [], mentorId: null, mentor: { name: '' }, user: {}, labels: {}, mentorProfile: 'sport',
            hours: Array.from({length: 24}, (_, i) => i.toString().padStart(2, '0')),
            halfHours: Array.from({length: 48}, (_, i) => `${Math.floor(i/2).toString().padStart(2,'0')}:${i%2===0?'00':'30'}`),
            daySlots: Array.from({length: 29}, (_, i) => `${(7+Math.floor(i/2)).toString().padStart(2,'0')}:${i%2===0?'00':'30'}`),
            coachGrid: [],
            selectedTraineeFilters: [], traineeSearch: '',
            sessionForm: { title: 'Тренування', description: '', date: '', startTime: null, endTime: null, traineeIds: [], locationId: null },
            selectedCoachSlots: [],
            traineeForm: { name: '', description: '', photoBase64: null },
            locationForm: { name: '', description: '', color: '#3b82f6' },
            confirmData: { show: false, title: '', message: '', confirmText: 'Видалити', onConfirm: () => {} },
            notifyModal: { show: false, traineeId: null, traineeName: '', customMessage: '', dayType: 'tomorrow', targetDate: '' },
            mentorTg: { enabled: false, connected: false, username: '', connectLink: '', copied: false },
            inviteUrls: {},
            traineeLinks: {},
            notifyingTrainees: {},
            notifyErrors: {},
            notifySuccess: {},
            _nowTimer: null,
            nowTick: 0,
            availabilityMap: {},
            touchDrag: null,
            touchJustDragged: false,
            _touchDragCleanup: null,

            async init() {
                console.log('init() starting...');
                try {
                    const me = await this.fetchMe();
                    console.log('fetchMe result:', me, 'mentorId:', this.mentorId);
                    if (!me) return;
                    
                    this.generateDays();
                    console.log('generateDays done, days count:', this.days.length);
                    
                    await this.fetchLocations();
                    console.log('fetchLocations done, locations:', this.locations.length);
                    
                    await this.fetchTrainees();
                    console.log('fetchTrainees done, trainees:', this.trainees.length);
                    
                    await this.fetchData();
                    console.log('fetchData done, sessions:', this.sessions.length);
                    
                    await this.fetchAvailability();
                    console.log('fetchAvailability done');
                    
                    await this.fetchMentorTelegramStatus();
                    console.log('fetchMentorTelegramStatus done');
                    
                    this.connectWebSocket();
                    for (let h = 6; h < 22; h++) {
                        const cells = [{mm:h*60},{mm:h*60+30}];
                        this.coachGrid.push({ lbl: `${String(h).padStart(2,'0')}:00`, cells });
                    }
                    this.initTouchDrag();
                    setTimeout(() => this.scrollToToday(), 200);
                    this._nowTimer = setInterval(() => { this.nowTick++; }, 30000);
                    console.log('init() complete!');
                } catch (e) {
                    console.error('init() error:', e);
                }
            },

            connectWebSocket() {
                const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${wsProtocol}//${window.location.host}/api/v1/ws`;
                const ws = new WebSocket(wsUrl);
                
                ws.onmessage = (event) => {
                    switch(event.data) {
                        case 'session_changed': this.fetchData(); break;
                        case 'trainee_changed': this.fetchTrainees(); this.fetchData(); break;
                        case 'location_changed': this.fetchLocations(); this.fetchData(); break;
                        case 'availability_changed': this.fetchAvailability(); break;
                        case 'mentor_changed': this.fetchMentorTelegramStatus(); this.fetchTrainees(); break;
                    }
                };
                
                ws.onclose = () => {
                    setTimeout(() => this.connectWebSocket(), 3000);
                };
                
                ws.onerror = () => {
                    ws.close();
                };
                
                this.ws = ws;
            },

            handleCardClick(session, index) {
                if (this.touchJustDragged) return;
                if (session.date < this.todayStr) return;
                this.editSession(session);
            },

            copySession(w) {
                if (w.date < this.todayStr) return;
                this.editingSessionId = null;
                this.originalSessionData = null;
                let st = w.time, et = w.endTime || this.nextSlot(w.time);
                if (w.date === this.todayStr && new Date(`${w.date}T${st}`) <= new Date()) {
                    const dur = this.slotToMin(et) - this.slotToMin(st);
                    st = this.getNearestSlot();
                    const em = this.slotToMin(st) + Math.max(dur, 30);
                    const eh = Math.floor(em / 60) % 24;
                    et = `${eh.toString().padStart(2, '0')}:${em % 60 === 0 ? '00' : '30'}`;
                }
                this.sessionForm = {
                    title: w.title,
                    description: w.description || '',
                    date: w.date,
                    startTime: st,
                    endTime: et,
                    traineeIds: [...(w.traineeIds || [])],
                    locationId: w.locationId || null
                };
                this.showModal = true;
            },

            exportToGCal(session) {
                const d = session.date.replace(/-/g, '');
                const st = session.time.replace(/:/g, '') + '00';
                const et = (session.endTime || session.time).replace(/:/g, '') + '00';
                const loc = this.getLocationName(session.locationId) || '';
                const names = (session.traineeIds || []).map(id => this.getTraineeName(id)).filter(Boolean).join(', ');
                const desc = (session.description || '') + (names ? '\\nУчні: ' + names : '');
                const ics = [
                    'BEGIN:VCALENDAR',
                    'VERSION:2.0',
                    'PRODID:-//Cozy Planner//EN',
                    'BEGIN:VEVENT',
                    'DTSTART:' + d + 'T' + st,
                    'DTEND:' + d + 'T' + et,
                    'SUMMARY:' + session.title,
                    'DESCRIPTION:' + desc,
                    'LOCATION:' + loc,
                    'END:VEVENT',
                    'END:VCALENDAR'
                ].join('\r\n');
                const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (session.title || 'session').replace(/[^a-zа-яіїє0-9]/gi, '_') + '.ics';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            },

            initTouchDrag() {
                const container = document.querySelector('main') || document.body;
                if (!container) return;
                if (this._touchDragCleanup) return;

                let timer = null;
                let drag = null;

                const onStart = (e) => {
                    const card = e.target.closest('[data-session-id]');
                    if (!card) return;
                    const id = parseInt(card.dataset.sessionId);
                    const session = this.sessions.find(w => w.id === id);
                    if (!session) return;
                    const t = e.touches[0];
                    this.touchJustDragged = false;
                    drag = { session, card, startX: t.clientX, startY: t.clientY, armed: false, ghost: null };
                    timer = setTimeout(() => { if (drag) drag.armed = true; }, 400);
                };

                    const onMove = (e) => {
                    if (!drag || !drag.armed) return;
                    e.preventDefault();
                    const t = e.touches[0];
                    if (!drag.ghost) {
                        const g = drag.card.cloneNode(true);
                        g.style.position = 'fixed';
                        g.style.width = drag.card.offsetWidth + 'px';
                        g.style.opacity = '0.85';
                        g.style.pointerEvents = 'none';
                        g.style.zIndex = '9999';
                        g.style.transform = 'scale(0.95) rotate(1deg)';
                        g.style.transition = 'none';
                        document.body.appendChild(g);
                        drag.ghost = g;
                    }
                    drag.ghost.style.left = (t.clientX - drag.ghost.offsetWidth / 2) + 'px';
                    drag.ghost.style.top = (t.clientY - 30) + 'px';
                };

                const onEnd = async (e) => {
                    clearTimeout(timer);
                    if (!drag) return;
                    if (drag.armed && drag.ghost) {
                        this.touchJustDragged = true;
                        setTimeout(() => { this.touchJustDragged = false; }, 400);
                        const el = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                        const c = el?.closest('[data-session-id]');
                        if (c) {
                            const tid = parseInt(c.dataset.sessionId);
                            const tw = this.sessions.find(w => w.id === tid);
                            if (tw && tw.id !== drag.session.id) {
                                const ts = drag.session.time, te = drag.session.endTime;
                                drag.session.time = tw.time; drag.session.endTime = tw.endTime;
                                tw.time = ts; tw.endTime = te;
                                await this.saveRaw(drag.session); await this.saveRaw(tw);
                                await this.fetchData();
                            }
                        }
                    }
                    if (drag.ghost) drag.ghost.remove();
                    drag = null;
                };

                container.addEventListener('touchstart', onStart, { passive: true });
                container.addEventListener('touchmove', onMove, { passive: false });
                container.addEventListener('touchend', onEnd, { passive: true });

                this._touchDragCleanup = () => {
                    container.removeEventListener('touchstart', onStart);
                    container.removeEventListener('touchmove', onMove);
                    container.removeEventListener('touchend', onEnd);
                };
            },

            async fetchMe() {
                try {
                    const res = await fetch('/api/v1/me');
                    if (res.ok) {
                        const data = await res.json();
                        this.user = data.user || {};
                        this.mentorId = data.mentor?.id;
                        this.mentor.name = data.mentor?.name || 'Cozy Planner';
                        this.mentorProfile = data.mentor?.profile || 'sport';
                        this.labels = data.labels || {};
                        return true;
                    } else {
                        window.location.href = '/setup';
                        return false;
                    }
                } catch {
                    window.location.href = '/setup';
                    return false;
                }
            },

            get filteredSessions() {
                return this.sessions.filter(w => w.date === this.selectedDate);
            },

            targetIndex(id) {
                return this.filteredSessions.findIndex(w => w.id === id);
            },

            scrollToToday() {
                this.selectedDate = this.todayStr;
                this.$nextTick(() => this.scrollToActive());
            },

            scrollToWeekStart() {
                const el = document.getElementById('calendar-container');
                const todayBtn = document.getElementById('date-btn-' + this.todayStr);
                if (!el || !todayBtn) {
                    this.scrollToActive();
                    return;
                }
                
                const todayIdx = this.days.findIndex(d => d.dateStr === this.todayStr);
                if (todayIdx === -1) {
                    this.scrollToActive();
                    return;
                }
                
                let mondayIdx = todayIdx;
                while (mondayIdx > 0 && !this.days[mondayIdx].isMonday) {
                    mondayIdx--;
                }
                
                const mondayBtn = document.getElementById('date-btn-' + this.days[mondayIdx].dateStr);
                if (mondayBtn) {
                    el.scrollTo({
                        left: mondayBtn.offsetLeft - 16,
                        behavior: 'smooth'
                    });
                }
            },

            scrollToActive() {
                const el = document.getElementById('calendar-container');
                const activeBtn = document.getElementById('date-btn-' + this.selectedDate);
                if (el && activeBtn) {
                    el.scrollTo({
                        left: activeBtn.offsetLeft - el.offsetWidth / 2 + activeBtn.offsetWidth / 2,
                        behavior: 'smooth'
                    });
                }
            },

            goToDay(date) { this.selectedDate = date; this.currentView = 'feed'; setTimeout(() => this.scrollToActive(), 150); },
            toggleTraineeFilter(id) { if (id === null) this.selectedTraineeFilters = []; else { const idx = this.selectedTraineeFilters.indexOf(id); if (idx > -1) this.selectedTraineeFilters.splice(idx, 1); else this.selectedTraineeFilters.push(id); } },

            get agendaGroups() {
                let filtered = this.sessions.filter(w => w.date >= this.todayStr);
                if (this.selectedTraineeFilters.length > 0) filtered = filtered.filter(w => w.traineeIds.some(id => this.selectedTraineeFilters.includes(id)));
                const groups = filtered.reduce((acc, w) => { if (!acc[w.date]) acc[w.date] = []; acc[w.date].push(w); return acc; }, {});
                return Object.keys(groups).sort().map(date => ({ date, items: groups[date] }));
            },

            get futureDays() {
                return this.days.filter(d => d.dateStr >= this.todayStr);
            },

            traineeHasFutureAvailability(id) {
                return this.futureDays.some(d => this.getFutureSlots(id, d.dateStr).length > 0);
            },

            get filteredTrainees() {
                const q = this.traineeSearch.toLowerCase();
                return this.trainees
                    .filter(a => !q || a.name.toLowerCase().includes(q))
                    .sort((a, b) => a.name.localeCompare(b.name));
            },

            isTimePassed() {
                if (this.sessionForm.startTime === null) return this.sessionForm.date <= this.todayStr;
                if (this.sessionForm.date < this.todayStr) return true;
                if (this.sessionForm.date === this.todayStr) {
                    return new Date(`${this.sessionForm.date}T${this.sessionForm.startTime}`) <= new Date();
                }
                return false;
            },

            isSlotPast(t) {
                if (this.sessionForm.date < this.todayStr) return true;
                if (this.sessionForm.date === this.todayStr) {
                    const now = new Date();
                    const currentMinutes = now.getHours() * 60 + now.getMinutes();
                    return this.slotToMin(t) <= currentMinutes;
                }
                return false;
            },

            async fetchData() {
                if (!this.mentorId) return;
                const res = await fetch(`/api/v1/sessions?mentorId=${this.mentorId}&startDate=${this.days[0].dateStr}&endDate=${this.days[this.days.length-1].dateStr}`);
                if (res.ok) {
                    this.sessions = (await res.json()).sort((a, b) => a.time.localeCompare(b.time));
                    for (const w of this.sessions) {
                        w.color = this.getLocationColor(w.locationId);
                    }
                }
            },

            async fetchTrainees() {
                if (!this.mentorId) return;
                
                try {
                    const traineesRes = await fetch(`/api/v1/mentors/${this.mentorId}/trainees`);
                    if (traineesRes.ok) {
                        this.trainees = (await traineesRes.json()).sort((a, b) => a.name.localeCompare(b.name));
                    }
                    
                    try {
                        const tgRes = await fetch(`/api/v1/telegram/config`);
                        if (tgRes.ok) {
                            const tgConfig = await tgRes.json();
                            if (tgConfig.enabled) {
                                const tgStatusRes = await fetch(`/api/v1/mentors/${this.mentorId}/trainees-telegram`);
                                if (tgStatusRes.ok) {
                                    const tgStatuses = await tgStatusRes.json();
                                    const tgMap = {};
                                    for (const t of tgStatuses) {
                                        tgMap[t.id] = t;
                                    }
                                    for (const a of this.trainees) {
                                        const tg = tgMap[a.id];
                                        if (tg) {
                                            a.telegramEnabled = tg.telegramEnabled;
                                            a.telegramConnected = tg.telegramConnected;
                                            a.telegramUsername = tg.telegramUsername;
                                            a.connectLink = tg.connectLink;
                                            a.photoBase64 = tg.photoBase64;
                                            a.weekendReminderEnabled = tg.weekendReminderEnabled;
                                            a.sessionReminderEnabled = tg.sessionReminderEnabled;
                                            a.inviteToken = tg.inviteToken;
                                        } else {
                                            a.telegramEnabled = true;
                                            a.telegramConnected = false;
                                            a.photoBase64 = null;
                                            a.weekendReminderEnabled = false;
                                            a.sessionReminderEnabled = false;
                                            a.inviteToken = null;
                                        }
                                    }
                                }
                            } else {
                                for (const a of this.trainees) {
                                    a.telegramEnabled = false;
                                    a.weekendReminderEnabled = false;
                                    a.sessionReminderEnabled = false;
                                }
                            }
                        }
                    } catch (e) {
                        console.log('Telegram config fetch failed (probably not configured):', e.message);
                        for (const a of this.trainees) {
                            a.telegramEnabled = false;
                            a.weekendReminderEnabled = false;

            openNotifyModal(trainee) {

            closeNotifyModal() {

            async sendNotifyTrainee() {
                const traineeId = this.notifyModal.traineeId;

                const dayType = this.notifyModal.dayType || 'tomorrow';
                const targetDate = this.notifyModal.targetDate;
                
                if (this.notifyingTrainees[traineeId] === true) return;
                
                this.notifyingTrainees[traineeId] = true;
                this.notifyErrors[traineeId] = null;
                this.notifySuccess[traineeId] = false;
                
                const body = { dayType };
                if (dayType === 'specific_day' && targetDate) {
                    body.targetDate = targetDate;
                }
                if (customMsg && customMsg.trim().length > 0) {
                    body.customMessage = customMsg;
                }
                
                const res = await fetch(`/api/v1/trainees/${traineeId}/notify-availability`, {

                    headers: { 'Content-Type': 'application/json' },

                if (res.ok) {

            async fetchAvailability() {
                if (!this.mentorId) return;
                const start = this.days[0].dateStr;
                const end = this.days[this.days.length - 1].dateStr;
                const res = await fetch(`/api/v1/mentors/${this.mentorId}/availability?startDate=${start}&endDate=${end}`);
                if (res.ok) {
                    const data = await res.json();
                    const map = {};
                    for (const entry of data) {
                        for (const slot of entry.slots) {
                            const key = entry.traineeId + '|' + slot.date;
                            if (!map[key]) map[key] = [];
                            map[key].push({ startTime: slot.startTime, endTime: slot.endTime });
                        }
                    }
                    this.availabilityMap = map;
                }
            },

            async generateInvite(traineeId) {

            },

            isAvailable(traineeId, date) {

                return this.availabilityMap[key] !== undefined ? this.availabilityMap[key] : null;
            },
            getFutureSlots(traineeId, dateStr) {
                const slots = this.availabilityMap[traineeId + '|' + dateStr];
                if (!slots) return [];
                if (dateStr !== this.todayStr) return slots;
                const now = new Date();
                const currentMin = now.getHours() * 60 + now.getMinutes();
                return slots.filter(s => this.slotToMin(s.endTime) > currentMin);
            },

            getAvailLabel(slots) {
                if (!slots || slots.length === 0) return '';
                return slots.map(s => s.startTime.slice(0,5) + '-' + s.endTime.slice(0,5)).join(', ');
            },

            toggleTraineeSelection(id) {
                const idx = this.sessionForm.traineeIds.indexOf(id);
                if (idx > -1) {
                    this.sessionForm.traineeIds = this.sessionForm.traineeIds.filter(i => i !== id);
                } else {
                    this.sessionForm.traineeIds = [...this.sessionForm.traineeIds, id];
                }
                this.updateSessionTitleFromTrainees();
            },
            getTraineeName(id) { return (this.trainees.find(at => at.id == id)?.name) || 'Unknown'; },
            getLocationName(id) { return this.locations.find(l => l.id === id)?.name || ''; },
            getLocationColor(id) { return this.locations.find(l => l.id === id)?.color || '#3b82f6'; },
            getSessionIcons(session, index) {
                const profile = this.mentorProfile || 'sport';
                const sportIcons = ['⚽', '🎾', '🏀', '⚾', '🏈', '🥊', '🎯', '🚴', '🏋️', '🏃', '🏄', '🧗', '🎿', '🥋', '🤺', '🏇'];
                const medicineIcons = ['💆', '🧘', '🌿', '🪷', '🔮', '🕯️', '🌺', '🍃', '💧', '🤲', '✨', '🪐', '🫧', '🌸', '🏔️', '🌊', '🔥', '🧂', '🧴', '🪨'];
                const icons = profile === 'medicine' ? medicineIcons : sportIcons;
                const count = (session.traineeIds || []).length;
                const result = [];
                for (let i = 0; i < count; i++) {
                    const idx = (index * 3 + i) % icons.length;
                    result.push(icons[idx]);
                }
                return result;
            },
            get nowMinutes() {
                this.nowTick; // trigger reactivity
                const now = new Date();
                return now.getHours() * 60 + now.getMinutes();
            },
            sessionStartMin(session) {
                const [h, m] = (session.time || '0:00').split(':').map(Number);
                return h * 60 + (m || 0);
            },
            sessionEndMin(session) {
                const [h, m] = (session.endTime || session.time || '0:00').split(':').map(Number);
                return h * 60 + (m || 0);
            },
            isSessionNow(session) {
                const now = this.nowMinutes;
                const start = this.sessionStartMin(session);
                const end = this.sessionEndMin(session);
                return now >= start && now < end;
            },
            showNowLineAfter(session, allSessions) {
                const now = this.nowMinutes;
                const end = this.sessionEndMin(session);
                const sorted = allSessions
                    .filter(s => s.id !== session.id && s.date === session.date)
                    .slice()
                    .sort((a, b) => this.sessionStartMin(a) - this.sessionStartMin(b));
                const nextSession = sorted.find(s => this.sessionStartMin(s) > this.sessionStartMin(session));
                if (!nextSession) return false;
                return end <= now && now < this.sessionStartMin(nextSession);
            },
            hasSessionOn(date) { return this.sessions.some(w => w.date === date); },
            handleMouseScroll(e) { document.getElementById('calendar-container').scrollLeft += e.deltaY; },
            dragStart(event, index) { this.draggedIndex = index; },
            dragEnd() { this.draggedIndex = null; },

            getNearestSlot() {
                const now = new Date();
                const totalMin = Math.max(now.getHours() * 60 + now.getMinutes(), 7 * 60);
                const nextSlot = Math.ceil(totalMin / 30) * 30;
                const nh = Math.floor(nextSlot / 60) % 24;
                const nm = nextSlot % 60;
                return `${nh.toString().padStart(2, '0')}:${nm === 0 ? '00' : '30'}`;
            },

            slotToMin(t) {
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            },

            pickTime(t) {
                if (typeof t === 'number') {
                    const h = String(Math.floor(t / 60)).padStart(2, '0');
                    const m = String(t % 60).padStart(2, '0');
                    t = `${h}:${m}`;
                }
                if (this.isSlotPast(t)) return;
                if (this.isSlotOnCoachSession(t)) return;
                const tm = this.slotToMin(t);
                const sel = this.selectedCoachSlots;
                if (sel.length === 0) {
                    this.selectedCoachSlots = [tm];
                } else {
                    const sorted = [...sel].sort((a, b) => a - b);
                    const min = sorted[0], max = sorted[sorted.length - 1];
                    if (tm === max + 30) {
                        this.selectedCoachSlots = [...sorted, tm];
                    } else if (tm === min - 30) {
                        this.selectedCoachSlots = [tm, ...sorted];
                    } else if (tm >= min && tm <= max) {
                        this.selectedCoachSlots = [tm];
                    } else {
                        this.selectedCoachSlots = [tm];
                    }
                }
                const sorted = [...this.selectedCoachSlots].sort((a, b) => a - b);
                if (sorted.length) {
                    const sh = String(Math.floor(sorted[0] / 60)).padStart(2, '0');
                    const sm = String(sorted[0] % 60).padStart(2, '0');
                    const last = sorted[sorted.length - 1] + 30;
                    const eh = String(Math.floor(last / 60)).padStart(2, '0');
                    const em = String(last % 60).padStart(2, '0');
                    this.sessionForm.startTime = `${sh}:${sm}`;
                    this.sessionForm.endTime = `${eh}:${em}`;
                } else {
                    this.sessionForm.startTime = null;
                    this.sessionForm.endTime = null;
                }
            },

            isSlotOnCoachSession(t) {
                if (!this.sessionForm.date) return false;
                const tm = this.slotToMin(t);
                return this.sessions.some(s => {
                    if (s.date !== this.sessionForm.date) return false;
                    if (this.editingSessionId && s.id === this.editingSessionId) return false;
                    const [sh, sm] = s.time.split(':').map(Number);
                    const [eh, em] = (s.endTime || s.time).split(':').map(Number);
                    return tm >= sh * 60 + sm && tm < eh * 60 + em;
                });
            },

            nextSlot(t) {
                const m = this.slotToMin(t) + 30;
                const h = Math.floor(m / 60) % 24;
                return `${h.toString().padStart(2, '0')}:${m % 60 === 0 ? '00' : '30'}`;
            },

            getTimeClass(t) {
                if (this.isSlotPast(t)) return 'bg-[#1a1a1a] text-gray-700 line-through cursor-not-allowed opacity-30';
                if (this.isSlotOnCoachSession(t)) return 'bg-[#1a1a1a] text-gray-700 line-through cursor-not-allowed opacity-30';
                const tm = this.slotToMin(t);
                const sel = this.selectedCoachSlots;
                if (sel.includes(tm)) return 'bg-blue-600 text-white shadow-lg';
                const sorted = [...sel].sort((a, b) => a - b);
                if (sorted.length) {
                    const min = sorted[0], max = sorted[sorted.length - 1];
                    if (tm > min && tm < max) return 'bg-blue-500/20 text-blue-300';
                }
                if (this.sessionForm.traineeIds.length > 0 && this.hasSlotConflict(t)) return 'bg-red-900/20 text-red-400/60 line-through';
                return 'bg-[#262626] text-gray-400 hover:bg-[#333]';
            },

            coachCellStyle(mm) {
                const t = `${String(Math.floor(mm/60)).padStart(2,'0')}:${String(mm%60).padStart(2,'0')}`;
                if (this.isSlotPast(t)) return 'background:#1a1a1a; pointer-events:none';
                if (this.selectedCoachSlots.includes(mm)) return 'background:#3b82f5';
                if (this.isSlotOnCoachSession(t)) return 'background:#1a1a1a; pointer-events:none';
                if (this.sessionForm.traineeIds.length > 0 && this.hasSlotConflict(t)) return 'background:#1a1a1a; pointer-events:none';
                return 'background:#2a2a2a';
            },

            hasSlotConflict(t) {
                if (this.sessionForm.traineeIds.length === 0) return false;
                const tm = this.slotToMin(t);
                for (const aId of this.sessionForm.traineeIds) {
                    const key = aId + '|' + this.sessionForm.date;
                    const slots = this.availabilityMap[key];
                    if (!slots) continue;
                    const ok = slots.some(s => {
                        const ss = this.slotToMin(s.startTime);
                        const se = this.slotToMin(s.endTime);
                        return tm >= ss && tm < se;
                    });
                    if (!ok) return true;
                }
                return false;
            },

            get isSessionTimeValid() {
                const { startTime, endTime, date, traineeIds } = this.sessionForm;
                if (!startTime || !endTime || traineeIds.length === 0) return true;
                const sm = this.slotToMin(startTime);
                const em = this.slotToMin(endTime);
                for (const aId of traineeIds) {
                    const slots = this.availabilityMap[aId + '|' + date];
                    if (!slots || slots.length === 0) continue;
                    const ok = slots.some(s => {
                        const ss = this.slotToMin(s.startTime);
                        const se = this.slotToMin(s.endTime);
                        return sm >= ss && em <= se;
                    });
                    if (!ok) return false;
                }
                return true;
            },

            getDurationLabel() {
                if (!this.sessionForm.startTime || !this.sessionForm.endTime) return '';
                const diff = this.slotToMin(this.sessionForm.endTime) - this.slotToMin(this.sessionForm.startTime);
                const h = Math.floor(diff / 60);
                const m = diff % 60;
                if (h > 0 && m > 0) return `${h} год ${m} хв`;
                if (h > 0) return `${h} год`;
                return `${m} хв`;
            },

            sessionDuration(session) {
                if (!session || !session.time || !session.endTime) return '';
                const diff = this.slotToMin(session.endTime) - this.slotToMin(session.time);
                const h = Math.floor(diff / 60);
                const m = diff % 60;
                if (h > 0 && m > 0) return `${h} год ${m} хв`;
                if (h > 0) return `${h} год`;
                return `${m} хв`;
            },

            async drop(event, targetIndex) {
                if (this.draggedIndex === null || this.draggedIndex === targetIndex) return;
                const list = this.filteredSessions; const dragged = list[this.draggedIndex]; const target = list[targetIndex];
                if (dragged.date < this.todayStr) return;
                const ts = dragged.time; const te = dragged.endTime;
                dragged.time = target.time; dragged.endTime = target.endTime;
                target.time = ts; target.endTime = te;
                await this.saveRaw(dragged); await this.saveRaw(target);
                this.draggedIndex = null; await this.fetchData();
            },

            async saveRaw(w) { await fetch('/api/v1/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...w, mentorId: this.mentorId }) }); },

            openSessionModal() {
                this.traineeSearch = '';
                this.editingSessionId = null;
                this.originalSessionData = null;
                this.sessionForm = { title: this.labels.session_title_default || 'Тренування', description: '', date: this.selectedDate, startTime: null, endTime: null, traineeIds: [], locationId: null };

            editSession(w) {

                if (w.time && w.endTime) {
                    const slots = [];
                    let t = this.slotToMin(w.time);
                    const end = this.slotToMin(w.endTime);
                    while (t < end) { slots.push(t); t += 30; }
                    this.selectedCoachSlots = slots;
                } else {
                    this.selectedCoachSlots = [];
                }
                this.showModal = true;

            createFromAvailability(traineeId, date, startTime, endTime) {
                this.showAvailabilityOverview = false;

                    const slots = [];

            async saveSession() {

                if (!this.isSessionTimeValid) return;

                if (this.editingSessionId && this.originalSessionData) {
                    if (date !== this.originalSessionData.date || newTime !== this.originalSessionData.time) {
                        await fetch(`/api/v1/sessions/${this.editingSessionId}`, { method: 'DELETE' });
                    }
                }
                const payload = {
                    id: (this.editingSessionId && date === this.originalSessionData?.date && newTime === this.originalSessionData?.time) ? this.editingSessionId : null,
                    title, description, date, mentorId: this.mentorId,
                    time: newTime, endTime,
                    traineeIds, locationId
                };
                await fetch('/api/v1/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                this.showModal = false; await this.fetchData();
            },

            },
