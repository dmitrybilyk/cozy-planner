<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Planner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cozy Planner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/mentor-view.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/mentor-view.css">
</head>
<body class="antialiased flex flex-col h-screen" x-data="calendarApp()">

<div x-show="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60" style="top: 0; left: 0; width: 100%; height: 100%;">
    <div class="flex flex-col items-center gap-4">
        <svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="text-white text-lg font-bold">Завантаження…</span>
    </div>
</div>

<!-- ВЕРХНЯ СЕКЦІЯ: навігація та кнопки -->
<header class="flex-shrink-0 bg-[#1a1a1a]/95 backdrop-blur-lg border-b border-[#333] shadow-md">
    <!-- Ряд 1: Профіль, День/План, Сповіщення, Вихід -->
    <div class="px-3 sm:px-4 h-14 sm:h-16 flex items-center justify-between">
        <div @click="activeTab = 'profile'" class="flex items-center space-x-2 sm:space-x-3 min-w-0 cursor-pointer rounded-lg px-2 py-1.5 transition"
             :class="activeTab === 'profile' ? 'bg-white/10' : 'hover:bg-white/5'">
            <div class="ig-ring w-7 h-7 sm:w-9 sm:h-9 flex items-center justify-center flex-shrink-0">
                <template x-if="photoUrl">
                    <img :src="photoUrl" class="w-full h-full rounded-full object-cover">
                </template>
                <template x-if="!photoUrl">
                    <div class="bg-black rounded-full w-full h-full flex items-center justify-center">
                        <span class="text-[8px] sm:text-[10px] font-black italic ig-gradient-text">CP</span>
                    </div>
                </template>
            </div>
            <div class="leading-tight truncate">
                <h1 class="text-[11px] sm:text-sm font-bold truncate" x-text="mentor.name || 'Cozy Planner'"></h1>
                <p x-show="user.email" class="text-[8px] sm:text-[9px] text-gray-500 font-medium truncate" x-text="user.email"></p>
            </div>
            <svg class="w-3 h-3 text-gray-500 flex-shrink-0 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
        </div>
        <div class="flex bg-[#262626] p-0.5 sm:p-1 rounded-xl flex-shrink-0">
            <button @click="activeTab = 'feed'" class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg transition flex items-center gap-1" :class="activeTab === 'feed' ? 'bg-[#444] text-blue-400' : 'text-gray-500'">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <span class="text-[9px] sm:text-[10px] font-black uppercase tracking-wider" x-text="labels.today_short || 'День'"></span>
            </button>
            <button @click="activeTab = 'agenda'; loadFutureSessions()" class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg transition flex items-center gap-1" :class="activeTab === 'agenda' ? 'bg-[#444] text-blue-400' : 'text-gray-500'">
                <span class="text-[9px] sm:text-[10px] font-black uppercase tracking-wider">План</span>
            </button>
        </div>
         <form method="POST" action="/logout" id="logoutForm" class="hidden"></form>
         
          <button @click="activeTab = 'notifications'" class="relative mr-1 text-lg"
                  :class="activeTab === 'notifications' ? 'text-blue-400' : ''">
              🔔
              <span x-show="unreadCount > 0" class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold rounded-full min-w-[14px] h-[14px] flex items-center justify-center px-1 leading-none" x-text="unreadCount"></span>
          </button>

          
          <button onclick="document.getElementById('logoutForm').submit()" class="flex-shrink-0"><svg class="w-5 h-5 sm:w-6 sm:h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
    </div>
    <!-- Ряд 2: Кнопки дій -->
    <div class="px-2 sm:px-4 pb-2 sm:pb-3 flex gap-2">
        <button @click="openSessionModal()" :disabled="selectedDate < todayStr" class="flex-1 flex items-center justify-center bg-blue-600 hover:bg-blue-700 active:scale-[0.97] text-white py-3 rounded-2xl shadow-lg transition disabled:opacity-30 disabled:cursor-not-allowed disabled:active:scale-100" :title="labels.new_session || 'Нова сесія'">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
        <button @click="activeTab = 'trainees'" class="flex-1 flex items-center justify-center py-3 rounded-2xl transition"
                :class="activeTab === 'trainees' ? 'bg-[#333] ring-2 ring-emerald-400' : 'bg-[#262626] hover:bg-[#333]'"
                :title="labels.manage_trainees || 'Учні'">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <button @click="activeTab = 'locations'" class="flex-1 flex items-center justify-center py-3 rounded-2xl transition"
                :class="activeTab === 'locations' ? 'bg-[#333] ring-2 ring-rose-400' : 'bg-[#262626] hover:bg-[#333]'"
                :title="labels.locations || 'Місця'">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <button @click="activeTab = 'coach-availability'; loadCoachAvailability()" class="flex-1 flex items-center justify-center py-3 rounded-2xl transition"
                :class="activeTab === 'coach-availability' ? 'bg-[#333] ring-2 ring-violet-400' : 'bg-[#262626] hover:bg-[#333]'"
                :title="'Доступність ' + (labels.mentor || 'тренера').toLowerCase()">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </button>
        <button @click="activeTab = 'availability-overview'" class="flex items-center justify-center py-3 px-3 rounded-2xl transition"
                :class="activeTab === 'availability-overview' ? 'bg-[#333] ring-2 ring-amber-400' : 'bg-[#262626] hover:bg-[#333]'"
                :title="'Доступність ' + (labels.trainees || 'учнів').toLowerCase()">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </button>
    </div>
    <!-- Ряд 3: Історія + Смуга днів -->
    <div class="bg-[#1a1a1a] border-b border-[#333]">
        <div class="flex items-center px-4 pt-4 pb-4 gap-2">
            <button @click="activeTab = 'history'; loadPastSessions()"
                    class="flex-shrink-0 flex flex-col items-center justify-center w-14 h-14 rounded-xl transition-all"
                    :class="activeTab === 'history' ? 'bg-[#444] ring-2 ring-blue-400' : 'bg-[#333] hover:bg-[#444]'"
                    title="Історія">
                <span class="text-lg">📋</span>
                <span class="text-[6px] font-black text-gray-400 uppercase mt-0.5">Історія</span>
            </button>
            <div id="calendar-container" class="flex-1 flex overflow-x-auto no-scrollbar space-x-5 scroll-smooth" @wheel.passive="handleMouseScroll($event)">
             <template x-for="day in visibleDays" :key="day.dateStr">
                <button @click="selectDay(day.dateStr)"
                        :id="'date-btn-' + day.dateStr"
                        class="flex-shrink-0 flex flex-col items-center min-w-[64px]"
                        :class="day.isMonday ? 'week-start' : ''">
                    <div class="w-14 h-14 rounded-xl p-[2px] flex items-center justify-center transition-all relative"
                         :class="[selectedDate === day.dateStr ? 'ig-gradient shadow-lg' : (day.isWeekend || isDayOff(day.dateStr) ? 'bg-[#5a2525]' : 'bg-[#333]'), day.dateStr === todayStr ? 'today-marker' : '']">
                        <div class="w-full h-full rounded-xl bg-black flex flex-col items-center justify-center border-2 border-black">
                            <span class="text-[9px] font-bold text-gray-500 uppercase" x-text="day.weekday"></span>
                            <span class="text-sm font-bold text-white" x-text="day.dayNum"></span>
                        </div>
                    </div>
                    <span x-show="day.dateStr === todayStr" class="text-[7px] font-black text-white uppercase mt-1 tracking-tighter" x-text="labels.today || 'Сьогодні'"></span>
                    <div x-show="isDayOff(day.dateStr)" class="text-[7px] font-black text-red-400 uppercase mt-0.5">✕</div>
                    <div x-show="sessionCountOn(day.dateStr) > 0 && !isDayOff(day.dateStr)" class="mt-0.5 text-[8px] font-bold text-blue-400" x-text="sessionCountOn(day.dateStr)"></div>
                </button>
            </template>
        </div>
    </div>
    </div>
</header>

<!-- НИЖНЯ СЕКЦІЯ: контент -->
<main class="flex-1 overflow-y-auto">

    <!-- ДЕНЬ -->
    <div x-show="activeTab === 'feed'" class="max-w-2xl mx-auto p-4 pb-24">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-sm sm:text-base font-black text-gray-500 uppercase tracking-widest" x-text="formatDisplayDate(selectedDate)"></h2>
            <button @click="selectedDate = todayStr; $nextTick(() => scrollToToday())" class="text-xs sm:text-sm font-bold text-blue-400 uppercase" x-text="labels.today || 'Сьогодні'"></button>
        </div>
        <div class="space-y-4">
            <template x-for="(session, index) in filteredSessions" :key="session.id">
                <div>
                    <div x-show="showNowLineAfter(session, filteredSessions)"
                         class="my-3 flex items-center gap-2">
                        <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                        <span class="text-[9px] font-bold text-red-500 uppercase tracking-wider flex-shrink-0 px-1">● NOW</span>
                        <div class="h-px flex-1 bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
                    </div>
                    <div draggable="true" @dragstart="dragStart($event, index)" @dragend="dragEnd" @dragover.prevent @drop="drop($event, targetIndex(session.id))"
                         @click="handleCardClick(session, index)"
                         :data-session-id="session.id"
                         :id="'session-card-' + session.id"
                         class="rounded-3xl p-5 shadow-sm card-hover fade-in relative overflow-hidden"
                         :class="[draggedIndex === index ? 'dragging' : '', getCardBorderClass(session)]"
                         :style="'border-left: 5px solid ' + (session.color || '#3b82f6')">
                        <div x-show="isSessionNow(session)" 
                             class="absolute inset-0 bg-gradient-to-r from-red-500/5 to-transparent pointer-events-none"></div>
                        <div class="flex items-center space-x-4">
                        <div class="flex flex-col items-center">
                            <div class="relative flex flex-col items-center justify-center rounded-2xl px-3 py-2 min-w-[70px] border border-[#333]"
                                 :style="'background: ' + (session.color || '#3b82f6') + '33'">
                                <span x-show="isSessionNow(session)" 
                                      class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span>
                                <span class="text-xl sm:text-2xl font-black leading-none" :style="'color: ' + (session.color || '#3b82f6')" x-text="convertTz(session.time, session.date, timezone) + ' — ' + (session.endTime ? convertTz(session.endTime, session.date, timezone) : '')"></span>
                                <span class="text-[9px] font-bold text-gray-500 mt-0.5" x-text="sessionDuration(session)"></span>
                            </div>
                            <div x-show="session.createdBy === 'COACH' && (session.confirmationStatus === 'NONE' || session.confirmationStatus === 'REJECTED')" class="mt-1">
                                <button @click.stop="requestTraineeConfirmation(session)" class="text-[9px] font-bold text-yellow-400 uppercase tracking-wider text-center leading-tight">Запитати підтвердження учня</button>
                            </div>
                        </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <p class="text-base sm:text-lg font-bold text-gray-100 truncate" x-text="session.title"></p>
                                    <span x-show="isSessionNow(session)" 
                                          class="text-[9px] font-bold text-red-500 uppercase tracking-wider animate-pulse flex-shrink-0">● NOW</span>
                                </div>
                                <p class="text-sm text-gray-500 italic truncate" x-text="session.description"></p>
                                <div class="flex flex-wrap gap-1 mt-2">
                                    <template x-for="aId in session.traineeIds"><span class="inline-flex items-center gap-1 text-xs sm:text-sm bg-[#333] px-2.5 py-0.5 rounded-full font-semibold text-gray-300"><span x-show="session.confirmationStatus === 'PENDING' || session.confirmationStatus === 'CONFIRMED'" class="text-xs" :class="getTraineeConfirmStatus(aId, session) === 'confirmed' ? 'text-green-400' : (getTraineeConfirmStatus(aId, session) === 'rejected' ? 'text-red-400' : 'text-yellow-400')" x-text="getTraineeConfirmStatus(aId, session) === 'confirmed' ? '✓' : (getTraineeConfirmStatus(aId, session) === 'rejected' ? '✕' : '⏳')"></span><span x-show="session.confirmationStatus !== 'PENDING' && session.confirmationStatus !== 'CONFIRMED'" class="w-1.5 h-1.5 rounded-full" :class="isAvailable(aId, session.date)?.length > 0 ? 'bg-green-500' : isAvailable(aId, session.date) !== null ? 'bg-red-500' : 'bg-gray-600'"></span><span x-text="getTraineeName(aId)"></span></span></template>
                                </div>
                                <div x-show="session.confirmationStatus === 'PENDING'" class="flex flex-wrap gap-1 mt-1">
                                    <span class="inline-flex items-center gap-1 text-[10px] font-bold uppercase px-2 py-0.5 rounded-full"
                                          :class="getConfirmationBadgeClass(session.confirmationStatus)">
                                        <span x-text="getConfirmationLabel(session.confirmationStatus)"></span>
                                    </span>
                                </div>
                                <div x-show="session.createdBy === 'COACH' && session.confirmationStatus === 'PENDING'" class="mt-2">
                                    <button @click.stop="confirmSession(session.id)" class="flex items-center justify-center w-10 h-10 bg-blue-600/30 text-blue-400 rounded-xl hover:bg-blue-600/50 transition" title="Підтвердити вручну">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                                    </button>
                                </div>
                                <div x-show="getLocationName(session.locationId)" class="mt-1.5 flex items-center space-x-1">
                                    <span class="w-2 h-2 rounded-full" :style="'background: ' + (session.color || '#3b82f6')"></span>
                                    <span class="text-xs text-gray-500 font-medium" x-text="getLocationName(session.locationId)"></span>
                                </div>
                                <div class="flex items-center gap-4 mt-2">
                                    <button @click.stop="copySession(session)" class="text-blue-400 hover:text-blue-300 transition p-1" title="Копіювати">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                    </button>
                                    <button @click.stop="exportToGCal(session)" class="p-1" title="Google Календар">
                                        <svg class="w-6 h-6" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H5V8h14v11z" fill="#4285F4"/><rect x="7" y="10" width="4" height="4" rx="0.5" fill="#EA4335"/><rect x="13" y="10" width="4" height="4" rx="0.5" fill="#FBBC04"/><rect x="7" y="16" width="4" height="4" rx="0.5" fill="#34A853"/><rect x="13" y="16" width="4" height="4" rx="0.5" fill="#4285F4"/></svg>
                                    </button>
                                </div>
                                <div x-show="session.createdBy === 'TRAINEE' && session.confirmationStatus === 'PENDING'" class="flex gap-3 mt-2">
                                    <button @click.stop="confirmSession(session.id)" class="flex items-center justify-center w-10 h-10 bg-green-600/30 text-green-400 rounded-xl hover:bg-green-600/50 transition" title="Підтвердити">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                                    </button>
                                    <button @click.stop="rejectSession(session.id)" class="flex items-center justify-center w-10 h-10 bg-red-600/30 text-red-400 rounded-xl hover:bg-red-600/50 transition" title="Відмінити">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex flex-col items-center gap-1 flex-shrink-0 ml-1">
                                <template x-for="(icon, i) in getSessionIcons(session, index)" :key="i">
                                    <span class="text-base sm:text-lg" x-text="icon"></span>
                                </template>
                                <button @click.stop="handleConfirmAction(session)"
                                        x-show="session.createdBy === 'COACH' && session.confirmationStatus === 'NONE'"
                                        class="text-gray-500 hover:text-gray-300 transition" title="Запитати підтвердження">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
                                </button>
                                <span x-show="session.confirmationStatus === 'PENDING'"
                                      class="text-yellow-500" title="Очікує підтвердження">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                </span>
                                <span x-show="session.confirmationStatus === 'CONFIRMED'"
                                      class="text-green-500" title="Підтверджено">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                </span>
                                <span x-show="session.confirmationStatus === 'REJECTED'"
                                      class="text-red-500" title="Відхилено">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredSessions.length === 0" class="text-center py-20 text-gray-600 text-sm italic" x-text="labels.no_sessions || 'Немає тренувань на цей день'"></div>
        </div>
    </div>

    <!-- ПЛАН -->
    <div x-show="activeTab === 'agenda'" class="max-w-2xl mx-auto p-4 pb-24">
        <h3 class="text-sm sm:text-base font-black text-gray-500 uppercase tracking-widest mb-6">📅 Наступні дні</h3>
        <div x-show="!agendaReady" class="flex flex-col items-center justify-center py-20">
            <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <span class="text-sm text-gray-500">Завантаження…</span>
        </div>
        <template x-for="dateGroup in agendaGroups" :key="dateGroup.date">
            <div class="space-y-3 mb-6">

                            </div>
                        </template>
                        <div x-show="filteredTrainees.length === 0 && traineeSearch" class="text-center py-6 text-gray-600 text-xs" x-text="labels.not_found || 'Нічого не знайдено'"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer flex space-x-3">
            <button @click="showModal = false; sessionValidationErrors = null" class="flex-1 py-4 font-bold text-gray-500 uppercase text-sm" x-text="labels.cancel || 'Скасувати'"></button>
            <button @click="saveSession()" :class="saveBtnClass" x-text="labels.save || 'Зберегти'"></button>
        </div>
    </div>
</div>

<div x-show="sessionValidationErrors" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition @click="sessionValidationErrors = null">
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[360px] rounded-[24px] overflow-hidden shadow-2xl" @click.stop>
        <div class="p-6">
            <h4 class="text-lg font-bold text-red-400 mb-3" x-text="labels.cannot_save || 'Неможливо зберегти'"></h4>
            <ul class="space-y-2">
                <template x-for="error in sessionValidationErrors" :key="error">
                    <li class="text-sm text-gray-300 flex items-start gap-2">
                        <span class="text-red-400 mt-0.5 shrink-0">•</span>
                        <span x-text="error"></span>
                    </li>
                </template>
            </ul>
        </div>
        <div class="border-t border-[#333]">
            <button @click="sessionValidationErrors = null" class="w-full py-4 text-sm font-bold text-white">Зрозуміло</button>
        </div>
    </div>
</div>

<div x-show="confirmData.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-[300px] rounded-[24px] overflow-hidden shadow-2xl"><div class="p-6 text-center text-white"><h4 class="text-lg font-bold" x-text="confirmData.title"></h4><p class="text-sm text-gray-500 mt-2" x-text="confirmData.message"></p></div><div class="flex flex-col border-t border-[#333]"><button @click="confirmData.onConfirm(); confirmData.show = false" class="py-4 text-sm font-bold border-b border-[#333]" :class="confirmData.confirmText === 'Видалити' || !confirmData.confirmText ? 'text-red-500' : 'text-yellow-400'" x-text="confirmData.confirmText || 'Видалити'"></button><button @click="confirmData.show = false" class="py-4 text-sm font-medium text-gray-300">Скасувати</button></div></div>
</div>

<div x-show="notifyModal.show" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" x-cloak x-transition>
    <div class="bg-[#1c1c1c] border border-[#333] w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6">
            <h4 class="text-lg font-bold text-white mb-1" x-text="labels.request_availability_title || '📲 Запросити доступність'"></h4>
            <p class="text-sm text-gray-400 mb-4"><span x-text="labels.request_availability_body || 'Надішліть запит учневі: '"></span><span x-text="notifyModal.traineeName"></span></p>
            
            <div class="mb-4">
                <label class="text-xs font-bold text-gray-500 uppercase mb-3 block">Період:</label>
                <div class="flex gap-2">
                    <button @click="notifyModal.dayType = 'tomorrow'" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'tomorrow' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Завтра
                    </button>
                    <button @click="notifyModal.dayType = 'specific_day'; notifyModal.targetDate = ''" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'specific_day' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Обрати день
                    </button>
                    <button @click="notifyModal.dayType = 'weekend'" 
                            class="flex-1 py-3 rounded-xl text-sm font-bold transition"
                            :class="notifyModal.dayType === 'weekend' ? 'bg-blue-600 text-white' : 'bg-[#262626] text-gray-400 hover:bg-[#333]'">
                        Вихідні
                    </button>
                </div>
                <div x-show="notifyModal.dayType === 'specific_day'" class="mt-3">
                    <input type="date" x-model="notifyModal.targetDate" 
                           class="w-full bg-[#262626] text-white rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            
            <div class="mb-6">
                <label class="text-xs font-bold text-gray-500 uppercase mb-2 block" x-text="labels.comment_optional || `Коментар (необов'язково):`"></label>
                <textarea x-model="notifyModal.customMessage" 
                          :placeholder="labels.comment_placeholder || &quot;наприклад: 'на два дні', 'на наступний тиждень'&quot;"
                          class="w-full bg-[#262626] text-white rounded-xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                          rows="2"></textarea>
            </div>
            
            <div class="flex gap-3">
                <button @click="closeNotifyModal()" 
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-gray-400 bg-[#262626]"
                        x-text="labels.cancel || 'Скасувати'">
                </button>
                <button @click="sendNotifyTrainee()" 
                        class="flex-1 py-3 rounded-xl text-sm font-bold text-white bg-blue-600"
                        x-text="labels.send || 'Надіслати'">
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
